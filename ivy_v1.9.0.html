 "follow_up": "When your team needs investor-level waterfall output, where does that calculation happen \u2014 in Allvue or somewhere else?"}, "investran": {"name": "Investran", "reframe": "Everyone with Investran still lives in Excel for calcs. Complementary positioning.", "talk_track": "Investran is widely used for fund-level accounting. The pattern is that even with Investran, investor-level performance \u2014 waterfalls, fees, carry \u2014 still lives in Excel. A performance book of record c", "follow_up": "For the calculations outside Investran today \u2014 waterfalls, carry, investor allocations \u2014 where does that logic live?"}, "efront": {"name": "eFront", "reframe": "GL complement. eFront does accounting, performance layer does the rest.", "talk_track": "eFront is solid for GL and fund accounting \u2014 especially customized instances. Investor-level performance, waterfalls, and scenario modeling typically still live in Excel or custom solutions. Integrati", "follow_up": "How customized is your eFront instance \u2014 and what still lives outside of it in Excel?"}, "yardi": {"name": "Yardi", "reframe": "Yardi = property-level accounting. Fund-level performance is the gap.", "talk_track": "Yardi handles property-level accounting well. The gap is at the fund level \u2014 investor-level waterfalls, promote structures, co-invest allocations, feeder/blocker rollups. Those calculations sit on top", "follow_up": "After data comes out of Yardi, where do fund-level and investor-level calculations happen?"}, "anaplan": {"name": "Anaplan", "reframe": "General-purpose planning tool vs. purpose-built fund calc engine. Consultant army required.", "talk_track": "Anaplan is powerful for FP&A and general planning. Configuring it for fund accounting \u2014 LPA terms, waterfall tiers, investor allocations \u2014 requires significant consulting investment and a dedicated te", "follow_up": "Has the team scoped what an Anaplan implementation would require in terms of consulting and ongoing internal resources?"}, "ss&c": {"name": "SS&C (TNR / GlobeOps)", "reframe": "Legacy platform. Robust but resource-intensive. Position as agile, cost-effective alternative.", "talk_track": "SS&C has built capabilities through decades of acquisitions. TNR supports complex structures. The trade-off is implementation complexity, cost, and limited fund-side visibility. An independent platfor", "follow_up": "How much control do you have today over how calculations are done \u2014 do you set the rules, or does your admin?"}, "chronograph": {"name": "Chronograph", "reframe": "Complementary \u2014 portfolio management vs. fund performance. They feed us, we don't replace them.", "talk_track": "Chronograph is a portfolio management tool \u2014 strong at deal-level data, company metrics, valuations. It doesn't do investor-level performance, waterfall calculations, or admin reconciliation. A perfor", "follow_up": "How does your portfolio data from Chronograph connect to your investor-level reporting today \u2014 is there manual work in between?"}, "ilevel": {"name": "iLevel (MSCI)", "reframe": "Same as Chronograph \u2014 portfolio monitoring vs. fund performance.", "talk_track": "iLevel handles portfolio monitoring and company-level data well. The gap is the same as Chronograph \u2014 it doesn't calculate investor-level waterfalls, management fees, or carried interest. Those calcul", "follow_up": "Does your iLevel data flow directly into your investor reporting, or is there a manual step in between where waterfalls and allocations get calculated?"}, "arcesium": {"name": "Arcesium", "reframe": "Arcesium is enterprise-focused and broad. Position on specialization depth and right-sizing.", "talk_track": "Arcesium offers an enterprise platform across multiple asset classes. For firms focused on closed-end fund structures \u2014 PE, real estate, credit \u2014 the question is whether a broad enterprise platform or", "follow_up": "What drew you to Arcesium specifically \u2014 was it the breadth of their platform, or specific capabilities around fund calculations?"}, "deloitte": {"name": "Deloitte Cascade Suite", "reframe": "Consulting-grade solution. More expensive, longer implementation. Position as agile and cost-efficient.", "talk_track": "Deloitte's Cascade is designed for large enterprises needing fully integrated solutions with deep compliance and risk management. For firms that don't need the full Deloitte suite, a more agile platfo", "follow_up": "Is the interest in Cascade driven by your auditor relationship, or by a specific capability you're looking for?"}, "cascata": {"name": "Cascata Solutions", "reframe": "Waterfall point solution vs. full performance book of record.", "talk_track": "Cascata offers solid waterfall calculation tools. The question is whether the need is only the calc, or the full workflow \u2014 capital calls, distributions, management fees, admin reconciliation, and rep", "follow_up": "Is the primary need waterfall calculations specifically, or does it extend into the full fund operations workflow?"}, "lemonedge": {"name": "Lemonedge", "reframe": "Similar thesis, different execution. Differentiate on proven client base and breadth.", "talk_track": "Lemonedge has a similar thesis \u2014 replacing Excel with auditable workflows. The differentiation comes down to depth of the calculation engine, breadth of fund types validated, and the reference base of", "follow_up": "What matters most to you \u2014 breadth of fund type coverage, depth of waterfall logic, or speed of implementation?"}, "workiva": {"name": "Workiva / BI tools (Tableau, Power BI, Sigma)", "reframe": "BI tools need clean data. If the source is Excel, the BI layer inherits the mess.", "talk_track": "BI tools are great for visualization and reporting. But they need clean, structured data to work with. If performance data lives in 15 different Excel files, no BI tool can fix the underlying data qua", "follow_up": "What's the primary data source for your BI dashboards today \u2014 and how much manual preparation goes into getting that data ready?"}}, "thread_map": {"key_person": ["dq-001", "dq-005", "dq-003"], "admin_validation": ["dq-008", "dq-010", "dq-009"], "side_letter_complexity": ["dq-004", "dq-006", "dq-002"], "leadership_and_eb": ["dq-007", "dq-013", "dq-011"], "future_state": ["dq-012", "dq-006", "dq-017"], "data_access": ["dq-014", "dq-009"], "competitor_eval": ["dq-023", "dq-015"], "champion_and_close": ["dq-018", "dq-022", "dq-019", "dq-020", "dq-021"]}, "m2_recovery": {"never_skip": ["dq-026", "dq-029", "dq-031", "dq-033", "dq-034", "dq-035", "dq-036"], "drop_first": ["dq-024", "dq-032"]}, "posture_states": {"open": {"label": "Open", "description": "Buyer is engaged, asking questions, sharing information freely. No defensiveness detected.", "judgment_note": ""}, "curious": {"label": "Curious", "description": "Buyer is interested but non-committal. Asking surface questions. Hasn't revealed pain or process details yet.", "judgment_note": ""}, "defensive": {"label": "Defensive", "description": "Buyer is protecting their current process. Active resistance to the idea that something is wrong. Status quo defense is dominant.", "judgment_note": ""}, "defensive_but_cracking": {"label": "Defensive but Cracking", "description": "Buyer defends their process but keeps describing friction. They say 'it works' but then describe manual steps, workarounds, or dependencies. The defense and the evidence contradict each other.", "judgment_note": "This is the most important posture to detect. It means the buyer KNOWS there's a problem but isn't ready to say it. The right move is NOT to push harder \u2014 it's to give them permission to acknowledge what they already know. Credibility stories work here. Hard reframes don't."}, "pain_acknowledged": {"label": "Pain Acknowledged", "description": "Buyer has explicitly named a problem, risk, or fragility. They're past defending the status quo. Discovery should deepen, not restart.", "judgment_note": ""}, "politically_cautious": {"label": "Politically Cautious", "description": "Buyer is interested but filtering for colleagues, boss, or committee. They won't say what they really think because someone else is listening or will hear about it.", "judgment_note": ""}, "evaluative": {"label": "Evaluative", "description": "Buyer is actively comparing options. They're past pain \u2014 they know they need something. Now they're deciding what and from whom.", "judgment_note": ""}, "stalling": {"label": "Stalling", "description": "Buyer was engaged but momentum has stopped. They're not rejecting \u2014 they're avoiding commitment. Timeline is pushing out.", "judgment_note": ""}, "championing": {"label": "Championing", "description": "Buyer is selling internally on your behalf. They're asking how to make the case, what to show their boss, how to justify the spend. This is your champion.", "judgment_note": ""}}, "posture_transitions": [{"id": "pt-001", "from": "curious", "to": "open", "post_move_result": "engaged", "rationale": "Buyer moved from surface curiosity to active engagement. They're sharing real information."}, {"id": "pt-002", "from": "curious", "to": "defensive", "post_move_result": "resisted", "rationale": "The question hit a nerve. Buyer shifted from passive curiosity to active defense."}, {"id": "pt-003", "from": "curious", "to": "politically_cautious", "post_move_result": "deflected", "rationale": "Buyer deflected rather than resisted. They may be filtering for someone else in the room or someone who will hear about this."}, {"id": "pt-004", "from": "open", "to": "defensive", "post_move_result": "resisted", "rationale": "An open buyer who resists has encountered a specific topic that triggers defensiveness. The defense is topic-specific, not general."}, {"id": "pt-005", "from": "open", "to": "pain_acknowledged", "post_move_result": "engaged", "rationale": "Open buyer who engages deeply with pain questions and uses acknowledgment language has crossed the threshold."}, {"id": "pt-006", "from": "open", "to": "evaluative", "post_move_result": "", "rationale": "Buyer shifted from sharing information to comparing options. They know they have a problem \u2014 now they're deciding how to solve it."}, {"id": "pt-007", "from": "open", "to": "politically_cautious", "post_move_result": "deflected", "rationale": "Two consecutive deflections from an open buyer means they hit a political boundary. They're willing to share but not about certain topics."}, {"id": "pt-008", "from": "defensive", "to": "defensive_but_cracking", "post_move_result": ["engaged", "neutral"], "rationale": "Buyer is defending but just described friction. The defense and the evidence contradict \u2014 this is the cracking point."}, {"id": "pt-009", "from": "defensive", "to": "defensive", "post_move_result": "resisted", "rationale": "Continued resistance hardens the defensive posture. Don't try to transition \u2014 increase certainty that defense is the state."}, {"id": "pt-010", "from": "defensive", "to": "curious", "post_move_result": "engaged", "rationale": "A story broke through the defense. Buyer didn't acknowledge pain but dropped the defensive posture. Reset to curious \u2014 don't push too fast."}, {"id": "pt-011", "from": "defensive_but_cracking", "to": "pain_acknowledged", "post_move_result": "engaged", "rationale": "The crack became a break. Buyer explicitly acknowledged the problem or accumulated enough fragility evidence without new defenses. This is the most important transition in the system."}, {"id": "pt-012", "from": "defensive_but_cracking", "to": "defensive", "post_move_result": "resisted", "rationale": "The crack closed. Buyer re-engaged their defense. The AE pushed too hard or the wrong topic. Fall back to defensive and let move_evaluation switch tactics."}, {"id": "pt-013", "from": "defensive_but_cracking", "to": "politically_cautious", "post_move_result": "deflected", "rationale": "They're cracking on the problem but deflecting on authority. They know there's an issue but can't or won't discuss who decides."}, {"id": "pt-014", "from": "pain_acknowledged", "to": "evaluative", "post_move_result": "", "rationale": "Buyer moved from acknowledging the problem to evaluating solutions. Discovery shifts to differentiation."}, {"id": "pt-015", "from": "pain_acknowledged", "to": "championing", "post_move_result": "advanced", "rationale": "Buyer went from acknowledging pain to taking ownership of the internal process. They're selling for you."}, {"id": "pt-016", "from": "pain_acknowledged", "to": "stalling", "post_move_result": ["neutral", "deflected"], "rationale": "They acknowledged the pain but stopped engaging. Something is blocking momentum \u2014 could be internal politics, competing priorities, or lost conviction."}, {"id": "pt-017", "from": "politically_cautious", "to": "open", "post_move_result": "engaged", "rationale": "Backing off the political topics and returning to safe process questions reopened the buyer. They'll share when they feel safe."}, {"id": "pt-018", "from": "politically_cautious", "to": "championing", "post_move_result": "advanced", "rationale": "The cautious buyer just started selling. They were cautious because they care \u2014 and now they're committing."}, {"id": "pt-019", "from": "evaluative", "to": "championing", "post_move_result": "advanced", "rationale": "Evaluative buyer who starts asking about implementation has made their decision. They're now planning, not evaluating."}, {"id": "pt-020", "from": "evaluative", "to": "stalling", "post_move_result": ["neutral", "deflected"], "rationale": "Evaluative buyer who goes quiet and starts mentioning timing concerns is stalling. The evaluation has lost momentum."}, {"id": "pt-021", "from": "stalling", "to": "pain_acknowledged", "post_move_result": "engaged", "rationale": "A story or cost-of-inaction reframe broke through the stall. Buyer reconnected with the pain."}, {"id": "pt-022", "from": "stalling", "to": "evaluative", "post_move_result": "engaged", "rationale": "Stalling buyer who re-engages with evaluation questions has found renewed interest. They were stalling on timing, not on interest."}, {"id": "pt-023", "from": "championing", "to": "politically_cautious", "post_move_result": "deflected", "rationale": "Champion was enthusiastic until the AE asked about EB access. They're championing the product but gatekeeping the decision-maker. This is the most dangerous transition \u2014 the deal can die here."}, {"id": "pt-024", "from": "championing", "to": "stalling", "post_move_result": ["neutral", "deflected"], "rationale": "Champion who goes quiet may have hit internal resistance they haven't disclosed. Four consecutive flat responses from someone who was championing is a red flag."}, {"id": "pt-025", "from": "*", "to": "championing", "post_move_result": "advanced", "rationale": "Regardless of where the buyer was, an 'advanced' post-move result means they're now actively moving the deal forward. Recognize it immediately."}, {"id": "pt-026", "from": "*", "to": "defensive", "post_move_result": "resisted", "rationale": "Two consecutive resistances from any posture means something is seriously wrong. Stop the current approach. Move_evaluation rules me-001 and me-008 will activate automatically."}], "post_move_classifier": {"engaged": {"phrases": ["that's exactly what we're dealing with", "funny you mention that", "we actually had that happen", "tell me more about that", "how would that work for us", "that's interesting because", "we've been talking about this internally", "can you give me an example", "what would that look like", "how did they handle", "we've seen that too", "that resonates", "that's a good question", "let me think about that", "so what you're saying is", "yeah that's our problem", "we've been saying the same thing"], "signals": ["buyer_asks_question_back", "buyer_names_specific_person", "buyer_names_specific_process", "buyer_elaborates_unprompted", "buyer_connects_to_own_experience", "buyer_requests_more_detail"], "posture_effect": "Maintain or advance posture. If defensive, consider transition to defensive_but_cracking. If defensive_but_cracking, consider transition to pain_acknowledged.", "move_effect": "Last move type gets +3 affinity for next 2 turns. The system learned what works with this buyer."}, "neutral": {"phrases": ["okay", "sure", "interesting", "got it", "makes sense", "I see", "fair enough", "right", "understood", "good to know", "yeah", "hm", "okay yeah", "that makes sense"], "signals": ["short_response", "no_elaboration", "neutral_acknowledgment"], "posture_effect": "No posture change. Neutral responses are ambiguous \u2014 the buyer might be thinking, or they might be disengaged.", "move_effect": "No affinity change. Switch angle \u2014 use the response_question_chaining system to attach a question that pulls the buyer into specifics."}, "deflected": {"phrases": ["let's come back to that", "can we talk about", "what about", "I'm more interested in", "that's not really our situation", "we don't really have that issue", "I'd have to check", "I'm not sure about that", "can you send me something on that", "let me think about it", "we'd need to discuss internally", "I'd need to loop in", "our admin handles that", "that's more of a [other person] question", "not sure that applies to us"], "signals": ["topic_change", "vague_response", "deferral_to_others", "request_for_materials_instead", "admin_handles_that"], "posture_effect": "If currently defensive, maintain. If currently open or curious, consider transition to politically_cautious (they may be filtering). Deflection after a deep question often signals the question hit but the buyer isn't ready.", "move_effect": "Last move type gets -3 affinity for next 2 turns. Don't repeat the same approach. Switch to a safer topic or question type, then circle back later."}, "resisted": {"phrases": ["that's not how we see it", "I disagree", "that's not our experience", "we've already looked at that", "we tried something like that", "that doesn't apply to us", "our situation is different", "I don't think that's the issue", "we're happy with how it works", "it's not broken", "we don't need to change", "I'm not sure you understand our setup", "that's a big assumption", "we've already solved that", "no that's not right"], "signals": ["explicit_disagreement", "status_quo_defense_intensified", "frustration_signal", "correction_of_rep_assumption"], "posture_effect": "If not already defensive, transition to defensive. If already defensive, increase confidence score. Resistance hardens posture.", "move_effect": "Last move type gets -6 affinity for next 3 turns. Block reframes for 2 turns (me-008 fires). Boost advancing_questions that are concrete and process-focused \u2014 return to the buyer's world."}, "advanced": {"phrases": ["we should get [name] on a call", "can you send me something I can share", "what would the next step be", "how do we move forward", "I want my team to see this", "can we set up a demo", "when can we start", "let me check calendars", "I think [name] should hear this", "what would implementation look like", "how long does onboarding take", "can you walk through pricing", "we should do a deeper dive", "let me introduce you to", "I'll set something up internally"], "signals": ["buyer_initiates_next_step", "buyer_introduces_stakeholder", "buyer_requests_materials_to_share", "buyer_asks_about_implementation", "buyer_asks_about_pricing_proactively"], "posture_effect": "Transition to championing if not already there. This buyer is ready to move.", "move_effect": "Immediately boost next_step_prompt by +15. Lock the commitment NOW before the energy fades. If they named a person, boost questions about that person's decision criteria."}}, "move_eval_rules": [{"id": "me-001", "name": "stop_hammering_defensive_buyers", "condition": {"posture": "defensive", "recommended_move": "reframe", "session_check": "reframe_count_this_stage >= 2"}, "action": {"type": "score_adjustment", "adjust_move": "reframe", "points": -12, "boost_move": "credibility_story", "boost_points": 8, "fallback_move": "advancing_question"}, "judgment": "Two reframes didn't crack the defense. A third won't either. Switch to a story that gives them permission to see their situation differently through someone else's experience."}, {"id": "me-002", "name": "dont_question_after_acknowledgment", "condition": {"posture_transition": {"from": "defensive_but_cracking", "to": "pain_acknowledged"}, "within_turns": 1}, "action": {"type": "score_adjustment", "adjust_move": "advancing_question", "points": -8, "boost_move": "confirming_question", "boost_points": 10}, "judgment": "The buyer just admitted the problem. Asking another probing question feels like piling on. A confirming question locks the acknowledgment and transitions the conversation."}, {"id": "me-003", "name": "back_off_politically_cautious", "condition": {"posture_modifier": "politically_cautious", "recommended_move_has_tags": ["MEDDPICC-economic_buyer", "shift_ownership_to_economic_buyer"]}, "action": {"type": "score_adjustment", "adjust_move_with_tags": ["MEDDPICC-economic_buyer"], "points": -10, "boost_move_with_tags": ["MEDDPICC-decision_process", "MEDDPICC-pain"], "boost_points": 6}, "judgment": "The buyer is filtering for someone on the call. EB and budget questions will get a non-answer or worse \u2014 signal to the boss that this vendor is pushy. Ask safe process questions instead. Get the EB intel in a follow-up 1-on-1."}, {"id": "me-004", "name": "dont_push_next_steps_without_eb", "condition": {"recommended_move": "next_step_prompt", "session_check": "economic_buyer_named == false", "stage_minimum": "m1-confirming"}, "action": {"type": "move_block", "blocked_move": "next_step_prompt", "substitute_move": "advancing_question", "substitute_preference": "MEDDPICC-economic_buyer"}, "judgment": "Pushing next steps when you don't know who the EB is means the champion will go back and hit a wall you didn't map. Find the EB first. The next step should include them."}, {"id": "me-005", "name": "stop_discovering_when_stalling", "condition": {"posture": "stalling", "recommended_move": "advancing_question", "session_check": "advancing_questions_asked_this_stage >= 4"}, "action": {"type": "score_adjustment", "adjust_move": "advancing_question", "points": -10, "boost_alternatives": [{"move": "credibility_story", "points": 8}, {"move": "reframe", "points": 6, "principle_preference": "cost_of_inaction"}]}, "judgment": "You've asked enough questions. They know the pain but something is blocking commitment. Either tell a story about a firm that delayed and what happened, or reframe the cost of waiting."}, {"id": "me-006", "name": "match_evaluative_posture_with_evidence", "condition": {"posture": "evaluative", "recommended_move": "advancing_question", "session_check": "advancing_questions_asked_this_stage >= 3"}, "action": {"type": "score_adjustment", "adjust_move": "advancing_question", "points": -6, "boost_alternatives": [{"move": "competitor_response", "points": 8}, {"move": "proof_point", "points": 6}, {"move": "credibility_story", "points": 6}]}, "judgment": "This buyer is past discovery. They're comparing options. Give them differentiation, evidence, and stories from firms like theirs \u2014 not more questions about their process."}, {"id": "me-007", "name": "dont_reframe_when_championing", "condition": {"posture": "championing", "recommended_move": "reframe"}, "action": {"type": "score_adjustment", "adjust_move": "reframe", "points": -10, "boost_alternatives": [{"move": "credibility_story", "points": 10, "story_use_preference": "champion_enablement"}, {"move": "proof_point", "points": 8}, {"move": "next_step_prompt", "points": 6}]}, "judgment": "This person is your champion. They don't need their frame disrupted \u2014 they need ammunition to go sell internally. Give them a story they can retell, a proof point they can cite // ─── POSTURE ENGINE ────────────────────────────────────
function classifyPostMove(text){
  const lo=text.toLowerCase();
  const pmc=B.post_move_classifier||{};
  let best=null,bestCount=0;
  for(const[bucket,data]of Object.entries(pmc)){
    const hits=(data.phrases||[]).filter(p=>lo.includes(p)).length;
    if(hits>bestCount){bestCount=hits;best=bucket;}
  }
  // Behavioral checks
  const avgLen=S.notes.length>3?S.notes.slice(-5).reduce((a,n)=>a+n.text.length,0)/5:50;
  if(!best&&text.length<15) best="neutral";
  if(!best&&text.length>avgLen*1.5) best="engaged";
  return best||"neutral";
}

function updatePosture(postMoveResult){
  S.lastMoveResult=postMoveResult;
  const transitions=B.posture_transitions||[];
  // Check universal overrides first, then specific
  const sorted=[...transitions.filter(t=>t.from==="*"),...transitions.filter(t=>t.from===S.posture)];
  for(const t of sorted){
    const pmr=t.post_move_result;
    if(pmr){
      if(Array.isArray(pmr)&&!pmr.includes(postMoveResult)) continue;
      if(typeof pmr==="string"&&pmr!==postMoveResult) continue;
    }
    // Transition fires
    const oldP=S.posture;
    S.posture=t.to;
    S.postureConf=0.75;
    S.postureHistory.push({turn:S.notes.length,from:oldP,to:t.to,trigger:postMoveResult,id:t.id});
    return;
  }
  // No transition matched — adjust confidence
  if(postMoveResult==="resisted"&&S.postureConf<1) S.postureConf=Math.min(1,S.postureConf+0.1);
}

// ─── MOVE AFFINITY ─────────────────────────────────────
function updateAffinity(moveType,postMoveResult){
  const rules={engaged:{delta:3,decay:2},advanced:{delta:6,decay:3},neutral:{delta:0,decay:0},deflected:{delta:-3,decay:2},resisted:{delta:-6,decay:3}};
  const r=rules[postMoveResult];
  if(!r||!r.delta) return;
  S.moveAffinity[moveType]=(S.moveAffinity[moveType]||0)+r.delta;
  if(r.decay>0) S.affinityDecay.push({moveType,delta:r.delta,remaining:r.decay,turn:S.notes.length});
}

function processAffinityDecay(){
  S.affinityDecay=S.affinityDecay.filter(d=>{
    d.remaining--;
    if(d.remaining<=0){S.moveAffinity[d.moveType]=(S.moveAffinity[d.moveType]||0)-d.delta;return false;}
    return true;
  });
}

function getAffinityScore(moveType){
  const a=S.moveAffinity[moveType]||0;
  if(a>=4) return 10;
  if(a>=1) return 6;
  if(a===0) return 5;
  if(a>=-3) return 2;
  return 0;
}

function computeDealRisk(){
  let score=0;const factors=[];const rf=B.deal_risk_factors||[];
  const stageIdx={"open":0,"align":0,"advancing":1,"map":1,"confirming":2,"lock":2,"frame":0,"diagnose":1,"advance":2,"discover":0};
  const si=stageIdx[S.stage]||0;
  const qAsked=Object.keys(S.checked).length;
  const isM3Plus=["M3","M4","M5"].includes(S.meeting);
  
  // Belief not landing
  if(S.beliefGap>0.6&&S.timer>600){score+=15;factors.push({name:"Belief shift not landing",severity:"high",action:"Switch to credibility stories"});}
  // EB not identified
  if(!S.ebIdentified&&isM3Plus){score+=20;factors.push({name:"EB not identified",severity:"critical",action:"Ask who ultimately signs off on this investment"});}
  // Single-threaded
  if(S.stakeholders.length<=1&&isM3Plus){score+=10;factors.push({name:"Single-threaded deal",severity:"medium",action:"Multi-thread — ask about other stakeholders"});}
  // No compelling event
  if(!S.rbs.some(r=>["fund_growth","timeline_delay","quarter_end_pressure"].includes(r.signal))&&isM3Plus){score+=10;factors.push({name:"No compelling event identified",severity:"medium",action:"Ask about fundraises, audits, or fund launches on the horizon"});}
  // Stalling
  if(S.posture==="stalling"){score+=10;factors.push({name:"Buyer stalling",severity:"high",action:"Tell a cost-of-delay story or surface proof point"});}
  // Defensive hardening
  if(S.posture==="defensive"&&S.postureConf>0.85){score+=10;factors.push({name:"Defensive posture hardening",severity:"high",action:"Stop reframing — switch to stories exclusively"});}
  // No next step late in call
  if(S.timer>1500&&si>=2&&!Object.keys(S.checked).some(id=>id.includes("dq-021")||id.includes("dq-035")||id.includes("dq-115"))){score+=10;factors.push({name:"No next step locked — time running out",severity:"critical",action:"Lock the next meeting NOW"});}
  
  S.dealRisk=Math.min(100,score);
  S.dealRiskFactors=factors;
}

// ─── BELIEF STATE ──────────────────────────────────────
function updateBeliefState(){
  const qCount=Object.keys(S.checked).length;
  const painSignals=S.rbs.filter(r=>["workflow_fragility","manual_process","excel_dependency","audit_risk","key_person_risk","ownership_unclear"].includes(r.signal)).length;
  const ackPhrases=["that's a real problem","you're right","that makes sense","we need to fix this","i see the issue","this is exactly our problem"];
  const hasAck=S.notes.some(n=>ackPhrases.some(p=>n.text.toLowerCase().includes(p)));
  
  if(qCount===0) S.beliefState="unaware";
  else if(S.posture==="defensive"&&painSignals<2) S.beliefState="aware_but_dismissive";
  else if(S.posture==="curious"||painSignals<3) S.beliefState="curious_but_uncommitted";
  else if(painSignals>=3&&!hasAck) S.beliefState="friction_acknowledged";
  else if(hasAck||S.posture==="pain_acknowledged") S.beliefState="risk_acknowledged";
  else if(S.meeting==="M4"&&S.stage==="diagnose") S.beliefState="cost_quantified";
  else if(S.posture==="championing") S.beliefState="committed_to_evaluate";
  
  const beliefOrder=["unaware","aware_but_dismissive","curious_but_uncommitted","friction_acknowledged","risk_acknowledged","cost_quantified","change_justified","solution_envisioned","committed_to_evaluate","committed_to_buy"];
  const idx=beliefOrder.indexOf(S.beliefState);
  S.beliefGap=idx>=0?1-(idx/(beliefOrder.length-1)):1;
}

// ─── VARIATION ENGINE ──────────────────────────────────
const usedVariations=new Set();
function vary(text){
  const slots=B.variation_slots||{};
  const pm=B.posture_modulation||{};
  let result=text;
  
  // Layer 2: Posture modulation prefix
  const mod=pm[S.posture];
  if(mod&&mod.prefix_slot&&slots[mod.prefix_slot]){
    const fills=slots[mod.prefix_slot].filter(f=>!usedVariations.has(f));
    if(fills.length){const pick=fills[Math.floor(Math.random()*fills.length)];usedVariations.add(pick);result=pick+", "+result.charAt(0).toLowerCase()+result.slice(1);}
  }
  
  // Layer 1: Slot fills for known patterns
  if(result.includes("What we usually")||result.includes("what we usually")){
    const df=slots.discovery_frame||[];
    const available=df.filter(f=>!usedVariations.has(f));
    if(available.length){const pick=available[Math.floor(Math.random()*available.length)];usedVariations.add(pick);result=result.replace(/What we usually discover during this exercise/gi,pick).replace(/What we usually see/gi,pick);}
  }
  
  return result;
}

    let sc=0;
    sc+=q.tier===1?100:q.tier===2?50:20;
    
    // Stage match
    const qi=(cm.stages||[]).findIndex(s=>(s.questions||[]).find(x=>x.id===q.id));
    if(qi===si)sc+=80;
    else if(qi===si+1)sc+=30;
    else if(qi<si)sc-=50;
    
    // Time pressure
    if(tp&&ns.includes(q.id))sc+=200;
    if(tp&&!ns.includes(q.id))sc-=100;
    
    // Signal match
    if(q.fire_when?.some(fw=>rsig.some(rs=>rs.includes(fw)||fw.includes(rs))))sc+=60;
    
    // Vague answer boost
    if(S.partial[q.id]?.vague)sc+=120;
    
    // MEDDPICC gap fill
    if(!ctags.includes(q.tag))sc+=25;
    
    // Competitor context
    if(comps.length&&(q.tag==="Competition"||q.l1?.q?.toLowerCase().includes("looked at")))sc+=40;
    if(comps.some(c=>adminComps.some(ac=>c.toLowerCase().includes(ac.toLowerCase())))&&q.l1?.q?.toLowerCase().includes("admin"))sc+=40;
    
    // Thread continuity
    if(lastChecked){for(const[thread,qIds]of Object.entries(threadMap)){if(qIds.includes(lastChecked)&&qIds.includes(q.id)){sc+=50;break;}}}
    
    // v1.9: Move affinity (6th dimension)
    const moveType=q.tag==="EB"||q.tag==="Champion"?"advancing_question":"advancing_question";
    sc+=getAffinityScore(moveType)*2;
    
    // v1.9: Posture-aware adjustments (move evaluation lite)
    if(S.posture==="defensive"&&q.tag==="EB") sc-=30; // me-003: back off politically cautious
    if(S.posture==="championing"&&q.tag==="Champion") sc+=40; // arm the champion
    if(S.posture==="evaluative"&&q.tag==="Competition") sc+=30; // me-006: evidence for evaluative
    if(S.posture==="stalling"&&q.tier===1) sc-=20; // me-005: stop discovering when stalling
    
    return{...q,score:sc};
  }).sort((a,b)=>b.score-a.score);
}

function processChunk(t){
  S.lastSpeechTime=S.timer;S.nudgeLevel=0;const lo=t.toLowerCase();
  S.notes.push({text:t,time:fmt(S.timer)});
  
  // v1.9: Post-move classification feedback loop
  if(S.feedbackPending){
    const result=classifyPostMove(t);
    updatePosture(result);
    updateAffinity(S.feedbackPending.moveType,result);
    S.feedbackPending=null;
  }
  
  // Process affinity decay each turn
  processAffinityDecay();
  
  // Signal detection
  const sigs=[];
  (B.signal_map||[]).forEach(sig=>{sig.phrases.forEach(p=>{if(lo.includes(p)&&!sigs.find(f=>f.signal===sig.signal))sigs.push(sig);});});
  if(sigs.length)S.rbs=[...sigs.map(s=>({...s,id:++rbC,level:"l1"})),...S.rbs].slice(0,8);
  
  // EB detection
  const ebPhrases=["cfo","coo","managing partner","chief financial","chief operating","head of finance"];
  ebPhrases.forEach(p=>{if(lo.includes(p)&&!S.ebIdentified){S.ebIdentified=true;
    const words=t.split(/\s+/);const idx=words.findIndex(w=>w.toLowerCase().includes(p.split(" ")[0]));
    if(idx>=0) S.ebName=words.slice(Math.max(0,idx-1),idx+3).join(" ");
  }});
  
  // Stakeholder detection
  const stakePhrases=["my boss","our cfo","the partners","our coo","the controller","head of","vp of","director of"];
  stakePhrases.forEach(p=>{if(lo.includes(p)&&!S.stakeholders.some(s=>s.phrase===p)){S.stakeholders.push({phrase:p,turn:S.notes.length});}});
  
  // Auto-match
  const isV=VAGUE.some(w=>lo.includes(w));const isS=SPEC.test(lo);
  for(const[phrase,qIds]of Object.entries(AM)){if(lo.includes(phrase)){qIds.forEach(id=>{if(!S.checked[id]){if(isV&&!isS)S.partial[id]={vague:true,answer:t};else{S.checked[id]=true;delete S.partial[id];}}});}}
  
  // Rebuttal tracking
  if(S.expRb!==null){S.rbSpk=(S.rbSpk+" "+t).trim();const rb=S.rbs.find(r=>r.id===S.expRb);
    if(rb){const d=(B.signal_rebuttals||{})[rb.signal]?.[rb.level];
      if(d?.text&&mP(S.rbSpk,d.text)>0.4){setTimeout(()=>{const nx=rb.level==="l1"?"l2":rb.level==="l2"?"l3":null;if(nx&&(B.signal_rebuttals||{})[rb.signal]?.[nx]?.text)rb.level=nx;else{S.rbs=S.rbs.filter(r=>r.id!==rb.id);S.expRb=null;}S.rbSpk="";buildQ();render();},1200);}}}
  
  // Question tracking
  if(S.exp){S.spkAE=(S.spkAE+" "+t).trim();const all=(B.meetings[S.meeting]?.stages||[]).flatMap(s=>s.questions||[]);const q=all.find(x=>x.id===S.exp.qId);
    if(q){const ld=q[S.exp.level];if(ld?.q&&mP(S.spkAE,ld.q)>0.4){setTimeout(()=>{const nx=S.exp.level==="l1"?"l2":S.exp.level==="l2"?"l3":null;if(nx&&q[nx]?.q)S.exp={qId:S.exp.qId,level:nx};else{S.checked[S.exp.qId]=true;S.exp=null;}S.spkAE="";buildQ();render();},1200);}}}
  
  // Profile detection
  if(!S.profile){for(const[n,p]of Object.entries(B.profiles||{})){if(p.detect?.some(d=>lo.includes(d.toLowerCase().slice(0,15)))){S.profile=n;break;}}}
  
  // Stage auto-progression
  const av=ADV.filter(s=>lo.includes(s)).length;const cv=CONF.filter(s=>lo.includes(s)).length;const cn=Object.keys(S.checked).length;
  const stageKeys=getStageKeys();
  const si=stageKeys.indexOf(S.stage);
  if(si===0&&(av>=1||cn>=2)&&stageKeys.length>1) S.stage=stageKeys[1];
  if(si===1&&(cv>=2||cn>=8)&&stageKeys.length>2) S.stage=stageKeys[2];
  
  // v1.9: Update belief state and deal risk
  updateBeliefState();
  computeDealRisk();
  
  buildQ();render();
}

function initSp(){const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR)return;rec=new SR();rec.continuous=true;rec.interimResults=true;rec.lang="en-US";rec.onresult=e=>{let i="",f="";for(let x=e.resultIndex;x<e.results.length;x++){const t=e.results[x][0].transcript;if(e.results[x].isFinal)f+=t+" ";else i=t;}S.transcript=i;if(f.trim())processChunk(f.trim());else render();};rec.onerror=()=>{};rec.onend=()=>{if(S.isListening)try{rec.start();}catch(e){}};}

function fmt(s){return Math.floor(s/60)+":"+(s%60).toString().padStart(2,"0");}
function gH(sp,tx){const sw=sp.toLowerCase().replace(/[^a-z0-9\s]/g,"").split(/\s+/).filter(Boolean);const tw=tx.split(/\s+/);let l=-1;for(const s of sw){for(let i=l+1;i<tw.length;i++){const t=tw[i].toLowerCase().replace(/[^a-z0-9]/g,"");if(t.length>2&&s.length>2&&(t.startsWith(s.slice(0,3))||s.startsWith(t.slice(0,3)))){l=i;break;}}}return l;}
function mP(sp,tx){const tw=tx.toLowerCase().replace(/[^a-z0-9\s]/g,"").split(/\s+/).filter(Boolean);return tw.length?(gH(sp,tx)+1)/tw.length:0;}
function kH(tx,sp){if(!sp||!tx)return`<span style="color:#ccc">${tx||""}</span>`;const w=tx.split(/\s+/);const idx=gH(sp,tx);return w.map((v,i)=>`<span style="color:${i<=idx?"#FEFCE8":"#6B5B3A"};font-weight:${i<=idx?600:400};transition:all 0.12s">${v} </span>`).join("");}

    h+='<div onclick="xQ(\''+hero.id+'\',\'l1\')" style="background:#111114;border:1px solid #27272A;border-left:3px solid #00F0FF;border-radius:0 10px 10px 0;padding:14px 14px;cursor:pointer">';
    // Tag row
    h+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">';
    var tc=hero.tier===1?"#00F0FF":hero.tier===2?"#FBBF24":"#3F3F46";
    h+='<span style="font-size:7px;font-weight:800;color:'+tc+';letter-spacing:0.1em">'+(hero.tier===1?"MUST":hero.tier===2?"SIT":"DEPTH")+'</span>';
    var tagC=TAG_C[hero.tag]||"#3F3F46";
    h+='<span style="font-size:7px;font-weight:700;color:'+tagC+';background:'+tagC+'12;padding:1px 5px;border-radius:2px">'+hero.tag+'</span>';
    if(hero.question_type==="confirming")h+='<span style="font-size:7px;font-weight:700;color:#00D4AA;background:#00D4AA12;padding:1px 5px;border-radius:2px">CONFIRM</span>';
    h+='<div style="flex:1"></div>';
    h+='<div onclick="event.stopPropagation();ckQ(\''+hero.id+'\')" style="width:22px;height:22px;border-radius:6px;border:2px solid #27272A;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;color:#3F3F46">✓</div>';
    h+='</div>';
    // Question text — BIG
    if(!isHeroExp){
      h+='<p class="q-text" style="color:#FAFAFA;font-size:15px;margin:0;line-height:1.55;font-weight:400">'+heroText+'</p>';
      if(hero.l1?.goal)h+='<p style="color:#3F3F46;font-size:9px;margin:6px 0 0">'+hero.l1.goal.substring(0,80)+'</p>';
    }
    h+='</div>';
    
    // Expanded hero — drill down levels
    if(isHeroExp){
      var ldText=personalize(heroLd?.q||"");
      h+='<div style="margin-left:6px;border-left:2px solid #27272A;padding-left:12px;padding-top:8px;padding-bottom:4px">';
      // Level buttons
      h+='<div style="display:flex;gap:4px;margin-bottom:8px;align-items:center">';
      ["l1","l2","l3"].forEach(function(l){var n=l==="l1"?1:l==="l2"?2:3;var a=heroLvl===l;h+='<button onclick="xQ(\''+hero.id+'\',\''+l+'\')" style="background:'+(a?"#1E1B4B":"#111114")+';color:'+(a?"#A5B4FC":"#3F3F46")+';border:1px solid '+(a?"#4F46E5":"#27272A")+';border-radius:4px;padding:3px 10px;font-size:10px;font-weight:700;cursor:pointer">L'+n+'</button>';});
      h+='<div style="flex:1"></div>';
      if(heroLd?.goal)h+='<span style="color:#3F3F46;font-size:8px">'+heroLd.goal.substring(0,50)+'</span>';
      h+='</div>';
      // Coaching whisper for expanded
      if(heroNote)h+='<p style="color:#52525B;font-size:10px;font-style:italic;margin:0 0 6px 0">'+heroNote.substring(0,120)+'</p>';
      // Question text with karaoke highlight
      h+='<div style="background:#0C0C10;border-radius:8px;padding:12px 14px;border:1px solid #18181B"><p class="q-text" style="font-size:15px;margin:0;line-height:1.6">'+kH(ldText,S.spkAE)+'</p></div>';
      // Actions
      h+='<div style="display:flex;gap:6px;margin-top:8px;align-items:center">';
      if(heroLvl!=="l3")h+='<button onclick="xQ(\''+hero.id+'\','+(heroLvl==="l1"?"\'l2\'":"\'l3\'")+')\" style="background:#1E1B4B;border:none;border-radius:5px;padding:5px 12px;color:#A5B4FC;font-size:10px;font-weight:700;cursor:pointer">DEEPER →</button>';
      h+='<button onclick="ckQ(\''+hero.id+'\')" style="background:#111114;border:1px solid #27272A;border-radius:5px;padding:5px 12px;color:#52525B;font-size:10px;font-weight:600;cursor:pointer">DONE ✓</button>';
      h+='<div style="flex:1"></div>';
      h+='<button onclick="event.stopPropagation();giveFeedback(\'advancing_question\',\'engaged\')" style="background:#00D4AA10;border:1px solid #00D4AA20;border-radius:6px;padding:3px 10px;color:#00D4AA;font-size:10px;cursor:pointer" title="Buyer engaged">↑</button>';
      h+='<button onclick="event.stopPropagation();giveFeedback(\'advancing_question\',\'resisted\')" style="background:#F8717110;border:1px solid #F8717120;border-radius:6px;padding:3px 10px;color:#F87171;font-size:10px;cursor:pointer" title="Buyer resisted">↓</button>';
      h+='</div>';
      h+='</div>';
    }
    h+='</div>';
    
    // ─── QUEUE — always visible ───
    if(top.length>1){
      h+='<div style="padding:4px 12px 0;margin-top:2px"><span style="color:#27272A;font-size:8px;font-weight:700;letter-spacing:0.1em">UP NEXT</span></div>';
      {
        top.slice(1).forEach(function(q,qi){
          var isE=S.exp?.qId===q.id;
          var lvl=isE?S.exp.level:"l1";var ld=q[lvl];
          var dimmed=tp&&!ns.includes(q.id)&&qi>3;
          var qText=personalize(q.l1?.q||"");
          
          h+='<div style="opacity:'+(dimmed?0.2:0.7)+';margin-top:1px">';
          h+='<div class="q-card" style="display:flex;align-items:flex-start;gap:8px;padding:8px 12px;border-left:2px solid #18181B;border-radius:0 4px 4px 0" onclick="xQ(\''+q.id+'\',\'l1\')">';
          h+='<div onclick="event.stopPropagation();ckQ(\''+q.id+'\')" style="min-width:16px;height:16px;border-radius:4px;margin-top:2px;border:1.5px solid #27272A;display:flex;align-items:center;justify-content:center;cursor:pointer"></div>';
          h+='<div style="flex:1"><p class="q-text" style="color:#A1A1AA;font-size:12px;margin:0;line-height:1.35;font-weight:400">'+qText.substring(0,100)+(qText.length>100?"...":"")+'</p>';
          var tcc=q.tier===1?"#00F0FF":q.tier===2?"#FBBF24":"#3F3F46";
          h+='<div style="display:flex;gap:4px;margin-top:2px"><span style="font-size:7px;font-weight:800;color:'+tcc+'">'+(q.tier===1?"MUST":q.tier===2?"SIT":"DEPTH")+'</span>';
          var tagCc=TAG_C[q.tag]||"#3F3F46";
          h+='<span style="font-size:7px;font-weight:700;color:'+tagCc+'">'+q.tag+'</span></div>';
          h+='</div></div>';
          
          // Expanded queue item
          if(isE){
            var ldtxt=personalize(ld?.q||"");
            h+='<div style="margin-left:28px;border-left:2px solid #27272A;padding-left:10px;padding-bottom:6px">';
            h+='<div style="display:flex;gap:3px;margin:6px 0">';
            ["l1","l2","l3"].forEach(function(l){var n=l==="l1"?1:l==="l2"?2:3;var aa=lvl===l;h+='<button onclick="xQ(\''+q.id+'\',\''+l+'\')" style="background:'+(aa?"#1E1B4B":"#111114")+';color:'+(aa?"#A5B4FC":"#3F3F46")+';border:1px solid '+(aa?"#4F46E5":"#18181B")+';border-radius:4px;padding:2px 8px;font-size:10px;font-weight:700;cursor:pointer">L'+n+'</button>';});
            h+='</div>';
            if(q.note)h+='<p style="color:#52525B;font-size:9px;font-style:italic;margin:0 0 4px">'+q.note.substring(0,100)+'</p>';
            h+='<div style="background:#0C0C10;border-radius:6px;padding:8px 10px;border:1px solid #18181B"><p class="q-text" style="font-size:12px;margin:0;line-height:1.5">'+kH(ldtxt,S.spkAE)+'</p></div>';
            h+='<div style="display:flex;gap:5px;margin-top:6px">';
            if(lvl!=="l3")h+='<button onclick="xQ(\''+q.id+'\','+(lvl==="l1"?"\'l2\'":"\'l3\'")+')\" style="background:#1E1B4B;border:none;border-radius:5px;padding:3px 10px;color:#A5B4FC;font-size:9px;font-weight:700;cursor:pointer">DEEPER →</button>';
            h+='<button onclick="ckQ(\''+q.id+'\')" style="background:#111114;border:1px solid #18181B;border-radius:5px;padding:3px 10px;color:#52525B;font-size:9px;font-weight:600;cursor:pointer">DONE ✓</button>';
            h+='</div></div>';
          }
          h+='</div>';
        });
      }
    }
    
    // ─── COVERED (very minimal) ───
    var ckd=all.filter(function(q){return S.checked[q.id];});
    if(ckd.length){
      h+='<div style="margin-top:12px;padding:4px 12px"><span style="color:#18181B;font-size:8px;font-weight:700;letter-spacing:0.1em">COVERED ('+ckd.length+')</span></div>';
      ckd.forEach(function(q){h+='<div onclick="unCk(\''+q.id+'\')" style="padding:3px 12px;opacity:0.12;cursor:pointer"><p style="color:#3F3F46;font-size:9px;text-decoration:line-through;margin:0">'+(q.l1?.q||"").substring(0,70)+'</p></div>';});
    }
  }
  
  h+='</div>';

  // ═══ BOTTOM BAR ═══
  if(S.isLive){
    var bLabels={unaware:"—",aware_but_dismissive:"AWARE",curious_but_uncommitted:"CURIOUS",friction_acknowledged:"FRICTION",risk_acknowledged:"RISK",cost_quantified:"COST",change_justified:"JUSTIFIED",solution_envisioned:"VISION",committed_to_evaluate:"EVAL",committed_to_buy:"WON"};
    h+='<div style="flex-shrink:0;background:#0C0C10;border-top:1px solid #18181B;padding:6px 14px;display:flex;align-items:center;gap:8px">';
    h+='<div style="width:6px;height:6px;border-radius:50%;background:#00F0FF"></div>';
    h+='<span style="color:#3F3F46;font-size:9px;font-weight:600">LISTENING</span>';
    h+='<span style="font-size:7px;font-weight:700;color:#3F3F46;background:#18181B;border-radius:3px;padding:1px 5px">'+(bLabels[S.beliefState]||"—")+'</span>';
    h+='<div style="flex:1"></div>';
    if(S.dealRisk>0){var riskCol=S.dealRisk<30?"#3F3F46":S.dealRisk<60?"#FBBF24":"#F87171";h+='<span style="color:'+riskCol+';font-size:8px;font-weight:700">RISK '+S.dealRisk+'</span>';}
    h+='<button onclick="exportSummary()" style="background:#18181B;border:none;border-radius:5px;padding:3px 8px;color:#52525B;font-size:9px;font-weight:700;cursor:pointer">EXPORT</button>';
    h+='</div>';
  }

  document.getElementById("app").innerHTML=h;
}

function renderSetup(){
  const comps=[S.comp1,S.comp2,S.comp3].filter(Boolean);
  let h=`<div style="padding:20px 16px;overflow-y:auto;flex:1">`;
  h+=`<div style="text-align:center;margin-bottom:20px">`;
  h+=`<div style="font-size:28px;margin-bottom:6px">🌿</div>`;
  h+=`<span style="color:#00F0FF;font-size:20px;font-weight:800;letter-spacing:0.15em">IVY</span>`;
  h+=`<p style="color:#3F3F46;font-size:10px;margin-top:3px;letter-spacing:0.08em">INTELLIGENT VOICE FOR YOU</p>`;
  h+=`</div>`;
  h+=`<div style="margin-bottom:14px"><label class="form-label">GP NAME</label><input class="form-input" placeholder="e.g. Thrive Capital" value="${S.gpName}" oninput="S.gpName=this.value" /></div>`;
  h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px"><div><label class="form-label">AUM</label><input class="form-input" placeholder="e.g. 5B" value="${S.aum}" oninput="S.aum=this.value" /></div><div><label class="form-label"># FUNDS</label><input class="form-input" type="number" placeholder="e.g. 14" value="${S.fundCount}" oninput="S.fundCount=this.value" /></div></div>`;
  h+=`<div style="margin-bottom:14px"><label class="form-label">KNOWN TOOLS (up to 3)</label>`;
  h+=`<input class="form-input" placeholder="Tool 1" value="${S.comp1}" oninput="S.comp1=this.value" style="margin-bottom:6px" />`;
  h+=`<input class="form-input" placeholder="Tool 2" value="${S.comp2}" oninput="S.comp2=this.value" style="margin-bottom:6px" />`;
  h+=`<input class="form-input" placeholder="Tool 3" value="${S.comp3}" oninput="S.comp3=this.value" />`;
  h+=`<div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:3px">`;
  COMPS_KNOWN.forEach(c=>{const a=comps.includes(c);h+=`<button onclick="pickComp('${c}')" style="background:${a?"#1a1a3a":"#111"};border:1px solid ${a?"#A5B4FC":"#1a1a1a"};border-radius:4px;padding:1px 6px;font-size:9px;color:${a?"#A5B4FC":"#333"};cursor:pointer;font-weight:${a?700:400}">${c}</button>`;});
  h+=`</div></div>`;
  h+=`<button onclick="startCall()" style="width:100%;background:${S.gpName.trim()?"#00F0FF":"#1a1a1a"};color:${S.gpName.trim()?"#000":"#333"};border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;margin-top:6px">START SESSION →</button>`;
  h+=`<button onclick="startCall()" style="background:transparent;border:none;color:#222;font-size:10px;cursor:pointer;margin-top:10px;display:block;text-align:center;width:100%">Skip</button>`;
  try{if(localStorage.getItem('ivy_gp')){h+=`<button onclick="clearSession()" style="background:transparent;border:none;color:#222;font-size:9px;cursor:pointer;margin-top:6px;display:block;text-align:center;width:100%">Clear saved data</button>`;}}catch(e){}
  h+=`</div>`;
  document.getElementById("app").innerHTML=h;
}

// ─── EXPORT ─────────────────────────────────────────────
window.exportSummary=function(){
  const cm=B.meetings[S.meeting]||{stages:[]};const all=(cm.stages||[]).flatMap(s=>s.questions||[]);
  const asked=all.filter(q=>S.checked[q.id]);const skippedMust=all.filter(q=>q.tier===1&&!S.checked[q.id]);
  const TAG={Pain:0,Metrics:0,EB:0,Champion:0,Competition:0,Process:0,Criteria:0};
  asked.forEach(q=>{if(TAG[q.tag]!==undefined)TAG[q.tag]++;});
  let md="# IVY — Post-Call Summary\n\n";
  md+="**Date:** "+new Date().toLocaleDateString()+"\n";
  md+="**Duration:** "+fmt(S.timer)+"\n";
  if(S.gpName)md+="**GP:** "+S.gpName+"\n";
  if(S.aum)md+="**AUM:** $"+S.aum+"\n";
  md+="**Meeting:** "+S.meeting+" | Stage: "+S.stage+"\n";
  if(S.profile){const _pe=S.profile.replace(/_/g," ");md+="**Buyer Profile:** "+_pe+"\n";}
  md+="**Buyer Posture:** "+S.posture+"\n";
  md+="**Belief State:** "+S.beliefState+" (gap: "+(S.beliefGap*100).toFixed(0)+"%)\n";
  md+="**Deal Risk:** "+S.dealRisk+"/100\n";
  if(S.ebIdentified)md+="**EB Identified:** "+S.ebName+"\n";
  md+="\n## Questions Covered ("+asked.length+"/"+all.length+")\n";
  asked.forEach(q=>{md+="- ✅ "+q.l1.q+"\n";});
  if(skippedMust.length){md+="\n## Must-Ask Gaps ("+skippedMust.length+")\n";skippedMust.forEach(q=>{md+="- ❌ "+q.l1.q+"\n";});}
  md+="\n## MEDDPICC\n";Object.entries(TAG).forEach(([t,c])=>{md+="- "+t+": "+c+"\n";});
  if(S.rbs.length){md+="\n## Signals\n";S.rbs.forEach(r=>{md+="- "+r.label+"\n";});}
  if(S.dealRiskFactors.length){md+="\n## Deal Risk Factors\n";S.dealRiskFactors.forEach(f=>{md+="- **"+f.name+"**: "+f.action+"\n";});}
  if(S.postureHistory.length){md+="\n## Posture Transitions\n";S.postureHistory.forEach(p=>{md+="- Turn "+p.turn+": "+p.from+" → "+p.to+" ("+p.trigger+")\n";});}
  if(S.notes.length){md+="\n## Notes\n";S.notes.forEach(n=>{md+="- ["+n.time+"] "+n.text+"\n";});}
  const blob=new Blob([md],{type:"text/markdown"});const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download="ivy-"+(S.gpName||"call").replace(/\s/g,"-").toLowerCase()+"-"+new Date().toISOString().slice(0,10)+".md";a.click();URL.revokeObjectURL(url);
};

window.markRf=function(id){S.checked['rf_'+id]=true;render();};
window.toggleEC=function(key){if(!S._ecMap) S._ecMap={};const criterion=S._ecMap[key]||key;S.exitCriteriaMet[key]=!S.exitCriteriaMet[key];render();};
// ─── ACTIONS ────────────────────────────────────────────
window.clearSession=function(){try{["ivy_gp","ivy_aum","ivy_fc","ivy_c1","ivy_c2","ivy_c3"].forEach(k=>localStorage.removeItem(k));}catch(e){}S.gpName="";S.aum="";S.fundCount="";S.comp1="";S.comp2="";S.comp3="";render();};
window.pickComp=function(c){const comps=[S.comp1,S.comp2,S.comp3];const idx=comps.indexOf(c);if(idx>=0){if(idx===0)S.comp1="";else if(idx===1)S.comp2="";else S.comp3="";}else{if(!S.comp1)S.comp1=c;else if(!S.comp2)S.comp2=c;else if(!S.comp3)S.comp3=c;}render();};
window.startCall=function(){try{localStorage.setItem('ivy_gp',S.gpName);localStorage.setItem('ivy_aum',S.aum);localStorage.setItem('ivy_fc',S.fundCount);localStorage.setItem('ivy_c1',S.comp1);localStorage.setItem('ivy_c2',S.comp2);localStorage.setItem('ivy_c3',S.comp3);}catch(e){}
  S.setupDone=true;const comps=[S.comp1,S.comp2,S.comp3].filter(Boolean).join(" ").toLowerCase();if(comps.includes("investran")||comps.includes("allvue")||comps.includes("efront"))S.profile="in_house_operations";else if(comps.includes("citco")||comps.includes("ss&c")||comps.includes("apex"))S.profile="outsourced_admin";buildQ();render();};
window.goLive=function(){if(!S.isLive){S.isLive=true;S.isListening=true;S.lastSpeechTime=S.timer;if(rec)try{rec.start();}catch(e){}tiv=setInterval(()=>{S.timer++;render();},1000);buildQ();}else{S.isLive=false;S.isListening=false;if(rec)try{rec.stop();}catch(e){}if(tiv)clearInterval(tiv);}render();};
window.toggleExpand=function(){S.expanded_mode=!S.expanded_mode;document.getElementById("shell").classList.toggle("expanded",S.expanded_mode);render();};
window.setM=function(m){S.meeting=m;const keys=getStageKeys();S.stage=keys[0]||"open";S.exp=null;S.spkAE="";buildQ();render();};
window.setS=function(s){S.stage=s;buildQ();render();};
window.xQ=function(id,l){if(S.exp?.qId===id&&S.exp?.level===l){S.exp=null;S.spkAE="";}else{S.exp={qId:id,level:l};S.spkAE="";S.feedbackPending={moveType:"advancing_question"};}render();};
window.ckQ=function(id){S.checked[id]=true;delete S.partial[id];S.exp=null;S.spkAE="";buildQ();render();};
window.unCk=function(id){delete S.checked[id];buildQ();render();};
window.xRb=function(id){S.expRb=S.expRb===id?null:id;S.rbSpk="";if(S.expRb)S.feedbackPending={moveType:"reframe"};render();};
window.advRb=function(id){const rb=S.rbs.find(r=>r.id===id);if(!rb)return;rb.level=rb.level==="l1"?"l2":rb.level==="l2"?"l3":rb.level;S.rbSpk="";render();};
window.dRb=function(id){S.rbs=S.rbs.filter(r=>r.id!==id);if(S.expRb===id){S.expRb=null;S.rbSpk="";}render();};
window.giveFeedback=function(moveType,result){
  updatePosture(result);
  updateAffinity(moveType,result);
  updateBeliefState();
  computeDealRisk();
  S.feedbackPending=null;
  render();
};

// ─── INIT ───────────────────────────────────────────────
try{const gp=localStorage.getItem('ivy_gp');if(gp)S.gpName=gp;const aum=localStorage.getItem('ivy_aum');if(aum)S.aum=aum;const fc=localStorage.getItem('ivy_fc');if(fc)S.fundCount=fc;const c1=localStorage.getItem('ivy_c1');if(c1)S.comp1=c1;const c2=localStorage.getItem('ivy_c2');if(c2)S.comp2=c2;const c3=localStorage.getItem('ivy_c3');if(c3)S.comp3=c3;}catch(e){}
initSp();
render();
</script>
