<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;color:#ddd;overflow-x:hidden;background:#09090B;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:#3F3F46;border-radius:2px;}
input::placeholder{color:#52525B;}

#shell{width:380px;height:100vh;position:fixed;right:0;top:0;background:#09090B;display:flex;flex-direction:column;transition:width 0.3s ease;overflow:hidden;border-left:1px solid #27272A;}
#shell.expanded{width:520px;}
#shell.expanded .q-text{font-size:15px !important;}
#shell.expanded .rb-text{font-size:17px !important;}
#shell.expanded .rb-preview{font-size:14px !important;}
@media(max-width:520px){#shell{width:100%!important;border-left:none;}}

#pin-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:40px;}
.pin-input{background:#111;border:2px solid #27272A;border-radius:12px;padding:14px;color:#fff;font-size:24px;text-align:center;width:200px;outline:none;font-family:inherit;letter-spacing:8px;-webkit-text-security:disc;}
.pin-input:focus{border-color:#00F0FF;box-shadow:0 0 12px #00F0FF40;}

.form-input{background:#111;border:1px solid #27272A;border-radius:8px;padding:9px 11px;color:#fff;font-size:13px;width:100%;outline:none;font-family:inherit;}
.form-input:focus{border-color:#00F0FF;}
.form-label{color:#A1A1AA;font-size:10px;font-weight:700;letter-spacing:0.08em;margin-bottom:3px;display:block;}
.q-card{transition:background 0.15s;cursor:pointer;}
.q-card:hover{background:#1a1a1e !important;}
.posture-badge{font-size:8px;font-weight:800;padding:2px 7px;border-radius:4px;letter-spacing:0.05em;transition:all 0.3s;}
.risk-bar{height:4px;border-radius:2px;transition:width 0.5s ease,background 0.3s;}
.exit-item{padding:4px 8px;border-radius:4px;font-size:10px;margin:2px 0;transition:background 0.2s;}
.cc-card{border-left:3px solid #F59E0B;background:#1C1917;border-radius:0 8px 8px 0;padding:8px 10px;margin-bottom:4px;cursor:pointer;transition:all 0.2s;}
.cc-card:hover{background:#292524;}
.feedback-btn{border:none;border-radius:6px;padding:4px 10px;font-size:9px;font-weight:700;cursor:pointer;transition:all 0.15s;}
.feedback-btn:hover{transform:scale(1.05);}
</style>

<div id="shell">

    <p style="color:#27272A;font-size:10px;margin-top:12px">Enter PIN to continue</p>
    <p id="pin-error" style="color:#EF4444;font-size:10px;margin-top:8px;display:none">Incorrect PIN</p>
  </div>
  <div id="app" style="display:flex;flex:1;flex-direction:column;height:100%"></div>
</div>

<script>
const PIN="2026";
function checkPin(e){
  const v=document.getElementById("pin").value;
  if(v.length===4){
    if(v===PIN){
      document.getElementById("pin-screen").style.display="none";
      const app=document.getElementById("app");
      app.style.display="flex";
      app.style.flexDirection="column";
      try{localStorage.setItem("ivy_auth","1");}catch(e){}
      render();
    }else{
      document.getElementById("pin-error").style.display="block";
      document.getElementById("pin").value="";
      setTimeout(()=>{document.getElementById("pin-error").style.display="none";},2000);
    }
  }
}

ap \u2014 minor inconvenience or structural problem?", "goal": "Get them to size it"}, "l3": {"q": "What does that gap cost you in real terms \u2014 time, money, risk, or all three?", "goal": "Quantify in their language"}}, {"id": "dq-029", "tier": 1, "tag": "Criteria", "fire_when": [], "skip_when": [], "note": "The single best post-demo question. Whatever they say is their decision criterion. Write it down.", "l1": {"q": "When you look at what we just showed you, where do you see the biggest gap between this and how your team operates today?", "goal": "Self-identified gap. They tell you where the value is."}, "l2": {"q": "Has your team tried to solve that before \u2014 and what happened?", "goal": "Surface failed internal attempts"}, "l3": {"q": "If you could fix one thing about your current process, what would it be?", "goal": "Get the single most important outcome"}}, {"id": "dq-028", "tier": 1, "tag": "Pain", "fire_when": [], "skip_when": [], "note": "Same future-projection technique from M1, now with the demo as evidence that an alternative exists.", "l1": {"q": "At what point does your current approach start breaking under the weight of new fund launches or increasing LP complexity?", "goal": "Future risk. Connects current process to a scaling limit."}, "l2": {"q": "What does 'break' look like \u2014 longer cycles, more errors, or people burning out?", "goal": "Specifics on the failure mode"}, "l3": {"q": "How close are you to that point right now?", "goal": "Create urgency from their assessment"}}, {"id": "dq-024", "tier": 2, "tag": "Pain", "fire_when": [], "skip_when": [], "note": "This is the emotional question. If they pause or sigh, you've hit something real. Slow down and explore.", "l1": {"q": "Has a delayed or corrected distribution ever created a trust issue with an LP?", "goal": "Level 3 pain ladder \u2014 personal stakes. Connects operational failure to relations"}, "l2": {"q": "What happened after that \u2014 did the LP raise it again, or did it fade?", "goal": "Test whether trust issues compound"}, "l3": {"q": "What would it be worth to you to never have that conversation again?", "goal": "Emotional close on relationship risk"}}, {"id": "dq-032", "tier": 2, "tag": "Pain", "fire_when": [], "skip_when": [], "note": "Works especially well with controllers and CFOs. Audit season is universally painful.", "l1": {"q": "Think about the last time you were under pressure during an audit cycle \u2014 what would have made that materially easier?", "goal": "Emotional recall. Re-lives the pain in context of what they just saw."}, "l2": {"q": "How many hours did that consume across your team?", "goal": "Quantify"}, "l3": {"q": "What would have made that a non-event instead of a fire drill?", "goal": "Paint the future state from their pain"}}, {"id": "dq-027", "tier": 2, "tag": "Metrics", "fire_when": [], "skip_when": [], "note": "Audit pain is universal. This question works with every persona in the room.", "l1": {"q": "If your auditors could trace any LP's economics back to a single source of truth in under a minute, how would that change your audit cycle?", "goal": "Paints the future state. Connects to a concrete business outcome."}, "l2": {"q": "How many hours does audit prep take your team today?", "goal": "Quantify audit burden"}, "l3": {"q": "What would you do with that time if you got it back?", "goal": "Connect efficiency to strategic outcomes"}}, {"id": "dq-025", "tier": 2, "tag": "EB", "fire_when": [], "skip_when": [], "note": "If 'day-to-day frustration' \u2014 you need to help them escalate it. If 'on management's radar' \u2014 the path to the EB is open", "l1": {"q": "Is streamlining this on management's radar, or more of a day-to-day frustration?", "goal": "Tests whether pain has reached leadership."}, "l2": {"q": "Can you give me a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify"}}, {"id": "dq-031", "tier": 1, "tag": "Criteria", "fire_when": [], "skip_when": [], "note": "Ask this before they define criteria with someone else. What they say here becomes the rubric you demo against in M8.", "l1": {"q": "If you were to evaluate a solution for this \u2014 what would the non-negotiables be?", "goal": "Shapes the evaluation frame before a competitor does."}, "l2": {"q": "Which non-negotiable has disqualified solutions in the past?", "goal": "Find the deal-killer criterion"}, "l3": {"q": "If we met every non-negotiable, what's the remaining hesitation?", "goal": "Surface the hidden objection"}}, {"id": "dq-030", "tier": 1, "tag": "Competition", "fire_when": [], "skip_when": [], "note": "Opens the competitive landscape and reveals what killed prior deals. Both are gold.", "l1": {"q": "Have you looked at solutions for this before \u2014 and if so, what's kept you from moving forward?", "goal": "Surfaces prior evaluations and decision blockers."}, "l2": {"q": "Was it the product that didn't work, or timing, budget, or internal alignment?", "goal": "Separate product gaps from process gaps"}, "l3": {"q": "What would need to be different this time for you to actually move forward?", "goal": "Get their conditions for commitment"}}, {"id": "m2rip-12", "tier": 2, "tag": "Pain", "fire_when": [], "skip_when": [], "l1": {"q": "Is there anyone internally who would push back on moving forward \u2014 and what would their concern be?", "goal": "Risk identification"}, "l2": {"q": "Can you walk me through that?", "goal": "Get specifics"}, "l3": {"q": "What did that cost you?", "goal": "Quantify"}}]}, {"id": "m2-confirming", "name": "Confirm & Advance \u2014 Secure Coordination Meeting", "questions": [{"id": "dq-033", "tier": 1, "tag": "Pain", "fire_when": [], "skip_when": [], "note": "If 'nice-to-have' \u2014 the belief shift didn't fully land. Go back to pain. If 'real problem' \u2014 proceed to close.", "l1": {"q": "Does what you've seen feel like it addresses a real problem, or is this more of a nice-to-have?", "goal": "Binary test. Forces a position."}, "l2": {"q": "What makes it real \u2014 is there a cost to not solving it, or a specific event that forces action?", "goal": "Anchor urgency to concrete trigger"}, "l3": {"q": "If you do nothing for twelve months, what's the most likely downside?", "goal": "Cost of inaction in their words"}, "question_type": "confirming"}, {"id": "dq-034", "tier": 1, "tag": "Process", "fire_when": [], "skip_when": [], "note": "Every name they give you is a person you need to multi-thread with before M8.", "l1": {"q": "If this is worth exploring further, who else on your team would need to weigh in on whether it fits your environment?", "goal": "Stakeholder mapping for the buying committee."}, "l2": {"q": "What's each person's likely reaction \u2014 supportive, skeptical, or unknown?", "goal": "Pre-map the room"}, "l3": {"q": "Who's the hardest to convince, and what would it take?", "goal": "Identify the blocker"}}, {"id": "dq-036", "tier": 1, "tag": "Champion", "fire_when": [], "skip_when": [], "note": "Whatever they say here tells you exactly what materials, references, or framing they need to get internal buy-in.", "l1": {"q": "What would need to be true for you to feel comfortable recommending that next step internally?", "goal": "Arms the champion with what they need to sell internally."}, "l2": {"q": "When you make that recommendation, what pushback do you expect?", "goal": "Prepare champion for resistance"}, "l3": {"q": "Would it help if I put together a one-pager so you don't have to build the case from scratch?", "goal": "Champion leaves armed"}, "question_type": "confirming"}, {"id": "dq-035", "tier": 1, "tag": "Process", "fire_when": [], "skip_when": [], "note": "Name the meeting type. 'Coordination meeting' is specific and bounded. 'Follow up' is vague and dies.", "l1": {"q": "Would it make sense to bring those stakeholders into a coordination meeting so we can scope a proper evaluation?", "goal": "Proposes the next step explicitly."}, "l2": {"q": "What would need to happen between now and that meeting to keep momentum?", "goal": "Create interim commitments"}, "l3": {"q": "Can we get it on the calendar right now?", "goal": "Book it live"}, "question_type": "confirming"}]}]}, "M3": {"name": "Coordination Meeting", "belief_shift": "A proper evaluation requires defined scope, roles, timeline \u2014 and the economic buyer's awareness from day one.", "stages": [{"id": "m3-align", "name": "Align \u2014 Confirm Pain & Stakeholder Map", "goal": "Re-anchor the pain that earned this meeting. Map every person who touches or influences the decision. Identify the economic buyer by name and role. Understand their relationship to the champion.", "belief_shift_target": "Move from 'I'm exploring this' to 'I know exactly who needs to be involved, what each person cares about, and who ultimately says yes.'", "questions": [{"id": "dq-037", "tier": 1, "tag": "EB", "fire_when": ["economic_buyer_missing", "audit_risk"], "skip_when": [], "note": "Identifies the economic buyer or their proxy.", "l1": {"q": "When an LP or auditor challenges a distribution, who in your org is ultimately accountable for defending that number?", "goal": "Identifies the economic buyer or their proxy."}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}}, {"id": "dq-038", "tier": 1, "tag": "Process", "fire_when": ["decision_process_unclear"], "skip_when": [], "note": "Maps the full buying committee. Surfaces hidden influencers.", "l1": {"q": "If you were to evaluate a platform like this properly, who would need to be involved to make sure nothing gets missed?", "goal": "Maps the full buying committee. Surfaces hidden influencers."}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}}, {"id": "dq-042", "tier": 1, "tag": "Champion", "fire_when": ["ownership_unclear"], "skip_when": [], "note": "MEDDPICC Champion gap fill. Identifies motivation.", "l1": {"q": "Who on your team has the most to gain if this gets solved the right way?", "goal": "MEDDPICC Champion gap fill. Identifies motivation."}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}}, {"id": "dq-106", "tier": 1, "tag": "EB", "fire_when": ["economic_buyer_missing", "eb_gatekeeping"], "skip_when": [], "note": "Maps EB engagement style. Determines whether EB needs operational evidence or strategic framing.", "l1": {"q": "You mentioned [name] would need to be involved. What does their day-to-day look like \u2014 are they in the weeds on fund operations, or more of a strategic oversight role?", "goal": "Maps EB engagement style. Determines whether EB needs operational evidence or strategic framing."}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}}, {"id": "dq-107", "tier": 1, "tag": "EB", "fire_when": ["economic_buyer_missing", "pricing_discussion"], "skip_when": [], "note": "Discovers the EB's decision criteria before the EB is in the room. Arms the champion.", "l1": {"q": "When your [CFO/COO/Managing Partner] evaluates an investment in operational technology, what lens do they look through \u2014 cost reduction, risk mitigation, or scale readiness?", "goal": "Discovers the EB's decision criteria before the EB is in the room. Arms the champion."}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}}, {"id": "dq-108", "tier": 1, "tag": "Process", "fire_when": ["decision_process_unclear", "timeline_delay"], "skip_when": [], "note": "Surfaces historical blockers and internal political dynamics. Prevents repeating past failures.", "l1": {"q": "Has your team tried to get something like this approved before? What happened?", "goal": "Surfaces historical blockers and internal political dynamics. Prevents repeating past failures."}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}}], "exit_criteria": [{"criterion": "Economic buyer identified by name and title", "meddpicc": "Economic Buyer", "required": true, "if_not_met": "Ask directly: 'If we got through the full evaluation and both sides agreed this was a fit \u2014 who writes the check? Who has the authority to say yes?' Do not leave M3-align without this."}, {"criterion": "Full buying committee mapped", "meddpicc": "Decision Process", "required": true, "if_not_met": "Walk through the decision chain: 'You'd evaluate the workflow. Who evaluates the cost? Who evaluates the security? Who signs the contract?' Each answer is a stakeholder."}, {"criterion": "Champion's internal credibility confirmed", "meddpicc": "Champion", "required": true, "if_not_met": "Ask: 'Have you championed something like this internally before? How did it go?' If they haven't, you may have a coach, not a champion."}, {"criterion": "EB's decision lens identified", "meddpicc": "Decision Criteria", "required": false}, {"criterion": "Historical blockers surfaced", "meddpicc": "Decision Process", "required": false}], "champion_coaching": [{"id": "cc-001", "prompt": "Ask the champion: 'When you bring this to [EB name], what's the one thing they'll ask first?' Then build the answer together.", "surface_when": "Champion mentions needing to 'run it by' or 'get buy-in from' someone senior."}, {"id": "cc-002", "prompt": "Test the champion: 'If [EB name] asked you right now why this matters, what would you say?' If their answer is vague, help sharpen it.", "surface_when": "After the stakeholder map is built and before the MAP is locked."}, {"id": "cc-003", "prompt": "Offer to build champion materials: 'Would it help if we put together a one-page summary you can share with [EB name] before we ask for their time?'", "surface_when": "Champion expresses any hesitation about engaging the EB."}], "stage_objections": [], "reframes": [{"id": "rf-033", "text": "A structured evaluation protects both sides. It prevents scope creep, sets clear expectations, and gives the team a framework to make a confident decision."}, {"id": "rf-064", "text": "The biggest risk in any evaluation isn't picking the wrong vendor. It's getting to month four and realizing the person who says yes was never in the process."}, {"id": "rf-065", "text": "The best evaluations we've seen work backwards from the decision \u2014 who makes it, what they need to see, and by when. That shapes everything else."}, {"id": "rf-066", "text": "We've seen deals move fast when the champion understands exactly what the EB cares about and builds the business case around that specific lens."}, {"id": "rf-067", "text": "The champion doesn't need the EB in every meeting. They need the EB to know the evaluation is happening, understand why, and have a defined moment where they engage."}], "competitor_paths": [], "next_steps": [], "proof_points": [{"id": "pp-046", "text": "Deals where the EB is identified and briefed by the coordination meeting close 2.5x faster than deals where the EB surfaces late in the process."}, {"id": "pp-047", "text": "Firms that run a structured MAP with defined milestones complete their evaluation in 45-60 days. Firms without one average 4-6 months \u2014 and many stall entirely."}]}, {"id": "m3-map", "name": "Map \u2014 Decision Process & Competitive Landscape", "goal": "Document the full decision process end-to-end: procurement steps, approval chain, timeline constraints, evaluation criteria, and competitive alternatives. Shape the evaluation rubric before someone else does.", "belief_shift_target": "Move from 'we'll figure out the process as we go' to 'the decision process has specific steps, specific owners, and a specific timeline \u2014 and we've documented it.'", "questions": [{"id": "dq-039", "tier": 1, "tag": "Process", "fire_when": ["decision_process_unclear", "timeline_delay"], "skip_when": [], "note": "Learns their procurement pattern. Identifies potential blockers early.", "l1": {"q": "Walk me through how decisions like this have been made in the past \u2014 what worked, and what slowed things down?", "goal": "Learns their procurement pattern. Identifies potential blockers early."}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}}, {"id": "dq-040", "tier": 1, "tag": "Process", "fire_when": ["fund_growth", "timeline_delay"], "skip_when": [], "note": "Identifies the compelling event. Creates timeline urgency.", "l1": {"q": "Is there an event on your calendar \u2014 a fundraise, an audit, a fund launch \u2014 that creates natural urgency around resolving this?", "goal": "Identifies the compelling event. Creates timeline urgency."}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}}, {"id": "dq-041", "tier": 2, "tag": "Competition", "fire_when": ["vendor_comparison"], "skip_when": [], "note": "MEDDPICC Competition gap fill. Surfaces competitive landscape.", "l1": {"q": "Are there other vendors in this space your team is evaluating or has looked at recently?", "goal": "MEDDPICC Competition gap fill. Surfaces competitive landscape."}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}}, {"id": "dq-043", "tier": 1, "tag": "Criteria", "fire_when": ["decision_process_unclear", "vendor_comparison"], "skip_when": [], "note": "MEDDPICC Decision Criteria gap fill. Shapes the evaluation rubric.", "l1": {"q": "Are there specific criteria your team will use to evaluate this formally?", "goal": "MEDDPICC Decision Criteria gap fill. Shapes the evaluation rubric."}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}}, {"id": "dq-044", "tier": 1, "tag": "Process", "fire_when": ["decision_process_unclear", "timeline_delay"], "skip_when": [], "note": "MEDDPICC Paper Process gap fill. Surfaces legal/procurement blockers early.", "l1": {"q": "What does your standard vendor onboarding or procurement process typically look like?", "goal": "MEDDPICC Paper Process gap fill. Surfaces legal/procurement blockers early."}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}}, {"id": "dq-109", "tier": 1, "tag": "Criteria", "fire_when": ["vendor_comparison", "decision_process_unclear"], "skip_when": [], "note": "Co-creates the evaluation rubric. Anchors criteria that favor Maybern's strengths before competitors shape it.", "l1": {"q": "If we defined the evaluation criteria together right now \u2014 what would be on the list? Accuracy? Speed? Auditability? Integration? Let's write it down.", "goal": "Co-creates the evaluation rubric. Anchors criteria that favor Maybern's strengths before competitors shape it."}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}}, {"id": "dq-110", "tier": 1, "tag": "Process", "fire_when": ["timeline_delay", "decision_process_unclear"], "skip_when": [], "note": "Surfaces procurement bottlenecks early. Parallel-pathing security review prevents it from becoming a late-stage blocker.", "l1": {"q": "Is there a security review or IT assessment that needs to happen? If so, how long does that typically take, and can we start it in parallel?", "goal": "Surfaces procurement bottlenecks early. Parallel-pathing security review prevents it from becoming a late-stage blocker."}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}}, {"id": "dq-111", "tier": 2, "tag": "Competition", "fire_when": ["vendor_comparison"], "skip_when": [], "note": "Pre-positions against competitor weaknesses by getting the buyer to articulate their own skepticism about demo-stage evaluations.", "l1": {"q": "When your team evaluates competitors in this space, what's the thing that usually looks great in the demo but falls apart in implementation?", "goal": "Pre-positions against competitor weaknesses by getting the buyer to articulate their own skepticism about demo-stage evaluations."}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}}], "exit_criteria": [{"criterion": "Decision process documented end-to-end", "meddpicc": "Decision Process", "required": true, "if_not_met": "Walk through it step by step: 'After the tailored demo, what happens next? Who reviews? How long does that take? Then what?'"}, {"criterion": "Compelling event identified and anchored", "meddpicc": "Decision Process", "required": true, "if_not_met": "Ask: 'Is there anything on your calendar in the next 6-12 months that would make resolving this more urgent \u2014 a fundraise, an audit, a new fund launch?' If truly nothing \u2014 flag as deal risk."}, {"criterion": "Evaluation criteria co-created or at minimum discussed", "meddpicc": "Decision Criteria", "required": true, "if_not_met": "Propose: 'Based on what we've discussed, accuracy with real data, implementation speed, and ongoing support seem like the right criteria. Does that feel right, or are there others?'"}, {"criterion": "Competitive landscape mapped", "meddpicc": "Competition", "required": false}, {"criterion": "Security/procurement timeline estimated", "meddpicc": "Paper Process", "required": false}], "champion_coaching": [], "stage_objections": [{"id": "obj-055", "category": "EVALUATION PROCESS", "objection": "We don't have formal evaluation criteria \u2014 we'll just know when we see the right solution.", "response": "That instinct is valid, but it's hard to get multiple stakeholders to agree on 'we'll know it when we see it.' A written set of criteria \u2014 even a simple one \u2014 gives everyone a shared rubric. It also protects you from a competitor who looks flashy in a demo but can't handle your actual fund structures."}, {"id": "obj-056", "category": "COMPETITIVE EVALUATION", "objection": "We want to evaluate at least two or three vendors before committing to a process.", "response": "Makes total sense. A structured evaluation actually makes that easier \u2014 same criteria, same data, same stakeholders evaluating each vendor. Without that, you end up comparing apples to oranges because each vendor shows you something different."}, {"id": "obj-057", "category": "TIMELINE RESISTANCE", "objection": "We can't commit to a timeline right now \u2014 there's too much uncertainty.", "response": "Understood. Let's work backwards from the compelling event you mentioned. If [fundraise/audit/year-end] is the milestone, what would the timeline need to look like to have a decision by then? Even a rough sketch gives us something to test."}], "reframes": [{"id": "rf-068", "text": "The evaluation criteria should reflect what matters after the demo \u2014 implementation speed, data accuracy with real fund structures, and ongoing support. That's where the decision actually gets made."}, {"id": "rf-069", "text": "Starting the security review in parallel doesn't commit you to anything. It just prevents a two-month bottleneck at the end when everyone's ready to move."}, {"id": "rf-070", "text": "Most evaluations stall because the process was never defined. When we map it now, we can tell you within a week if the timeline is realistic or if we need to adjust."}, {"id": "rf-034", "text": "The NDA and data-access steps let us work with real information instead of hypotheticals \u2014 that's where the evaluation gets meaningful."}], "competitor_paths": [{"id": "comp-045", "trigger": "Buyer names a specific competitor they're also evaluating", "path": "Don't attack. Ask: 'What criteria are you using to evaluate them?' Then shape the rubric: 'Would it be useful to define the evaluation criteria together so each vendor is measured against the same bar? We're happy to be evaluated on accuracy with real data, implementation timeline, and ongoing support.' This anchors criteria that favor Maybern."}, {"id": "comp-046", "trigger": "Buyer says they saw a demo from a competitor and liked it", "path": "Acknowledge and redirect: 'Demos are designed to look good. The real test is what happens when you feed in your actual fund structures \u2014 the side letters, the catch-up provisions, the multi-currency waterfalls. Let's make that part of the evaluation criteria.'"}, {"id": "comp-047", "trigger": "Buyer mentions building internally or using existing tools", "path": "Don't argue. Ask: 'What would the internal build need to cover \u2014 and who would maintain it once the person who built it moves on? Let's include build-vs-buy as an explicit evaluation criterion so the comparison is transparent.'"}], "next_steps": [], "proof_points": []}, {"id": "m3-lock", "name": "Lock \u2014 MAP, NDA & EB Commitment", "goal": "Lock the Mutual Action Plan with specific dates and owners. Secure NDA/data-access commitment. Get a specific commitment for when and how the EB enters the evaluation \u2014 not a vague 'at some point' but a defined milestone.", "belief_shift_target": "Move from 'I'll bring leadership in when the time is right' to 'we've agreed on a specific milestone where leadership sees the evaluation \u2014 and I know what to tell them before that meeting.'", "questions": [{"id": "dq-112", "tier": 1, "tag": "Process", "fire_when": ["timeline_delay"], "skip_when": [], "note": "Tests timeline commitment. Surfaces hidden constraints.", "l1": {"q": "Based on everything we've mapped \u2014 does a 45-day evaluation timeline feel realistic, or are there constraints we should build around?", "goal": "Tests timeline commitment. Surfaces hidden constraints."}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}, "question_type": "confirming"}, {"id": "dq-113", "tier": 1, "tag": "EB", "fire_when": ["economic_buyer_missing", "eb_gatekeeping"], "skip_when": [], "note": "Defines the EB engagement milestone. Gets the champion to commit to a specific moment, not a vague 'eventually.'", "l1": {"q": "At what point in this process should your [CFO/COO] see the evaluation \u2014 and what would they need to see to feel confident in the next step?", "goal": "Defines the EB engagement milestone. Gets the champion to commit to a specific moment, not a vague 'eventually.'"}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}, "question_type": "confirming"}, {"id": "dq-114", "tier": 1, "tag": "Champion", "fire_when": ["economic_buyer_missing", "eb_gatekeeping"], "skip_when": [], "note": "Offers to arm the champion. Reduces friction of EB engagement.", "l1": {"q": "Would it help if we put together a brief for [EB name] \u2014 the problem, the cost, and what the evaluation has covered so far \u2014 so they're up to speed before that meeting?", "goal": "Offers to arm the champion. Reduces friction of EB engagement."}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}, "question_type": "confirming"}, {"id": "dq-115", "tier": 1, "tag": "Process", "fire_when": ["timeline_delay"], "skip_when": [], "note": "Books multiple meetings in one shot. Creates commitment and velocity.", "l1": {"q": "Can we lock the next three milestones on the calendar now \u2014 the Value Creation Workshop, the Process Review, and the Tailored Demo date?", "goal": "Books multiple meetings in one shot. Creates commitment and velocity."}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}, "question_type": "confirming"}, {"id": "dq-116", "tier": 1, "tag": "Process", "fire_when": ["timeline_delay", "decision_process_unclear"], "skip_when": [], "note": "Surfaces deal risk early. Gets ahead of surprises.", "l1": {"q": "Is there anything that could derail this between now and [next milestone date] \u2014 a reorg, a freeze, a competing priority?", "goal": "Surfaces deal risk early. Gets ahead of surprises."}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}, "question_type": "confirming"}], "exit_criteria": [{"criterion": "MAP locked with dates and owners", "meddpicc": "Decision Process", "required": true, "if_not_met": "Build it live: 'Let's draft this together right now. Value Creation Workshop \u2014 [date]. Process Review \u2014 [date]. Tailored Demo \u2014 [date]. NDA \u2014 by [date]. Data access \u2014 by [date]. Does that work?'"}, {"criterion": "NDA and data access committed with timeline", "meddpicc": "Paper Process", "required": true, "if_not_met": "Ask directly: 'What's preventing us from moving on the NDA this week? Is it a legal review? We can send a standard mutual NDA today.'"}, {"criterion": "EB engagement milestone defined", "meddpicc": "Economic Buyer", "required": true, "if_not_met": "This is the most critical exit criterion. Ask: 'We've mapped the whole process \u2014 at what point does [EB name] see this? The tailored demo is usually where leadership engages. Can we target [date] for that?'"}, {"criterion": "Security review initiated in parallel", "meddpicc": "Paper Process", "required": false}, {"criterion": "Champion armed with EB briefing materials", "meddpicc": "Champion", "required": false}], "champion_coaching": [{"id": "cc-004", "prompt": "Before we wrap: when you brief [EB name], lead with the cost of the status quo \u2014 the hours, the risk, the scaling problem. The product is secondary to the problem.", "surface_when": "Always \u2014 end of M3-lock."}, {"id": "cc-005", "prompt": "If [EB name] asks 'why now' \u2014 the answer is [compelling event]. That's the natural deadline. Everything works backward from there.", "surface_when": "When a compelling event has been identified in M3-map."}, {"id": "cc-006", "prompt": "The strongest champions position it as: 'I've been evaluating this and I think it's worth your time. Here's a 15-minute brief and then a 45-minute demo with our actual data. If it doesn't pass the bar, we stop.'", "surface_when": "Champion is nervous about EB engagement."}], "stage_objections": [{"id": "obj-058", "category": "EB ENGAGEMENT RESISTANCE", "objection": "It's too early to bring leadership into this \u2014 I need to vet it more first.", "response": "Totally fair. We're not asking for a leadership meeting tomorrow. We're asking: at what milestone would it make sense for them to see this? If the tailored demo is that milestone, let's work backward from there and make sure they're briefed before they walk in."}, {"id": "obj-059", "category": "EB ENGAGEMENT RESISTANCE", "objection": "My [CFO/COO] doesn't get involved until there's a proposal on the table.", "response": "That's common \u2014 and it often means the EB's first exposure to the evaluation is a price conversation, which skips the context. What if we ensured [EB name] had a 15-minute brief on the problem and the cost before the proposal? That way the pricing conversation happens with context, not in a vacuum."}, {"id": "obj-060", "category": "MAP RESISTANCE", "objection": "We don't need a formal plan \u2014 we can just schedule meetings as we go.", "response": "Absolutely \u2014 and if it were just the two of us, that would work. The challenge is coordinating multiple stakeholders across procurement, security, finance, and leadership. The MAP is just a shared calendar with owners. It prevents the 'we'll get to it' drift that adds months to evaluations."}], "reframes": [{"id": "rf-071", "text": "The MAP isn't a contract \u2014 it's a shared plan. If something changes, we adjust. But without it, evaluations drift and everyone loses momentum."}, {"id": "rf-072", "text": "The champion doesn't need the EB in every meeting. They need the EB aware of the evaluation, briefed on the problem, and scheduled for one key meeting where they see the platform handle their actual data."}, {"id": "rf-073", "text": "Here's what works: the champion briefs the EB on the problem and the cost. We handle the product demonstration. The EB never has to sit through discovery \u2014 they come in at the decision point."}, {"id": "rf-074", "text": "Locking the NDA and data access now means every subsequent meeting works with real information. That's the difference between evaluating a concept and evaluating a solution."}, {"id": "rf-075", "text": "The most successful evaluations we run share one thing: the EB knows it's happening from day one. They don't need to be in the room \u2014 they just need to be on the map."}], "competitor_paths": [], "next_steps": [{"id": "ns-045", "text": "Let me send over the MAP with the milestones we discussed, the NDA for review, and a data access request. You'll have it by end of day."}, {"id": "ns-046", "text": "Can we confirm: [EB name] will be briefed by [date] and scheduled for the tailored demo on [date]? I'll send a one-pager to support that conversation."}, {"id": "ns-047", "text": "The security review \u2014 can your IT team start that in parallel this week? I'll send the SOC 2 report and the DDQ responses."}, {"id": "ns-048", "text": "One last thing: is there anyone we haven't discussed who might have an opinion or veto power? Better to surface them now than at the finish line."}], "proof_points": [{"id": "pp-048", "text": "Evaluations with a locked MAP and EB commitment complete in 45-60 days. Without one, the average is 4-6 months \u2014 and 40% stall entirely."}, {"id": "pp-049", "text": "Champions who brief the EB before the tailored demo convert at 3x the rate of champions who bring the EB in cold."}]}], "stage_keys": ["align", "map", "lock"]}, "M4": {"name": "Value Creation Workshop", "belief_shift": "The cost of inaction is quantifiable and material.", "stages": [{"id": "m4-frame", "name": "Frame \u2014 Set the Diagnostic Context", "goal": "Establish that this is a collaborative quantification exercise \u2014 not a sales pitch. The buyer should feel like they're building the business case with you, not being sold one.", "belief_shift_target": "Move from 'this is inconvenient but manageable' to 'the cost of inaction is quantifiable and material \u2014 I can put a number on it.'", "questions": [{"id": "dq-117", "tier": 1, "tag": "EB", "fire_when": ["economic_buyer_missing"], "skip_when": [], "note": "Surfaces the EB early in M4. If the EB wasn't identified in M3, this catches the gap.", "l1": {"q": "Who in your organization would ultimately need to sign off on an investment like this \u2014 and what would they need to see?", "goal": "Surfaces the EB early in M4. If the EB wasn't identified in M3, this catches the gap."}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}}, {"id": "dq-118", "tier": 1, "tag": "EB", "fire_when": ["economic_buyer_missing", "pricing_discussion"], "skip_when": [], "note": "Calibrates the ROI narrative for the EB's specific lens before building the model.", "l1": {"q": "When your [CFO/COO] looks at the business case for operational technology, do they think in terms of cost savings, risk reduction, or strategic capability? What resonates most?", "goal": "Calibrates the ROI narrative for the EB's specific lens before building the model."}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}}], "exit_criteria": [{"criterion": "Collaborative framing established", "meddpicc": "Champion", "required": true, "if_not_met": "Reframe: 'I want to be clear \u2014 this isn't about selling you on a number. It's about building a picture of what the current process actually costs so you can make an informed decision.'"}, {"criterion": "EB decision lens identified", "meddpicc": "Economic Buyer", "required": true, "if_not_met": "Ask dq-118 directly. Do not proceed to quantification without knowing which ROI dimension matters most to the person who approves the budget."}], "champion_coaching": [{"id": "cc-007", "prompt": "Before we start quantifying \u2014 who will you be presenting this to, and what's the one number they'll fixate on?", "surface_when": "Opening of M4-frame, before the first ROI prompt."}], "stage_objections": [], "reframes": [{"id": "rf-035", "text": "What we usually discover during this exercise is that the cost isn't obvious because the work is distributed across the team. Nobody owns the full number."}, {"id": "rf-036", "text": "The real cost usually shows up after the information has already been gathered \u2014 in the reconciliation, the validation, the shadow work nobody budgeted for."}, {"id": "rf-037", "text": "Many teams underestimate how much time this workflow consumes across analysts because each person only sees their slice of it."}, {"id": "rf-038", "text": "The hardest costs to see are the ones baked into the process \u2014 the extra headcount, the late distributions, the hours spent checking the admin's work."}, {"id": "rf-039", "text": "Most organizations don't even run through this exercise. The cost is there \u2014 they just haven't noticed it because nobody sat down to calculate it."}, {"id": "rf-040", "text": "We try to make everything tangible. If a number feels wrong, say so \u2014 we'll adjust it together. This is your model, not ours."}, {"id": "rf-041", "text": "I'm going to save this and share the link \u2014 you can toggle the numbers offline. This is your model. If something doesn't pass the sniff test, adjust it."}, {"id": "rf-076", "text": "The business case we build today should be something you can put in front of your [CFO/COO] as-is \u2014 no translation needed. Let's build it in their language."}, {"id": "rf-077", "text": "I'd rather we build a conservative model that your CFO believes than an aggressive one they discount. What matters is that the directional math is undeniable."}], "competitor_paths": [], "next_steps": [], "proof_points": [{"id": "pp-022", "text": "A healthcare PE controller called the platform pricing 'not that expensive' once the cost of the existing validation process was quantified \u2014 roughly $37K/year was a fraction of what the manual process cost."}, {"id": "pp-023", "text": "Most firms find the ROI case is straightforward once the numbers are on paper. The harder part is sitting down to do the math."}]}, {"id": "m4-diagnose", "name": "Diagnose \u2014 Map Workflow, Quantify Cost, Surface Risk", "goal": "Walk through the buyer's workflow systematically. Quantify time and effort at each step. Surface operational risk. Build a rough ROI model collaboratively. This is the core of the meeting.", "belief_shift_target": "Move from 'this is just how it works' to 'the total cost of this process is $X per year, it scales worse than linearly, and there's a key person risk we haven't addressed.'", "questions": [{"id": "dq-050", "tier": 2, "tag": "Metrics", "fire_when": ["status_quo_confidence", "roi_curiosity"], "skip_when": [], "note": "If yes \u2014 use their number as the starting point. If no \u2014 this meeting is the first time. That's significant: it means nobody has ever forced the calculation.", "l1": {"q": "Have you ever put a number on what the status quo is costing you \u2014 headcount, distribution delays, or carry leakage?", "goal": "Tests whether they've already quantified the problem."}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}}, {"id": "dq-045", "tier": 2, "tag": "Metrics", "fire_when": ["manual_process", "workflow_fragility"], "skip_when": [], "note": "Start here. This is the anchor number. Everything else builds on it. If they can't estimate, break it down: 'How many people touch the process? How many hours each?'", "l1": {"q": "How many person-hours per quarter does your team spend on waterfall calculations, validation, and LP-facing reconciliation?", "goal": "Quantifies the labor cost of the status quo."}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}}, {"id": "dq-046", "tier": 2, "tag": "Metrics", "fire_when": ["roi_curiosity", "budget_pushback"], "skip_when": [], "note": "Do the math together. If they won't say the rate, use $150K fully-loaded as a proxy and let them correct it.", "l1": {"q": "If you translated those hours into fully-loaded annual cost, what does that number look like?", "goal": "Converts hours to dollars. Makes the cost tangible."}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}}, {"id": "dq-047", "tier": 2, "tag": "Metrics", "fire_when": ["fund_growth", "scale_discussion", "volume_increase"], "skip_when": [], "note": "The answer is almost always 'worse.' Each new fund adds side letters, unique fee arrangements, and another set of Excel models. Complexity is nonlinear.", "l1": {"q": "What happens to that number if your fund count doubles in the next 18 months \u2014 does it scale linearly or worse?", "goal": "Projects future cost. Usually worse than linear."}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}}, {"id": "dq-120", "tier": 2, "tag": "Pain", "fire_when": ["audit_risk", "workflow_fragility"], "skip_when": [], "note": "Surfaces risk events that are emotionally resonant. Near-misses are more powerful than theoretical risk because they're real.", "l1": {"q": "Beyond the hours \u2014 has the team ever had a near-miss? A distribution that almost went out wrong, or a partner question that took days to answer?", "goal": "Surfaces risk events that are emotionally resonant. Near-misses are more powerful than theoretical risk because they're real."}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}}, {"id": "dq-121", "tier": 2, "tag": "Pain", "fire_when": ["ownership_unclear", "workflow_fragility"], "skip_when": [], "note": "Key person risk quantification. Converts abstract dependency into concrete cost (hiring time, error risk, distribution delays).", "l1": {"q": "If your lead person on waterfall calculations left tomorrow, how long would it take to replace that institutional knowledge \u2014 and what breaks in the meantime?", "goal": "Key person risk quantification. Converts abstract dependency into concrete cost (hiring time, error risk, distribution delays)."}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}}, {"id": "dq-048", "tier": 2, "tag": "Pain", "fire_when": ["audit_risk", "vendor_comparison"], "skip_when": [], "note": "This is Level 3 on the pain ladder. Connects operational failure to personal and relationship stakes. Let them feel it.", "l1": {"q": "When an LP challenges a distribution and your team has to reconstruct the logic, what does that cost you in time, credibility, and trust?", "goal": "Adds intangible costs \u2014 trust, reputation, LP relationships."}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}}, {"id": "dq-049", "tier": 1, "tag": "EB", "fire_when": ["economic_buyer_missing", "pricing_discussion", "roi_curiosity"], "skip_when": [], "note": "Whatever number they say becomes the bar. Then use the cost data from this session to show whether the numbers clear it.", "l1": {"q": "If you had to justify investing in a new platform to your CFO next week, what ROI would they need to see?", "goal": "Learns the CFO's decision framework. Shapes the proposal."}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}}, {"id": "dq-119", "tier": 1, "tag": "EB", "fire_when": ["roi_curiosity", "economic_buyer_missing"], "skip_when": [], "note": "Tests whether the quantified cost is large enough to trigger EB attention. If yes, the business case has legs. If no, dig deeper.", "l1": {"q": "If the status quo costs your team $[X] per year in hours alone \u2014 before we even add risk exposure \u2014 would that number surprise your [CFO/COO]?", "goal": "Tests whether the quantified cost is large enough to trigger EB attention. If yes, the business case has legs. If no, dig deeper."}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}}], "exit_criteria": [{"criterion": "At least 2 of 4 cost-of-inaction channels quantified", "meddpicc": "Metrics", "required": true, "if_not_met": "Push through at least labor + one risk channel. The model doesn't need all four to be compelling \u2014 but it needs more than just hours."}, {"criterion": "Buyer owns the numbers", "meddpicc": "Champion", "required": true, "if_not_met": "If you've been doing all the estimating, pause and recalibrate: 'I want to make sure these are your numbers, not mine. Does that 200-hour estimate feel right to you, or should we adjust?'"}], "champion_coaching": [], "stage_objections": [], "reframes": [{"id": "rf-042", "text": "What we often find is that the total hours are 3-5x what anyone initially estimates \u2014 because each person only sees their slice of the workflow."}, {"id": "rf-043", "text": "The real impact usually shows up when the process needs to scale. Adding one more fund shouldn't require adding one more person."}, {"id": "rf-044", "text": "The cost that's hardest to see is the opportunity cost \u2014 what would your team do with those hours back? That's usually where the strategic value lives."}, {"id": "rf-045", "text": "Distribution timing is the sleeper ROI. Firms that distribute 14 days late \u2014 think about the pref accrual. At scale, that's real money returned to the GP."}, {"id": "rf-046", "text": "Management teams strip out intangible benefits. What survives the CFO filter: headcount equivalence, error cost reduction, distribution timing improvement. Those three build the case."}, {"id": "rf-047", "text": "The question isn't whether the ROI is there. It's whether the team has sat down to calculate it."}, {"id": "rf-048", "text": "Any delay in distributions is a drag on pref, which translates to a drag on carry. The question is whether the team can quantify exactly how much that delay costs per event."}, {"id": "rf-049", "text": "When someone leaves, there's a real cost: time to notice, time to hire, time to ramp. Most firms estimate $75K per departure. The question is whether that knowledge is in a system or in someone's head."}, {"id": "rf-050", "text": "The cost of the status quo isn't fixed. As fund count grows, every one of these numbers gets bigger \u2014 sometimes more than linearly."}, {"id": "rf-051", "text": "Even without the intangibles, the hard numbers \u2014 headcount equivalence, distribution timing, error reduction \u2014 usually clear the bar on their own."}, {"id": "rf-052", "text": "When in doubt, be conservative. This model should be directional, not precise. Management will run their own math \u2014 if we're conservative and the numbers still work, the case is stronger."}, {"id": "rf-053", "text": "The review time probably stays consistent. What changes is the preparation \u2014 that goes from hours to minutes. So we're not eliminating your oversight, we're eliminating the setup work."}, {"id": "rf-054", "text": "Risk mitigation and unlocking data \u2014 that's what clients tell us the real value is. The workflows are nice, but having the data accessible is the night-and-day difference."}, {"id": "rf-078", "text": "Near-misses are the most important data point. They tell you the system is fragile \u2014 you just haven't had the failure yet. The question is whether you want to fix it proactively or reactively."}, {"id": "rf-079", "text": "When we run this exercise with similar firms, the total usually lands between 2x and 4x what the champion initially estimated. Not because anyone is wrong \u2014 but because the cost is distributed across so many people that nobody sees the full number."}], "competitor_paths": [{"id": "comp-017", "trigger": "Buyer asks 'can't the admin just do this?'", "path": ""}, {"id": "comp-018", "trigger": "Buyer suggests cheaper alternatives or partial solutions", "path": ""}], "next_steps": [], "proof_points": [{"id": "pp-024", "text": "A $5B+ real estate manager quantified their quarter-end close at 3 weeks of team time. After implementing a system of record, it dropped to days. The controller changed how they think about hiring."}, {"id": "pp-025", "text": "One client found a six-figure error on a single distribution in their first quarter using the platform. The cost of that single error exceeded the annual platform cost."}, {"id": "pp-026", "text": "A $23B manager chose a productized platform over Anaplan + Lionpoint. The ROI case: $1.7M/year for a platform vs. $10M+ for a custom build that would require ongoing consulting to maintain."}, {"id": "pp-027", "text": "Three ROI buckets that survive the CFO filter: efficiency gains (person-hours saved \u00d7 fully-loaded rate), key person risk reduction (what would a departure cost?), distribution timing improvement (pref accrual on late distributions)."}, {"id": "pp-028", "text": "Most firms pass the platform cost through as an LP fund expense. Net cost to the GP is often zero \u2014 making the ROI effectively infinite."}, {"id": "pp-029", "text": "In one Value Creation session, a mid-market credit firm's VP of Ops mapped $32K of direct labor cost and 200 hours per fund per year \u2014 one-tenth of a full-time person. Across 5 funds, that's half a headcount nobody had budgeted for."}, {"id": "pp-030", "text": "When distribution optimization was calculated with real numbers \u2014 3 days saved \u00d7 $10M average distribution \u00d7 7% pref rate \u2014 the annual pref savings alone were material. The IRR uplift was net positive even after including platform fees."}, {"id": "pp-031", "text": "One prospect's VP of Ops said: 'Management is going to throw out the intangible numbers. They'll look at software cost vs. headcount cost \u2014 that's it.' The value creation model was rebuilt around those two numbers and the deal advanced."}, {"id": "pp-032", "text": "In one Value Creation session with a $23B RE manager, the accounting team mapped 265 hours per fund per year. The PM team added another 307 hours \u2014 more than the AE expected. When the rep said 'that's less than I expected,' the accounting team corrected by adding scenario modeling, ad hoc requests, and catch-up calcs that weren't on the original list."}], "roi_prompts": [{"id": "roi-001", "prompt": "How long does the full quarter-end process take end-to-end \u2014 from when it starts to when everything is finalized?", "quantifies": "Total cycle time per quarter. Multiply by four for annual burden."}, {"id": "roi-002", "prompt": "How many people are directly involved when that workflow runs \u2014 analysts, controllers, fund accountants?", "quantifies": "Headcount exposed to the process. Basis for fully-loaded cost calculation."}, {"id": "roi-003", "prompt": "If that activity doubled in volume \u2014 twice as many funds, twice as many investors \u2014 what would happen?", "quantifies": "Scaling trajectory. Reveals whether cost growth is linear (unlikely) or exponential."}, {"id": "roi-004", "prompt": "What portion of your team's time goes to checking the admin's work versus original analysis?", "quantifies": "Shadow work ratio. Most teams estimate 30-40%. Actual is usually 50-60%."}, {"id": "roi-005", "prompt": "How many hours does a single distribution cycle take \u2014 from calculation to notice to wire?", "quantifies": "Per-event cost. Multiply by distributions per year for annual distribution burden."}, {"id": "roi-006", "prompt": "If the finance team had 30% of their time back, what's the first thing they'd work on?", "quantifies": "Opportunity cost. Reveals what strategic work is being displaced by operational validation."}, {"id": "roi-007", "prompt": "What would it cost to hire one additional analyst to absorb the growth in fund count?", "quantifies": "Headcount avoidance value. Platform cost vs. incremental hire cost is the simplest CFO math."}, {"id": "roi-008", "prompt": "How many days late are distributions typically going out \u2014 and what's the pref accrual impact?", "quantifies": "Distribution timing ROI. Late distributions accrue preferred return. Quantifiable in dollars."}, {"id": "roi-009", "prompt": "Let's start with your team \u2014 how many senior staff and how many junior staff handle fund operations?", "quantifies": "Team composition. Basis for fully-loaded cost allocation by seniority level."}, {"id": "roi-010", "prompt": "For management fees specifically \u2014 how many hours per event, and how many times per year?", "quantifies": "Per-activity cost for fees. Multiply across all activities for total annual burden."}, {"id": "roi-011", "prompt": "For capital calls \u2014 how many hours each, and what's the annual frequency?", "quantifies": "Cap call operational cost. Usually lower per-event but multiplied by frequency."}, {"id": "roi-012", "prompt": "For distributions \u2014 how many hours, and how many per year? This is usually where the heaviest lift is.", "quantifies": "Distribution operational cost. Typically the highest-hour activity due to waterfall complexity."}, {"id": "roi-013", "prompt": "How about ad hoc LP requests \u2014 how many per year, and how long does each one take?", "quantifies": "Reactive work burden. Often underestimated. Can be 25-60 hours per year."}, {"id": "roi-014", "prompt": "If we add up those hours, does the total feel right as a sanity check \u2014 could one person running all of these activities handle roughly 10 funds?", "quantifies": "Sanity check on the aggregate number. Validates the model against the buyer's intuition."}, {"id": "roi-015", "prompt": "Should we run this for a stabilized fund or a fundraising fund? The hours will look very different \u2014 fundraising funds have closings, equalizations, catch-up interest.", "quantifies": "Lifecycle-stage calibration. Fundraising funds have 2-3x the operational burden of stabilized funds."}, {"id": "roi-016", "prompt": "Does the preparation time look different from the review time? Let's separate those \u2014 review probably stays, but preparation should shrink significantly.", "quantifies": "Isolates the automatable portion. Review time is human judgment; prep time is system work."}], "eb_alignment": [{"scenario": "", "framing": "", "script": ""}, {"scenario": "", "framing": "", "script": ""}, {"scenario": "", "framing": "", "script": ""}, {"scenario": "", "framing": "", "script": ""}, {"scenario": "", "framing": "", "script": ""}]}, {"id": "m4-advance", "name": "Align & Advance \u2014 Lock the Process Review", "goal": "Confirm the business case landed. Verify the champion can articulate ROI internally. Secure commitment for the Process Review meeting.", "belief_shift_target": "Move from 'the numbers are interesting' to 'the cost of inaction is material enough to warrant a process review \u2014 and I can make that case internally.'", "questions": [{"id": "dq-051", "tier": 1, "tag": "Pain", "fire_when": ["roi_curiosity", "status_quo_defense"], "skip_when": [], "note": "If yes \u2014 proceed to close. If 'I think so' \u2014 the conviction isn't strong enough. Go back to the number that surprised them most.", "l1": {"q": "Now that we've quantified the cost side \u2014 does this feel like a material enough problem to warrant a serious evaluation?", "goal": "Binary confirmation. Tests whether the belief shift landed."}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}, "question_type": "confirming"}, {"id": "dq-053", "tier": 1, "tag": "EB", "fire_when": ["economic_buyer_missing", "budget_pushback"], "skip_when": [], "note": "If no \u2014 identify the specific gap. Different CFOs care about different numbers. Find out which number matters most.", "l1": {"q": "Are you comfortable that the ROI justification would hold up with your CFO or investment committee?", "goal": "Final gut-check on business case credibility with the EB."}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}, "question_type": "confirming"}, {"id": "dq-055", "tier": 1, "tag": "EB", "fire_when": ["economic_buyer_missing", "pricing_discussion"], "skip_when": [], "note": "Whatever they say here shapes the proposal narrative. Write it down.", "l1": {"q": "Before we wrap \u2014 which of those cost areas carries the most weight internally, and is there anything your team tends to discount that we should emphasize?", "goal": "Prioritizes the ROI narrative for the internal conversation."}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}}, {"id": "dq-052", "tier": 1, "tag": "Champion", "fire_when": ["decision_process_unclear", "economic_buyer_missing"], "skip_when": [], "note": "If they hesitate, ask: 'What would make this more presentable? Specific materials? A one-pager with the numbers?'", "l1": {"q": "Could you present this business case internally, or do we need to sharpen any of the numbers?", "goal": "Tests champion readiness to sell internally."}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}, "question_type": "confirming"}, {"id": "dq-122", "tier": 1, "tag": "Champion", "fire_when": ["economic_buyer_missing"], "skip_when": [], "note": "Final calibration of the champion's internal pitch. Different EBs respond to different frames.", "l1": {"q": "When you present this to [EB name], what's the version of this story that resonates with them \u2014 the efficiency angle, the risk angle, or the strategic transformation angle?", "goal": "Final calibration of the champion's internal pitch. Different EBs respond to different frames."}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}, "question_type": "confirming"}, {"id": "dq-123", "tier": 1, "tag": "Process", "fire_when": ["decision_process_unclear", "economic_buyer_missing"], "skip_when": [], "note": "Distinguishes between EB sole authority and committee decision. Changes the deal strategy entirely.", "l1": {"q": "Is there a version of this business case that gets a quick yes from [EB name], or does everything go through a formal investment committee review?", "goal": "Distinguishes between EB sole authority and committee decision. Changes the deal strategy entirely."}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}}, {"id": "dq-056", "tier": 1, "tag": "Process", "fire_when": ["timeline_delay"], "skip_when": [], "note": "Don't leave without a date. The Process Review should happen within 2 weeks while the numbers are fresh.", "l1": {"q": "Can we lock in the next meeting date to review your process in detail?", "goal": "Books the Process Review live on the call."}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}, "question_type": "confirming"}], "exit_criteria": [{"criterion": "Champion can articulate ROI without vendor in the room", "meddpicc": "Champion", "required": true, "if_not_met": "Do not leave the meeting without testing this. Ask dq-052: 'Could you present this business case internally, or do we need to sharpen any of the numbers?' If they hesitate, role-play it (cc-008)."}, {"criterion": "Process Review date locked", "meddpicc": "Decision Process", "required": true, "if_not_met": "Ask directly: 'Can we lock the process review right now while we're both looking at calendars? The numbers are freshest this week.'"}, {"criterion": "EB briefing plan confirmed", "meddpicc": "Economic Buyer", "required": true, "if_not_met": "Ask: 'What's the best way to get [EB name] up to speed \u2014 a one-pager, a quick call, or should we prep something together?' Then commit to a date."}, {"criterion": "EB decision authority confirmed", "meddpicc": "Economic Buyer", "required": false}, {"criterion": "ROI model saved and shareable", "meddpicc": "Metrics", "required": false}], "champion_coaching": [{"id": "cc-008", "prompt": "Before you present this internally \u2014 practice your 60-second pitch with me. Pretend I'm your [CFO/COO]. What would you say?", "surface_when": "End of M4-advance, before locking next steps."}, {"id": "cc-009", "prompt": "Here's what the strongest champions do: they send the one-pager before the internal meeting, not during it. Give [EB name] time to process the numbers before they're asked to react in a room.", "surface_when": "When champion commits to presenting internally."}, {"id": "cc-010", "prompt": "If [EB name] pushes back on price, the answer is: 'The platform costs $X. The status quo costs $Y. Here are the numbers.' The business case should speak for itself \u2014 you don't need to sell.", "surface_when": "When pricing sensitivity surfaces during M4-advance."}], "stage_objections": [], "reframes": [{"id": "rf-055", "text": "The numbers we built today are yours, not ours. You can present them however makes sense internally."}, {"id": "rf-056", "text": "The process review takes the cost picture we built today and connects it to specific workflow steps that can be improved."}, {"id": "rf-057", "text": "If the champion in the room can articulate this ROI to their CFO without us in the room, the deal is real."}, {"id": "rf-058", "text": "When you present this to management, lead with the hard numbers \u2014 software cost vs. headcount cost. That's the comparison they'll make. The intangibles add to it, but the hard math has to clear the bar on its own."}, {"id": "rf-059", "text": "Here's how the strongest champions present this: 'Here are all the intangible considerations. Here are the additional efficiencies we might see. But just looking at the hard numbers, this is where we're at.' If hard numbers reach parity, the intangibles push it over."}, {"id": "rf-060", "text": "If management takes a 'toe in the water' approach with one fund, pricing won't be as competitive. Expanding to all funds from the start typically unlocks better economics."}], "competitor_paths": [], "next_steps": [{"id": "ns-013", "text": "Here's what I'd suggest as next steps: a summary of the numbers we built today \u2014 sent to you same-day. Then a process review in the next two weeks to map the specific workflow that drives those costs. From there, a proposal."}, {"id": "ns-014", "text": "Can we lock the process review onto the calendar now? The numbers are freshest this week."}, {"id": "ns-015", "text": "What materials would help you present this internally \u2014 a one-pager with the cost breakdown, or a reference call with a similar firm?"}], "proof_points": [{"id": "pp-033", "text": "Champions who can articulate ROI in their own words close deals 3x faster than those who rely on the vendor to make the case."}, {"id": "pp-034", "text": "The process review connects the cost picture to specific workflow steps \u2014 it's the bridge between 'we know it costs us' and 'here's exactly how to fix it.'"}, {"id": "pp-035", "text": "One VP of Ops told his AE: 'Ops has clearly identified we need this solution. We're on your team. But management needs hard tangible figures \u2014 not reputational risk.' He then presented the efficiency calculator to management, stripped the intangibles, and led with headcount equivalence. The deal advanced."}], "eb_alignment": [{"scenario": "EB is cost-focused", "framing": "Lead with headcount equivalence: 'The platform costs less than one FTE and replaces the work of two.' Follow with distribution timing ROI as a bonus.", "script": "Tell your CFO: 'The hard numbers alone \u2014 headcount avoidance and distribution timing \u2014 make the case. The risk and strategic benefits are on top.'"}, {"scenario": "EB is risk-focused", "framing": "Lead with key person risk and audit defensibility. 'The institutional knowledge is in one person's head. The platform is the insurance policy.' Follow with cost savings as secondary.", "script": "Tell your CFO: 'We have a single point of failure on our most critical calculations. This eliminates that risk and saves money doing it.'"}, {"scenario": "EB is growth-focused", "framing": "Lead with scaling penalty: 'Every new fund adds nonlinear operational complexity. The platform absorbs that complexity so the team can focus on fundraising support, investor relations, and strategic analysis.' Follow with current cost as proof of concept.", "script": "Tell your CFO: 'We can't scale fund operations by adding headcount forever. This is the operational infrastructure that lets us grow without proportional cost growth.'"}, {"scenario": "EB hasn't been briefed yet", "framing": "This is a red flag. The champion needs to brief the EB before the tailored demo or the deal is at risk. Offer to build a one-pager. Escalate the EB engagement conversation.", "script": "Surface cc-006 (champion coaching): 'I've been evaluating this and I think it's worth your time. Here's a 15-minute brief and then a 45-minute demo with our actual data.'"}]}], "stage_keys": ["frame", "diagnose", "advance"]}, "M5": {"name": "Process Review", "belief_shift": "Our current process has specific fragilities that mirror what Maybern solves \u2014 and the right person needs to see this.", "stages": [{"id": "m5-discover", "name": "Discover \u2014 Map the End-to-End Workflow", "goal": "Walk through the buyer's process from beginning to end. Document every step, system, handoff, and person involved. This is a data-gathering phase \u2014 don't diagnose yet, just map.", "belief_shift_target": "Move from 'I know our process' to 'I had no idea how many manual handoffs and single-point-of-failure steps exist when you actually map it end-to-end.'", "questions": [{"id": "dq-057", "tier": 2, "tag": "Pain", "fire_when": ["manual_process", "workflow_fragility"], "skip_when": [], "note": "Full process mapping. Creates the artifact that drives the rest of the evaluation.", "l1": {"q": "Let's map your process end-to-end: starting from when fund terms are set, walk me through every step until an LP receives their distribution statement.", "goal": "Full process mapping. Creates the artifact that drives the rest of the evaluation."}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}}, {"id": "dq-058", "tier": 2, "tag": "Pain", "fire_when": ["manual_process", "excel_dependency", "shadow_models"], "skip_when": [], "note": "Identifies manual handoff points \u2014 each one is an error risk.", "l1": {"q": "At which points in that flow does data get manually entered or re-keyed from one system to another?", "goal": "Identifies manual handoff points \u2014 each one is an error risk."}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}}, {"id": "dq-059", "tier": 2, "tag": "Pain", "fire_when": ["audit_risk", "shadow_models", "ownership_unclear"], "skip_when": [], "note": "Surfaces auditability gaps and governance risks.", "l1": {"q": "Where do overrides happen \u2014 and who has visibility into what was changed and why?", "goal": "Surfaces auditability gaps and governance risks."}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}}, {"id": "dq-060", "tier": 2, "tag": "Pain", "fire_when": ["manual_process", "audit_risk"], "skip_when": [], "note": "Tests the QC process. Usually reveals it's one person's judgment call.", "l1": {"q": "How does your team reconcile the waterfall output back to the source data before it goes out?", "goal": "Tests the QC process. Usually reveals it's one person's judgment call."}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}}, {"id": "dq-061", "tier": 2, "tag": "Pain", "fire_when": ["complexity_increase", "shadow_models"], "skip_when": [], "note": "Surfaces the side-letter complexity that breaks standard templates.", "l1": {"q": "Which fund structures have side-letter provisions that require separate handling outside your primary workflow?", "goal": "Surfaces the side-letter complexity that breaks standard templates."}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}}, {"id": "dq-062", "tier": 2, "tag": "Pain", "fire_when": ["manual_process", "excel_dependency"], "skip_when": [], "note": "Collaboration and governance risk. Usually the answer is 'carefully' or 'we don't.'", "l1": {"q": "How do you manage version control when multiple people are touching the same calculation?", "goal": "Collaboration and governance risk. Usually the answer is 'carefully' or 'we don't.'"}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}}, {"id": "dq-124", "tier": 2, "tag": "Pain", "fire_when": ["ownership_unclear", "audit_risk"], "skip_when": [], "note": "Surfaces the QC gap that most firms have. The answer is almost always one person.", "l1": {"q": "Who checks the checker? When the final numbers go out, is there a second set of eyes \u2014 or does one person sign off alone?", "goal": "Surfaces the QC gap that most firms have. The answer is almost always one person."}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}}, {"id": "dq-125", "tier": 2, "tag": "Pain", "fire_when": ["workflow_fragility"], "skip_when": [], "note": "Inverted question. Reveals what conditions produce success, which highlights what conditions produce failure.", "l1": {"q": "When is the last time the process worked perfectly \u2014 no late nights, no corrections, no surprises? What was different about that quarter?", "goal": "Inverted question. Reveals what conditions produce success, which highlights what conditions produce failure."}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}}], "exit_criteria": [{"criterion": "End-to-end process map completed", "meddpicc": "Pain", "required": true, "if_not_met": "Don't move to diagnose until the map is complete. If the team can't finish in one session, schedule a follow-up to complete the map before moving on."}, {"criterion": "Manual handoff points identified and counted", "meddpicc": "Pain", "required": true, "if_not_met": "Ask dq-058 directly for each transition point: 'Is this step automated or manual? Who does it? How long does it take?'"}], "champion_coaching": [], "stage_objections": [], "reframes": [{"id": "rf-080", "text": "The reason we map the full process is that nobody in the room usually sees all of it. The champion sees the strategic picture. The analysts see their slice. When it's all on paper, the gaps become obvious."}, {"id": "rf-081", "text": "Don't worry about making it look clean \u2014 we want the real process, not the documented process. The messier it is, the more useful this exercise becomes."}, {"id": "rf-082", "text": "Every manual handoff on this map is an error waiting to happen. Not every quarter \u2014 but on the quarter where everything goes wrong at once."}], "competitor_paths": [], "next_steps": [], "proof_points": [{"id": "pp-036", "text": "Process mapping sessions consistently surface 3-5 fragility points the buyer didn't consciously recognize as risks until they were documented."}, {"id": "pp-050", "text": "The average fund operations workflow has 12-18 manual handoff points per distribution cycle. Most firms estimate 3-5 before they map it."}]}, {"id": "m5-diagnose", "name": "Diagnose \u2014 Identify Fragility Points & Connect to Product", "goal": "Review the process map together. Identify the 3-5 most fragile points. Connect each fragility to a specific Maybern capability. The buyer should see their process reflected in the product \u2014 not the other way around.", "belief_shift_target": "Move from 'we have some fragile points' to 'these specific fragilities are exactly what a purpose-built system eliminates \
