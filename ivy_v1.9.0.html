u2014 and I can see the connection.'", "questions": [{"id": "dq-063", "tier": 2, "tag": "Pain", "fire_when": ["ownership_unclear", "workflow_fragility"], "skip_when": [], "note": "Key person risk, revisited with the process map as context.", "l1": {"q": "If your lead person on this process were unavailable for an entire quarter-end cycle, what breaks?", "goal": "Key person risk, revisited with the process map as context."}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}}, {"id": "dq-064", "tier": 1, "tag": "Pain", "fire_when": ["workflow_fragility"], "skip_when": [], "note": "Self-identified. Gets them to own the diagnosis before you prescribe.", "l1": {"q": "Looking at the full map we just built \u2014 where do you see the most fragile points?", "goal": "Self-identified. Gets them to own the diagnosis before you prescribe."}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}}, {"id": "dq-126", "tier": 2, "tag": "Pain", "fire_when": ["audit_risk", "workflow_fragility"], "skip_when": [], "note": "Emotionally anchors the diagnosis to a specific risk. Converts abstract fragility to personal accountability.", "l1": {"q": "Of the fragility points we've identified \u2014 which one would keep you up at night if an LP called to challenge the numbers?", "goal": "Emotionally anchors the diagnosis to a specific risk. Converts abstract fragility to personal accountability."}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}}, {"id": "dq-127", "tier": 1, "tag": "Criteria", "fire_when": ["workflow_fragility"], "skip_when": [], "note": "Bridges from diagnosis to product. Uses the process map as the demo script.", "l1": {"q": "Let me show you how Maybern handles [specific fragility point from the map]. Would it help to see this mapped to your actual workflow?", "goal": "Bridges from diagnosis to product. Uses the process map as the demo script."}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}}, {"id": "dq-128", "tier": 2, "tag": "Metrics", "fire_when": ["workflow_fragility", "roi_curiosity"], "skip_when": [], "note": "Future state visualization. Gets the buyer to articulate what 'better' looks like in their own words.", "l1": {"q": "If we could eliminate the three most fragile steps on this map, what would that change for your team's quarter-end experience?", "goal": "Future state visualization. Gets the buyer to articulate what 'better' looks like in their own words."}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}}], "exit_criteria": [{"criterion": "3-5 fragility points identified and buyer-confirmed", "meddpicc": "Pain", "required": true, "if_not_met": "Ask dq-064: 'Looking at the full map \u2014 where do you see the most fragile points?' If they minimize, ask dq-126 to anchor it emotionally."}, {"criterion": "Each fragility connected to a specific Maybern capability", "meddpicc": "Decision Criteria", "required": true, "if_not_met": "Use dq-127 to bridge each one: 'Let me show you how Maybern handles [fragility]. Would it help to see this mapped to your actual workflow?'"}, {"criterion": "Future state articulated by buyer", "meddpicc": "Metrics", "required": false}], "champion_coaching": [], "stage_objections": [{"id": "obj-061", "category": "PROCESS DEFENSIVENESS", "objection": "Our process works \u2014 it just takes a lot of effort.", "response": "It works today. The question is whether it works when fund count doubles, when the key person leaves, or when an LP challenges a number from three quarters ago. The fragilities on this map don't break every quarter \u2014 they break on the worst possible quarter."}, {"id": "obj-062", "category": "CHANGE RESISTANCE", "objection": "We've invested years in building these spreadsheets and templates \u2014 I don't want to throw them away.", "response": "You wouldn't be throwing them away. The platform ingests the logic from your existing models \u2014 the waterfall structures, the allocation rules, the side-letter provisions. The institutional knowledge stays. What changes is that it's no longer in a spreadsheet that one person maintains."}], "reframes": [{"id": "rf-083", "text": "The fragility points you just identified are exactly the patterns we built the platform around. That's not a coincidence \u2014 it's the result of working with firms that have the same complexity."}, {"id": "rf-084", "text": "The most dangerous fragilities aren't the ones you know about. They're the ones that only surface when everything goes wrong at the same time \u2014 a new fund launch during quarter-end during an audit."}, {"id": "rf-085", "text": "Here's the mental model: for each fragility point on the map, there's a specific Maybern capability that eliminates it. The tailored demo should walk through those connections one by one with your actual data."}, {"id": "rf-086", "text": "The process map we just built becomes the demo script. Instead of a generic product tour, the tailored demo shows how each of these fragile steps works in Maybern \u2014 with your fund structures, your waterfall provisions, your actual complexity."}], "competitor_paths": [{"id": "comp-048", "trigger": "Buyer mentions a competitor's process mapping or workflow analysis capability", "path": "Redirect to data depth: 'The process map is the starting point, not the product. What matters is whether the platform can actually handle the specific fund structures on this map \u2014 the side letters, the catch-ups, the multi-currency waterfalls. That's what the tailored demo will test.'"}, {"id": "comp-049", "trigger": "Buyer asks if Maybern can replicate their current spreadsheet logic exactly", "path": "Confirm and elevate: 'Yes \u2014 and then some. The platform replicates the logic but adds auditability, version control, and multi-user access that spreadsheets can't provide. Your models become institutional assets instead of personal files.'"}], "next_steps": [], "proof_points": []}, {"id": "m5-advance", "name": "Advance \u2014 Lock Future State & EB Demo", "goal": "Confirm the fragility diagnosis. Align on which capabilities to demonstrate in the Tailored Demo. Lock the EB into M8 with a tailored agenda built from the process map findings. This is the last meeting before the EB sees the product.", "belief_shift_target": "Move from 'the process has fragilities' to 'I have a specific plan: the tailored demo will address these exact fragilities with our actual data, and [EB name] is confirmed to attend because the business case warrants their time.'", "questions": [{"id": "dq-129", "tier": 1, "tag": "Criteria", "fire_when": ["economic_buyer_missing"], "skip_when": [], "note": "Co-creates the demo agenda. Ensures the demo is calibrated to the EB's priorities, not just the champion's.", "l1": {"q": "Based on the fragilities we've mapped \u2014 which three should be the focus of the tailored demo? What would be most convincing for your [CFO/COO]?", "goal": "Co-creates the demo agenda. Ensures the demo is calibrated to the EB's priorities, not just the champion's."}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}, "question_type": "confirming"}, {"id": "dq-130", "tier": 1, "tag": "EB", "fire_when": ["economic_buyer_missing", "eb_gatekeeping"], "skip_when": [], "note": "Direct EB commitment check. Forces the champion to either confirm or articulate the blocker.", "l1": {"q": "Is [EB name] confirmed for the tailored demo? If not \u2014 what do they need from you before they'll commit the time?", "goal": "Direct EB commitment check. Forces the champion to either confirm or articulate the blocker."}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}, "question_type": "confirming"}, {"id": "dq-131", "tier": 1, "tag": "EB", "fire_when": ["economic_buyer_missing"], "skip_when": [], "note": "Identifies the EB's decision-making trigger. Calibrates the demo to land the single most important message.", "l1": {"q": "What's the one thing your [CFO/COO] would need to see in 45 minutes that would make them say 'this is worth pursuing'?", "goal": "Identifies the EB's decision-making trigger. Calibrates the demo to land the single most important message."}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}, "question_type": "confirming"}, {"id": "dq-132", "tier": 1, "tag": "Process", "fire_when": ["timeline_delay"], "skip_when": [], "note": "Secures the data needed to build the tailored demo. Without real data, the demo is generic.", "l1": {"q": "For the file review \u2014 can your team pull sample data files, waterfall templates, and examples of your most complex fund structures by [date]?", "goal": "Secures the data needed to build the tailored demo. Without real data, the demo is generic."}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}, "question_type": "confirming"}, {"id": "dq-133", "tier": 1, "tag": "Process", "fire_when": ["timeline_delay"], "skip_when": [], "note": "Deal risk check. Catches blockers before they materialize.", "l1": {"q": "Is there anything that could prevent the tailored demo from happening on [proposed date] \u2014 a vacation, an audit, a competing priority?", "goal": "Deal risk check. Catches blockers before they materialize."}, "l2": {"q": "Can you walk me through a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you \u2014 time, money, or risk?", "goal": "Quantify the impact"}, "question_type": "confirming"}], "exit_criteria": [{"criterion": "EB confirmed for Tailored Demo with specific date", "meddpicc": "Economic Buyer", "required": true, "if_not_met": "This is the most critical exit criterion in the entire mid-funnel. Ask dq-130 directly. If the champion can't confirm, escalate: 'What would need to happen for [EB name] to commit to 30 minutes? Would a shorter format help? Would a pre-brief from us help?'"}, {"criterion": "Tailored demo agenda co-created from fragility findings", "meddpicc": "Decision Criteria", "required": true, "if_not_met": "Ask dq-129 and dq-131 to co-create the agenda. The demo must be built around the EB's lens, not the champion's."}, {"criterion": "Data access committed for file review", "meddpicc": "Decision Process", "required": true, "if_not_met": "Ask dq-132 directly. Without data, the tailored demo is generic \u2014 and a generic demo won't close the EB."}, {"criterion": "EB pre-briefing plan confirmed", "meddpicc": "Champion", "required": false}, {"criterion": "Demo format agreed", "meddpicc": "Decision Criteria", "required": false}], "champion_coaching": [{"id": "cc-011", "prompt": "When you invite [EB name] to the tailored demo, position it as: 'I've been evaluating this for the past [X] weeks. The process map and the business case both point in the same direction. I'd like you to see a 30-minute demo with our actual data before we decide next steps.'", "surface_when": "EB commitment is being discussed."}, {"id": "cc-012", "prompt": "Brief [EB name] before the demo \u2014 not during. Send them the one-pager from M4, the three fragility points from today, and a note that says: 'Here's what we found. The demo will show what the solution looks like.'", "surface_when": "EB is confirmed but hasn't been briefed."}], "stage_objections": [{"id": "obj-063", "category": "EB ENGAGEMENT RESISTANCE", "objection": "My [CFO/COO] won't sit through a 45-minute demo.", "response": "Fair. What if we structured it as a 20-minute focused session? Three fragility points from the process map, each shown with your actual data. No product tour \u2014 just the three things that matter most to them. Would that work?"}, {"id": "obj-064", "category": "DATA HESITATION", "objection": "We're not comfortable sharing fund data before an agreement is in place.", "response": "Understood. We can work with anonymized data or sample structures that mirror your complexity without using actual LP information. The goal is to demonstrate the product handles your fund architecture \u2014 we don't need real names or dollar amounts for that."}], "reframes": [{"id": "rf-087", "text": "The tailored demo isn't a product tour \u2014 it's a simulation of your future state. We'll load your data, run your fund structures, and show what the fragility points on this map look like when they're eliminated."}, {"id": "rf-088", "text": "Your [CFO/COO] doesn't need the workflow details. They need: 'Here's what the current process costs. Here's what breaks. Here's what it looks like when it doesn't break.' The demo builds that story in 45 minutes."}, {"id": "rf-089", "text": "The most effective tailored demos we run follow the process map: 'This is what you do today. This is where it breaks. This is what it looks like when Maybern handles it.' Step by step, fragility by fragility."}, {"id": "rf-090", "text": "If the EB leaves the tailored demo understanding three things \u2014 the cost, the risk, and the alternative \u2014 they have everything they need to make a decision. That's what we're designing for."}], "competitor_paths": [], "next_steps": [{"id": "ns-049", "text": "I'll send a summary of the process map and the fragility points we identified \u2014 that becomes the tailored demo agenda."}, {"id": "ns-050", "text": "For the file review, we'll need sample files by [date]. Can your team pull waterfall templates, sample LPA provisions, and examples of your most complex structures?"}, {"id": "ns-051", "text": "Let's confirm: tailored demo on [date], [EB name] attending, agenda built around [fragility 1], [fragility 2], and [fragility 3]. I'll send a calendar invite today."}, {"id": "ns-052", "text": "One final thing: is there anything your [CFO/COO] will ask in the demo that we should be prepared for? Better to anticipate it now than be surprised in the room."}], "proof_points": []}], "stage_keys": ["discover", "diagnose", "advance"]}}, "signal_rebuttals": {"status_quo_confidence": {"l1": {"text": "The firms that feel most confident usually haven't had the event yet. One LP dispute, one team member leaving, one fund launch \u2014 that's usually what changes the math. We're not here to create urgency. We're here to ask whether the current setup can absorb the next level of complexity."}, "l2": {"text": "What would have to break for you to feel like the current setup wasn't enough?"}, "l3": {"text": "If the current process handles everything perfectly, what made someone on your team take this meeting? Something triggered the conversation. I'd rather understand that than pitch you on something you don't need."}}, "status_quo_defense": {"l1": {"text": "I'm not suggesting what you have is broken. I'm asking whether it scales. Most firms we talk to aren't in crisis \u2014 they're at an inflection point. The question is whether you want to address it before or after the next fund launch."}, "l2": {"text": "When you think about Fund V or your next close \u2014 does the current process hold up without adding people?"}, "l3": {"text": ""}}, "manual_process": {"l1": {"text": "Manual is fine until it's not. The question is whether the manual work is growing linearly with your fund count \u2014 because if it is, you're either going to cap your growth or grow your team. Neither is the answer you want."}, "l2": {"text": "How many hours per quarter would you say your team spends on validation and reconciliation work?"}, "l3": {"text": ""}}, "workflow_fragility": {"l1": {"text": "When a process depends on specific people executing specific steps in a specific order \u2014 that's not a workflow, that's a ritual. Rituals work until the person who knows the ritual isn't there."}, "l2": {"text": "If I asked your team to document that process end to end today \u2014 how long would it take and how confident would you be it was complete?"}, "l3": {"text": ""}}, "excel_dependency": {"l1": {"text": "Excel isn't the problem \u2014 it's the process Excel enables. When the logic lives in a file that one person maintains, the file becomes the single point of failure. It doesn't fail dramatically. It fails quietly."}, "l2": {"text": "How many people on your team can open that model and understand exactly what it's doing?"}, "l3": {"text": ""}}, "audit_risk": {"l1": {"text": "Audit readiness isn't just about having the numbers. It's about being able to show your work \u2014 every calculation, every override, every amendment, with a timestamp and a reason. A spreadsheet that's been modified 40 times doesn't give you that."}, "l2": {"text": "When was the last audit and how long did your team spend pulling documentation together?"}, "l3": {"text": ""}}, "key_person_risk": {"l1": {"text": "The risk isn't that they leave. It's what happens while they're there. You can't promote them freely. You can't have them out during a distribution cycle. You can't hire someone junior to ramp up alongside them because the knowledge isn't transferable."}, "l2": {"text": "Who else on your team fully understands how the waterfall logic works end to end?"}, "l3": {"text": ""}}, "fund_growth": {"l1": {"text": "Growth is the multiplier. Every fund you add multiplies the complexity \u2014 more structures, more LPs, more side letters, more reconciliation cycles. The question is whether the infrastructure scales with the business or becomes the ceiling on it."}, "l2": {"text": "What does your fund launch roadmap look like over the next two years?"}, "l3": {"text": ""}}, "pricing_sensitivity": {"l1": {"text": "It is typically the most significant software investment a fund ops team makes. But 100% of our clients pass it through as a fund expense \u2014 it is not management company overhead. The question is what the validation process costs you today in person-hours trapped in spreadsheets."}, "l2": {"text": "What does a fully-loaded FTE cost you in this market? Let me run the real comparison with your numbers."}, "l3": {"text": "You are already paying for this. The platform costs a fraction of what you spend on the process it replaces. The math usually surprises people when they run it."}}, "internal_build_mentioned": {"l1": {"text": "We've seen this path. The first version works. Then a new fund structure comes in, and someone has to hack the system to make it work. Then another. The engineering team underestimates the complexity of fund accounting logic \u2014 not because they're not talented, but because it's genuinely subtle."}, "l2": {"text": "What's the estimate for the build timeline, and does that include ongoing maintenance as fund structures change?"}, "l3": {"text": ""}}, "competitor_mentioned": {"l1": {"text": ""}, "l2": {"text": "What specifically were you hoping they could solve that they could not?"}, "l3": {"text": "I am not asking you to trust me on capability. I am asking if it is worth 45 minutes to put your hardest fund on the table and see whether we can model it."}}, "no_urgency": {"l1": {"text": "You're right that there's no fire today. The question is whether the current setup is designed for where you're going or where you've been. Most firms don't add infrastructure when they're in crisis \u2014 they add it when they can. The ones that wait usually regret the timing."}, "l2": {"text": "What's your next fund close date, and does the current process get harder or easier from here?"}, "l3": {"text": "What would have to happen between now and Fund V's first close for this to feel urgent enough to act on? I want to understand what the trigger looks like for you, so we're not guessing at timing."}}, "competitor_pricing": {"l1": {"text": ""}, "l2": {"text": "What specifically is included in their quote \u2014 and what would you still need to solve in Excel even with that tool?"}, "l3": {"text": "One of our clients spent six months evaluating a cheaper alternative that could not handle their waterfall structures. The hidden cost was not the license \u2014 it was the six months."}}, "build_vs_buy_cost": {"l1": {"text": "Internal builds are optimized for how things worked when they were built. One client evaluated an internal Anaplan build at $50-70M over five years. The build cost was not the problem \u2014 it was the maintenance tail and the 3-5 engineers needed to sustain it."}, "l2": {"text": "How many engineering hours would your team need to build waterfall logic for multi-tier structures with side-letter overrides and full audit traceability?"}, "l3": {"text": "The question is whether your firm wants to be in the fund accounting software business or the fund management business. We have 50+ engineers who do nothing but this. You share the R&D cost with every client."}}, "allvue_mentioned": {"l1": {"text": "Allvue is a strong general ledger for partnership accounting. The gap is at the investor level \u2014 waterfalls, carried interest, scenario modeling, LP-specific economics. That is not Allvue's core."}, "l2": {"text": "What are you using Allvue for specifically \u2014 the GL, or are you trying to get it to handle the investor-level calculations too?"}, "l3": {"text": "Every firm running Allvue still lives in Excel for the calc layer. Data flows in from Allvue. The performance book of record adds the layer above it."}}, "carta_mentioned": {"l1": {"text": "Carta is strong for venture-style funds with pro-rata structures. When complexity increases \u2014 deal-by-deal waterfalls, catch-ups, clawbacks, side letters \u2014 it breaks."}, "l2": {"text": "How many of your fund structures have economics that go beyond a simple pro-rata split?"}, "l3": {"text": "Carta's waterfall approach uses rigid templates that require constant Excel validation. How many of your investor arrangements have custom terms?"}}, "investran_mentioned": {"l1": {"text": "Investran is widely used for fund-level accounting. The pattern is that even with Investran, investor-level performance \u2014 waterfalls, fees, carry \u2014 still ends up in spreadsheets."}, "l2": {"text": "Where does the investor-level calc logic live today \u2014 in Investran or in Excel?"}, "l3": {"text": "We do not replace Investran. Data flows in. The GL stays. The calc layer adds."}}, "efront_mentioned": {"l1": {"text": "eFront is solid for GL and fund accounting \u2014 especially customized instances. Investor-level performance, waterfalls, and scenario modeling typically live outside it in Excel."}, "l2": {"text": "How much customization have you done on your eFront instance, and what still lives outside it?"}, "l3": {"text": "The more customized the eFront instance, the harder it is to change. The calc layer above it gives you flexibility without touching the GL."}}}, "signal_map": [{"phrases": ["we're fine", "working for us", "not broken", "works well", "no issues", "it works", "process works", "happy with"], "signal": "status_quo_confidence", "label": "STATUS QUO", "color": "#F59E0B"}, {"phrases": ["we manage", "things are working", "been doing it this way", "haven't had problems"], "signal": "status_quo_defense", "label": "STATUS QUO", "color": "#EAB308"}, {"phrases": ["no urgency", "not a priority", "not the right time", "too busy", "maybe next quarter", "not now"], "signal": "no_urgency", "label": "NO URGENCY", "color": "#F97316"}, {"phrases": ["too expensive", "that's a lot", "can't afford", "over budget", "sticker shock", "how much does it cost", "what's the price", "price point"], "signal": "pricing_sensitivity", "label": "PRICING", "color": "#EF4444"}, {"phrases": ["basis points", "why bps", "flat fee", "per user", "per fund pricing", "why not flat"], "signal": "pricing_sensitivity", "label": "BPS MODEL", "color": "#EF4444"}, {"phrases": ["cheaper", "discount", "come down", "best price", "sharpen the pencil", "flexibility on price", "can you do better"], "signal": "pricing_sensitivity", "label": "NEGOTIATE", "color": "#EF4444"}, {"phrases": ["roi", "return on investment", "payback", "justify the cost", "business case"], "signal": "pricing_sensitivity", "label": "ROI", "color": "#EF4444"}, {"phrases": ["fund expense", "who pays", "lpa", "pass through", "management company cost", "gp should pay"], "signal": "pricing_sensitivity", "label": "FUND EXPENSE", "color": "#EF4444"}, {"phrases": ["allvue", "all vue"], "signal": "allvue_mentioned", "label": "vs ALLVUE", "color": "#EC4899"}, {"phrases": ["carta"], "signal": "carta_mentioned", "label": "vs CARTA", "color": "#EC4899"}, {"phrases": ["investran"], "signal": "investran_mentioned", "label": "vs INVESTRAN", "color": "#EC4899"}, {"phrases": ["efront", "e-front"], "signal": "efront_mentioned", "label": "vs EFRONT", "color": "#EC4899"}, {"phrases": ["juniper square", "juniper"], "signal": "competitor_mentioned", "label": "vs JUNIPER", "color": "#EC4899"}, {"phrases": ["chronograph"], "signal": "competitor_mentioned", "label": "vs CHRONOGRAPH", "color": "#EC4899"}, {"phrases": ["arcesium"], "signal": "competitor_mentioned", "label": "vs ARCESIUM", "color": "#EC4899"}, {"phrases": ["anaplan"], "signal": "build_vs_buy_cost", "label": "vs ANAPLAN", "color": "#8B5CF6"}, {"phrases": ["build it ourselves", "build internally", "internal tool", "built our own", "custom system"], "signal": "build_vs_buy_cost", "label": "BUILD vs BUY", "color": "#8B5CF6"}, {"phrases": ["excel works", "spreadsheet is fine", "our models work", "works in excel", "built the model"], "signal": "excel_dependency", "label": "EXCEL", "color": "#14B8A6"}, {"phrases": ["manual process", "manually", "reconcile by hand", "re-key", "copy paste"], "signal": "manual_process", "label": "MANUAL", "color": "#06B6D4"}, {"phrases": ["only one person", "only person who knows", "if they leave", "key person", "tribal knowledge", "in their head"], "signal": "key_person_risk", "label": "KEY PERSON", "color": "#F43F5E"}, {"phrases": ["audit", "auditor", "sox", "compliance", "traceability", "defensible"], "signal": "audit_risk", "label": "AUDIT", "color": "#A855F7"}, {"phrases": ["new fund", "fund raise", "launching", "next fund", "scaling", "growing"], "signal": "fund_growth", "label": "GROWTH", "color": "#00D4AA"}, {"phrases": ["fragile", "breaks", "workaround", "duct tape", "held together", "clunky"], "signal": "workflow_fragility", "label": "FRAGILE", "color": "#D97706"}, {"phrases": ["by the time we see it", "we don't really touch that", "that's on their side", "we trust them to get it right", "they've been doing it for years", "we wouldn't know how to do it ourselves", "if they disappeared tomorrow", "we're pretty removed from that process", "it just shows up", "fund administrator", "administrator", "our admin"], "signal": "ownership_unclear", "label": "ADMIN_DEPENDENCY", "color": "#888"}, {"phrases": ["that's a good question \u2014 i'm not sure", "i'd have to ask around", "a few people would need to weigh in", "it's not really anyone's job specifically", "whoever has bandwidth", "it depends on the week", "we rotate that responsibility", "it kind of falls between teams", "don't know who owns", "unclear who owns", "nobody owns", "no clear owner"], "signal": "ownership_unclear", "label": "OWNERSHIP_UNCLEAR", "color": "#888"}, {"phrases": ["we thought we could do it ourselves", "it seemed simpler to just build it", "we didn't think anything existed", "our cto wanted to keep it in-house", "the team preferred to own the code", "we wanted full control", "it started as a side project", "it was supposed to be temporary", "built something", "built internally", "built a tool", "built a system"], "signal": "internal_build", "label": "INTERNAL_BUILD", "color": "#888"}, {"phrases": ["i'd need to run it by", "let me check with", "i'm not the one who", "that would ultimately be", "my boss would need to", "the partners would have to", "we'd need buy-in from", "chief financial officer", "finance chief", "head of finance", "finance lead", "chief operating officer"], "signal": "economic_buyer_missing", "label": "EB ACCESS", "color": "#8B5CF6"}, {"phrases": ["what does this cost", "how much are we talking", "is there a way to reduce", "can you sharpen the pencil", "the number seems high", "i need to justify this", "hard to get that approved", "price", "cost", "fees", "rate", "subscription"], "signal": "pricing_discussion", "label": "PRICING", "color": "#EF4444"}, {"phrases": ["we're also looking at", "how do you compare to", "what makes you different from", "we built something for this", "our team already handles this", "we have a process for that", "why wouldn't we just", "looking at other vendors", "other options", "other solutions", "competitive evaluation", "vendor selection"], "signal": "vendor_comparison", "label": "COMPETITOR", "color": "#EC4899"}, {"phrases": ["we'll look at this after", "maybe in the fall", "not in this budget cycle", "we need to get through", "timing isn't great", "too many priorities right now", "we're heads down on", "q-end", "quarter close", "end of quarter", "quarterly close", "quarter-end crunch"], "signal": "timeline_delay", "label": "TIMING", "color": "#F97316"}, {"phrases": ["there are a few people who", "it's not just my decision", "we need alignment across", "our process involves", "there are multiple steps", "everyone has to weigh in", "we need to get everyone on the same page", "steering committee", "evaluation committee", "buying committee", "approval committee", "review board"], "signal": "decision_process_unclear", "label": "COMMITTEE", "color": "#6366F1"}, {"phrases": ["how long does this take", "who on our side needs to be involved", "what's the implementation look like", "i've been through bad implementations", "our team is already maxed out", "we can't take on another project right now", "onboarding", "deployment", "rollout", "go-live", "migration"], "signal": "implementation_anxiety", "label": "CHANGE", "color": "#F59E0B"}], "objections": [{"cat": "PRICING RESISTANCE", "l1": "It's typically the most expensive software clients have bought. The question is whether anything else provides this much value. Most firms pass it through as an LP expense \u2014 if it's a core book of record solution, it's covered in the LPA. The net cos", "l2": "", "l3": ""}, {"cat": "PRICING RESISTANCE", "l1": "The pricing model mirrors how public market infrastructure is priced \u2014 Clearwater, Aladdin, Bloomberg PORT all use basis points. As NAV goes down, the fee goes down. The bet is that firms raise more funds and grow AUM over time \u2014 the price aligns wit", "l2": "", "l3": ""}, {"cat": "PRICING RESISTANCE", "l1": "The admin handles bookkeeping. The question is what it costs to check the admin in Excel \u2014 person-hours, key person risk, error exposure. Most firms find the validation burden alone justifies the platform, and the cost passes through to the fund.", "l2": "", "l3": ""}, {"cat": "PRICING RESISTANCE", "l1": "Point solutions cover the easy 30%. The hard part \u2014 complex waterfalls, side letter compliance, cross-fund performance, admin reconciliation \u2014 is where the value concentrates. A data warehouse with AI modules doesn't handle LPA-compliant calculations", "l2": "", "l3": ""}, {"cat": "PRICING RESISTANCE", "l1": "That math works in our favor for most firms. Translate the hours spent on waterfall validation, quarter-end reconciliation, and distribution prep into fully-loaded headcount cost. Add the cost of a single error on a distribution \u2014 typically five to s", "l2": "", "l3": ""}, {"cat": "PRICING RESISTANCE", "l1": "At the current AUM, the pricing may feel like a stretch. The model is designed so that as AUM grows \u2014 through fund raises and appreciation \u2014 the cost stays proportional. Some firms start with a subset of funds to prove value before expanding. There a", "l2": "", "l3": ""}, {"cat": "PRICING RESISTANCE", "l1": "Three buckets: efficiency gains from eliminating manual reconciliation and quarter-end crunch (quantifiable in person-hours), key person risk reduction (what would it cost if your lead fund accountant left tomorrow?), and distribution timing improvem", "l2": "", "l3": ""}, {"cat": "EXISTING VENDOR LOYALTY", "l1": "A strong admin relationship is valuable. The question isn't whether the admin is doing their job \u2014 it's who checks them. Most firms build parallel Excel workbooks to validate admin output. That's the redundant work a system of record eliminates. The ", "l2": "", "l3": ""}, {"cat": "EXISTING VENDOR LOYALTY", "l1": "A performance book of record complements the admin rather than replacing them. The admin keeps booking transactions and producing statements. The fund gets an independent calculation layer that validates output and catches discrepancies before they r", "l2": "", "l3": ""}, {"cat": "EXISTING VENDOR LOYALTY", "l1": "The admin's GL is designed for bookkeeping \u2014 journal entries, trial balances, financial statements. Investor-level performance \u2014 waterfalls, management fees, carried interest, scenario modeling \u2014 lives outside the GL in Excel. That's the layer a perf", "l2": "", "l3": ""}, {"cat": "EXISTING VENDOR LOYALTY", "l1": "If the new system is a GL, portal, or CRM, a performance book of record is the missing layer that completes the stack \u2014 not another competing system. Data flows between them. The timing might actually be ideal: while the team is in a systems-improvem", "l2": "", "l3": ""}, {"cat": "LACK OF URGENCY", "l1": "Understood. One question worth considering: is there a fund raise, an audit, or a key hire transition coming up? Those are the moments when the current process gets stress-tested. Most firms wish they'd started a quarter earlier.", "l2": "", "l3": ""}, {"cat": "LACK OF URGENCY", "l1": "That makes sense \u2014 audit season and fundraising stretch every team. The implementation process is designed to run in parallel without disrupting current workflows. The team that's busiest right now is the one that benefits most from getting this off ", "l2": "", "l3": ""}, {"cat": "LACK OF URGENCY", "l1": "The best implementation window is between fund closes \u2014 clean data, team has bandwidth. If a new fund is in the pipeline, starting now means it goes live from day one with no retroactive conversion. Waiting until after the close means converting hist", "l2": "", "l3": ""}, {"cat": "LACK OF URGENCY", "l1": "Most firms say that until something breaks \u2014 a key person leaves, an LP challenges a number, fund count doubles. The question isn't whether it works today. It's whether it's defensible, scalable, and not dependent on one person. If the answer to any ", "l2": "", "l3": ""}, {"cat": "LACK OF URGENCY", "l1": "AI is accelerating \u2014 but it accelerates what's already structured. If fund data is in 15 Excel files, AI can't make sense of it. The firms investing in a structured data layer now are the ones positioned to benefit most from AI capabilities next year", "l2": "", "l3": ""}, {"cat": "EVALUATION FATIGUE", "l1": "If prior evaluations didn't land, it's worth understanding why. Was it product fit, timing, or internal alignment? The firms that move forward fastest are the ones that test with their actual data \u2014 not generic demos. A tailored demo with real fund s", "l2": "", "l3": ""}, {"cat": "EVALUATION FATIGUE", "l1": "A standard demo shows the platform's capabilities \u2014 but it doesn't reflect any specific firm's fund structures, investor terms, or fee schedules. The tailored demo, built from actual files, is where fit becomes clear. If the standard demo didn't reso", "l2": "", "l3": ""}, {"cat": "EVALUATION FATIGUE", "l1": "That makes sense for a decision this important. To make the evaluation productive, it helps to define evaluation criteria upfront \u2014 what does a winning solution need to do? Then each vendor can demonstrate against the same rubric with real data. That", "l2": "", "l3": ""}, {"cat": "SECURITY / DATA CONCERNS", "l1": "Data ownership stays with the client \u2014 it's structured, exportable, and not locked into proprietary formats. Any acquisition scenario would preserve client access. That said, the risk of data being trapped is actually higher in the current state \u2014 wh", "l2": "", "l3": ""}, {"cat": "SECURITY / DATA CONCERNS", "l1": "That concern is increasing across the industry as AI scrutiny rises. The platform is designed so the fund owns the data directly \u2014 it's calculated in the system and pushed out wherever needed. No training on client data, no sharing with third parties", "l2": "", "l3": ""}, {"cat": "SECURITY / DATA CONCERNS", "l1": "SOC 2 Type II certified. There's a standard DDQ package that can be sent over \u2014 most firms include it in the coordination meeting workflow so security review happens in parallel with the evaluation, not sequentially after it.", "l2": "", "l3": ""}, {"cat": "INTEGRATION COMPLEXITY", "l1": "Integration is file-based, not API-dependent. Data comes in from the GL \u2014 Investran, Allvue, Yardi, eFront, QuickBooks \u2014 through standardized file exports. Not a deep technical integration that requires IT involvement. Most implementations handle dat", "l2": "", "l3": ""}, {"cat": "INTEGRATION COMPLEXITY", "l1": "That's a common pattern with older platforms. If the system can produce any kind of export \u2014 CSV, Excel, PDF \u2014 the implementation team can work with it. The harder the data extraction is from the current system, the stronger the case for having an in", "l2": "", "l3": ""}, {"cat": "INTEGRATION COMPLEXITY", "l1": "The goal is one system of record for fund performance. Data flows in from Yardi automatically \u2014 no duplicate entry. Over time, the team references the performance platform directly instead of going back to Yardi for fund-level questions. It's additiv", "l2": "", "l3": ""}, {"cat": "INTERNAL BUILD PREFERENCE", "l1": "Internal builds can work with the right engineering resources. The question is opportunity cost \u2014 purpose-built platforms represent years of R&D across hundreds of fund structures. That's hard to replicate and harder to maintain. Most firms find engi", "l2": "", "l3": ""}, {"cat": "INTERNAL BUILD PREFERENCE", "l1": "Custom solutions built in-house represent real investment. The ongoing challenge is maintenance \u2014 each new fund vintage, side letter, or LPA provision requires someone to update the logic. Firms that have gone through that cycle find the maintenance ", "l2": "", "l3": ""}, {"cat": "INTERNAL BUILD PREFERENCE", "l1": "That works until that engineer leaves or gets pulled into something else. If the fund's waterfall logic lives in one person's code, that's key person risk in a different form. A commercial platform means the calculation engine is maintained by a dedi", "l2": "", "l3": ""}, {"cat": "RESOURCE CONSTRAINTS", "l1": "The implementation model is designed to minimize client-side bandwidth \u2014 the implementation team handles 90-95% of the configuration work. The client's role is primarily validation: confirming that output matches what they already know to be true. It", "l2": "", "l3": ""}, {"cat": "RESOURCE CONSTRAINTS", "l1": "That's actually a common starting point. Firms that implement before the hire find it easier to recruit \u2014 candidates see a modern platform instead of a pile of Excel files. The system also becomes the onboarding tool: new hires learn the fund structu", "l2": "", "l3": ""}, {"cat": "RESOURCE CONSTRAINTS", "l1": "That's exactly the pressure a platform addresses. Technology absorbs the incremental complexity from new funds and investors \u2014 without adding bodies. The question is whether the team can handle double the fund count in 18 months with the same headcou", "l2": "", "l3": ""}, {"cat": "RESOURCE CONSTRAINTS", "l1": "The platform is configured to match how the team already works \u2014 same fund structures, same fee schedules, same waterfall logic. It's not a new process; it's the existing process in a system instead of spreadsheets. Most teams report the learning cur", "l2": "", "l3": ""}, {"cat": "IMPLEMENTATION ANXIETY", "l1": "So have we \u2014 that's why the implementation team reports to the CTO, not to sales. The process is structured: map the operating model, configure from existing files, validate against known good numbers, run in parallel until the team is confident. No ", "l2": "", "l3": ""}, {"cat": "IMPLEMENTATION ANXIETY", "l1": "Typical 3-5 fund client is live in about 4 months. 40+ funds \u2014 closer to 12 months. The team runs in parallel for at least one full quarter to validate. AI tooling is accelerating the process \u2014 LPA parsing, chart of accounts mapping, historical recon", "l2": "", "l3": ""}, {"cat": "IMPLEMENTATION ANXIETY", "l1": "Understood \u2014 most firms don't want to add anything during their busiest period. Discovery and scoping can happen now while the team is heads-down. Implementation kicks off after the audit closes, and the system is ready for the next cycle. That way t", "l2": "", "l3": ""}, {"cat": "IMPLEMENTATION ANXIETY", "l1": "One person who knows the fund structures well \u2014 usually the controller or lead fund accountant. They validate output against what they already know. The implementation team handles configuration, data loading, and formula mapping. It's not a 'bring y", "l2": "", "l3": ""}, {"cat": "CALCULATION ACCURACY / TRUST", "l1": "That's exactly the right question. The validation process is designed for it: the team's existing Excel output becomes the test. Configure the system, run the same calculations, compare side by side. If numbers don't match, it's either a configuratio", "l2": "", "l3": ""}, {"cat": "CALCULATION ACCURACY / TRUST", "l1": "Calculations are deterministic \u2014 no AI approximation, no rounding shortcuts. Every output is traceable: click any number and see the formula, the inputs, and every intermediate step. Auditors are increasingly asking for this level of traceability. If", "l2": "", "l3": ""}, {"cat": "CHANGE MANAGEMENT", "l1": "That's the hardest part \u2014 and it's why the platform runs in parallel first. The team keeps doing what they do in Excel while the system produces the same output independently. Over time, when the numbers consistently match, confidence builds. Some te", "l2": "", "l3": ""}, {"cat": "CHANGE MANAGEMENT", "l1": "That's the failure pattern with tools that require external consultants to configure and maintain. A purpose-built platform doesn't need a consulting layer \u2014 the concepts are native. And the implementation team stays engaged through the first live qu", "l2": "", "l3": ""}, {"cat": "STAKEHOLDER / INTERNAL ALIGNMENT", "l1": "That's the right process. To make that conversation productive, it helps to have specific numbers \u2014 hours spent on quarter-end, cost of the validation process, key person risk exposure. A business case with hard ROI makes the internal conversation ea", "l2": "", "l3": ""}, {"cat": "STAKEHOLDER / INTERNAL ALIGNMENT", "l1": "That's common with platform decisions that touch finance, operations, and technology. The coordination meeting is designed for exactly this \u2014 bring the stakeholders together, agree on evaluation scope and criteria, and make sure everyone is looking a", "l2": "", "l3": ""}, {"cat": "STAKEHOLDER / INTERNAL ALIGNMENT", "l1": "The more we know about that process upfront, the better we can plan around it. Running security review, legal, and procurement in parallel with the technical evaluation \u2014 rather than sequentially after it \u2014 can compress the timeline significantly. Th", "l2": "", "l3": ""}, {"cat": "PRODUCT GAPS", "l1": "Transparency on what's available today versus what's on the roadmap is important. If that feature is a hard requirement for day-one value, it's worth understanding what the timeline looks like and whether the core platform delivers enough value indep", "l2": "", "l3": ""}, {"cat": "PRODUCT GAPS", "l1": "Core product today is built for closed-end fund structures. Open-ended with unitization and redemptions is on the development roadmap. For firms with a mix, starting with the closed-end portfolio and expanding to open-ended vehicles as the capability", "l2": "", "l3": ""}, {"cat": "TRUST / CREDIBILITY", "l1": "Client base ranges from $2B to $200B+ AUM across PE, real estate, credit, and venture. Reference calls with firms at similar scale and complexity are available \u2014 and those conversations tend to be more convincing than anything said in a demo.", "l2": "", "l3": ""}, {"cat": "TRUST / CREDIBILITY", "l1": "Growth companies go through team transitions \u2014 it comes with the territory. What matters is whether the product, implementation process, and support model are consistent regardless of individual personnel. Client relationships are team-based, not ind", "l2": "", "l3": ""}, {"cat": "TRUST / CREDIBILITY", "l1": "Absolutely. There's a segmented reference list by strategy, fund size, and use case. For [RE/PE/credit/venture] firms with similar complexity, specific references can be arranged. Those conversations tend to be the most productive part of the evaluat", "l2": "", "l3": ""}, {"cat": "EXISTING VENDOR LOYALTY", "l1": "A dedicated team is an asset. The question is what happens if key people on that team leave \u2014 and whether the work is trapped in their heads or in a system the fund controls. Outsourced teams have the same key person risk as internal teams.", "l2": "", "l3": ""}, {"cat": "EXISTING VENDOR LOYALTY", "l1": "The platform plays Switzerland. Most admins prefer when the fund owns its own logic because it reduces the admin's calculation liability. Over time, the admin becomes a booking agent \u2014 which is actually what most admins want to be.", "l2": "", "l3": ""}, {"cat": "PRICING RESISTANCE", "l1": "Understood. The pricing model has tiers \u2014 all funds typically unlocks better economics than starting with one or two. If expanding scope from the start gets pricing to a range that works, would your management be more comfortable with the all-in appr", "l2": "", "l3": ""}, {"cat": "PRICING RESISTANCE", "l1": "Every client we work with expenses this to the fund as a core book of record solution \u2014 it's covered under the LPA. Worth confirming with your legal team, but the precedent is strong. If the management company only absorbs a fraction of the cost, the", "l2": "", "l3": ""}, {"cat": "STAKEHOLDER / INTERNAL ALIGNMENT", "l1": "Lead with the hard math \u2014 software cost vs. headcount cost. If those numbers reach parity, present the intangibles as additional considerations that tip the balance. The strongest internal cases are built on balance sheet line items with intangibles ", "l2": "", "l3": ""}, {"cat": "EXISTING VENDOR LOYALTY", "l1": "Internal systems are optimized for how things worked when they were built. The question is what happens when the fund structure evolves \u2014 new waterfall types, new fee models, evergreen structures. If the team has to hack the system every time somethi", "l2": "", "l3": ""}], "stories": [{"id": "cs-01", "label": "Large RE Manager ($5B+)", "pain": "3-week quarter-end close reconciling admin numbers", "outcome": "Quarter-end close reduced from 3 weeks to days. Controller changed how they think about hiring \u2014 technology instead of h", "use_when": ["quarter-end pain", "admin reconciliation", "real estate", "scaling operations"], "stage": ["M1", "M2", "M4"]}, {"id": "cs-02", "label": "Mid-market PE (multiple vintages)", "pain": "Admin getting waterfall calculations wrong on complex pref structures", "outcome": "Implemented as the independent checker. Caught multiple errors in the first quarter. Admin now books what the system cal", "use_when": ["admin errors", "waterfall accuracy", "maker-checker", "PE complexity"], "stage": ["M1", "M2", "M5"]}, {"id": "cs-03", "label": "Mid-market PE, San Francisco", "pain": "Needed fund infrastructure as a strategic advantage", "outcome": "5 funds live. Team spent 2 days doing hands-on configuration. Now adding new vehicles quarterly. Views infrastructure as", "use_when": ["strategic advantage", "fund expansion", "co-invest vehicles", "PE mid-market"], "stage": ["M2", "M4", "M9"]}, {"id": "cs-04", "label": "Mid-market PE (auditor angle)", "pain": "Auditor switch (Deloitte \u2192 KPMG) created need for better traceability", "outcome": "CAO asked about giving KPMG read-only platform access instead of separate audit workbooks. Auditor now traces directly t", "use_when": ["audit", "auditor access", "traceability", "auditor switch"], "stage": ["M2", "M5", "M6"]}, {"id": "cs-05", "label": "$23B AUM RE/hospitality PE", "pain": "Evaluated Anaplan + Lionpoint vs. purpose-built solution", "outcome": "$1.7M annual contract \u2014 largest single-phase deal. 44 funds, 12-month implementation. Chose productized over custom-buil", "use_when": ["megafund", "Anaplan alternative", "large deal", "real estate"], "stage": ["M2", "M4", "M10"]}, {"id": "cs-06", "label": "$16B+ VC/growth equity", "pain": "CFO described ops as 'getting out of the nineties' \u2014 all back/middle office in-house as strategic di", "outcome": "Chose platform because it doesn't force outsourcing. In-house team keeps control. Carry structure (25%\u219230% at 3x MOIC) i", "use_when": ["VC", "in-house operations", "strategic differentiator", "complex carry"], "stage": ["M1", "M2"]}, {"id": "cs-07", "label": "$200B+ alt asset manager", "pain": "Evaluated internal Anaplan build ($50-70M) vs. commercial platform", "outcome": "$700-900K initial contract to prove concept. Thesis: productized solution without the consultant army or internal engine", "use_when": ["megafund", "Anaplan", "build vs. buy", "proof of concept"], "stage": ["M2", "M4", "M10"]}, {"id": "cs-08", "label": "Top-tier VC (highly customized eFront)", "pain": "Data spread across eFront, custom CRM, Google Sheets, Snowflake. New evergreen fund had non-traditio", "outcome": "Demonstrated complex allocation rules with full auditability. AI explainability feature got the team to bring additional", "use_when": ["eFront integration", "VC", "complex allocations", "AI explainability"], "stage": ["M2", "M8"]}, {"id": "cs-09", "label": "$15B+ credit manager", "pain": "SS&C for evergreen, custom app for closed-end. 200 employees, 17 in tech. Data consistency across In", "outcome": "Build vs. buy decision landed on buy \u2014 engineering time better spent on firm differentiation, not maintaining fund calc ", "use_when": ["credit", "build vs. buy", "SS&C", "Investran"], "stage": ["M1", "M2"]}, {"id": "cs-10", "label": "Large VC (multi-admin complexity)", "pain": "CFO manages multiple admins, GLs, data sources. Operational inefficiencies from fragmentation.", "outcome": "Interested in platform as 'cockpit' standardizing calcs/reporting. AI explainability feature drove deeper engagement and", "use_when": ["multi-admin", "data fragmentation", "cockpit", "VC"], "stage": ["M1", "M2"]}, {"id": "cs-11", "label": "$12B+ RE manager (LP, not GP)", "pain": "LP needing to verify JV partners honor fee/waterfall agreements. Alternative: hire auditor at massiv", "outcome": "Proposed 5 JV partner pilot. Platform becomes automated auditor \u2014 verifying partner calculations without external audit ", "use_when": ["LP use case", "JV verification", "real estate", "fund of funds"], "stage": ["M1", "M2"]}, {"id": "cs-12", "label": "RE manager (returned after 18 months)", "pain": "First outreach April 2024. Weren't ready. Watched improvements over 18 months.", "outcome": "Brought latest fund in-house from CBRE admin and signed. Best deals sometimes say 'not yet' and come back when timing is", "use_when": ["timing", "patience", "came back", "real estate"], "stage": ["M1", "M3"]}, {"id": "cs-13", "label": "PE/credit firm (expanded during impl)", "pain": "Started with 3-5 funds. Saw value during implementation.", "outcome": "Added funds to contracts while still in implementation. New fund goes into the platform from day one. Expanding within 6", "use_when": ["expansion", "upsell", "implementation momentum", "phased approach"], "stage": ["M9", "M10"]}, {"id": "cs-14", "label": "Multiple clients (admin error pattern)", "pain": "Admin sends distribution calcs, system flags variances. Sometimes rounding, sometimes missed side le", "outcome": "One client found a six-figure error on a single distribution in the first quarter. Admin isn't liable for the error \u2014 th", "use_when": ["admin errors", "distribution risk", "six-figure error", "fiduciary responsibility"], "stage": ["M1", "M2", "M4"]}, {"id": "cs-15", "label": "CFO changed admin dynamic", "pain": "After 6 months on platform, admin validation burden eliminated", "outcome": "CFO told admin: just book what's in the system. Stopped shadowing in Excel entirely. Admin became a booking agent instea", "use_when": ["admin relationship change", "booking agent model", "CFO decision", "shadow elimination"], "stage": ["M2", "M4", "M9"]}, {"id": "cs-16", "label": "Key person risk (15-fund model builder)", "pain": "One person maintained all waterfall models for 15 funds. Gave notice.", "outcome": "CFO called in a panic. Not an edge case \u2014 happens constantly. Institutional knowledge trapped in someone's head and thei", "use_when": ["key person risk", "resignation", "institutional knowledge", "panic"], "stage": ["M1", "M4"]}, {"id": "cs-17", "label": "PE firm frustrated with portal vendor", "pain": "Portal vendor wanted proprietary data access that felt like a data grab", "outcome": "Switched approach: performance book of record keeps data with the fund. Data flows out to portal, not the other way arou", "use_when": ["data ownership", "portal frustration", "JSQ alternative", "data control"], "stage": ["M1", "M2"]}, {"id": "cs-18", "label": "Mid-market RE (key person + admin staffing loss)", "pain": "Lost two accountants in quick succession. Admin also lost key staff and started missing deadlines.", "outcome": "Key person risk hit from both sides \u2014 internal team and admin. Created urgent need for a system that doesn't depend on a", "use_when": ["key person risk", "admin staffing loss", "real estate", "urgency"], "stage": ["M1", "M2"]}, {"id": "cs-19", "label": "Healthcare PE (pricing validation)", "pain": "Controller skeptical of pricing until contextualized against operational cost", "outcome": "Controller reaction: '$37K a year in expenses to help the data become better \u2014 the pricing is really not that expensive.", "use_when": ["pricing validation", "small firm", "healthcare PE", "LP expense"], "stage": ["M4", "M10"]}, {"id": "cs-20", "label": "$40B+ institutional RE (multi-system complexity)", "pain": "Data spread across 5+ systems \u2014 proprietary asset management platform, admin's GL (Investran), admin", "outcome": "Discovery revealed the real pain wasn't accuracy \u2014 the dedicated admin team was competent. The pain was data availabilit", "use_when": ["multi-system complexity", "data fragmentation", "institutional scale", "real estate"], "stage": ["M1", "M2"]}, {"id": "cs-21", "label": "Emerging manager ($250M, scaling to larger fund)", "pain": "Currently paying outsourced consulting firm $5-6K/month for manual reconciliation. About to raise la", "outcome": "Booked demo in under 10 minutes. Prospect was already evaluating admin alternatives (Citco, SS&C, Apex). Platform positi", "use_when": ["emerging manager", "scaling", "fundraising", "outsourced consulting"], "stage": ["M1"]}, {"id": "cs-22", "label": "Mid-market credit/PE ($1-2B, multiple funds)", "pain": "Operations team had identified need for a system but couldn't get management buy-in. Management appr", "outcome": "Value creation model built collaboratively in session. VP of Ops mapped $32K direct labor cost per fund, 200 hours per y", "use_when": ["value creation", "champion coaching", "management skepticism", "pricing negotiation"], "stage": ["M4"]}, {"id": "cs-23", "label": "$90B direct lending manager (internal admin, proprietary system)", "pain": "Product team constrained by operational limitations \u2014 couldn't offer certain fee structures to inves", "outcome": "Dir of Product wanted to socialize slides with CFO and schedule demo with finance team. Platform positioned as the middl", "use_when": ["internal admin", "proprietary system rigidity", "product team constraints", "decision latency"], "stage": ["M1", "M2"]}, {"id": "cs-gong-001", "label": "$11B manager tracking admin errors to build the case", "pain": "", "outcome": "", "use_when": [], "stage": ["m1-advancing", "m2-advancing", "m4-advance"]}, {"id": "cs-gong-002", "label": "Slowed hiring at 50-fund shop", "pain": "", "outcome": "", "use_when": [], "stage": ["m4-diagnose", "m4-advance"]}, {"id": "cs-gong-003", "label": "Admin fee reduction after validation period", "pain": "", "outcome": "", "use_when": [], "stage": ["m4-advance", "m5-core"]}], "profiles": {"in_house_operations": {"detect": ["mentions running Investran, Allvue, eFront, or custom system in-house", "describes team of 4+ on fund ops", "says \"we do our own fund accounting\"", "no mention of external fund admin"], "skip": ["dq-008", "dq-010"], "elevate": ["dq-014"], "stories": ["cs-16", "cs-18", "cs-06", "cs-23"]}, "outsourced_admin": {"detect": ["names Citco, SS&C, Apex, CSC, Gen II, Standish, or other admin", "says \"our admin handles...\" or \"we outsource...\"", "small finance team (1-3 people)", "describes reconciliation against admin output"], "skip": [], "elevate": ["dq-008", "dq-010"], "stories": ["cs-01", "cs-02", "cs-14", "cs-15", "cs-04"]}, "hybrid_model": {"detect": ["describes split admin model", "some funds internal, some outsourced", "mentions multiple data sources or GLs", "describes reconciliation across systems"], "skip": [], "elevate": ["dq-008", "dq-014"], "stories": ["cs-10", "cs-20", "cs-09"]}}, "recovery": {"never_skip": ["dq-001", "dq-005", "dq-009", "dq-012", "dq-018", "dq-022", "dq-019", "dq-020", "dq-021"], "drop_first": ["dq-003", "dq-014", "dq-011"]}, "competitors": {"Carta": {"reframe": "Acknowledge Carta's strength in venture/simple structures. Surface the complexity ceiling.", "talk": "Carta is strong for venture-style funds with pro rata structures. When complexity increases \u2014 deal-by-deal waterfalls, catch-ups, clawbacks, side letter variations \u2014 firms have fou", "follow": "What are the most complex waterfall structures across your fund family \u2014 and how confident is your t"}, "Carta (waterfall claims)": {"reframe": "Shift from feature claims to depth. Rigid templates vs. configurable engine.", "talk": "Carta's waterfall approach uses rigid templates that require constant Excel validation. Firms with negotiated side letters, custom fee structures, or multi-tier waterfalls find the", "follow": "How many of your investor arrangements have custom terms that wouldn't fit neatly into a standard te"}, "Carta (fund admin expansion)": {"reframe": "Carta's admin expansion targets simpler funds. Institutional complexity is a different market.", "talk": "Carta is expanding into fund administration, but the target is primarily smaller and simpler fund structures. Institutional-grade complexity \u2014 unique investor terms, multi-strategy", "follow": "What's the most complex LPA provision your team has to manage \u2014 and how would you test whether any p"}, "Juniper Square": {"reframe": "Complementary, not competitive. JSQ = portal/CRM. Maybern = calc engine.", "talk": "Roughly a third of similar clients use both platforms. Juniper Square handles investor communications and the portal. The calculation engine \u2014 waterfalls, management fees, carried ", "follow": "Are you using JSQ primarily for the portal and CRM, or are you relying on it for fund-level calculat"}, "Juniper Square (data ownership concern)": {"reframe": "Address the data ownership concern directly \u2014 Maybern keeps data with the fund, not the vendor.", "talk": "Some firms have concerns about how portal vendors handle their proprietary data. With a performance book of record, the fund owns the data directly \u2014 it's calculated in your system", "follow": "How comfortable is your team with how data flows between your current systems \u2014 and who ultimately c"}, "Allvue Systems": {"reframe": "GL \u2260 performance book of record. Complementary.", "talk": "Allvue is a strong general ledger for partnership accounting. The gap is at the investor level \u2014 waterfalls, carried interest, scenario modeling, LP performance. That's where teams", "follow": "When your team needs investor-level waterfall output, where does that calculation happen \u2014 in Allvue"}, "Investran": {"reframe": "Everyone with Investran still lives in Excel for calcs. Complementary positioning.", "talk": "Investran is widely used for fund-level accounting. The pattern is that even with Investran, investor-level performance \u2014 waterfalls, fees, carry \u2014 still lives in Excel. A performa", "follow": "For the calculations outside Investran today \u2014 waterfalls, carry, investor allocations \u2014 where does "}, "Investran (data accessibility)": {"reframe": "Validate frustration. Position as the data normalization layer.", "talk": "That's a common pattern \u2014 limited API access, difficulty extracting data for analysis. A platform that ingests data from Investran through file exports gives the team accessibility", "follow": "If you could query and analyze fund data without going through Investran's native interface, what wo"}, "eFront": {"reframe": "GL complement. eFront does accounting, performance layer does the rest.", "talk": "eFront is solid for GL and fund accounting \u2014 especially customized instances. Investor-level performance, waterfalls, and scenario modeling typically still live in Excel or custom ", "follow": "How customized is your eFront instance \u2014 and what still lives outside of it in Excel?"}, "Yardi": {"reframe": "Yardi = property-level accounting. Fund-level performance is the gap.", "talk": "Yardi handles property-level accounting well. The gap is at the fund level \u2014 investor-level waterfalls, promote structures, co-invest allocations, feeder/blocker rollups. Those cal", "follow": "After data comes out of Yardi, where do fund-level and investor-level calculations happen?"}, "Yardi + Juniper Square (combined stack)": {"reframe": "Additive, not replacement. GL + portal is set. The calc layer in between is the gap.", "talk": "That's actually good news \u2014 GL and portal are in place. The piece in between \u2014 investor-level waterfalls, management fees, carried interest, admin reconciliation \u2014 that's the calcu", "follow": "For the calculations between Yardi and JSQ \u2014 fees, waterfalls, carry \u2014 what does that process look l"}, "Anaplan": {"reframe": "General-purpose planning tool vs. purpose-built fund calc engine. Consultant army required.", "talk": "Anaplan is powerful for FP&A and general planning. Configuring it for fund accounting \u2014 LPA terms, waterfall tiers, investor allocations \u2014 requires significant consulting investmen", "follow": "Has the team scoped what an Anaplan implementation would require in terms of consulting and ongoing "}, "Anaplan (already evaluated)": {"reframe": "Validate their experience. Position as the productized alternative.", "talk": "That's consistent with what other firms have found. Firms that haven't already committed to a custom Anaplan build \u2014 like a few of the largest managers did for $50M+ \u2014 tend to pref", "follow": "What specifically made the Anaplan path feel like too much \u2014 was it cost, timeline, or internal reso"}, "Pigment": {"reframe": "Same category as Anaplan \u2014 general-purpose planning, not fund-native.", "talk": "Pigment is a modern planning tool and strong for FP&A. The gap is the same as Anaplan \u2014 it doesn't natively understand LPA terms, waterfall tiers, or investor-level allocations. Co", "follow": "Is the need primarily financial planning and forecasting, or does it extend into fund-level waterfal"}, "SS&C (TNR / GlobeOps)": {"reframe": "Legacy platform. Robust but resource-intensive. Position as agile, cost-effective alternative.", "talk": "SS&C has built capabilities through decades of acquisitions. TNR supports complex structures. The trade-off is implementation complexity, cost, and limited fund-side visibility. An", "follow": "How much control do you have today over how calculations are done \u2014 do you set the rules, or does yo"}, "SEI": {"reframe": "Admin does the calc, but who checks it? Maker-checker problem.", "talk": "SEI handles the calculation on the admin side. The question is: who validates it? Most funds build parallel Excel workbooks to check admin output. Software that acts as an independ", "follow": "When SEI sends over distribution numbers, what does your team's validation process look like before "}, "Geneva (SS&C)": {"reframe": "Geneva is the admin's tool, not the fund's. Position as the GP's own system of record.", "talk": "Geneva is a legacy fund accounting platform used primarily by administrators. The fund's visibility is limited to whatever the admin exports. Having an independent system of record", "follow": "How much visibility do you have into how your admin arrives at the numbers they send \u2014 can you trace"}, "Chronograph": {"reframe": "Complementary \u2014 portfolio management vs. fund performance. They feed us, we don't replace them.", "talk": "Chronograph is a portfolio management tool \u2014 strong at deal-level data, company metrics, valuations. It doesn't do investor-level performance, waterfall calculations, or admin reco", "follow": "How does your portfolio data from Chronograph connect to your investor-level reporting today \u2014 is th"}, "Chronograph + DealsPlus partnership": {"reframe": "Partnership extends portfolio analytics. Fund-level performance and waterfall calcs remain outside t", "talk": "That partnership extends Chronograph's capabilities in the portfolio analytics and deal sourcing space. Fund-level performance \u2014 investor waterfalls, management fees, carried inter", "follow": "When you think about what you need most \u2014 is it portfolio-level analytics, or investor-level fund pe"}, "iLevel (MSCI)": {"reframe": "Same as Chronograph \u2014 portfolio monitoring vs. fund performance.", "talk": "iLevel handles portfolio monitoring and company-level data well. The gap is the same as Chronograph \u2014 it doesn't calculate investor-level waterfalls, management fees, or carried in", "follow": "Does your iLevel data flow directly into your investor reporting, or is there a manual step in betwe"}, "Arcesium": {"reframe": "Arcesium is enterprise-focused and broad. Position on specialization depth and right-sizing.", "talk": "Arcesium offers an enterprise platform across multiple asset classes. For firms focused on closed-end fund structures \u2014 PE, real estate, credit \u2014 the question is whether a broad en", "follow": "What drew you to Arcesium specifically \u2014 was it the breadth of their platform, or specific capabilit"}, "Alter Domus (fund admin)": {"reframe": "Admin relationship is separate from the GP's own system of record. Complementary positioning.", "talk": "Alter Domus handles fund administration \u2014 and the relationship with the admin is important. The question is whether the fund also has its own independent system for calculations, v", "follow": "How does your team validate Alter Domus's calculations before distributions go out \u2014 and how long do"}, "Gen II (fund admin)": {"reframe": "Same maker-checker framework. Admin does the work, fund checks it. Software can be a better checker.", "talk": "Gen II is a strong administrator. The dynamic is the same with any admin \u2014 they do the calculations, but the fund has a fiduciary responsibility to validate them. Most teams build ", "follow": "When Gen II sends over distribution or fee calculations, how does your team verify the numbers befor"}, "CBRE (fund admin)": {"reframe": "CBRE is more real-estate services than fund technology. Same admin validation gap applies.", "talk": "CBRE provides fund administration services, particularly in real estate. The technology layer \u2014 investor-level performance, waterfall calculations, scenario modeling \u2014 is typically", "follow": "How much of the calculation and reporting work does CBRE handle versus your internal team \u2014 and wher"}, "Deloitte Cascade Suite": {"reframe": "Consulting-grade solution. More expensive, longer implementation. Position as agile and cost-efficie", "talk": "Deloitte's Cascade is designed for large enterprises needing fully integrated solutions with deep compliance and risk management. For firms that don't need the full Deloitte suite,", "follow": "Is the interest in Cascade driven by your auditor relationship, or by a specific capability you're l"}, "Cascata Solutions": {"reframe": "Waterfall point solution vs. full performance book of record.", "talk": "Cascata offers solid waterfall calculation tools. The question is whether the need is only the calc, or the full workflow \u2014 capital calls, distributions, management fees, admin rec", "follow": "Is the primary need waterfall calculations specifically, or does it extend into the full fund operat"}, "S7 Fund Ops": {"reframe": "Narrow focus vs. comprehensive platform.", "talk": "S7 does waterfall automation with fast onboarding. If the need is only waterfall calculations, they may fit. If it extends to capital activity workflows, fees, LP performance, and ", "follow": "Is the primary need waterfall automation, or the full end-to-end fund operations process?"}, "Lemonedge": {"reframe": "Similar thesis, different execution. Differentiate on proven client base and breadth.", "talk": "Lemonedge has a similar thesis \u2014 replacing Excel with auditable workflows. The differentiation comes down to depth of the calculation engine, breadth of fund types validated, and t", "follow": "What matters most to you \u2014 breadth of fund type coverage, depth of waterfall logic, or speed of impl"}, "qashqade": {"reframe": "Flexibility vs. speed. Bespoke = longer setup.", "talk": "qashqade offers flexibility for bespoke structures. The trade-off is typically longer setup time. Purpose-built platforms that have processed hundreds of fund structures can often ", "follow": "How much configuration time are you prepared to invest \u2014 and how quickly do you need to be running l"}, "Tactic / newer entrants": {"reframe": "Welcome competition as market validation. Differentiate on depth and track record.", "talk": "New entrants validate the market need. The question is always whether the platform handles the edge cases \u2014 deal-by-deal waterfalls with catch-ups and clawbacks across investors wi", "follow": "What's your most complex fund structure \u2014 and what happens if the platform can't handle it on day on"}, "Entrilia": {"reframe": "Newer to market. Differentiate on proven institutional client base.", "talk": "Entrilia is building modern fund operations tooling. When evaluating platforms in this space, the key questions are: how many institutional-grade fund structures has the engine bee", "follow": "How important is it that the platform has been validated by firms with similar complexity to yours?"}, "AgoraReal": {"reframe": "Narrow CRE focus vs. multi-strategy flexibility.", "talk": "AgoraReal is designed specifically for commercial real estate investment management. For firms that operate only in CRE, it may cover core needs. For firms managing across strategi", "follow": "Is your firm focused exclusively on real estate, or do you anticipate expanding into other strategie"}, "Niagara (Blackstone internal build)": {"reframe": "Internal builds at megafunds cost $50-70M. Position as the productized commercial version.", "talk": "Firms like Blackstone invested $50-70M building internal systems like Niagara. Those are impressive but not commercially available. For firms that don't have that engineering budge", "follow": "What's your appetite for building vs. buying \u2014 and do you have the internal engineering resources to"}, "Workiva / BI tools (Tableau, Power BI, Sigma)": {"reframe": "BI tools need clean data. If the source is Excel, the BI layer inherits the mess.", "talk": "BI tools are great for visualization and reporting. But they need clean, structured data to work with. If performance data lives in 15 different Excel files, no BI tool can fix the", "follow": "What's the primary data source for your BI dashboards today \u2014 and how much manual preparation goes i"}, "Lionpoint / Alpha FMC / consultants": {"reframe": "Consultants implement tools, not replace them. They often implement Anaplan or custom builds.", "talk": "Consulting firms are strong at integration, data cleanup, and process design. They typically implement general-purpose tools like Anaplan or Investran \u2014 which require ongoing consu", "follow": "What are the consultants implementing specifically \u2014 and who will maintain it after they leave?"}, "QuickBooks / Great Plains / NetSuite (GL)": {"reframe": "Basic GL handles management company accounting. Fund-level performance is a completely different nee", "talk": "Basic GLs like QuickBooks or Great Plains handle management company accounting \u2014 expenses, revenue, payroll. Fund-level accounting \u2014 investor allocations, waterfall calculations, c", "follow": "When you say accounting, are you referring to management company books or fund-level investor accoun"}, "Excel / spreadsheets (internal tool)": {"reframe": "Don't argue with their reality. Expand the time horizon to scenarios they haven't tested.", "talk": "Excel works \u2014 until it doesn't. Teams in similar environments find the real question isn't whether it works today. It's what happens when fund count doubles, when the person who bu", "follow": "If your lead fund accountant left tomorrow, how confident is your team that they could pick up those"}, "Excel (we've invested heavily in our models)": {"reframe": "Respect the investment. Position as codifying and upgrading, not replacing.", "talk": "Sophisticated Excel models represent real institutional knowledge \u2014 and that knowledge is valuable. The risk is that it lives in one person's head and their specific spreadsheet lo", "follow": "How many people on your team fully understand the logic in those models \u2014 and what happens during th"}, "Internal build (custom application)": {"reframe": "Opportunity cost. Engineering time is better spent on firm differentiation, not fund calc maintenanc", "talk": "Internal builds can work if the engineering team has bandwidth. The question is opportunity cost \u2014 purpose-built platforms represent years of R&D across hundreds of fund structures", "follow": "If the tech team didn't have to maintain fund calc tools, what would they build instead?"}, "Internal build (we already have one)": {"reframe": "Validate the investment. Surface the maintenance burden and scalability ceiling.", "talk": "Custom applications built in-house are impressive. The ongoing challenge is typically maintenance as fund structures evolve, the team grows, and regulatory requirements change. Fir", "follow": "How much of your tech team's time goes into maintaining and updating the custom application versus b"}, "Appian / low-code platforms": {"reframe": "Low-code is powerful for workflows but lacks fund-specific calculation depth.", "talk": "Low-code platforms like Appian are strong for workflow automation \u2014 approvals, routing, notifications. The gap is fund-specific calculation depth: waterfall logic, LPA-compliant al", "follow": "What specifically are you trying to automate \u2014 is it the workflow and approvals, or the underlying f"}, "InvestorFlow / investor portals": {"reframe": "Portal vs. engine. Complementary, not competitive.", "talk": "InvestorFlow handles investor-facing communications \u2014 portal, documents, reporting distribution. The calculation engine \u2014 where the actual waterfall, fee, and performance numbers a", "follow": "When investor notices go out through your portal, where are the underlying numbers calculated \u2014 and "}, "Backstop / DealCloud (CRM)": {"reframe": "CRM is a different category. Complementary.", "talk": "CRM platforms handle investor relationships, deal flow, and communications. Fund-level performance \u2014 waterfalls, allocations, carried interest \u2014 is a separate discipline. The two c", "follow": "How does your fund performance data flow into your CRM today \u2014 is it automated or manual?"}, "Quantrix": {"reframe": "Acknowledge the waterfall capability. Surface the scope gap \u2014 does it also handle cap calls, distrib", "talk": "Quantrix handles the waterfall calculation piece. The question is whether it also handles capital calls, distributions, management fees, investor-level allocations, admin reconcili", "follow": "Would you classify that as your waterfall engine, your allocation engine, or both?"}}, "story_signal_map": {"key_person_risk": ["cs-16", "cs-18", "cs-05"], "manual_process": ["cs-01", "cs-20", "cs-09"], "excel_dependency": ["cs-03", "cs-06", "cs-22"], "audit_risk": ["cs-04", "cs-14", "cs-02"], "workflow_fragility": ["cs-18", "cs-01", "cs-16"], "pricing_sensitivity": ["cs-19", "cs-07", "cs-05"], "competitor_mentioned": ["cs-08", "cs-05", "cs-09"], "fund_growth": ["cs-13", "cs-21", "cs-12"], "admin_dependency": ["cs-15", "cs-14", "cs-02"], "status_quo_confidence": ["cs-12", "cs-02", "cs-16"], "no_urgency": ["cs-12", "cs-13", "cs-18"], "build_vs_buy_cost": ["cs-07", "cs-09", "cs-23"]}, "competitor_cards": {"carta": {"name": "Carta", "reframe": "Acknowledge Carta's strength in venture/simple structures. Surface the complexity ceiling.", "talk_track": "Carta is strong for venture-style funds with pro rata structures. When complexity increases \u2014 deal-by-deal waterfalls, catch-ups, clawbacks, side letter variations \u2014 firms have found they need purpose", "follow_up": "What are the most complex waterfall structures across your fund family \u2014 and how confident is your team in how those are handled today?"}, "juniper square": {"name": "Juniper Square", "reframe": "Complementary, not competitive. JSQ = portal/CRM. Maybern = calc engine.", "talk_track": "Roughly a third of similar clients use both platforms. Juniper Square handles investor communications and the portal. The calculation engine \u2014 waterfalls, management fees, carried interest, admin reco", "follow_up": "Are you using JSQ primarily for the portal and CRM, or are you relying on it for fund-level calculations as well?"}, "allvue": {"name": "Allvue Systems", "reframe": "GL \u2260 performance book of record. Complementary.", "talk_track": "Allvue is a strong general ledger for partnership accounting. The gap is at the investor level \u2014 waterfalls, carried interest, scenario modeling, LP performance. That's where teams end up in Excel. A ",
