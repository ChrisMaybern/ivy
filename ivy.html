// ─── PIN GATE ───────────────────────────────────────────
const PIN="2026";
function checkPin(e){
  const v=document.getElementById("pin").value;
  if(v.length===4){
    if(v===PIN){
      document.getElementById("pin-screen").style.display="none";
      const app=document.getElementById("app");
      app.style.display="flex";
      try{localStorage.setItem("ivy_auth","1");}catch(e){}
      render();
    }else{
      document.getElementById("pin-error").style.display="block";
      document.getElementById("pin").value="";
      setTimeout(()=>{document.getElementById("pin-error").style.display="none";},2000);
    }
  }
}

// ─── BRAIN ──────────────────────────────────────────────
const B = {"meetings":{"M1":{"name":"Initial Call","belief_shift":"I have a structural risk I haven't fully examined.","stages":[{"id":"m1-open","name":"Open \u2014 Frame & Permission","questions":[{"id":"rip-0","tier":1,"tag":"Pain","fire_when":[],"skip_when":[],"l1":{"q":"I've been meeting with firms at your size and there are two themes: one is oversight \u2014 making sure the numbers are defensible. Two is data availability \u2014 leadership needs answers and finance can't turn them around fast enough. Which one resonates more with how your team operates?","goal":"Give context, let them self-select into a discovery thread"},"l2":{"q":"Tell me more about that \u2014 what does that actually look like day to day for your team?","goal":"Get operational specifics on whichever thread they picked"},"l3":{"q":"How long has that been the case, and has it gotten better or worse as you've grown?","goal":"Establish trajectory \u2014 growing pain is more urgent"}},{"id":"rip-1","tier":1,"tag":"Pain","fire_when":[],"skip_when":[],"l1":{"q":"How many funds are you running right now, and what does your next 18 months look like in terms of launches?","goal":"Risk identification"},"l2":{"q":"How does the team size change when you add those funds \u2014 hiring or absorbing?","goal":"Connect fund growth to operational strain"},"l3":{"q":"At what fund count does the current headcount break?","goal":"Get the specific breaking point"}}]},{"id":"m1-advancing","name":"Diagnose \u2014 Surface Structural Risk","questions":[{"id":"dq-001","tier":1,"tag":"Pain","fire_when":[],"skip_when":[],"note":"Ask this after the 'performance book of record' reframe. Let them describe the dependency themselves.","l1":{"q":"Walk me through who actually owns the waterfall logic today \u2014 and what happens when that person is unavailable for a quarter-end.","goal":"Surfaces key person risk and process fragility in a single question."},"l2":{"q":"How current is the documentation on those models? Could someone else step in next quarter-end?","goal":"Expose the documentation gap"},"l3":{"q":"If that person gave notice tomorrow, walk me through the next distribution cycle \u2014 day by day.","goal":"Force them to visualize the operational crisis in detail"}},{"id":"dq-002","tier":2,"tag":"Pain","fire_when":["audit_risk","lp_scrutiny_mentioned","regulatory_pressure"],"skip_when":[],"note":"If they hesitate, the gap is real. Don't fill the silence.","l1":{"q":"When an LP asks you to defend a specific calculation, what does the process look like to trace it back to the source?","goal":"Exposes auditability gaps and traceability issues."},"l2":{"q":"How often does that happen, and how long does each inquiry take?","goal":"Quantify the recurring burden"},"l3":{"q":"Has an LP ever challenged a number you couldn't immediately defend? What happened?","goal":"Surface a trust-damaging incident"}},{"id":"dq-003","tier":3,"tag":"Pain","fire_when":["manual_process_acknowledged","excel_dependency_confirmed"],"skip_when":[],"note":"The answer is almost always 'we couldn't.' That's the moment.","l1":{"q":"If I asked your team to show me every manual override made in the last distribution cycle, how quickly could they produce that?","goal":"Tests process maturity and auditability. Most teams can't answer this."},"l2":{"q":"Who would know where to find that information \u2014 and how long would it take them?","goal":"Expose the version control gap"},"l3":{"q":"If an auditor asked that question today, how confident are you in the answer?","goal":"Connect to audit liability"}},{"id":"dq-004","tier":1,"tag":"Pain","fire_when":[],"skip_when":[],"note":"Side letters are the complexity that breaks templates. Use this to bridge to the 'purpose-built' concept.","l1":{"q":"How many of your fund structures have side-letter economics that live outside your primary Excel model?","goal":"Surfaces hidden complexity invisible to leadership."},"l2":{"q":"Where do those side-letter terms live \u2014 main model, separate tabs, or somewhere else entirely?","goal":"Expose fragmented data architecture"},"l3":{"q":"If an LP asked you to trace their specific fee arrangement back to the side letter, how many files do you touch?","goal":"Quantify the audit trail gap"}},{"id":"dq-005","tier":1,"tag":"Pain","fire_when":[],"skip_when":[],"note":"Slow down when asking this. Let the weight of it land. If they name a specific person, write the name down \u2014 that's your","l1":{"q":"What would happen to your next distribution cycle if your lead fund accountant left tomorrow?","goal":"Key person risk. The most emotionally resonant question. Hits Level 3 on the pai"},"l2":{"q":"How long would it take to get someone new up to speed \u2014 weeks or months?","goal":"Quantify the knowledge transfer cost"},"l3":{"q":"Has this actually happened \u2014 to you or someone you know? What did it look like?","goal":"Anchor to a real experience, not a hypothetical"}},{"id":"dq-006","tier":2,"tag":"Pain","fire_when":["fund_growth","scale_discussion","hiring_pressure"],"skip_when":[],"note":"Future projection questions bypass the 'we're fine' defense. They can't argue with a scenario they haven't tested.","l1":{"q":"When you think about scaling from your current fund count to double that, where does the process start to feel fragile?","goal":"Connects current pain to future risk. Creates urgency without being pushy."},"l2":{"q":"Is that fragility a time problem, an accuracy problem, or a people problem?","goal":"Categorize the scaling risk"},"l3":{"q":"How close are you to that breaking point right now \u2014 and what happens when you cross it?","goal":"Create urgency from their own assessment"}},{"id":"dq-007","tier":1,"tag":"EB","fire_when":[],"skip_when":[],"note":"If yes \u2014 you have a path to the EB. If no \u2014 the pain hasn't been escalated yet, and you may need to help them frame it.","l1":{"q":"Has anyone on the leadership team ever raised concerns about the defensibility of your waterfall outputs to auditors or LPs?","goal":"Elevates the conversation from operational to strategic. Tests whether pain has "},"l2":{"q":"When they raised it, what specifically were they worried about \u2014 accuracy, auditability, or key person risk?","goal":"Map the EB's specific concern"},"l3":{"q":"What would need to happen for that concern to move from 'something we discuss' to 'something we act on'?","goal":"Find the EB's action trigger"}},{"id":"dq-008","tier":2,"tag":"Pain","fire_when":["external_admin_confirmed"],"skip_when":["in_house_operations","no_external_admin"],"note":"Let them tell you what's working first. The 'what isn't' part opens the maker-checker conversation.","l1":{"q":"How would you describe your relationship with your fund admin \u2014 what's working and what isn't?","goal":"Opens the admin tension naturally. Don't lead negative."},"l2":{"q":"When they send distribution calcs, what does your review process look like? What are you checking for?","goal":"Quantify the shadow validation burden"},"l3":{"q":"Have you caught a material error? What would have happened if you hadn't?","goal":"Escalate from process description to consequence"}},{"id":"dq-009","tier":1,"tag":"Metrics","fire_when":[],"skip_when":[],"note":"Anchor the number. You'll use it in the Value Creation workshop later.","l1":{"q":"How long does your distribution process typically take end-to-end?","goal":"Quantifies the operational burden. Sets up ROI."},"l2":{"q":"How much of that is the waterfall validation piece specifically?","goal":"Isolate the compressible time"},"l3":{"q":"Multiply that by four quarters \u2014 what does it cost you in fully-loaded hours per year?","goal":"Make them say the dollar figure"}},{"id":"dq-010","tier":2,"tag":"Pain","fire_when":["external_admin_confirmed","admin_trust_expressed"],"skip_when":["in_house_operations"],"note":"If yes, follow up: 'How did you catch it? What would have happened if you hadn't?' This escalates from anecdote to syste","l1":{"q":"Have you ever caught errors in your admin's calculations?","goal":"Surfaces admin trust issues. If yes, major pain amplifier."},"l2":{"q":"How did you catch it? Was it the process or luck?","goal":"Test whether error detection is systematic or accidental"},"l3":{"q":"What would have happened if you hadn't caught it \u2014 and how much was at stake?","goal":"Quantify the downside of a miss"}},{"id":"dq-011","tier":2,"tag":"Pain","fire_when":["pain_count_gte_3","buyer_engaged"],"skip_when":[],"note":"Only ask after they've articulated real pain. If they say 7+, the deal is real.","l1":{"q":"On a scale of 1-10, how would you prioritize fixing those issues?","goal":"Forces them to commit to a priority level."},"l2":{"q":"What makes it that number and not a 10?","goal":"Surface what's holding them back from full urgency"},"l3":{"q":"What would have to change to make it a 10?","goal":"Get them to name their own activation trigger"}},{"id":"dq-012","tier":1,"tag":"Pain","fire_when":[],"skip_when":[],"note":"This closes the discovery phase. Whatever they say here is the narrative you carry into the close.","l1":{"q":"If you fast-forward six quarters, what part of your current process worries you most?","goal":"Future-state anxiety. Connects today's tolerable friction to tomorrow's risk."},"l2":{"q":"Is that worry something you've raised internally, or is it just something you carry yourself?","goal":"Test whether pain is personal or organizational"},"l3":{"q":"If nothing changes between now and then, what's the worst realistic outcome you can picture?","goal":"Get them to articulate the worst case \u2014 that's the narrative"}},{"id":"dq-013","tier":2,"tag":"EB","fire_when":["referral_mention","executive_interest","budget_pushback"],"skip_when":[],"note":"CRITICAL: Ask this whenever the buyer indicates a senior leader sent them. The answer maps the funding path before M2. L","l1":{"q":"How do you think about budgeting for something like this \u2014 you have a working process, time is a pressure point, but it's not broken. What's the mindset internally on investing in this pocket of the business?","goal":"Surfaces how the EB thinks about ROI before you present pricing. Learns their in"},"l2":{"q":"Who signs off on that level of investment \u2014 you, the CFO, or a committee?","goal":"Map the actual decision authority"},"l3":{"q":"What does the business case need to look like for that person to say yes?","goal":"Get the EB's decision criteria before you're in the room"}},{"id":"dq-014","tier":3,"tag":"Pain","fire_when":["separate_deal_team","data_access_complaint","cross_team_friction"],"skip_when":[],"note":"This is the data accessibility play. Rob at Golub described sending requests to finance and waiting \u2014 'that part drives ","l1":{"q":"When the product or deal team needs performance data \u2014 capital call percentage, inception-to-date IRR, deployment levels \u2014 how fast can the finance team turn that around?","goal":"Surfaces the decision latency pain. If the answer is 'days,' data accessibility "},"l2":{"q":"What's the typical turnaround \u2014 hours, days? And what does the deal team do while they wait?","goal":"Quantify downstream impact"},"l3":{"q":"Has slow turnaround ever cost the firm a decision or delayed a deal?","goal":"Connect data latency to business outcomes"}},{"id":"rip-2","tier":2,"tag":"Pain","fire_when":[],"skip_when":[],"l1":{"q":"If [key person] wasn't available for a month, what would break?","goal":"Risk identification"},"l2":{"q":"Who would step in \u2014 and how long before they could run a distribution independently?","goal":"Quantify the ramp time for a replacement"},"l3":{"q":"What would that cost you \u2014 in delayed distributions, overtime, or a rushed hire?","goal":"Put a dollar figure on the key person gap"}},{"id":"rip-3","tier":3,"tag":"Pain","fire_when":[],"skip_when":[],"l1":{"q":"Walk me through what happens the day after a distribution goes out. Who checks what?","goal":"Risk identification"},"l2":{"q":"How many people touch that process, and where do the handoffs slow down?","goal":"Map the bottlenecks in the post-distribution workflow"},"l3":{"q":"If an LP called the next day and challenged a number, how fast could you trace it back?","goal":"Connect post-distribution to audit exposure"}},{"id":"rip-4","tier":2,"tag":"Pain","fire_when":[],"skip_when":[],"l1":{"q":"When was the last time an LP asked a question about their distribution calculation that took longer than an hour to answer?","goal":"Risk identification"},"l2":{"q":"What did the process look like to get them the answer \u2014 who was involved and how long?","goal":"Quantify the LP inquiry burden in people and hours"},"l3":{"q":"How did the LP react to the turnaround time \u2014 and has that affected the relationship?","goal":"Connect data latency to LP trust"}},{"id":"rip-5","tier":2,"tag":"Pain","fire_when":[],"skip_when":[],"l1":{"q":"How long does audit prep take your team right now?","goal":"Risk identification"},"l2":{"q":"What percentage of that time is gathering data versus actually reviewing it?","goal":"Separate data collection burden from analysis burden"},"l3":{"q":"If audit prep was two days instead of two weeks, what would your team do with that time?","goal":"Connect efficiency to strategic outcomes"}},{"id":"rip-6","tier":2,"tag":"Pain","fire_when":[],"skip_when":[],"l1":{"q":"What happens to that process when you launch Fund V?","goal":"Risk identification"},"l2":{"q":"Can you walk me through a specific instance?","goal":"Get a real example"},"l3":{"q":"What did that cost you \u2014 hours, dollars, or trust?","goal":"Quantify"}},{"id":"rip-7","tier":1,"tag":"Pain","fire_when":[],"skip_when":[],"l1":{"q":"Who else on your team fully understands how the waterfall logic works end to end?","goal":"Risk identification"},"l2":{"q":"If you asked them to reproduce a waterfall calc from scratch without help, could they?","goal":"Test whether bench depth is real or :"Connect fund raise to operational pressure"},"l3":{"q":"Would it be easier to implement something like this before Fund V goes live, or after \u2014 when you're already mid-cycle?","goal":"Create timing urgency from their own logic"}},{"id":"dq-018","tier":1,"tag":"Pain","fire_when":[],"skip_when":[],"note":"This is the single most important confirming question. If they say yes, go to close. If they hedge, go back to discovery","l1":{"q":"Based on what we've discussed, it sounds like there are a few structural risks worth examining more closely \u2014 would you agree?","goal":"Tests whether the belief shift landed. If they agree, you've earned the right to"},"l2":{"q":"Which of those risks feels most pressing to you personally?","goal":"Prioritize \u2014 this becomes the M2 anchor"},"l3":{"q":"If you had to put a dollar amount on what that risk costs the firm per year, what would it be?","goal":"Force quantification"}},{"id":"dq-022","tier":1,"tag":"Champion","fire_when":[],"skip_when":[],"note":"Ask this before proposing the M2 attendee list. Their answer tells you whether to coach them on framing before the next ","l1":{"q":"When you go back to Maria after this call, how would you describe what we talked about?","goal":"Champion litmus test. If they can articulate the pain in their own words, they'r"},"l2":{"q":"What part would resonate most with them \u2014 time savings, risk reduction, or scenario speed?","goal":"Help them sharpen the internal pitch"},"l3":{"q":"If they push back and say 'we're fine,' what would you say?","goal":"Test whether the champion will fight or fold"}},{"id":"dq-023","tier":1,"tag":"Competition","fire_when":[],"skip_when":[],"note":"Ask casually. If they name competitors, don't react. Write the names down silently. If they say 'just exploratory,' test","l1":{"q":"Have you looked at anything else for this, or is this more exploratory at this point?","goal":"Competitive landscape awareness. Tells you if you're in a bake-off, a solo evalu"},"l2":{"q":"What specifically didn't work about what you've seen before?","goal":"Map competitor ceiling"},"l3":{"q":"What would tip the scale if you compared solutions?","goal":"Shape evaluation criteria"}},{"id":"dq-019","tier":1,"tag":"Champion","fire_when":[],"skip_when":[],"note":"Name the role specifically. 'Your team' is vague. 'Your CFO' or 'your controller' is a commitment.","l1":{"q":"If we could show you how firms with similar complexity have addressed these exact gaps, would it be worth 45 minutes with your CFO or Head of Fund Ops?","goal":"Proposes the next meeting with a specific stakeholder. Frames as value, not sale"},"l2":{"q":"What would make that meeting most useful \u2014 a live demo of your data, a business case, or both?","goal":"Frame M2 around the EB's priorities"},"l3":{"q":"What's the one thing they need to see to invest 45 minutes?","goal":"Get the single most important proof point"}},{"id":"dq-020","tier":1,"tag":"EB","fire_when":[],"skip_when":[],"note":"Write down every name. This is your M2 attendee list.","l1":{"q":"Who on your team would need to be in the room for that conversation to be productive?","goal":"Stakeholder mapping. Starts building the buying committee."},"l2":{"q":"What's each person's biggest concern likely to be?","goal":"Pre-map objections by stakeholder"},"l3":{"q":"Is there anyone who would actively push back \u2014 and what would their argument be?","goal":"Identify the blocker before M2"}},{"id":"dq-021","tier":1,"tag":"Process","fire_when":[],"skip_when":[],"note":"If they won't commit to a date live, the deal is already at risk. Push gently: 'Early or late next week?'","l1":{"q":"What does your calendar look like in the next two weeks to schedule that?","goal":"Book the meeting live on the call. Don't leave it to email."},"l2":{"q":"Early next week or late \u2014 what works better?","goal":"Binary choice closes faster than open-ended"},"l3":{"q":"Let's lock it now \u2014 I'll send the invite before we hang up.","goal":"Do not leave without a date"}},{"id":"rip-8","tier":2,"tag":"Pain","fire_when":[],"skip_when":[],"l1":{"q":"On a scale of one to ten, how confident are you that your current setup can handle double the fund count without adding people?","goal":"Risk identification"},"l2":{"q":"What makes it that number and not a ten?","goal":"Surface what is holding them back from full urgency"},"l3":{"q":"What would have to change for it to become a ten?","goal":"Get them to name their own activation trigger"}}]}]},"M2":{"name":"Initial Demo","belief_shift":"There's a credible alternative worth evaluating seriously.","stages":[{"id":"m2-open","name":"Open \u2014 Anchor to Pain, Not Product","questions":[{"id":"m2rip-0","tier":2,"tag":"Pain","fire_when":[],"skip_when":[],"l1":{"q":"Since we last spoke \u2014 anything change internally that I should know about?","goal":"Risk identification"},"l2":{"q":"Can you walk me through that?","goal":"Get specifics"},"l3":{"q":"What did that cost you?","goal":"Quantify"}}]},{"id":"m2-advancing","name":"Demo & Diagnose \u2014 Create Contrast","questions":[{"id":"dq-022","tier":2,"tag":"Pain","fire_when":[],"skip_when":[],"note":"Ask before showing the distribution workflow in the demo. Their description becomes the 'before' that the demo contrasts","l1":{"q":"Walk me through how you run a distribution today \u2014 what does that process actually look like?","goal":"Current state mapping. Gets them describing their own process before showing the"},"l2":{"q":"Can you give me a specific example?","goal":"Get concrete evidence"},"l3":{"q":"What did that cost you \u2014 time, money, or risk?","goal":"Quantify"}},{"id":"dq-023","tier":2,"tag":"Metrics","fire_when":[],"skip_when":[],"note":"Anchor the number. Use it later: 'You said 3 weeks. What we just showed takes 3 days.'","l1":{"q":"How long does the full process take from decision to funds out the door?","goal":"Quantifies the operational burden. Creates a benchmark."},"l2":{"q":"Can you give me a specific example?","goal":"Get concrete evidence"},"l3":{"q":"What did that cost you \u2014 time, money, or risk?","goal":"Quantify"}},{"id":"dq-024","tier":2,"tag":"Pain","fire_when":[],"skip_when":[],"note":"This is the emotional question. If they pause or sigh, you've hit something real. Slow down and explore.","l1":{"q":"Has a delayed or corrected distribution ever created a trust issue with an LP?","goal":"Level 3 pain ladder \u2014 personal stakes. Connects operational failure to relations"},"l2":{"q":"What happened after that \u2014 did the LP raise it again, or did it fade?","goal":"Test whether trust issues compound"},"l3":{"q":"What would it be worth to you to never have that conversation again?","goal":"Emotional close on relationship risk"}},{"id":"dq-025","tier":2,"tag":"EB","fire_when":[],"skip_when":[],"note":"If 'day-to-day frustration' \u2014 you need to help them escalate it. If 'on management's radar' \u2014 the path to the EB is open","l1":{"q":"Is streamlining this on management's radar, or more of a day-to-day frustration?","goal":"Tests whether pain has reached leadership."},"l2":{"q":"Can you give me a specific example?","goal":"Get concrete evidence"},"l3":{"q":"What did that cost you \u2014 time, money, or risk?","goal":"Quantify"}},{"id":"dq-026","tier":1,"tag":"Pain","fire_when":[],"skip_when":[],"note":"Ask this after showing a workflow, not before. Let the demo create the contrast first.","l1":{"q":"When you see a centralized calculation layer like this, what's the first thing you think about relative to your current setup?","goal":"Post-demo reflection. Gets them comparing what they just saw to their reality."},"l2":{"q":"How big is that gap \u2014 minor inconvenience or structural problem?","goal":"Get them to size it"},"l3":{"q":"What does that gap cost you in real terms \u2014 time, money, risk, or all three?","goal":"Quantify in their language"}},{"id":"dq-027","tier":2,"tag":"Metrics","fire_when":[],"skip_when":[],"note":"Audit pain is universal. This question works with every persona in the room.","l1":{"q":"If your auditors could trace any LP's economics back to a single source of truth in under a minute, how would that change your audit cycle?","goal":"Paints the future state. Connects to a concrete business outcome."},"l2":{"q":"How many hours does audit prep take your team today?","goal":"Quantify audit burden"},"l3":{"q":"What would you do with that time if you got it back?","goal":"Connect efficiency to strategic outcomes"}},{"id":"dq-028","tier":1,"tag":"Pain","fire_when":[],"skip_when":[],"note":"Same future-projection technique from M1, now with the demo as evidence that an alternative exists.","l1":{"q":"At what point does your current approach start breaking under the weight of new fund launches or increasing LP complexity?","goal":"Future risk. Connects current process to a scaling limit."},"l2":{"q":"What does 'break' look like \u2014 longer cycles, more errors, or people burning out?","goal":"Specifics on the failure mode"},"l3":{"q":"How close are you to that point right now?","goal":"Create urgency from their assessment"}},{"id":"dq-029","tier":1,"tag":"Criteria","fire_when":[],"skip_when":[],"note":"The single best post-demo question. Whatever they say is their decision criterion. Write it down.","l1":{"q":"When you look at what we just showed you, where do you see the biggest gap between this and how your team operates today?","goal":"Self-identified gap. They tell you where the value is."},"l2":{"q":"Has your team tried to solve that before \u2014 and what happened?","goal":"Surface failed internal attempts"},"l3":{"q":"If you could fix one thing about your current process, what would it be?","goal":"Get the single most important outcome"}},{"id":"dq-030","tier":1,"tag":"Competition","fire_when":[],"skip_when":[],"note":"Opens the competitive landscape and reveals what killed prior deals. Both are gold.","l1":{"q":"Have you looked at solutions for this before \u2014 and if so, what's kept you from moving forward?","goal":"Surfaces prior evaluations and decision blockers."},"l2":{"q":"Was it the product that didn't work, or timing, budget, or internal alignment?","goal":"Separate product gaps from process gaps"},"l3":{"q":"What would need to be different this time for you to actually move forward?","goal":"Get their conditions for commitment"}},{"id":"dq-031","tier":1,"tag":"Criteria","fire_when":[],"skip_when":[],"note":"Ask this before they define criteria with someone else. What they say here becomes the rubric you demo against in M8.","l1":{"q":"If you were to evaluate a solution for this \u2014 what would the non-negotiables be?","goal":"Shapes the evaluation frame before a competitor does."},"l2":{"q":"Which non-negotiable has disqualified solutions in the past?","goal":"Find the deal-killer criterion"},"l3":{"q":"If we met every non-negotiable, what's the remaining hesitation?","goal":"Surface the hidden objection"}},{"id":"dq-032","tier":2,"tag":"Pain","fire_when":[],"skip_when":[],"note":"Works especially well with controllers and CFOs. Audit season is universally painful.","l1":{"q":"Think about the last time you were under pressure during an audit cycle \u2014 what would have made that materially easier?","goal":"Emotional recall. Re-lives the pain in context of what they just saw."},"l2":{"q":"How many hours did that consume across your team?","goal":"Quantify"},"l3":{"q":"What would have made that a non-event instead of a fire drill?","goal":"Paint the future state from their pain"}},{"id":"m2rip-11","tier":2,"tag":"Pain","fire_when":[],"skip_when":[],"l1":{"q":"As you're watching this \u2014 where does this connect to the problem you described last time?","goal":"Risk identification"},"l2":{"q":"Can you walk me through that?","goal":"Get specifics"},"l3":{"q":"What did that cost you?","goal":"Quantify"}},{"id":"m2rip-12","tier":2,"tag":"Pain","fire_when":[],"skip_when":[],"l1":{"q":"Is there anyone internally who would push back on moving forward \u2014 and what would their concern be?","goal":"Risk identification"},"l2":{"q":"Can you walk me through that?","goal":"Get specifics"},"l3":{"q":"What did that cost you?","goal":"Quantify"}}]},{"id":"m2-confirming","name":"Confirm & Advance \u2014 Secure Coordination Meeting","questions":[{"id":"dq-033","tier":1,"tag":"Pain","fire_when":[],"skip_when":[],"note":"If 'nice-to-have' \u2014 the belief shift didn't fully land. Go back to pain. If 'real problem' \u2014 proceed to close.","l1":{"q":"Does what you've seen feel like it addresses a real problem, or is this more of a nice-to-have?","goal":"Binary test. Forces a position."},"l2":{"q":"What makes it real \u2014 is there a cost to not solving it, or a specific event that forces action?","goal":"Anchor urgency to concrete trigger"},"l3":{"q":"If you do nothing for twelve months, what's the most likely downside?","goal":"Cost of inaction in their words"}},{"id":"dq-034","tier":1,"tag":"Process","fire_when":[],"skip_when":[],"note":"Every name they give you is a person you need to multi-thread with before M8.","l1":{"q":"If this is worth exploring further, who else on your team would need to weigh in on whether it fits your environment?","goal":"Stakeholder mapping for the buying committee."},"l2":{"q":"What's each person's likely reaction \u2014 supportive, skeptical, or unknown?","goal":"Pre-map the room"},"l3":{"q":"Who's the hardest to convince, and what would it take?","goal":"Identify the blocker"}},{"id":"dq-035","tier":1,"tag":"Process","fire_when":[],"skip_when":[],"note":"Name the meeting type. 'Coordination meeting' is specific and bounded. 'Follow up' is vague and dies.","l1":{"q":"Would it make sense to bring those stakeholders into a coordination meeting so we can scope a proper evaluation?","goal":"Proposes the next step explicitly."},"l2":{"q":"What would need to happen between now and that meeting to keep momentum?","goal":"Create interim commitments"},"l3":{"q":"Can we get it on the calendar right now?","goal":"Book it live"}},{"id":"dq-036","tier":1,"tag":"Champion","fire_when":[],"skip_when":[],"note":"Whatever they say here tells you exactly what materials, references, or framing they need to get internal buy-in.","l1":{"q":"What would need to be true for you to feel comfortable recommending that next step internally?","goal":"Arms the champion with what they need to sell internally."},"l2":{"q":"When you make that recommendation, what pushback do you expect?","goal":"Prepare champion for resistance"},"l3":{"q":"Would it help if I put together a one-pager so you don't have to build the case from scratch?","goal":"Champion leaves armed"}},{"id":"m2rip-4","tier":2,"tag":"Pain","fire_when":[],"skip_when":[],"l1":{"q":"What would need to be true for you to feel comfortable moving this to the next stage internally?","goal":"Risk identification"},"l2":{"q":"Can you walk me through that?","goal":"Get specifics"},"l3":{"q":"What did that cost you?","goal":"Quantify"}}]}]}},"signal_rebuttals":{"status_quo_confidence":{"l1":{"text":"The firms that feel most confident usually haven't had the event yet. One LP dispute, one team member leaving, one fund launch \u2014 that's usually what changes the math. We're not here to create urgency. We're here to ask whether the current setup can absorb the next level of complexity."},"l2":{"text":"What would have to break for you to feel like the current setup wasn't enough?"},"l3":{"text":"If the current process handles everything perfectly, what made someone on your team take this meeting? Something triggered the conversation. I'd rather understand that than pitch you on something you don't need."}},"status_quo_defense":{"l1":{"text":"I'm not suggesting what you have is broken. I'm asking whether it scales. Most firms we talk to aren't in crisis \u2014 they're at an inflection point. The question is whether you want to address it before or after the next fund launch."},"l2":{"text":"When you think about Fund V or your next close \u2014 does the current process hold up without adding people?"},"l3":{"text":""}},"manual_process":{"l1":{"text":"Manual is fine until it's not. The question is whether the manual work is growing linearly with your fund count \u2014 because if it is, you're either going to cap your growth or grow your team. Neither is the answer you want."},"l2":{"text":"How many hours per quarter would you say your team spends on validation and reconciliation work?"},"l3":{"text":""}},"workflow_fragility":{"l1":{"text":"When a process depends on specific people executing specific steps in a specific order \u2014 that's not a workflow, that's a ritual. Rituals work until the person who knows the ritual isn't there."},"l2":{"text":"If I asked your team to document that process end to end today \u2014 how long would it take and how confident would you be it was complete?"},"l3":{"text":""}},"excel_dependency":{"l1":{"text":"Excel isn't the problem \u2014 it's the process Excel enables. When the logic lives in a file that one person maintains, the file becomes the single point of failure. It doesn't fail dramatically. It fails quietly."},"l2":{"text":"How many people on your team can open that model and understand exactly what it's doing?"},"l3":{"text":""}},"audit_risk":{"l1":{"text":"Audit readiness isn't just about having the numbers. It's about being able to show your work \u2014 every calculation, every override, every amendment, with a timestamp and a reason. A spreadsheet that's been modified 40 times doesn't give you that."},"l2":{"text":"When was the last audit and how long did your team spend pulling documentation together?"},"l3":{"text":""}},"key_person_risk":{"l1":{"text":"The risk isn't that they leave. It's what happens while they're there. You can't promote them freely. You can't have them out during a distribution cycle. You can't hire someone junior to ramp up alongside them because the knowledge isn't transferable."},"l2":{"text":"Who else on your team fully understands how the waterfall logic works end to end?"},"l3":{"text":""}},"fund_growth":{"l1":{"text":"Growth is the multiplier. Every fund you add multiplies the complexity \u2014 more structures, more LPs, more side letters, more reconciliation cycles. The question is whether the infrastructure scales with the business or becomes the ceiling on it."},"l2":{"text":"What does your fund launch roadmap look like over the next two years?"},"l3":{"text":""}},"pricing_sensitivity":{"l1":{"text":"It is typically the most significant software investment a fund ops team makes. But 100% of our clients pass it through as a fund expense \u2014 it is not management company overhead. The question is what the validation process costs you today in person-hours trapped in spreadsheets."},"l2":{"text":"What does a fully-loaded FTE cost you in this market? Let me run the real comparison with your numbers."},"l3":{"text":"You are already paying for this. The platform costs a fraction of what you spend on the process it replaces. The math usually surprises people when they run it."}},"internal_build_mentioned":{"l1":{"text":"We've seen this path. The first version works. Then a new fund structure comes in, and someone has to hack the system to make it work. Then another. The engineering team underestimates the complexity of fund accounting logic \u2014 not because they're not talented, but because it's genuinely subtle."},"l2":{"text":"What's the estimate for the build timeline, and does that include ongoing maintenance as fund structures change?"},"l3":{"text":""}},"competitor_mentioned":{"l1":{"text":""},"l2":{"text":"What specifically were you hoping they could solve that they could not?"},"l3":{"text":"I am not asking you to trust me on capability. I am asking if it is worth 45 minutes to put your hardest fund on the table and see whether we can model it."}},"no_urgency":{"l1":{"text":"You're right that there's no fire today. The question is whether the current setup is designed for where you're going or where you've been. Most firms don't add infrastructure when they're in crisis \u2014 they add it when they can. The ones that wait usually regret the timing."},"l2":{"text":"What's your next fund close date, and does the current process get harder or easier from here?"},"l3":{"text":"What would have to happen between now and Fund V's first close for this to feel urgent enough to act on? I want to understand what the trigger looks like for you, so we're not guessing at timing."}},"competitor_pricing":{"l1":{"text":""},"l2":{"text":"What specifically is included in their quote \u2014 and what would you still need to solve in Excel even with that tool?"},"l3":{"text":"One of our clients spent six months evaluating a cheaper alternative that could not handle their waterfall structures. The hidden cost was not the license \u2014 it was the six months."}},"build_vs_buy_cost":{"l1":{"text":"Internal builds are optimized for how things worked when they were built. One client evaluated an internal Anaplan build at $50-70M over five years. The build cost was not the problem \u2014 it was the maintenance tail and the 3-5 engineers needed to sustain it."},"l2":{"text":"How many engineering hours would your team need to build waterfall logic for multi-tier structures with side-letter overrides and full audit traceability?"},"l3":{"text":"The question is whether your firm wants to be in the fund accounting software business or the fund management business. We have 50+ engineers who do nothing but this. You share the R&D cost with every client."}},"allvue_mentioned":{"l1":{"text":"Allvue is a strong general ledger for partnership accounting. The gap is at the investor level \u2014 waterfalls, carried interest, scenario modeling, LP-specific economics. That is not Allvue's core."},"l2":{"text":"What are you using Allvue for specifically \u2014 the GL, or are you trying to get it to handle the investor-level calculations too?"},"l3":{"text":"Every firm running Allvue still lives in Excel for the calc layer. Data flows in from Allvue. The performance book of record adds the layer above it."}},"carta_mentioned":{"l1":{"text":"Carta is strong for venture-style funds with pro-rata structures. When complexity increases \u2014 deal-by-deal waterfalls, catch-ups, clawbacks, side letters \u2014 it breaks."},"l2":{"text":"How many of your fund structures have economics that go beyond a simple pro-rata split?"},"l3":{"text":"Carta's waterfall approach uses rigid templates that require constant Excel validation. How many of your investor arrangements have custom terms?"}},"investran_mentioned":{"l1":{"text":"Investran is widely used for fund-level accounting. The pattern is that even with Investran, investor-level performance \u2014 waterfalls, fees, carry \u2014 still ends up in spreadsheets."},"l2":{"text":"Where does the investor-level calc logic live today \u2014 in Investran or in Excel?"},"l3":{"text":"We do not replace Investran. Data flows in. The GL stays. The calc layer adds."}},"efront_mentioned":{"l1":{"text":"eFront is solid for GL and fund accounting \u2014 especially customized instances. Investor-level performance, waterfalls, and scenario modeling typically live outside it in Excel."},"l2":{"text":"How much customization have you done on your eFront instance, and what still lives outside it?"},"l3":{"text":"The more customized the eFront instance, the harder it is to change. The calc layer above it gives you flexibility without touching the GL."}}},"signal_map":[{"phrases":["we're fine","working for us","not broken","works well","no issues","it works","process works","happy with"],"signal":"status_quo_confidence","label":"STATUS QUO","color":"#F59E0B"},{"phrases":["we manage","things are working","been doing it this way","haven't had problems"],"signal":"status_quo_defense","label":"STATUS QUO","color":"#EAB308"},{"phrases":["no urgency","not a priority","not the right time","too busy","maybe next quarter","not now"],"signal":"no_urgency","label":"NO URGENCY","color":"#F97316"},{"phrases":["too expensive","that's a lot","can't afford","over budget","sticker shock","how much does it cost","what's the price","price point"],"signal":"pricing_sensitivity","label":"PRICING","color":"#EF4444"},{"phrases":["basis points","why bps","flat fee","per user","per fund pricing","why not flat"],"signal":"pricing_sensitivity","label":"BPS MODEL","color":"#EF4444"},{"phrases":["cheaper","discount","come down","best price","sharpen the pencil","flexibility on price","can you do better"],"signal":"pricing_sensitivity","label":"NEGOTIATE","color":"#EF4444"},{"phrases":["roi","return on investment","payback","justify the cost","business case"],"signal":"pricing_sensitivity","label":"ROI","color":"#EF4444"},{"phrases":["fund expense","who pays","lpa","pass through","management company cost","gp should pay"],"signal":"pricing_sensitivity","label":"FUND EXPENSE","color":"#EF4444"},{"phrases":["allvue","all vue"],"signal":"allvue_mentioned","label":"vs ALLVUE","color":"#EC4899"},{"phrases":["carta"],"signal":"carta_mentioned","label":"vs CARTA","color":"#EC4899"},{"phrases":["investran"],"signal":"investran_mentioned","label":"vs INVESTRAN","color":"#EC4899"},{"phrases":["efront","e-front"],"signal":"efront_mentioned","label":"vs EFRONT","color":"#EC4899"},{"phrases":["juniper square","juniper"],"signal":"competitor_mentioned","label":"vs JUNIPER","color":"#EC4899"},{"phrases":["chronograph"],"signal":"competitor_mentioned","label":"vs CHRONOGRAPH","color":"#EC4899"},{"phrases":["arcesium"],"signal":"competitor_mentioned","label":"vs ARCESIUM","color":"#EC4899"},{"phrases":["anaplan"],"signal":"build_vs_buy_cost","label":"vs ANAPLAN","color":"#8B5CF6"},{"phrases":["build it ourselves","build internally","internal tool","built our own","custom system"],"signal":"build_vs_buy_cost","label":"BUILD vs BUY","color":"#8B5CF6"},{"phrases":["excel works","spreadsheet is fine","our models work","works in excel","built the model"],"signal":"excel_dependency","label":"EXCEL","color":"#14B8A6"},{"phrases":["manual process","manually","reconcile by hand","re-key","copy paste"],"signal":"manual_process","label":"MANUAL","color":"#06B6D4"},{"phrases":["only one person","only person who knows","if they leave","key person","tribal knowledge","in their head"],"signal":"key_person_risk","label":"KEY PERSON","color":"#F43F5E"},{"phrases":["audit","auditor","sox","compliance","traceability","defensible"],"signal":"audit_risk","label":"AUDIT","color":"#A855F7"},{"phrases":["new fund","fund raise","launching","next fund","scaling","growing"],"signal":"fund_growth","label":"GROWTH","color":"#10B981"},{"phrases":["fragile","breaks","workaround","duct tape","held together","clunky"],"signal":"workflow_fragility","label":"FRAGILE","color":"#D97706"}],"objections":[{"cat":"PRICING RESISTANCE","l1":"It's typically the most expensive software clients have bought. The question is whether anything else provides this much value. Most firms pass it through as an LP expense \u2014 if it's a core book of record solution, it's covered in the LPA. The net cos","l2":"","l3":""},{"cat":"PRICING RESISTANCE","l1":"The pricing model mirrors how public market infrastructure is priced \u2014 Clearwater, Aladdin, Bloomberg PORT all use basis points. As NAV goes down, the fee goes down. The bet is that firms raise more funds and grow AUM over time \u2014 the price aligns wit","l2":"","l3":""},{"cat":"PRICING RESISTANCE","l1":"The admin handles bookkeeping. The question is what it costs to check the admin in Excel \u2014 person-hours, key person risk, error exposure. Most firms find the validation burden alone justifies the platform, and the cost passes through to the fund.","l2":"","l3":""},{"cat":"PRICING RESISTANCE","l1":"Point solutions cover the easy 30%. The hard part \u2014 complex waterfalls, side letter compliance, cross-fund performance, admin reconciliation \u2014 is where the value concentrates. A data warehouse with AI modules doesn't handle LPA-compliant calculations","l2":"","l3":""},{"cat":"PRICING RESISTANCE","l1":"That math works in our favor for most firms. Translate the hours spent on waterfall validation, quarter-end reconciliation, and distribution prep into fully-loaded headcount cost. Add the cost of a single error on a distribution \u2014 typically five to s","l2":"","l3":""},{"cat":"PRICING RESISTANCE","l1":"At the current AUM, the pricing may feel like a stretch. The model is designed so that as AUM grows \u2014 through fund raises and appreciation \u2014 the cost stays proportional. Some firms start with a subset of funds to prove value before expanding. There a","l2":"","l3":""},{"cat":"PRICING RESISTANCE","l1":"Three buckets: efficiency gains from eliminating manual reconciliation and quarter-end crunch (quantifiable in person-hours), key person risk reduction (what would it cost if your lead fund accountant left tomorrow?), and distribution timing improvem","l2":"","l3":""},{"cat":"EXISTING VENDOR LOYALTY","l1":"A strong admin relationship is valuable. The question isn't whether the admin is doing their job \u2014 it's who checks them. Most firms build parallel Excel workbooks to validate admin output. That's the redundant work a system of record eliminates. The ","l2":"","l3":""},{"cat":"EXISTING VENDOR LOYALTY","l1":"A performance book of record complements the admin rather than replacing them. The admin keeps booking transactions and producing statements. The fund gets an independent calculation layer that validates output and catches discrepancies before they r","l2":"","l3":""},{"cat":"EXISTING VENDOR LOYALTY","l1":"The admin's GL is designed for bookkeeping \u2014 journal entries, trial balances, financial statements. Investor-level performance \u2014 waterfalls, management fees, carried interest, scenario modeling \u2014 lives outside the GL in Excel. That's the layer a perf","l2":"","l3":""},{"cat":"EXISTING VENDOR LOYALTY","l1":"If the new system is a GL, portal, or CRM, a performance book of record is the missing layer that completes the stack \u2014 not another competing system. Data flows between them. The timing might actually be ideal: while the team is in a systems-improvem","l2":"","l3":""},{"cat":"LACK OF URGENCY","l1":"Understood. One question worth considering: is there a fund raise, an audit, or a key hire transition coming up? Those are the moments when the current process gets stress-tested. Most firms wish they'd started a quarter earlier.","l2":"","l3":""},{"cat":"LACK OF URGENCY","l1":"That makes sense \u2014 audit season and fundraising stretch every team. The implementation process is designed to run in parallel without disrupting current workflows. The team that's busiest right now is the one that benefits most from getting this off ","l2":"","l3":""},{"cat":"LACK OF URGENCY","l1":"The best implementation window is between fund closes \u2014 clean data, team has bandwidth. If a new fund is in the pipeline, starting now means it goes live from day one with no retroactive conversion. Waiting until after the close means converting hist","l2":"","l3":""},{"cat":"LACK OF URGENCY","l1":"Most firms say that until something breaks \u2014 a key person leaves, an LP challenges a number, fund count doubles. The question isn't whether it works today. It's whether it's defensible, scalable, and not dependent on one person. If the answer to any ","l2":"","l3":""},{"cat":"LACK OF URGENCY","l1":"AI is accelerating \u2014 but it accelerates what's already structured. If fund data is in 15 Excel files, AI can't make sense of it. The firms investing in a structured data layer now are the ones positioned to benefit most from AI capabilities next year","l2":"","l3":""},{"cat":"EVALUATION FATIGUE","l1":"If prior evaluations didn't land, it's worth understanding why. Was it product fit, timing, or internal alignment? The firms that move forward fastest are the ones that test with their actual data \u2014 not generic demos. A tailored demo with real fund s","l2":"","l3":""},{"cat":"EVALUATION FATIGUE","l1":"A standard demo shows the platform's capabilities \u2014 but it doesn't reflect any specific firm's fund structures, investor terms, or fee schedules. The tailored demo, built from actual files, is where fit becomes clear. If the standard demo didn't reso","l2":"","l3":""},{"cat":"EVALUATION FATIGUE","l1":"That makes sense for a decision this important. To make the evaluation productive, it helps to define evaluation criteria upfront \u2014 what does a winning solution need to do? Then each vendor can demonstrate against the same rubric with real data. That","l2":"","l3":""},{"cat":"SECURITY / DATA CONCERNS","l1":"Data ownership stays with the client \u2014 it's structured, exportable, and not locked into proprietary formats. Any acquisition scenario would preserve client access. That said, the risk of data being trapped is actually higher in the current state \u2014 wh","l2":"","l3":""},{"cat":"SECURITY / DATA CONCERNS","l1":"That concern is increasing across the industry as AI scrutiny rises. The platform is designed so the fund owns the data directly \u2014 it's calculated in the system and pushed out wherever needed. No training on client data, no sharing with third parties","l2":"","l3":""},{"cat":"SECURITY / DATA CONCERNS","l1":"SOC 2 Type II certified. There's a standard DDQ package that can be sent over \u2014 most firms include it in the coordination meeting workflow so security review happens in parallel with the evaluation, not sequentially after it.","l2":"","l3":""},{"cat":"INTEGRATION COMPLEXITY","l1":"Integration is file-based, not API-dependent. Data comes in from the GL \u2014 Investran, Allvue, Yardi, eFront, QuickBooks \u2014 through standardized file exports. Not a deep technical integration that requires IT involvement. Most implementations handle dat","l2":"","l3":""},{"cat":"INTEGRATION COMPLEXITY","l1":"That's a common pattern with older platforms. If the system can produce any kind of export \u2014 CSV, Excel, PDF \u2014 the implementation team can work with it. The harder the data extraction is from the current system, the stronger the case for having an in","l2":"","l3":""},{"cat":"INTEGRATION COMPLEXITY","l1":"The goal is one system of record for fund performance. Data flows in from Yardi automatically \u2014 no duplicate entry. Over time, the team references the performance platform directly instead of going back to Yardi for fund-level questions. It's additiv","l2":"","l3":""},{"cat":"INTERNAL BUILD PREFERENCE","l1":"Internal builds can work with the right engineering resources. The question is opportunity cost \u2014 purpose-built platforms represent years of R&D across hundreds of fund structures. That's hard to replicate and harder to maintain. Most firms find engi","l2":"","l3":""},{"cat":"INTERNAL BUILD PREFERENCE","l1":"Custom solutions built in-house represent real investment. The ongoing challenge is maintenance \u2014 each new fund vintage, side letter, or LPA provision requires someone to update the logic. Firms that have gone through that cycle find the maintenance ","l2":"","l3":""},{"cat":"INTERNAL BUILD PREFERENCE","l1":"That works until that engineer leaves or gets pulled into something else. If the fund's waterfall logic lives in one person's code, that's key person risk in a different form. A commercial platform means the calculation engine is maintained by a dedi","l2":"","l3":""},{"cat":"RESOURCE CONSTRAINTS","l1":"The implementation model is designed to minimize client-side bandwidth \u2014 the implementation team handles 90-95% of the configuration work. The client's role is primarily validation: confirming that output matches what they already know to be true. It","l2":"","l3":""},{"cat":"RESOURCE CONSTRAINTS","l1":"That's actually a common starting point. Firms that implement before the hire find it easier to recruit \u2014 candidates see a modern platform instead of a pile of Excel files. The system also becomes the onboarding tool: new hires learn the fund structu","l2":"","l3":""},{"cat":"RESOURCE CONSTRAINTS","l1":"That's exactly the pressure a platform addresses. Technology absorbs the incremental complexity from new funds and investors \u2014 without adding bodies. The question is whether the team can handle double the fund count in 18 months with the same headcou","l2":"","l3":""},{"cat":"RESOURCE CONSTRAINTS","l1":"The platform is configured to match how the team already works \u2014 same fund structures, same fee schedules, same waterfall logic. It's not a new process; it's the existing process in a system instead of spreadsheets. Most teams report the learning cur","l2":"","l3":""},{"cat":"IMPLEMENTATION ANXIETY","l1":"So have we \u2014 that's why the implementation team reports to the CTO, not to sales. The process is structured: map the operating model, configure from existing files, validate against known good numbers, run in parallel until the team is confident. No ","l2":"","l3":""},{"cat":"IMPLEMENTATION ANXIETY","l1":"Typical 3-5 fund client is live in about 4 months. 40+ funds \u2014 closer to 12 months. The team runs in parallel for at least one full quarter to validate. AI tooling is accelerating the process \u2014 LPA parsing, chart of accounts mapping, historical recon","l2":"","l3":""},{"cat":"IMPLEMENTATION ANXIETY","l1":"Understood \u2014 most firms don't want to add anything during their busiest period. Discovery and scoping can happen now while the team is heads-down. Implementation kicks off after the audit closes, and the system is ready for the next cycle. That way t","l2":"","l3":""},{"cat":"IMPLEMENTATION ANXIETY","l1":"One person who knows the fund structures well \u2014 usually the controller or lead fund accountant. They validate output against what they already know. The implementation team handles configuration, data loading, and formula mapping. It's not a 'bring y","l2":"","l3":""},{"cat":"CALCULATION ACCURACY / TRUST","l1":"That's exactly the right question. The validation process is designed for it: the team's existing Excel output becomes the test. Configure the system, run the same calculations, compare side by side. If numbers don't match, it's either a configuratio","l2":"","l3":""},{"cat":"CALCULATION ACCURACY / TRUST","l1":"Calculations are deterministic \u2014 no AI approximation, no rounding shortcuts. Every output is traceable: click any number and see the formula, the inputs, and every intermediate step. Auditors are increasingly asking for this level of traceability. If","l2":"","l3":""},{"cat":"CHANGE MANAGEMENT","l1":"That's the hardest part \u2014 and it's why the platform runs in parallel first. The team keeps doing what they do in Excel while the system produces the same output independently. Over time, when the numbers consistently match, confidence builds. Some te","l2":"","l3":""},{"cat":"CHANGE MANAGEMENT","l1":"That's the failure pattern with tools that require external consultants to configure and maintain. A purpose-built platform doesn't need a consulting layer \u2014 the concepts are native. And the implementation team stays engaged through the first live qu","l2":"","l3":""},{"cat":"STAKEHOLDER / INTERNAL ALIGNMENT","l1":"That's the right process. To make that conversation productive, it helps to have specific numbers \u2014 hours spent on quarter-end, cost of the validation process, key person risk exposure. A business case with hard ROI makes the internal conversation ea","l2":"","l3":""},{"cat":"STAKEHOLDER / INTERNAL ALIGNMENT","l1":"That's common with platform decisions that touch finance, operations, and technology. The coordination meeting is designed for exactly this \u2014 bring the stakeholders together, agree on evaluation scope and criteria, and make sure everyone is looking a","l2":"","l3":""},{"cat":"STAKEHOLDER / INTERNAL ALIGNMENT","l1":"The more we know about that process upfront, the better we can plan around it. Running security review, legal, and procurement in parallel with the technical evaluation \u2014 rather than sequentially after it \u2014 can compress the timeline significantly. Th","l2":"","l3":""},{"cat":"PRODUCT GAPS","l1":"Transparency on what's available today versus what's on the roadmap is important. If that feature is a hard requirement for day-one value, it's worth understanding what the timeline looks like and whether the core platform delivers enough value indep","l2":"","l3":""},{"cat":"PRODUCT GAPS","l1":"Core product today is built for closed-end fund structures. Open-ended with unitization and redemptions is on the development roadmap. For firms with a mix, starting with the closed-end portfolio and expanding to open-ended vehicles as the capability","l2":"","l3":""},{"cat":"TRUST / CREDIBILITY","l1":"Client base ranges from $2B to $200B+ AUM across PE, real estate, credit, and venture. Reference calls with firms at similar scale and complexity are available \u2014 and those conversations tend to be more convincing than anything said in a demo.","l2":"","l3":""},{"cat":"TRUST / CREDIBILITY","l1":"Growth companies go through team transitions \u2014 it comes with the territory. What matters is whether the product, implementation process, and support model are consistent regardless of individual personnel. Client relationships are team-based, not ind","l2":"","l3":""},{"cat":"TRUST / CREDIBILITY","l1":"Absolutely. There's a segmented reference list by strategy, fund size, and use case. For [RE/PE/credit/venture] firms with similar complexity, specific references can be arranged. Those conversations tend to be the most productive part of the evaluat","l2":"","l3":""},{"cat":"EXISTING VENDOR LOYALTY","l1":"A dedicated team is an asset. The question is what happens if key people on that team leave \u2014 and whether the work is trapped in their heads or in a system the fund controls. Outsourced teams have the same key person risk as internal teams.","l2":"","l3":""},{"cat":"EXISTING VENDOR LOYALTY","l1":"The platform plays Switzerland. Most admins prefer when the fund owns its own logic because it reduces the admin's calculation liability. Over time, the admin becomes a booking agent \u2014 which is actually what most admins want to be.","l2":"","l3":""},{"cat":"PRICING RESISTANCE","l1":"Understood. The pricing model has tiers \u2014 all funds typically unlocks better economics than starting with one or two. If expanding scope from the start gets pricing to a range that works, would your management be more comfortable with the all-in appr","l2":"","l3":""},{"cat":"PRICING RESISTANCE","l1":"Every client we work with expenses this to the fund as a core book of record solution \u2014 it's covered under the LPA. Worth confirming with your legal team, but the precedent is strong. If the management company only absorbs a fraction of the cost, the","l2":"","l3":""},{"cat":"STAKEHOLDER / INTERNAL ALIGNMENT","l1":"Lead with the hard math \u2014 software cost vs. headcount cost. If those numbers reach parity, present the intangibles as additional considerations that tip the balance. The strongest internal cases are built on balance sheet line items with intangibles ","l2":"","l3":""},{"cat":"EXISTING VENDOR LOYALTY","l1":"Internal systems are optimized for how things worked when they were built. The question is what happens when the fund structure evolves \u2014 new waterfall types, new fee models, evergreen structures. If the team has to hack the system every time somethi","l2":"","l3":""}],"stories":[{"id":"cs-01","label":"Large RE Manager ($5B+)","pain":"3-week quarter-end close reconciling admin numbers","outcome":"Quarter-end close reduced from 3 weeks to days. Controller changed how they think about hiring \u2014 technology instead of h","use_when":["quarter-end pain","admin reconciliation","real estate","scaling operations"],"stage":["M1","M2","M4"]},{"id":"cs-02","la  'not yet' and come back when timing is","use_when":["timing","patience","came back","real estate"],"stage":["M1","M3"]},{"id":"cs-13","label":"PE/credit firm (expanded during impl)","pain":"Started with 3-5 funds. Saw value during implementation.","outcome":"Added funds to contracts while still in implementation. New fund goes into the platform from day one. Expanding within 6","use_when":["expansion","upsell","implementation momentum","phased approach"],"stage":["M9","M10"]},{"id":"cs-14","label":"Multiple clients (admin error pattern)","pain":"Admin sends distribution calcs, system flags variances. Sometimes rounding, sometimes missed side le","outcome":"One client found a six-figure error on a single distribution in the first quarter. Admin isn't liable for the error \u2014 th","use_when":["admin errors","distribution risk","six-figure error","fiduciary responsibility"],"stage":["M1","M2","M4"]},{"id":"cs-15","label":"CFO changed admin dynamic","pain":"After 6 months on platform, admin validation burden eliminated","outcome":"CFO told admin: just book what's in the system. Stopped shadowing in Excel entirely. Admin became a booking agent instea","use_when":["admin relationship change","booking agent model","CFO decision","shadow elimination"],"stage":["M2","M4","M9"]},{"id":"cs-16","label":"Key person risk (15-fund model builder)","pain":"One person maintained all waterfall models for 15 funds. Gave notice.","outcome":"CFO called in a panic. Not an edge case \u2014 happens constantly. Institutional knowledge trapped in someone's head and thei","use_when":["key person risk","resignation","institutional knowledge","panic"],"stage":["M1","M4"]},{"id":"cs-17","label":"PE firm frustrated with portal vendor","pain":"Portal vendor wanted proprietary data access that felt like a data grab","outcome":"Switched approach: performance book of record keeps data with the fund. Data flows out to portal, not the other way arou","use_when":["data ownership","portal frustration","JSQ alternative","data control"],"stage":["M1","M2"]},{"id":"cs-18","label":"Mid-market RE (key person + admin staffing loss)","pain":"Lost two accountants in quick succession. Admin also lost key staff and started missing deadlines.","outcome":"Key person risk hit from both sides \u2014 internal team and admin. Created urgent need for a system that doesn't depend on a","use_when":["key person risk","admin staffing loss","real estate","urgency"],"stage":["M1","M2"]},{"id":"cs-19","label":"Healthcare PE (pricing validation)","pain":"Controller skeptical of pricing until contextualized against operational cost","outcome":"Controller reaction: '$37K a year in expenses to help the data become better \u2014 the pricing is really not that expensive.","use_when":["pricing validation","small firm","healthcare PE","LP expense"],"stage":["M4","M10"]},{"id":"cs-20","label":"$40B+ institutional RE (multi-system complexity)","pain":"Data spread across 5+ systems \u2014 proprietary asset management platform, admin's GL (Investran), admin","outcome":"Discovery revealed the real pain wasn't accuracy \u2014 the dedicated admin team was competent. The pain was data availabilit","use_when":["multi-system complexity","data fragmentation","institutional scale","real estate"],"stage":["M1","M2"]},{"id":"cs-21","label":"Emerging manager ($250M, scaling to larger fund)","pain":"Currently paying outsourced consulting firm $5-6K/month for manual reconciliation. About to raise la","outcome":"Booked demo in under 10 minutes. Prospect was already evaluating admin alternatives (Citco, SS&C, Apex). Platform positi","use_when":["emerging manager","scaling","fundraising","outsourced consulting"],"stage":["M1"]},{"id":"cs-22","label":"Mid-market credit/PE ($1-2B, multiple funds)","pain":"Operations team had identified need for a system but couldn't get management buy-in. Management appr","outcome":"Value creation model built collaboratively in session. VP of Ops mapped $32K direct labor cost per fund, 200 hours per y","use_when":["value creation","champion coaching","management skepticism","pricing negotiation"],"stage":["M4"]},{"id":"cs-23","label":"$90B direct lending manager (internal admin, proprietary system)","pain":"Product team constrained by operational limitations \u2014 couldn't offer certain fee structures to inves","outcome":"Dir of Product wanted to socialize slides with CFO and schedule demo with finance team. Platform positioned as the middl","use_when":["internal admin","proprietary system rigidity","product team constraints","decision latency"],"stage":["M1","M2"]},{"id":"cs-gong-001","label":"$11B manager tracking admin errors to build the case","pain":"","outcome":"","use_when":[],"stage":["m1-advancing","m2-advancing","m4-advance"]},{"id":"cs-gong-002","label":"Slowed hiring at 50-fund shop","pain":"","outcome":"","use_when":[],"stage":["m4-diagnose","m4-advance"]},{"id":"cs-gong-003","label":"Admin fee reduction after validation period","pain":"","outcome":"","use_when":[],"stage":["m4-advance","m5-core"]}],"profiles":{"in_house_operations":{"detect":["mentions running Investran, Allvue, eFront, or custom system in-house","describes team of 4+ on fund ops","says \"we do our own fund accounting\"","no mention of external fund admin"],"skip":["dq-008","dq-010"],"elevate":["dq-014"],"stories":["cs-16","cs-18","cs-06","cs-23"]},"outsourced_admin":{"detect":["names Citco, SS&C, Apex, CSC, Gen II, Standish, or other admin","says \"our admin handles...\" or \"we outsource...\"","small finance team (1-3 people)","describes reconciliation against admin output"],"skip":[],"elevate":["dq-008","dq-010"],"stories":["cs-01","cs-02","cs-14","cs-15","cs-04"]},"hybrid_model":{"detect":["describes split admin model","some funds internal, some outsourced","mentions multiple data sources or GLs","describes reconciliation across systems"],"skip":[],"elevate":["dq-008","dq-014"],"stories":["cs-10","cs-20","cs-09"]}},"recovery":{"never_skip":["dq-001","dq-005","dq-009","dq-012","dq-018","dq-022","dq-019","dq-020","dq-021"],"drop_first":["dq-003","dq-014","dq-011"]},"competitors":{"Carta":{"reframe":"Acknowledge Carta's strength in venture/simple structures. Surface the complexity ceiling.","talk":"Carta is strong for venture-style funds with pro rata structures. When complexity increases \u2014 deal-by-deal waterfalls, catch-ups, clawbacks, side letter variations \u2014 firms have fou","follow":"What are the most complex waterfall structures across your fund family \u2014 and how confident is your t"},"Carta (waterfall claims)":{"reframe":"Shift from feature claims to depth. Rigid templates vs. configurable engine.","talk":"Carta's waterfall approach uses rigid templates that require constant Excel validation. Firms with negotiated side letters, custom fee structures, or multi-tier waterfalls find the","follow":"How many of your investor arrangements have custom terms that wouldn't fit neatly into a standard te"},"Carta (fund admin expansion)":{"reframe":"Carta's admin expansion targets simpler funds. Institutional complexity is a different market.","talk":"Carta is expanding into fund administration, but the target is primarily smaller and simpler fund structures. Institutional-grade complexity \u2014 unique investor terms, multi-strategy","follow":"What's the most complex LPA provision your team has to manage \u2014 and how would you test whether any p"},"Juniper Square":{"reframe":"Complementary, not competitive. JSQ = portal/CRM. Maybern = calc engine.","talk":"Roughly a third of similar clients use both platforms. Juniper Square handles investor communications and the portal. The calculation engine \u2014 waterfalls, management fees, carried ","follow":"Are you using JSQ primarily for the portal and CRM, or are you relying on it for fund-level calculat"},"Juniper Square (data ownership concern)":{"reframe":"Address the data ownership concern directly \u2014 Maybern keeps data with the fund, not the vendor.","talk":"Some firms have concerns about how portal vendors handle their proprietary data. With a performance book of record, the fund owns the data directly \u2014 it's calculated in your system","follow":"How comfortable is your team with how data flows between your current systems \u2014 and who ultimately c"},"Allvue Systems":{"reframe":"GL \u2260 performance book of record. Complementary.","talk":"Allvue is a strong general ledger for partnership accounting. The gap is at the investor level \u2014 waterfalls, carried interest, scenario modeling, LP performance. That's where teams","follow":"When your team needs investor-level waterfall output, where does that calculation happen \u2014 in Allvue"},"Investran":{"reframe":"Everyone with Investran still lives in Excel for calcs. Complementary positioning.","talk":"Investran is widely used for fund-level accounting. The pattern is that even with Investran, investor-level performance \u2014 waterfalls, fees, carry \u2014 still lives in Excel. A performa","follow":"For the calculations outside Investran today \u2014 waterfalls, carry, investor allocations \u2014 where does "},"Investran (data accessibility)":{"reframe":"Validate frustration. Position as the data normalization layer.","talk":"That's a common pattern \u2014 limited API access, difficulty extracting data for analysis. A platform that ingests data from Investran through file exports gives the team accessibility","follow":"If you could query and analyze fund data without going through Investran's native interface, what wo"},"eFront":{"reframe":"GL complement. eFront does accounting, performance layer does the rest.","talk":"eFront is solid for GL and fund accounting \u2014 especially customized instances. Investor-level performance, waterfalls, and scenario modeling typically still live in Excel or custom ","follow":"How customized is your eFront instance \u2014 and what still lives outside of it in Excel?"},"Yardi":{"reframe":"Yardi = property-level accounting. Fun function personalize(t){if(!S.setupDone)return t;let r=t;if(S.gpName)r=r.replace(/your firm/gi,S.gpName).replace(/your organization/gi,S.gpName);if(S.aum)r=r.replace(/\$X AUM/gi,"$"+S.aum+" AUM").replace(/at your size/gi,"at $"+S.aum);if(S.fundCount)r=r.replace(/double that/gi,(parseInt(S.fundCount)*2||"double")+" funds");return r;}

function buildQ(){const cm=B.meetings[S.meeting];if(!cm)return;const all=(cm.stages||[]).flatMap(s=>s.questions||[]);const skip=S.profile?(B.profiles?.[S.profile]?.skip||[]):[];const ns=S.meeting==='M2'?(B.m2_recovery?.never_skip||[]):(B.recovery?.never_skip||[]);const tp=S.timer>1500;const si=({open:0,advancing:1,confirming:2})[S.stage]??0;const rsig=S.rbs.map(r=>r.signal);const ctags=all.filter(q=>S.checked[q.id]).map(q=>q.tag);const comps=[S.comp1,S.comp2,S.comp3].filter(Boolean);const adminComps=["Citco","SS&C","Apex","Gen II"];const threadMap=B.thread_map||{};const lastChecked=Object.keys(S.checked).slice(-1)[0];
S.queue=all.filter(q=>!S.checked[q.id]&&!skip.includes(q.id)).map(q=>{let sc=0;sc+=q.tier===1?100:q.tier===2?50:20;const qi=(cm.stages||[]).findIndex(s=>(s.questions||[]).find(x=>x.id===q.id));if(qi===si)sc+=80;else if(qi===si+1)sc+=30;else if(qi<si)sc-=50;if(tp&&ns.includes(q.id))sc+=200;if(tp&&!ns.includes(q.id))sc-=100;if(q.fire_when?.some(fw=>rsig.some(rs=>rs.includes(fw)||fw.includes(rs))))sc+=60;if(S.partial[q.id]?.vague)sc+=120;if(!ctags.includes(q.tag))sc+=25;if(comps.length&&(q.tag==="Competition"||q.l1?.q?.toLowerCase().includes("looked at")))sc+=40;if(comps.some(c=>adminComps.some(ac=>c.toLowerCase().includes(ac.toLowerCase())))&&q.l1?.q?.toLowerCase().includes("admin"))sc+=40;
if(lastChecked){for(const[thread,qIds]of Object.entries(threadMap)){if(qIds.includes(lastChecked)&&qIds.includes(q.id)){sc+=50;break;}}}
return{...q,score:sc};}).sort((a,b)=>b.score-a.score);}

function processChunk(t){S.lastSpeechTime=S.timer;S.nudgeLevel=0;const lo=t.toLowerCase();S.notes.push({text:t,time:fmt(S.timer)});
const sigs=[];(B.signal_map||[]).forEach(sig=>{sig.phrases.forEach(p=>{if(lo.includes(p)&&!sigs.find(f=>f.signal===sig.signal))sigs.push(sig);});});if(sigs.length)S.rbs=[...sigs.map(s=>({...s,id:++rbC,level:"l1"})),...S.rbs].slice(0,6);
const isV=VAGUE.some(w=>lo.includes(w));const isS=SPEC.test(lo);for(const[phrase,qIds]of Object.entries(AM)){if(lo.includes(phrase)){qIds.forEach(id=>{if(!S.checked[id]){if(isV&&!isS)S.partial[id]={vague:true,answer:t};else{S.checked[id]=true;delete S.partial[id];}}});}}
if(S.expRb!==null){S.rbSpk=(S.rbSpk+" "+t).trim();const rb=S.rbs.find(r=>r.id===S.expRb);if(rb){const d=(B.signal_rebuttals||{})[rb.signal]?.[rb.level];if(d?.text&&mP(S.rbSpk,d.text)>0.4){setTimeout(()=>{const nx=rb.level==="l1"?"l2":rb.level==="l2"?"l3":null;if(nx&&(B.signal_rebuttals||{})[rb.signal]?.[nx]?.text)rb.level=nx;else{S.rbs=S.rbs.filter(r=>r.id!==rb.id);S.expRb=null;}S.rbSpk="";buildQ();render();},1200);}}}
if(S.exp){S.spkAE=(S.spkAE+" "+t).trim();const all=(B.meetings[S.meeting]?.stages||[]).flatMap(s=>s.questions||[]);const q=all.find(x=>x.id===S.exp.qId);if(q){const ld=q[S.exp.level];if(ld?.q&&mP(S.spkAE,ld.q)>0.4){setTimeout(()=>{const nx=S.exp.level==="l1"?"l2":S.exp.level==="l2"?"l3":null;if(nx&&q[nx]?.q)S.exp={qId:S.exp.qId,level:nx};else{S.checked[S.exp.qId]=true;S.exp=null;}S.spkAE="";buildQ();render();},1200);}}}
if(!S.profile){for(const[n,p]of Object.entries(B.profiles||{})){if(p.detect?.some(d=>lo.includes(d.toLowerCase().slice(0,15)))){S.profile=n;break;}}}

if(S.stage==="open"&&(av>=1||cn>=2))S.stage="advancing";if(S.stage==="advancing"&&(cv>=2||cn>=8))S.stage="confirming";
buildQ();render();}

function initSp(){const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR)return;rec=new SR();rec.continuous=true;rec.interimResults=true;rec.lang="en-US";rec.onresult=e=>{let i="",f="";for(let x=e.resultIndex;x<e.results.length;x++){const t=e.results[x][0].transcript;if(e.results[x].isFinal)f+=t+" ";else i=t;}S.transcript=i;if(f.trim())processChunk(f.trim());else render();};rec.onerror=()=>{};rec.onend=()=>{if(S.isListening)try{rec.start();}catch(e){}};}

function fmt(s){return Math.floor(s/60)+":"+(s%60).toString().padStart(2,"0");}
function gH(sp,tx){const sw=sp.toLowerCase().replace(/[^a-z0-9\s]/g,"").split(/\s+/).filter(Boolean);const tw=tx.split(/\s+/);let l=-1;for(const s of sw){for(let i=l+1;i<tw.length;i++){const t=tw[i].toLowerCase().replace(/[^a-z0-9]/g,"");if(t.length>2&&s.length>2&&(t.startsWith(s.slice(0,3))||s.startsWith(t.slice(0,3)))){l=i;break;}}}return l;}
function mP(sp,tx){const tw=tx.toLowerCase().replace(/[^a-z0-9\s]/g,"").split(/\s+/).filter(Boolean);return tw.length?(gH(sp,tx)+1)/tw.length:0;}
function kH(tx,sp){if(!sp||!tx)return`<span style="color:#ccc">${tx||""}</span>`;const w=tx.split(/\s+/);const idx=gH(sp,tx);return w.map((v,i)=>`<span style="color:${i<=idx?"#FEFCE8":"#6B5B3A"};font-weight:${i<=idx?600:400};transition:all 0.12s">${v} </span>`).join("");}

function render(){

  }

  // QUESTIONS (green)

    top.forEach((q,qi)=>{const isE=S.exp?.qId===q.id;const lvl=isE?S.exp.level:"l1";const ld=q[lvl];const isFirst=qi===0;const dimmed=tp&&!ns.includes(q.id)&&qi>3;const qText=personalize(q.l1?.q||"");
      h+=`<div style="margin-top:2px;opacity:${dimmed?0.25:1}"><div class="q-card" style="display:flex;align-items:flex-start;gap:8px;padding:${isFirst?"10px 6px":"8px 6px"};border-left:3px solid #4ADE80;border-radius:0 6px 6px 0;background:${isE?"#0a1f14":"transparent"}" onclick="xQ('${q.id}','l1')">`;

        h+=`<div style="background:#060d09;border-radius:8px;padding:10px 12px;border:1px solid #1a3a28"><p class="q-text" style="font-size:13px;margin:0;line-height:1.55">${kH(ldText,S.spkAE)}</p></div>`;
        if(q.note)h+=`<p style="color:#2a5a3a;font-size:9px;margin:5px 0 0;font-style:italic">${q.note}</p>`;
        h+=`<div style="display:flex;gap:5px;margin-top:6px">`;
        if(lvl!=="l3")h+=`<button onclick="xQ('${q.id}','${lvl==="l1"?"l2":"l3"}')" style="background:#1a3a28;border:none;border-radius:5px;padding:4px 11px;color:#4ADE80;font-size:10px;font-weight:700;cursor:pointer">DEEPER →</button>`;
        h+=`<button onclick="ckQ('${q.id}')" style="background:#111;border:1px solid #222;border-radius:5px;padding:4px 11px;color:#555;font-size:10px;font-weight:600;cursor:pointer">DONE ✓</button></div></div>`;
      }

    });

  // Covered
  const ckd=all.filter(q=>S.checked[q.id]);
  if(ckd.length){h+=`<div style="margin-top:16px;padding:3px 0;border-bottom:1px solid #0d0d0d"><span style="color:#151515;font-size:8px;font-weight:700;letter-spacing:0.1em">COVERED (${ckd.length})</span></div>`;
    ckd.forEach(q=>{h+=`<div onclick="unCk('${q.id}')" style="padding:4px 5px;opacity:0.15;cursor:pointer;border-left:2px solid #111;margin-top:1px"><p style="color:#333;font-size:10px;text-decoration:line-through;margin:0">${q.l1?.q||""}</p></div>`;});
  }
  h+=`</div>`;

  // Bottom bar
  if(S.isLive){
    h+=`<div style="flex-shrink:0;background:#0d0d0d;border-top:1px solid #1a3a28;padding:6px 12px;display:flex;align-items:center;gap:8px">`;
    h+=`<div style="width:8px;height:8px;border-radius:50%;background:#4ADE80"></div>`;
    h+=`<span style="color:#3a5a48;font-size:10px;font-weight:600">IVY LISTENING</span>`;
    h+=`<div style="flex:1"></div>`;

    h+=`</div>`;

  document.getElementById("app").innerHTML=h;
}
