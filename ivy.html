// ─── EXPORT ─────────────────────────────────────────────
window.exportSummary=function(){
  const cm=B.meetings[S.meeting]||{stages:[]};const all=(cm.stages||[]).flatMap(s=>s.questions||[]);
  const asked=all.filter(q=>S.checked[q.id]);const skippedMust=all.filter(q=>q.tier===1&&!S.checked[q.id]);
  const TAG={Pain:0,Metrics:0,EB:0,Champion:0,Competition:0,Process:0,Criteria:0};
  asked.forEach(q=>{if(TAG[q.tag]!==undefined)TAG[q.tag]++;});
  let md="# IVY — Post-Call Summary\n\n";
  md+="**Date:** "+new Date().toLocaleDateString()+"\n";
  md+="**Duration:** "+fmt(S.timer)+"\n";
  if(S.gpName)md+="**GP:** "+S.gpName+"\n";
  if(S.aum)md+="**AUM:** $"+S.aum+"\n";
  md+="**Meeting:** "+S.meeting+" | Stage: "+S.stage+"\n";
  if(S.profile)md+="**Buyer Profile:** "+S.profile.replace(/_/g," ")+"\n";
  md+="\n## Questions Covered ("+asked.length+"/"+all.length+")\n";
  asked.forEach(q=>{md+="- ✅ "+q.l1.q+"\n";});
  if(skippedMust.length){md+="\n## Must-Ask Gaps ("+skippedMust.length+")\n";skippedMust.forEach(q=>{md+="- ❌ "+q.l1.q+"\n";});}
  md+="\n## MEDDPICC\n";Object.entries(TAG).forEach(([t,c])=>{md+="- "+t+": "+c+"\n";});
  if(S.rbs.length){md+="\n## Signals\n";S.rbs.forEach(r=>{md+="- "+r.label+"\n";});}
  if(S.notes.length){md+="\n## Notes\n";S.notes.forEach(n=>{md+="- ["+n.time+"] "+n.text+"\n";});}
  const blob=new Blob([md],{type:"text/markdown"});const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download="ivy-"+( S.gpName||"call").replace(/\s/g,"-").toLowerCase()+"-"+new Date().toISOString().slice(0,10)+".md";a.click();URL.revokeObjectURL(url);
};

// ─── ACTIONS ────────────────────────────────────────────
window.clearSession=function(){try{["ivy_gp","ivy_aum","ivy_fc","ivy_c1","ivy_c2","ivy_c3"].forEach(k=>localStorage.removeItem(k));}catch(e){}S.gpName="";S.aum="";S.fundCount="";S.comp1="";S.comp2="";S.comp3="";render();};
window.pickComp=function(c){const comps=[S.comp1,S.comp2,S.comp3];const idx=comps.indexOf(c);if(idx>=0){if(idx===0)S.comp1="";else if(idx===1)S.comp2="";else S.comp3="";}else{if(!S.comp1)S.comp1=c;else if(!S.comp2)S.comp2=c;else if(!S.comp3)S.comp3=c;}render();};
window.startCall=function(){try{localStorage.setItem('ivy_gp',S.gpName);localStorage.setItem('ivy_aum',S.aum);localStorage.setItem('ivy_fc',S.fundCount);localStorage.setItem('ivy_c1',S.comp1);localStorage.setItem('ivy_c2',S.comp2);localStorage.setItem('ivy_c3',S.comp3);}catch(e){}
  S.setupDone=true;const comps=[S.comp1,S.comp2,S.comp3].filter(Boolean).join(" ").toLowerCase();if(comps.includes("investran")||comps.includes("allvue")||comps.includes("efront"))S.profile="in_house_operations";else if(comps.includes("citco")||comps.includes("ss&c")||comps.includes("apex"))S.profile="outsourced_admin";buildQ();render();};
window.goLive=function(){if(!S.isLive){S.isLive=true;S.isListening=true;S.lastSpeechTime=S.timer;if(rec)try{rec.start();}catch(e){}tiv=setInterval(()=>{S.timer++;render();},1000);buildQ();}else{S.isLive=false;S.isListening=false;if(rec)try{rec.stop();}catch(e){}if(tiv)clearInterval(tiv);}render();};
window.toggleExpand=function(){S.expanded_mode=!S.expanded_mode;document.getElementById("shell").classList.toggle("expanded",S.expanded_mode);render();};
window.setM=function(m){S.meeting=m;S.stage="open";S.exp=null;S.spkAE="";buildQ();render();};
window.setS=function(s){S.stage=s;buildQ();render();};
window.xQ=function(id,l){if(S.exp?.qId===id&&S.exp?.level===l){S.exp=null;S.spkAE="";}else{S.exp={qId:id,level:l};S.spkAE="";}render();};
window.ckQ=function(id){S.checked[id]=true;delete S.partial[id];S.exp=null;S.spkAE="";buildQ();render();};
window.unCk=function(id){delete S.checked[id];buildQ();render();};
window.xRb=function(id){S.expRb=S.expRb===id?null:id;S.rbSpk="";render();};
window.advRb=function(id){const rb=S.rbs.find(r=>r.id===id);if(!rb)return;rb.level=rb.level==="l1"?"l2":rb.level==="l2"?"l3":rb.level;S.rbSpk="";render();};
window.dRb=function(id){S.rbs=S.rbs.filter(r=>r.id!==id);if(S.expRb===id){S.expRb=null;S.rbSpk="";}render();};

// ─── INIT ───────────────────────────────────────────────
try{const gp=localStorage.getItem('ivy_gp');if(gp)S.gpName=gp;const aum=localStorage.getItem('ivy_aum');if(aum)S.aum=aum;const fc=localStorage.getItem('ivy_fc');if(fc)S.fundCount=fc;const c1=localStorage.getItem('ivy_c1');if(c1)S.comp1=c1;const c2=localStorage.getItem('ivy_c2');if(c2)S.comp2=c2;const c3=localStorage.getItem('ivy_c3');if(c3)S.comp3=c3;}catch(e){}
initSp();
if(document.getElementById("app").style.display!=="none") render();
</script>
</body>
</html>
