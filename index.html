function b64ToBytes(b64){
  const bin=atob(b64);
  const bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  return bytes;
}

async function deriveKey(password){
  const enc=new TextEncoder();
  const keyMaterial=await crypto.subtle.importKey("raw",enc.encode(password),"PBKDF2",false,["deriveBits","deriveKey"]);
  return crypto.subtle.deriveKey(
    {name:"PBKDF2",salt:b64ToBytes(SALT),iterations:100000,hash:"SHA-256"},
    keyMaterial,
    {name:"AES-GCM",length:256},
    false,
    ["decrypt"]
  );
}

  const errEl=document.getElementById("err");

      {name:"AES-GCM",iv:b64ToBytes(IV)},
      key,
      b64ToBytes(CT)
    );

    `;
    const styleEnd=payload.indexOf('</style>')+8;
    const styleBlock=payload.substring(0,styleEnd);
    const rest=payload.substring(styleEnd);
    const bodyStart=rest.indexOf('<body>');
    const scriptStart=rest.indexOf('<script>');
    const bodyContent=bodyStart>=0?rest.substring(bodyStart+6,scriptStart):rest.substring(0,scriptStart);
    const scriptContent=rest.substring(scriptStart);
    const styleEl=document.createElement('div');
    styleEl.innerHTML=styleBlock;
    if(styleEl.querySelector('style')) document.head.appendChild(styleEl.querySelector('style'));
    document.body.innerHTML=bodyContent;
    document.body.style="";
    const scriptText=scriptContent.replace(/<\/?script>/g,'');
    const s=document.createElement('script');
    s.textContent=scriptText;
    document.body.appendChild(s);
  } catch(e){
    errEl.textContent="Incorrect password";
    document.getElementById("pw").value="";
    document.getElementById("pw").focus();
    setTimeout(()=>{errEl.textContent="";},2500);
  }
}
</script>
</body>
</html>
