ses us at the end."}, "l2": {"text": "Walk me through how decisions like this have been made at your firm in the past — what worked and what slowed things down?"}, "l3": {"text": "Can we build a joint timeline right now — even a rough one — so both sides know what to expect?"}}, "implementation_anxiety": {"l1": {"text": "Fair concern — bad implementations are painful and they leave scars. Here's how ours works: our implementation team reports to the CTO, not to sales. We map your operating model, configure from your actual files, validate against numbers you already know, and run in parallel for at least one full quarter before anything changes. Your team's role is validation, not configuration."}, "l2": {"text": "What's been your worst implementation experience — and what specifically went wrong?"}, "l3": {"text": "What would need to be true about our process for you to feel comfortable? I'd rather address that now than have it become a blocker later."}}}, "signal_map": [{"phrases": ["we're fine", "working for us", "not broken", "works well", "no issues", "it works", "process works", "happy with"], "signal": "status_quo_confidence", "label": "STATUS QUO", "color": "#FFB820"}, {"phrases": ["we manage", "things are working", "been doing it this way", "haven't had problems"], "signal": "status_quo_defense", "label": "STATUS QUO", "color": "#FFD020"}, {"phrases": ["no urgency", "not a priority", "not the right time", "too busy", "maybe next quarter", "not now"], "signal": "no_urgency", "label": "NO URGENCY", "color": "#FF9030"}, {"phrases": ["too expensive", "that's a lot", "can't afford", "over budget", "sticker shock", "how much does it cost", "what's the price", "price point"], "signal": "pricing_sensitivity", "label": "PRICING", "color": "#FF5555"}, {"phrases": ["basis points", "why bps", "flat fee", "per user", "per fund pricing", "why not flat"], "signal": "pricing_sensitivity", "label": "BPS MODEL", "color": "#FF5555"}, {"phrases": ["cheaper", "discount", "come down", "best price", "sharpen the pencil", "flexibility on price", "can you do better"], "signal": "pricing_sensitivity", "label": "NEGOTIATE", "color": "#FF5555"}, {"phrases": ["roi", "return on investment", "payback", "justify the cost", "business case"], "signal": "pricing_sensitivity", "label": "ROI", "color": "#FF5555"}, {"phrases": ["fund expense", "who pays", "lpa", "pass through", "management company cost", "gp should pay"], "signal": "pricing_sensitivity", "label": "FUND EXPENSE", "color": "#FF5555"}, {"phrases": ["allvue", "all vue"], "signal": "allvue_mentioned", "label": "vs ALLVUE", "color": "#FF6EB4"}, {"phrases": ["carta"], "signal": "carta_mentioned", "label": "vs CARTA", "color": "#FF6EB4"}, {"phrases": ["investran"], "signal": "investran_mentioned", "label": "vs INVESTRAN", "color": "#FF6EB4"}, {"phrases": ["efront", "e-front"], "signal": "efront_mentioned", "label": "vs EFRONT", "color": "#FF6EB4"}, {"phrases": ["juniper square", "juniper"], "signal": "competitor_mentioned", "label": "vs JUNIPER", "color": "#FF6EB4"}, {"phrases": ["chronograph"], "signal": "competitor_mentioned", "label": "vs CHRONOGRAPH", "color": "#FF6EB4"}, {"phrases": ["arcesium"], "signal": "competitor_mentioned", "label": "vs ARCESIUM", "color": "#FF6EB4"}, {"phrases": ["anaplan"], "signal": "build_vs_buy_cost", "label": "vs ANAPLAN", "color": "#A478FF"}, {"phrases": ["build it ourselves", "build internally", "internal tool", "built our own", "custom system"], "signal": "build_vs_buy_cost", "label": "BUILD vs BUY", "color": "#A478FF"}, {"phrases": ["excel works", "spreadsheet is fine", "our models work", "works in excel", "built the model"], "signal": "excel_dependency", "label": "EXCEL", "color": "#20D6C4"}, {"phrases": ["manual process", "manually", "reconcile by hand", "re-key", "copy paste"], "signal": "manual_process", "label": "MANUAL", "color": "#20D6E8"}, {"phrases": ["only one person", "only person who knows", "if they leave", "key person", "tribal knowledge", "in their head"], "signal": "key_person_risk", "label": "KEY PERSON", "color": "#FF5577"}, {"phrases": ["audit", "auditor", "sox", "compliance", "traceability", "defensible"], "signal": "audit_risk", "label": "AUDIT", "color": "#BE6FFF"}, {"phrases": ["new fund", "fund raise", "launching", "next fund", "scaling", "growing"], "signal": "fund_growth", "label": "GROWTH", "color": "#00FFCC"}, {"phrases": ["fragile", "breaks", "workaround", "duct tape", "held together", "clunky"], "signal": "workflow_fragility", "label": "FRAGILE", "color": "#F0A020"}, {"phrases": ["by the time we see it", "we don't really touch that", "that's on their side", "we trust them to get it right", "they've been doing it for years", "we wouldn't know how to do it ourselves", "if they disappeared tomorrow", "we're pretty removed from that process", "it just shows up", "fund administrator", "administrator", "our admin"], "signal": "ownership_unclear", "label": "ADMIN_DEPENDENCY", "color": "#90A0B4"}, {"phrases": ["that's a good question — i'm not sure", "i'd have to ask around", "a few people would need to weigh in", "it's not really anyone's job specifically", "whoever has bandwidth", "it depends on the week", "we rotate that responsibility", "it kind of falls between teams", "don't know who owns", "unclear who owns", "nobody owns", "no clear owner"], "signal": "ownership_unclear", "label": "OWNERSHIP_UNCLEAR", "color": "#90A0B4"}, {"phrases": ["we thought we could do it ourselves", "it seemed simpler to just build it", "we didn't think anything existed", "our cto wanted to keep it in-house", "the team preferred to own the code", "we wanted full control", "it started as a side project", "it was supposed to be temporary", "built something", "built internally", "built a tool", "built a system"], "signal": "internal_build", "label": "INTERNAL_BUILD", "color": "#90A0B4"}, {"phrases": ["i'd need to run it by", "let me check with", "i'm not the one who", "that would ultimately be", "my boss would need to", "the partners would have to", "we'd need buy-in from", "chief financial officer", "finance chief", "head of finance", "finance lead", "chief operating officer"], "signal": "economic_buyer_missing", "label": "EB ACCESS", "color": "#A478FF"}, {"phrases": ["what does this cost", "how much are we talking", "is there a way to reduce", "can you sharpen the pencil", "the number seems high", "i need to justify this", "hard to get that approved", "price", "cost", "fees", "rate", "subscription"], "signal": "pricing_discussion", "label": "PRICING", "color": "#FF5555"}, {"phrases": ["we're also looking at", "how do you compare to", "what makes you different from", "we built something for this", "our team already handles this", "we have a process for that", "why wouldn't we just", "looking at other vendors", "other options", "other solutions", "competitive evaluation", "vendor selection"], "signal": "vendor_comparison", "label": "COMPETITOR", "color": "#FF6EB4"}, {"phrases": ["we'll look at this after", "maybe in the fall", "not in this budget cycle", "we need to get through", "timing isn't great", "too many priorities right now", "we're heads down on", "q-end", "quarter close", "end of quarter", "quarterly close", "quarter-end crunch"], "signal": "timeline_delay", "label": "TIMING", "color": "#FF9030"}, {"phrases": ["there are a few people who", "it's not just my decision", "we need alignment across", "our process involves", "there are multiple steps", "everyone has to weigh in", "we need to get everyone on the same page", "steering committee", "evaluation committee", "buying committee", "approval committee", "review board"], "signal": "decision_process_unclear", "label": "COMMITTEE", "color": "#7B80FF"}, {"phrases": ["how long does this take", "who on our side needs to be involved", "what's the implementation look like", "i've been through bad implementations", "our team is already maxed out", "we can't take on another project right now", "onboarding", "deployment", "rollout", "go-live", "migration"], "signal": "implementation_anxiety", "label": "CHANGE", "color": "#FFB820"}], "objections": [{"cat": "PRICING RESISTANCE", "l1": "It's typically the most expensive software clients have bought. The question is whether anything else provides this much value. Most firms pass it through as an LP expense — if it's a core book of record solution, it's covered in the LPA. The net cos", "l2": "", "l3": ""}, {"cat": "PRICING RESISTANCE", "l1": "The pricing model mirrors how public market infrastructure is priced — Clearwater, Aladdin, Bloomberg PORT all use basis points. As NAV goes down, the fee goes down. The bet is that firms raise more funds and grow AUM over time — the price aligns wit", "l2": "", "l3": ""}, {"cat": "PRICING RESISTANCE", "l1": "The admin handles bookkeeping. The question is what it costs to check the admin in Excel — person-hours, key person risk, error exposure. Most firms find the validation burden alone justifies the platform, and the cost passes through to the fund.", "l2": "", "l3": ""}, {"cat": "PRICING RESISTANCE", "l1": "Point solutions cover the easy 30%. The hard part — complex waterfalls, side letter compliance, cross-fund performance, admin reconciliation — is where the value concentrates. A data warehouse with AI modules doesn't handle LPA-compliant calculations", "l2": "", "l3": ""}, {"cat": "PRICING RESISTANCE", "l1": "That math works in our favor for most firms. Translate the hours spent on waterfall validation, quarter-end reconciliation, and distribution prep into fully-loaded headcount cost. Add the cost of a single error on a distribution — typically five to s", "l2": "", "l3": ""}, {"cat": "PRICING RESISTANCE", "l1": "At the current AUM, the pricing may feel like a stretch. The model is designed so that as AUM grows — through fund raises and appreciation — the cost stays proportional. Some firms start with a subset of funds to prove value before expanding. There a", "l2": "", "l3": ""}, {"cat": "PRICING RESISTANCE", "l1": "Three buckets: efficiency gains from eliminating manual reconciliation and quarter-end crunch (quantifiable in person-hours), key person risk reduction (what would it cost if your lead fund accountant left tomorrow?), and distribution timing improvem", "l2": "", "l3": ""}, {"cat": "EXISTING VENDOR LOYALTY", "l1": "A strong admin relationship is valuable. The question isn't whether the admin is doing their job — it's who checks them. Most firms build parallel Excel workbooks to validate admin output. That's the redundant work a system of record eliminates. The ", "l2": "", "l3": ""}, {"cat": "EXISTING VENDOR LOYALTY", "l1": "A performance book of record complements the admin rather than replacing them. The admin keeps booking transactions and producing statements. The fund gets an independent calculation layer that validates output and catches discrepancies before they r", "l2": "", "l3": ""}, {"cat": "EXISTING VENDOR LOYALTY", "l1": "The admin's GL is designed for bookkeeping — journal entries, trial balances, financial statements. Investor-level performance — waterfalls, management fees, carried interest, scenario modeling — lives outside the GL in Excel. That's the layer a perf", "l2": "", "l3": ""}, {"cat": "EXISTING VENDOR LOYALTY", "l1": "If the new system is a GL, portal, or CRM, a performance book of record is the missing layer that completes the stack — not another competing system. Data flows between them. The timing might actually be ideal: while the team is in a systems-improvem", "l2": "", "l3": ""}, {"cat": "LACK OF URGENCY", "l1": "Understood. One question worth considering: is there a fund raise, an audit, or a key hire transition coming up? Those are the moments when the current process gets stress-tested. Most firms wish they'd started a quarter earlier.", "l2": "", "l3": ""}, {"cat": "LACK OF URGENCY", "l1": "That makes sense — audit season and fundraising stretch every team. The implementation process is designed to run in parallel without disrupting current workflows. The team that's busiest right now is the one that benefits most from getting this off ", "l2": "", "l3": ""}, {"cat": "LACK OF URGENCY", "l1": "The best implementation window is between fund closes — clean data, team has bandwidth. If a new fund is in the pipeline, starting now means it goes live from day one with no retroactive conversion. Waiting until after the close means converting hist", "l2": "", "l3": ""}, {"cat": "LACK OF URGENCY", "l1": "Most firms say that until something breaks — a key person leaves, an LP challenges a number, fund count doubles. The question isn't whether it works today. It's whether it's defensible, scalable, and not dependent on one person. If the answer to any ", "l2": "", "l3": ""}, {"cat": "LACK OF URGENCY", "l1": "AI is accelerating — but it accelerates what's already structured. If fund data is in 15 Excel files, AI can't make sense of it. The firms investing in a structured data layer now are the ones positioned to benefit most from AI capabilities next year", "l2": "", "l3": ""}, {"cat": "EVALUATION FATIGUE", "l1": "If prior evaluations didn't land, it's worth understanding why. Was it product fit, timing, or internal alignment? The firms that move forward fastest are the ones that test with their actual data — not generic demos. A tailored demo with real fund s", "l2": "", "l3": ""}, {"cat": "EVALUATION FATIGUE", "l1": "A standard demo shows the platform's capabilities — but it doesn't reflect any specific firm's fund structures, investor terms, or fee schedules. The tailored demo, built from actual files, is where fit becomes clear. If the standard demo didn't reso", "l2": "", "l3": ""}, {"cat": "EVALUATION FATIGUE", "l1": "That makes sense for a decision this important. To make the evaluation productive, it helps to define evaluation criteria upfront — what does a winning solution need to do? Then each vendor can demonstrate against the same rubric with real data. That", "l2": "", "l3": ""}, {"cat": "SECURITY / DATA CONCERNS", "l1": "Data ownership stays with the client — it's structured, exportable, and not locked into proprietary formats. Any acquisition scenario would preserve client access. That said, the risk of data being trapped is actually higher in the current state — wh", "l2": "", "l3": ""}, {"cat": "SECURITY / DATA CONCERNS", "l1": "That concern is increasing across the industry as AI scrutiny rises. The platform is designed so the fund owns the data directly — it's calculated in the system and pushed out wherever needed. No training on client data, no sharing with third parties", "l2": "", "l3": ""}, {"cat": "SECURITY / DATA CONCERNS", "l1": "SOC 2 Type II certified. There's a standard DDQ package that can be sent over — most firms include it in the coordination meeting workflow so security review happens in parallel with the evaluation, not sequentially after it.", "l2": "", "l3": ""}, {"cat": "INTEGRATION COMPLEXITY", "l1": "Integration is file-based, not API-dependent. Data comes in from the GL — Investran, Allvue, Yardi, eFront, QuickBooks — through standardized file exports. Not a deep technical integration that requires IT involvement. Most implementations handle dat", "l2": "", "l3": ""}, {"cat": "INTEGRATION COMPLEXITY", "l1": "That's a common pattern with older platforms. If the system can produce any kind of export — CSV, Excel, PDF — the implementation team can work with it. The harder the data extraction is from the current system, the stronger the case for having an in", "l2": "", "l3": ""}, {"cat": "INTEGRATION COMPLEXITY", "l1": "The goal is one system of record for fund performance. Data flows in from Yardi automatically — no duplicate entry. Over time, the team references the performance platform directly instead of going back to Yardi for fund-level questions. It's additiv", "l2": "", "l3": ""}, {"cat": "INTERNAL BUILD PREFERENCE", "l1": "Internal builds can work with the right engineering resources. The question is opportunity cost — purpose-built platforms represent years of R&D across hundreds of fund structures. That's hard to replicate and harder to maintain. Most firms find engi", "l2": "", "l3": ""}, {"cat": "INTERNAL BUILD PREFERENCE", "l1": "Custom solutions built in-house represent real investment. The ongoing challenge is maintenance — each new fund vintage, side letter, or LPA provision requires someone to update the logic. Firms that have gone through that cycle find the maintenance ", "l2": "", "l3": ""}, {"cat": "INTERNAL BUILD PREFERENCE", "l1": "That works until that engineer leaves or gets pulled into something else. If the fund's waterfall logic lives in one person's code, that's key person risk in a different form. A commercial platform means the calculation engine is maintained by a dedi", "l2": "", "l3": ""}, {"cat": "RESOURCE CONSTRAINTS", "l1": "The implementation model is designed to minimize client-side bandwidth — the implementation team handles 90-95% of the configuration work. The client's role is primarily validation: confirming that output matches what they already know to be true. It", "l2": "", "l3": ""}, {"cat": "RESOURCE CONSTRAINTS", "l1": "That's actually a common starting point. Firms that implement before the hire find it easier to recruit — candidates see a modern platform instead of a pile of Excel files. The system also becomes the onboarding tool: new hires learn the fund structu", "l2": "", "l3": ""}, {"cat": "RESOURCE CONSTRAINTS", "l1": "That's exactly the pressure a platform addresses. Technology absorbs the incremental complexity from new funds and investors — without adding bodies. The question is whether the team can handle double the fund count in 18 months with the same headcou", "l2": "", "l3": ""}, {"cat": "RESOURCE CONSTRAINTS", "l1": "The platform is configured to match how the team already works — same fund structures, same fee schedules, same waterfall logic. It's not a new process; it's the existing process in a system instead of spreadsheets. Most teams report the learning cur", "l2": "", "l3": ""}, {"cat": "IMPLEMENTATION ANXIETY", "l1": "So have we — that's why the implementation team reports to the CTO, not to sales. The process is structured: map the operating model, configure from existing files, validate against known good numbers, run in parallel until the team is confident. No ", "l2": "", "l3": ""}, {"cat": "IMPLEMENTATION ANXIETY", "l1": "Typical 3-5 fund client is live in about 4 months. 40+ funds — closer to 12 months. The team runs in parallel for at least one full quarter to validate. AI tooling is accelerating the process — LPA parsing, chart of accounts mapping, historical recon", "l2": "", "l3": ""}, {"cat": "IMPLEMENTATION ANXIETY", "l1": "Understood — most firms don't want to add anything during their busiest period. Discovery and scoping can happen now while the team is heads-down. Implementation kicks off after the audit closes, and the system is ready for the next cycle. That way t", "l2": "", "l3": ""}, {"cat": "IMPLEMENTATION ANXIETY", "l1": "One person who knows the fund structures well — usually the controller or lead fund accountant. They validate output against what they already know. The implementation team handles configuration, data loading, and formula mapping. It's not a 'bring y", "l2": "", "l3": ""}, {"cat": "CALCULATION ACCURACY / TRUST", "l1": "That's exactly the right question. The validation process is designed for it: the team's existing Excel output becomes the test. Configure the system, run the same calculations, compare side by side. If numbers don't match, it's either a configuratio", "l2": "", "l3": ""}, {"cat": "CALCULATION ACCURACY / TRUST", "l1": "Calculations are deterministic — no AI approximation, no rounding shortcuts. Every output is traceable: click any number and see the formula, the inputs, and every intermediate step. Auditors are increasingly asking for this level of traceability. If", "l2": "", "l3": ""}, {"cat": "CHANGE MANAGEMENT", "l1": "That's the hardest part — and it's why the platform runs in parallel first. The team keeps doing what they do in Excel while the system produces the same output independently. Over time, when the numbers consistently match, confidence builds. Some te", "l2": "", "l3": ""}, {"cat": "CHANGE MANAGEMENT", "l1": "That's the failure pattern with tools that require external consultants to configure and maintain. A purpose-built platform doesn't need a consulting layer — the concepts are native. And the implementation team stays engaged through the first live qu", "l2": "", "l3": ""}, {"cat": "STAKEHOLDER / INTERNAL ALIGNMENT", "l1": "That's the right process. To make that conversation productive, it helps to have specific numbers — hours spent on quarter-end, cost of the validation process, key person risk exposure. A business case with hard ROI makes the internal conversation ea", "l2": "", "l3": ""}, {"cat": "STAKEHOLDER / INTERNAL ALIGNMENT", "l1": "That's common with platform decisions that touch finance, operations, and technology. The coordination meeting is designed for exactly this — bring the stakeholders together, agree on evaluation scope and criteria, and make sure everyone is looking a", "l2": "", "l3": ""}, {"cat": "STAKEHOLDER / INTERNAL ALIGNMENT", "l1": "The more we know about that process upfront, the better we can plan around it. Running security review, legal, and procurement in parallel with the technical evaluation — rather than sequentially after it — can compress the timeline significantly. Th", "l2": "", "l3": ""}, {"cat": "PRODUCT GAPS", "l1": "Transparency on what's available today versus what's on the roadmap is important. If that feature is a hard requirement for day-one value, it's worth understanding what the timeline looks like and whether the core platform delivers enough value indep", "l2": "", "l3": ""}, {"cat": "PRODUCT GAPS", "l1": "Core product today is built for closed-end fund structures. Open-ended with unitization and redemptions is on the development roadmap. For firms with a mix, starting with the closed-end portfolio and expanding to open-ended vehicles as the capability", "l2": "", "l3": ""}, {"cat": "TRUST / CREDIBILITY", "l1": "Client base ranges from $2B to $200B+ AUM across PE, real estate, credit, and venture. Reference calls with firms at similar scale and complexity are available — and those conversations tend to be more convincing than anything said in a demo.", "l2": "", "l3": ""}, {"cat": "TRUST / CREDIBILITY", "l1": "Growth companies go through team transitions — it comes with the territory. What matters is whether the product, implementation process, and support model are consistent regardless of individual personnel. Client relationships are team-based, not ind", "l2": "", "l3": ""}, {"cat": "TRUST / CREDIBILITY", "l1": "Absolutely. There's a segmented reference list by strategy, fund size, and use case. For [RE/PE/credit/venture] firms with similar complexity, specific references can be arranged. Those conversations tend to be the most productive part of the evaluat", "l2": "", "l3": ""}, {"cat": "EXISTING VENDOR LOYALTY", "l1": "A dedicated team is an asset. The question is what happens if key people on that team leave — and whether the work is trapped in their heads or in a system the fund controls. Outsourced teams have the same key person risk as internal teams.", "l2": "", "l3": ""}, {"cat": "EXISTING VENDOR LOYALTY", "l1": "The platform plays Switzerland. Most admins prefer when the fund owns its own logic because it reduces the admin's calculation liability. Over time, the admin becomes a booking agent — which is actually what most admins want to be.", "l2": "", "l3": ""}, {"cat": "PRICING RESISTANCE", "l1": "Understood. The pricing model has tiers — all funds typically unlocks better economics than starting with one or two. If expanding scope from the start gets pricing to a range that works, would your management be more comfortable with the all-in appr", "l2": "", "l3": ""}, {"cat": "PRICING RESISTANCE", "l1": "Every client we work with expenses this to the fund as a core book of record solution — it's covered under the LPA. Worth confirming with your legal team, but the precedent is strong. If the management company only absorbs a fraction of the cost, the", "l2": "", "l3": ""}, {"cat": "STAKEHOLDER / INTERNAL ALIGNMENT", "l1": "Lead with the hard math — software cost vs. headcount cost. If those numbers reach parity, present the intangibles as additional considerations that tip the balance. The strongest internal cases are built on balance sheet line items with intangibles ", "l2": "", "l3": ""}, {"cat": "EXISTING VENDOR LOYALTY", "l1": "Internal systems are optimized for how things worked when they were built. The question is what happens when the fund structure evolves — new waterfall types, new fee models, evergreen structures. If the team has to hack the system every time somethi", "l2": "", "l3": ""}], "stories": [{"id": "cs-01", "label": "Large RE Manager ($5B+)", "pain": "3-week quarter-end close reconciling admin numbers", "outcome": "Quarter-end close reduced from 3 weeks to days. Controller changed how they think about hiring — technology instead of h", "use_when": ["quarter-end pain", "admin reconciliation", "real estate", "scaling operations"], "stage": ["M1", "M2", "M4"]}, {"id": "cs-02", "label": "Mid-market PE (multiple vintages)", "pain": "Admin getting waterfall calculations wrong on complex pref structures", "outcome": "Implemented as the independent checker. Caught multiple errors in the first quarter. Admin now books what the system cal", "use_when": ["admin errors", "waterfall accuracy", "maker-checker", "PE complexity"], "stage": ["M1", "M2", "M5"]}, {"id": "cs-03", "label": "Mid-market PE, San Francisco", "pain": "Needed fund infrastructure as a strategic advantage", "outcome": "5 funds live. Team spent 2 days doing hands-on configuration. Now adding new vehicles quarterly. Views infrastructure as", "use_when": ["strategic advantage", "fund expansion", "co-invest vehicles", "PE mid-market"], "stage": ["M2", "M4", "M9"]}, {"id": "cs-04", "label": "Mid-market PE (auditor angle)", "pain": "Auditor switch (Deloitte → KPMG) created need for better traceability", "outcome": "CAO asked about giving KPMG read-only platform access instead of separate audit workbooks. Auditor now traces directly t", "use_when": ["audit", "auditor access", "traceability", "auditor switch"], "stage": ["M2", "M5", "M6"]}, {"id": "cs-05", "label": "$23B AUM RE/hospitality PE", "pain": "Evaluated Anaplan + Lionpoint vs. purpose-built solution", "outcome": "$1.7M annual contract — largest single-phase deal. 44 funds, 12-month implementation. Chose productized over custom-buil", "use_when": ["megafund", "Anaplan alternative", "large deal", "real estate"], "stage": ["M2", "M4", "M10"]}, {"id": "cs-06", "label": "$16B+ VC/growth equity", "pain": "CFO described ops as 'getting out of the nineties' — all back/middle office in-house as strategic di", "outcome": "Chose platform because it doesn't force outsourcing. In-house team keeps control. Carry structure (25%→30% at 3x MOIC) i", "use_when": ["VC", "in-house operations", "strategic differentiator", "complex carry"], "stage": ["M1", "M2"]}, {"id": "cs-07", "label": "$200B+ alt asset manager", "pain": "Evaluated internal Anaplan build ($50-70M) vs. commercial platform", "outcome": "$700-900K initial contract to prove concept. Thesis: productized solution without the consultant army or internal engine", "use_when": ["megafund", "Anaplan", "build vs. buy", "proof of concept"], "stage": ["M2", "M4", "M10"]}, {"id": "cs-08", "label": "Top-tier VC (highly customized eFront)", "pain": "Data spread across eFront, custom CRM, Google Sheets, Snowflake. New evergreen fund had non-traditio", "outcome": "Demonstrated complex allocation rules with full auditability. AI explainability feature got the team to bring additional", "use_when": ["eFront integration", "VC", "complex allocations", "AI explainability"], "stage": ["M2", "M8"]}, {"id": "cs-09", "label": "$15B+ credit manager", "pain": "SS&C for evergreen, custom app for closed-end. 200 employees, 17 in tech. Data consistency across In", "outcome": "Build vs. buy decision landed on buy — engineering time better spent on firm differentiation, not maintaining fund calc ", "use_when": ["credit", "build vs. buy", "SS&C", "Investran"], "stage": ["M1", "M2"]}, {"id": "cs-10", "label": "Large VC (multi-admin complexity)", "pain": "CFO manages multiple admins, GLs, data sources. Operational inefficiencies from fragmentation.", "outcome": "Interested in platform as 'cockpit' standardizing calcs/reporting. AI explainability feature drove deeper engagement and", "use_when": ["multi-admin", "data fragmentation", "cockpit", "VC"], "stage": ["M1", "M2"]}, {"id": "cs-11", "label": "$12B+ RE manager (LP, not GP)", "pain": "LP needing to verify JV partners honor fee/waterfall agreements. Alternative: hire auditor at massiv", "outcome": "Proposed 5 JV partner pilot. Platform becomes automated auditor — verifying partner calculations without external audit ", "use_when": ["LP use case", "JV verification", "real estate", "fund of funds"], "stage": ["M1", "M2"]}, {"id": "cs-12", "label": "RE manager (returned after 18 months)", "pain": "First outreach April 2024. Weren't ready. Watched improvements over 18 months.", "outcome": "Brought latest fund in-house from CBRE admin and signed. Best deals sometimes say 'not yet' and come back when timing is", "use_when": ["timing", "patience", "came back", "real estate"], "stage": ["M1", "M3"]}, {"id": "cs-13", "label": "PE/credit firm (expanded during impl)", "pain": "Started with 3-5 funds. Saw value during implementation.", "outcome": "Added funds to contracts while still in implementation. New fund goes into the platform from day one. Expanding within 6", "use_when": ["expansion", "upsell", "implementation momentum", "phased approach"], "stage": ["M9", "M10"]}, {"id": "cs-14", "label": "Multiple clients (admin error pattern)", "pain": "Admin sends distribution calcs, system flags variances. Sometimes rounding, sometimes missed side le", "outcome": "One client found a six-figure error on a single distribution in the first quarter. Admin isn't liable for the error — th", "use_when": ["admin errors", "distribution risk", "six-figure error", "fiduciary responsibility"], "stage": ["M1", "M2", "M4"]}, {"id": "cs-15", "label": "CFO changed admin dynamic", "pain": "After 6 months on platform, admin validation burden eliminated", "outcome": "CFO told admin: just book what's in the system. Stopped shadowing in Excel entirely. Admin became a booking agent instea", "use_when": ["admin relationship change", "booking agent model", "CFO decision", "shadow elimination"], "stage": ["M2", "M4", "M9"]}, {"id": "cs-16", "label": "Key person risk (15-fund model builder)", "pain": "One person maintained all waterfall models for 15 funds. Gave notice.", "outcome": "CFO called in a panic. Not an edge case — happens constantly. Institutional knowledge trapped in someone's head and thei", "use_when": ["key person risk", "resignation", "institutional knowledge", "panic"], "stage": ["M1", "M4"]}, {"id": "cs-17", "label": "PE firm frustrated with portal vendor", "pain": "Portal vendor wanted proprietary data access that felt like a data grab", "outcome": "Switched approach: performance book of record keeps data with the fund. Data flows out to portal, not the other way arou", "use_when": ["data ownership", "portal frustration", "JSQ alternative", "data control"], "stage": ["M1", "M2"]}, {"id": "cs-18", "label": "Mid-market RE (key person + admin staffing loss)", "pain": "Lost two accountants in quick succession. Admin also lost key staff and started missing deadlines.", "outcome": "Key person risk hit from both sides — internal team and admin. Created urgent need for a system that doesn't depend on a", "use_when": ["key person risk", "admin staffing loss", "real estate", "urgency"], "stage": ["M1", "M2"]}, {"id": "cs-19", "label": "Healthcare PE (pricing validation)", "pain": "Controller skeptical of pricing until contextualized against operational cost", "outcome": "Controller reaction: '$37K a year in expenses to help the data become better — the pricing is really not that expensive.", "use_when": ["pricing validation", "small firm", "healthcare PE", "LP expense"], "stage": ["M4", "M10"]}, {"id": "cs-20", "label": "$40B+ institutional RE (multi-system complexity)", "pain": "Data spread across 5+ systems — proprietary asset management platform, admin's GL (Investran), admin", "outcome": "Discovery revealed the real pain wasn't accuracy — the dedicated admin team was competent. The pain was data availabilit", "use_when": ["multi-system complexity", "data fragmentation", "institutional scale", "real estate"], "stage": ["M1", "M2"]}, {"id": "cs-21", "label": "Emerging manager ($250M, scaling to larger fund)", "pain": "Currently paying outsourced consulting firm $5-6K/month for manual reconciliation. About to raise la", "outcome": "Booked demo in under 10 minutes. Prospect was already evaluating admin alternatives (Citco, SS&C, Apex). Platform positi", "use_when": ["emerging manager", "scaling", "fundraising", "outsourced consulting"], "stage": ["M1"]}, {"id": "cs-22", "label": "Mid-market credit/PE ($1-2B, multiple funds)", "pain": "Operations team had identified need for a system but couldn't get management buy-in. Management appr", "outcome": "Value creation model built collaboratively in session. VP of Ops mapped $32K direct labor cost per fund, 200 hours per y", "use_when": ["value creation", "champion coaching", "management skepticism", "pricing negotiation"], "stage": ["M4"]}, {"id": "cs-23", "label": "$90B direct lending manager (internal admin, proprietary system)", "pain": "Product team constrained by operational limitations — couldn't offer certain fee structures to inves", "outcome": "Dir of Product wanted to socialize slides with CFO and schedule demo with finance team. Platform positioned as the middl", "use_when": ["internal admin", "proprietary system rigidity", "product team constraints", "decision latency"], "stage": ["M1", "M2"]}, {"id": "cs-gong-001", "label": "$11B manager tracking admin errors to build the case", "pain": "", "outcome": "", "use_when": [], "stage": ["m1-advancing", "m2-advancing", "m4-advance"]}, {"id": "cs-gong-002", "label": "Slowed hiring at 50-fund shop", "pain": "", "outcome": "", "use_when": [], "stage": ["m4-diagnose", "m4-advance"]}, {"id": "cs-gong-003", "label": "Admin fee reduction after validation period", "pain": "", "outcome": "", "use_when": [], "stage": ["m4-advance", "m5-core"]}], "profiles": {"in_house_operations": {"detect": ["mentions running Investran, Allvue, eFront, or custom system in-house", "describes team of 4+ on fund ops", "says \"we do our own fund accounting\"", "no mention of external fund admin"], "skip": ["dq-008", "dq-010"], "elevate": ["dq-014"], "stories": ["cs-16", "cs-18", "cs-06", "cs-23"]}, "outsourced_admin": {"detect": ["names Citco, SS&C, Apex, CSC, Gen II, Standish, or other admin", "says \"our admin handles...\" or \"we outsource...\"", "small finance team (1-3 people)", "describes reconciliation against admin output"], "skip": [], "elevate": ["dq-008", "dq-010"], "stories": ["cs-01", "cs-02", "cs-14", "cs-15", "cs-04"]}, "hybrid_model": {"detect": ["describes split admin model", "some funds internal, some outsourced", "mentions multiple data sources or GLs", "describes reconciliation across systems"], "skip": [], "elevate": ["dq-008", "dq-014"], "stories": ["cs-10", "cs-20", "cs-09"]}}, "recovery": {"never_skip": ["dq-001", "dq-005", "dq-009", "dq-012", "dq-018", "dq-022", "dq-019", "dq-020", "dq-021"], "drop_first": ["dq-003", "dq-014", "dq-011"]}, "competitors": {"Carta": {"reframe": "Acknowledge Carta's strength in venture/simple structures. Surface the complexity ceiling.", "talk": "Carta is strong for venture-style funds with pro rata structures. When complexity increases — deal-by-deal waterfalls, catch-ups, clawbacks, side letter variations — firms have fou", "follow": "What are the most complex waterfall structures across your fund family — and how confident is your t"}, "Carta (waterfall claims)": {"reframe": "Shift from feature claims to depth. Rigid templates vs. configurable engine.", "talk": "Carta's waterfall approach uses rigid templates that require constant Excel validation. Firms with negotiated side letters, custom fee structures, or multi-tier waterfalls find the", "follow": "How many of your investor arrangements have custom terms that wouldn't fit neatly into a standard te"}, "Carta (fund admin expansion)": {"reframe": "Carta's admin expansion targets simpler funds. Institutional complexity is a different market.", "talk": "Carta is expanding into fund administration, but the target is primarily smaller and simpler fund structures. Institutional-grade complexity — unique investor terms, multi-strategy", "follow": "What's the most complex LPA provision your team has to manage — and how would you test whether any p"}, "Juniper Square": {"reframe": "Complementary, not competitive. JSQ = portal/CRM. Maybern = calc engine.", "talk": "Roughly a third of similar clients use both platforms. Juniper Square handles investor communications and the portal. The calculation engine — waterfalls, management fees, carried ", "follow": "Are you using JSQ primarily for the portal and CRM, or are you relying on it for fund-level calculat"}, "Juniper Square (data ownership concern)": {"reframe": "Address the data ownership concern directly — Maybern keeps data with the fund, not the vendor.", "talk": "Some firms have concerns about how portal vendors handle their proprietary data. With a performance book of record, the fund owns the data directly — it's calculated in your system", "follow": "How comfortable is your team with how data flows between your current systems — and who ultimately c"}, "Allvue Systems": {"reframe": "GL ≠ performance book of record. Complementary.", "talk": "Allvue is a strong general ledger for partnership accounting. The gap is at the investor level — waterfalls, carried interest, scenario modeling, LP performance. That's where teams", "follow": "When your team needs investor-level waterfall output, where does that calculation happen — in Allvue"}, "Investran": {"reframe": "Everyone with Investran still lives in Excel for calcs. Complementary positioning.", "talk": "Investran is widely used for fund-level accounting. The pattern is that even with Investran, investor-level performance — waterfalls, fees, carry — still lives in Excel. A performa", "follow": "For the calculations outside Investran today — waterfalls, carry, investor allocations — where does "}, "Investran (data accessibility)": {"reframe": "Validate frustration. Position as the data normalization layer.", "talk": "That's a common pattern — limited API access, difficulty extracting data for analysis. A platform that ingests data from Investran through file exports gives the team accessibility", "follow": "If you could query and analyze fund data without going through Investran's native interface, what wo"}, "eFront": {"reframe": "GL complement. eFront does accounting, performance layer does the rest.", "talk": "eFront is solid for GL and fund accounting — especially customized instances. Investor-level performance, waterfalls, and scenario modeling typically still live in Excel or custom ", "follow": "How customized is your eFront instance — and what still lives outside of it in Excel?"}, "Yardi": {"reframe": "Yardi = property-level accounting. Fund-level performance is the gap.", "talk": "Yardi handles property-level accounting well. The gap is at the fund level — investor-level waterfalls, promote structures, co-invest allocations, feeder/blocker rollups. Those cal", "follow": "After data comes out of Yardi, where do fund-level and investor-level calculations happen?"}, "Yardi + Juniper Square (combined stack)": {"reframe": "Additive, not replacement. GL + portal is set. The calc layer in between is the gap.", "talk": "That's actually good news — GL and portal are in place. The piece in between — investor-level waterfalls, management fees, carried interest, admin reconciliation — that's the calcu", "follow": "For the calculations between Yardi and JSQ — fees, waterfalls, carry — what does that process look l"}, "Anaplan": {"reframe": "General-purpose planning tool vs. purpose-built fund calc engine. Consultant army required.", "talk": "Anaplan is powerful for FP&A and general planning. Configuring it for fund accounting — LPA terms, waterfall tiers, investor allocations — requires significant consulting investmen", "follow": "Has the team scoped what an Anaplan implementation would require in terms of consulting and ongoing "}, "Anaplan (already evaluated)": {"reframe": "Validate their experience. Position as the productized alternative.", "talk": "That's consistent with what other firms have found. Firms that haven't already committed to a custom Anaplan build — like a few of the largest managers did for $50M+ — tend to pref", "follow": "What specifically made the Anaplan path feel like too much — was it cost, timeline, or internal reso"}, "Pigment": {"reframe": "Same category as Anaplan — general-purpose planning, not fund-native.", "talk": "Pigment is a modern planning tool and strong for FP&A. The gap is the same as Anaplan — it doesn't natively understand LPA terms, waterfall tiers, or investor-level allocations. Co", "follow": "Is the need primarily financial planning and forecasting, or does it extend into fund-level waterfal"}, "SS&C (TNR / GlobeOps)": {"reframe": "Legacy platform. Robust but resource-intensive. Position as agile, cost-effective alternative.", "talk": "SS&C has built capabilities through decades of acquisitions. TNR supports complex structures. The trade-off is implementation complexity, cost, and limited fund-side visibility. An", "follow": "How much control do you have today over how calculations are done — do you set the rules, or does yo"}, "SEI": {"reframe": "Admin does the calc, but who checks it? Maker-checker problem.", "talk": "SEI handles the calculation on the admin side. The question is: who validates it? Most funds build parallel Excel workbooks to check admin output. Software that acts as an independ", "follow": "When SEI sends over distribution numbers, what does your team's validation process look like before "}, "Geneva (SS&C)": {"reframe": "Geneva is the admin's tool, not the fund's. Position as the GP's own system of record.", "talk": "Geneva is a legacy fund accounting platform used primarily by administrators. The fund's visibility is limited to whatever the admin exports. Having an independent system of record", "follow": "How much visibility do you have into how your admin arrives at the numbers they send — can you trace"}, "Chronograph": {"reframe": "Complementary — portfolio management vs. fund performance. They feed us, we don't replace them.", "talk": "Chronograph is a portfolio management tool — strong at deal-level data, company metrics, valuations. It doesn't do investor-level performance, waterfall calculations, or admin reco", "follow": "How does your portfolio data from Chronograph connect to your investor-level reporting today — is th"}, "Chronograph + DealsPlus partnership": {"reframe": "Partnership extends portfolio analytics. Fund-level performance and waterfall calcs remain outside t", "talk": "That partnership extends Chronograph's capabilities in the portfolio analytics and deal sourcing space. Fund-level performance — investor waterfalls, management fees, carried inter", "follow": "When you think about what you need most — is it portfolio-level analytics, or investor-level fund pe"}, "iLevel (MSCI)": {"reframe": "Same as Chronograph — portfolio monitoring vs. fund performance.", "talk": "iLevel handles portfolio monitoring and company-level data well. The gap is the same as Chronograph — it doesn't calculate investor-level waterfalls, management fees, or carried in", "follow": "Does your iLevel data flow directly into your investor reporting, or is there a manual step in betwe"}, "Arcesium": {"reframe": "Arcesium is enterprise-focused and broad. Position on specialization depth and right-sizing.", "talk": "Arcesium offers an enterprise platform across multiple asset classes. For firms focused on closed-end fund structures — PE, real estate, credit — the question is whether a broad en", "follow": "What drew you to Arcesium specifically — was it the breadth of their platform, or specific capabilit"}, "Alter Domus (fund admin)": {"reframe": "Admin relationship is separate from the GP's own system of record. Complementary positioning.", "talk": "Alter Domus handles fund administration — and the relationship with the admin is important. The question is whether the fund also has its own independent system for calculations, v", "follow": "How does your team validate Alter Domus's calculations before distributions go out — and how long do"}, "Gen II (fund admin)": {"reframe": "Same maker-checker framework. Admin does the work, fund checks it. Software can be a better checker.", "talk": "Gen II is a strong administrator. The dynamic is the same with any admin — they do the calculations, but the fund has a fiduciary responsibility to validate them. Most teams build ", "follow": "When Gen II sends over distribution or fee calculations, how does your team verify the numbers befor"}, "CBRE (fund admin)": {"reframe": "CBRE is more real-estate services than fund technology. Same admin validation gap applies.", "talk": "CBRE provides fund administration services, particularly in real estate. The technology layer — investor-level performance, waterfall calculations, scenario modeling — is typically", "follow": "How much of the calculation and reporting work does CBRE handle versus your internal team — and wher"}, "Deloitte Cascade Suite": {"reframe": "Consulting-grade solution. More expensive, longer implementation. Position as agile and cost-efficie", "talk": "Deloitte's Cascade is designed for large enterprises needing fully integrated solutions with deep compliance and risk management. For firms that don't need the full Deloitte suite,", "follow": "Is the interest in Cascade driven by your auditor relationship, or by a specific capability you're l"}, "Cascata Solutions": {"reframe": "Waterfall point solution vs. full performance book of record.", "talk": "Cascata offers solid waterfall calculation tools. The question is whether the need is only the calc, or the full workflow — capital calls, distributions, management fees, admin rec", "follow": "Is the primary need waterfall calculations specifically, or does it extend into the full fund operat"}, "S7 Fund Ops": {"reframe": "Narrow focus vs. comprehensive platform.", "talk": "S7 does waterfall automation with fast onboarding. If the need is only waterfall calculations, they may fit. If it extends to capital activity workflows, fees, LP performance, and ", "follow": "Is the primary need waterfall automation, or the full end-to-end fund operations process?"}, "Lemonedge": {"reframe": "Similar thesis, different execution. Differentiate on proven client base and breadth.", "talk": "Lemonedge has a similar thesis — replacing Excel with auditable workflows. The differentiation comes down to depth of the calculation engine, breadth of fund types validated, and t", "follow": "What matters most to you — breadth of fund type coverage, depth of waterfall logic, or speed of impl"}, "qashqade": {"reframe": "Flexibility vs. speed. Bespoke = longer setup.", "talk": "qashqade offers flexibility for bespoke structures. The trade-off is typically longer setup time. Purpose-built platforms that have processed hundreds of fund structures can often ", "follow": "How much configuration time are you prepared to invest — and how quickly do you need to be running l"}, "Tactic / newer entrants": {"reframe": "Welcome competition as market validation. Differentiate on depth and track record.", "talk": "New entrants validate the market need. The question is always whether the platform handles the edge cases — deal-by-deal waterfalls with catch-ups and clawbacks across investors wi", "follow": "What's your most complex fund structure — and what happens if the platform can't handle it on day on"}, "Entrilia": {"reframe": "Newer to market. Differentiate on proven institutional client base.", "talk": "Entrilia is building modern fund operations tooling. When evaluating platforms in this space, the key questions are: how many institutional-grade fund structures has the engine bee", "follow": "How important is it that the platform has been validated by firms with similar complexity to yours?"}, "AgoraReal": {"reframe": "Narrow CRE focus vs. multi-strategy flexibility.", "talk": "AgoraReal is designed specifically for commercial real estate investment management. For firms that operate only in CRE, it may cover core needs. For firms managing across strategi", "follow": "Is your firm focused exclusively on real estate, or do you anticipate expanding into other strategie"}, "Niagara (Blackstone internal build)": {"reframe": "Internal builds at megafunds cost $50-70M. Position as the productized commercial version.", "talk": "Firms like Blackstone invested $50-70M building internal systems like Niagara. Those are impressive but not commercially available. For firms that don't have that engineering budge", "follow": "What's your appetite for building vs. buying — and do you have the internal engineering resources to"}, "Workiva / BI tools (Tableau, Power BI, Sigma)": {"reframe": "BI tools need clean data. If the source is Excel, the BI layer inherits the mess.", "talk": "BI tools are great for visualization and reporting. But they need clean, structured data to work with. If performance data lives in 15 different Excel files, no BI tool can fix the", "follow": "What's the primary data source for your BI dashboards today — and how much manual preparation goes i"}, "Lionpoint / Alpha FMC / consultants": {"reframe": "Consultants implement tools, not replace them. They often implement Anaplan or custom builds.", "talk": "Consulting firms are strong at integration, data cleanup, and process design. They typically implement general-purpose tools like Anaplan or Investran — which require ongoing consu", "follow": "What are the consultants implementing specifically — and who will maintain it after they leave?"}, "QuickBooks / Great Plains / NetSuite (GL)": {"reframe": "Basic GL handles management company accounting. Fund-level performance is a completely different nee", "talk": "Basic GLs like QuickBooks or Great Plains handle management company accounting — expenses, revenue, payroll. Fund-level accounting — investor allocations, waterfall calculations, c", "follow": "When you say accounting, are you referring to management company books or fund-level investor accoun"}, "Excel / spreadsheets (internal tool)": {"reframe": "Don't argue with their reality. Expand the time horizon to scenarios they haven't tested.", "talk": "Excel works — until it doesn't. Teams in similar environments find the real question isn't whether it works today. It's what happens when fund count doubles, when the person who bu", "follow": "If your lead fund accountant left tomorrow, how confident is your team that they could pick up those"}, "Excel (we've invested heavily in our models)": {"reframe": "Respect the investment. Position as codifying and upgrading, not replacing.", "talk": "Sophisticated Excel models represent real institutional knowledge — and that knowledge is valuable. The risk is that it lives in one person's head and their specific spreadsheet lo", "follow": "How many people on your team fully understand the logic in those models — and what happens during th"}, "Internal build (custom application)": {"reframe": "Opportunity cost. Engineering time is better spent on firm differentiation, not fund calc maintenanc", "talk": "Internal builds can work if the engineering team has bandwidth. The question is opportunity cost — purpose-built platforms represent years of R&D across hundreds of fund structures", "follow": "If the tech team didn't have to maintain fund calc tools, what would they build instead?"}, "Internal build (we already have one)": {"reframe": "Validate the investment. Surface the maintenance burden and scalability ceiling.", "talk": "Custom applications built in-house are impressive. The ongoing challenge is typically maintenance as fund structures evolve, the team grows, and regulatory requirements change. Fir", "follow": "How much of your tech team's time goes into maintaining and updating the custom application versus b"}, "Appian / low-code platforms": {"reframe": "Low-code is powerful for workflows but lacks fund-specific calculation depth.", "talk": "Low-code platforms like Appian are strong for workflow automation — approvals, routing, notifications. The gap is fund-specific calculation depth: waterfall logic, LPA-compliant al", "follow": "What specifically are you trying to automate — is it the workflow and approvals, or the underlying f"}, "InvestorFlow / investor portals": {"reframe": "Portal vs. engine. Complementary, not competitive.", "talk": "InvestorFlow handles investor-facing communications — portal, documents, reporting distribution. The calculation engine — where the actual waterfall, fee, and performance numbers a", "follow": "When investor notices go out through your portal, where are the underlying numbers calculated — and "}, "Backstop / DealCloud (CRM)": {"reframe": "CRM is a different category. Complementary.", "talk": "CRM platforms handle investor relationships, deal flow, and communications. Fund-level performance — waterfalls, allocations, carried interest — is a separate discipline. The two c", "follow": "How does your fund performance data flow into your CRM today — is it automated or manual?"}, "Quantrix": {"reframe": "Acknowledge the waterfall capability. Surface the scope gap — does it also handle cap calls, distrib", "talk": "Quantrix handles the waterfall calculation piece. The question is whether it also handles capital calls, distributions, management fees, investor-level allocations, admin reconcili", "follow": "Would you classify that as your waterfall engine, your allocation engine, or both?"}}, "story_signal_map": {"key_person_risk": ["cs-16", "cs-18", "cs-05"], "manual_process": ["cs-01", "cs-20", "cs-09"], "excel_dependency": ["cs-03", "cs-06", "cs-22"], "audit_risk": ["cs-04", "cs-14", "cs-02"], "workflow_fragility": ["cs-18", "cs-01", "cs-16"], "pricing_sensitivity": ["cs-19", "cs-07", "cs-05"], "competitor_mentioned": ["cs-08", "cs-05", "cs-09"], "fund_growth": ["cs-13", "cs-21", "cs-12"], "admin_dependency": ["cs-15", "cs-14", "cs-02"], "status_quo_confidence": ["cs-12", "cs-02", "cs-16"], "no_urgency": ["cs-12", "cs-13", "cs-18"], "build_vs_buy_cost": ["cs-07", "cs-09", "cs-23"]}, "competitor_cards": {"carta": {"name": "Carta", "reframe": "Acknowledge Carta's strength in venture/simple structures. Surface the complexity ceiling.", "talk_track": "Carta is strong for venture-style funds with pro rata structures. When complexity increases — deal-by-deal waterfalls, catch-ups, clawbacks, side letter variations — firms have found they need purpose", "follow_up": "What are the most complex waterfall structures across your fund family — and how confident is your team in how those are handled today?"}, "juniper square": {"name": "Juniper Square", "reframe": "Complementary, not competitive. JSQ = portal/CRM. Maybern = calc engine.", "talk_track": "Roughly a third of similar clients use both platforms. Juniper Square handles investor communications and the portal. The calculation engine — waterfalls, management fees, carried interest, admin reco", "follow_up": "Are you using JSQ primarily for the portal and CRM, or are you relying on it for fund-level calculations as well?"}, "allvue": {"name": "Allvue Systems", "reframe": "GL ≠ performance book of record. Complementary.", "talk_track": "Allvue is a strong general ledger for partnership accounting. The gap is at the investor level — waterfalls, carried interest, scenario modeling, LP performance. That's where teams end up in Excel. A ", "follow_up": "When your team needs investor-level waterfall output, where does that calculation happen — in Allvue or somewhere else?"}, "investran": {"name": "Investran", "reframe": "Everyone with Investran still lives in Excel for calcs. Complementary positioning.", "talk_track": "Investran is widely used for fund-level accounting. The pattern is that even with Investran, investor-level performance — waterfalls, fees, carry — still lives in Excel. A performance book of record c", "follow_up": "For the calculations outside Investran today — waterfalls, carry, investor allocations — where does that logic live?"}, "efront": {"name": "eFront", "reframe": "GL complement. eFront does accounting, performance layer does the rest.", "talk_track": "eFront is solid for GL and fund accounting — especially customized instances. Investor-level performance, waterfalls, and scenario modeling typically still live in Excel or custom solutions. Integrati", "follow_up": "How customized is your eFront instance — and what still lives outside of it in Excel?"}, "yardi": {"name": "Yardi", "reframe": "Yardi = property-level accounting. Fund-level performance is the gap.", "talk_track": "Yardi handles property-level accounting well. The gap is at the fund level — investor-level waterfalls, promote structures, co-invest allocations, feeder/blocker rollups. Those calculations sit on top", "follow_up": "After data comes out of Yardi, where do fund-level and investor-level calculations happen?"}, "anaplan": {"name": "Anaplan", "reframe": "General-purpose planning tool vs. purpose-built fund calc engine. Consultant army required.", "talk_track": "Anaplan is powerful for FP&A and general planning. Configuring it for fund accounting — LPA terms, waterfall tiers, investor allocations — requires significant consulting investment and a dedicated te", "follow_up": "Has the team scoped what an Anaplan implementation would require in terms of consulting and ongoing internal resources?"}, "ss&c": {"name": "SS&C (TNR / GlobeOps)", "reframe": "Legacy platform. Robust but resource-intensive. Position as agile, cost-effective alternative.", "talk_track": "SS&C has built capabilities through decades of acquisitions. TNR supports complex structures. The trade-off is implementation complexity, cost, and limited fund-side visibility. An independent platfor", "follow_up": "How much control do you have today over how calculations are done — do you set the rules, or does your admin?"}, "chronograph": {"name": "Chronograph", "reframe": "Complementary — portfolio management vs. fund performance. They feed us, we don't replace them.", "talk_track": "Chronograph is a portfolio management tool — strong at deal-level data, company metrics, valuations. It doesn't do investor-level performance, waterfall calculations, or admin reconciliation. A perfor", "follow_up": "How does your portfolio data from Chronograph connect to your investor-level reporting today — is there manual work in between?"}, "ilevel": {"name": "iLevel (MSCI)", "reframe": "Same as Chronograph — portfolio monitoring vs. fund performance.", "talk_track": "iLevel handles portfolio monitoring and company-level data well. The gap is the same as Chronograph — it doesn't calculate investor-level waterfalls, management fees, or carried interest. Those calcul", "follow_up": "Does your iLevel data flow directly into your investor reporting, or is there a manual step in between where waterfalls and allocations get calculated?"}, "arcesium": {"name": "Arcesium", "reframe": "Arcesium is enterprise-focused and broad. Position on specialization depth and right-sizing.", "talk_track": "Arcesium offers an enterprise platform across multiple asset classes. For firms focused on closed-end fund structures — PE, real estate, credit — the question is whether a broad enterprise platform or", "follow_up": "What drew you to Arcesium specifically — was it the breadth of their platform, or specific capabilities around fund calculations?"}, "deloitte": {"name": "Deloitte Cascade Suite", "reframe": "Consulting-grade solution. More expensive, longer implementation. Position as agile and cost-efficient.", "talk_track": "Deloitte's Cascade is designed for large enterprises needing fully integrated solutions with deep compliance and risk management. For firms that don't need the full Deloitte suite, a more agile platfo", "follow_up": "Is the interest in Cascade driven by your auditor relationship, or by a specific capability you're looking for?"}, "cascata": {"name": "Cascata Solutions", "reframe": "Waterfall point solution vs. full performance book of record.", "talk_track": "Cascata offers solid waterfall calculation tools. The question is whether the need is only the calc, or the full workflow — capital calls, distributions, management fees, admin reconciliation, and rep", "follow_up": "Is the primary need waterfall calculations specifically, or does it extend into the full fund operations workflow?"}, "lemonedge": {"name": "Lemonedge", "reframe": "Similar thesis, different execution. Differentiate on proven client base and breadth.", "talk_track": "Lemonedge has a similar thesis — replacing Excel with auditable workflows. The differentiation comes down to depth of the calculation engine, breadth of fund types validated, and the reference base of", "follow_up": "What matters most to you — breadth of fund type coverage, depth of waterfall logic, or speed of implementation?"}, "workiva": {"name": "Workiva / BI tools (Tableau, Power BI, Sigma)", "reframe": "BI tools need clean data. If the source is Excel, the BI layer inherits the mess.", "talk_track": "BI tools are great for visualization and reporting. But they need clean, structured data to work with. If performance data lives in 15 different Excel files, no BI tool can fix the underlying data qua", "follow_up": "What's the primary data source for your BI dashboards today — and how much manual preparation goes into getting that data ready?"}}, "thread_map": {"key_person": ["dq-001", "dq-005", "dq-003"], "admin_validation": ["dq-008", "dq-010", "dq-009"], "side_letter_complexity": ["dq-004", "dq-006", "dq-002"], "leadership_and_eb": ["dq-007", "dq-013", "dq-011"], "future_state": ["dq-012", "dq-006", "dq-017"], "data_access": ["dq-014", "dq-009"], "competitor_eval": ["dq-023", "dq-015"], "champion_and_close": ["dq-018", "dq-022", "dq-019", "dq-020", "dq-021"]}, "m2_recovery": {"never_skip": ["dq-026", "dq-029", "dq-031", "dq-033", "dq-034", "dq-035", "dq-036"], "drop_first": ["dq-024", "dq-032"]}, "posture_states": {"open": {"label": "Open", "description": "Buyer is engaged, asking questions, sharing information freely. No defensiveness detected.", "judgment_note": ""}, "curious": {"label": "Curious", "description": "Buyer is interested but non-committal. Asking surface questions. Hasn't revealed pain or process details yet.", "judgment_note": ""}, "defensive": {"label": "Defensive", "description": "Buyer is protecting their current process. Active resistance to the idea that something is wrong. Status quo defense is dominant.", "judgment_note": ""}, "defensive_but_cracking": {"label": "Defensive but Cracking", "description": "Buyer defends their process but keeps describing friction. They say 'it works' but then describe manual steps, workarounds, or dependencies. The defense and the evidence contradict each other.", "judgment_note": "This is the most important posture to detect. It means the buyer KNOWS there's a problem but isn't ready to say it. The right move is NOT to push harder — it's to give them permission to acknowledge what they already know. Credibility stories work here. Hard reframes don't."}, "pain_acknowledged": {"label": "Pain Acknowledged", "description": "Buyer has explicitly named a problem, risk, or fragility. They're past defending the status quo. Discovery should deepen, not restart.", "judgment_note": ""}, "politically_cautious": {"label": "Politically Cautious", "description": "Buyer is interested but filtering for colleagues, boss, or committee. They won't say what they really think because someone else is listening or will hear about it.", "judgment_note": ""}, "evaluative": {"label": "Evaluative", "description": "Buyer is actively comparing options. They're past pain — they know they need something. Now they're deciding what and from whom.", "judgment_note": ""}, "stalling": {"label": "Stalling", "description": "Buyer was engaged but momentum has stopped. They're not rejecting — they're avoiding commitment. Timeline is pushing out.", "judgment_note": ""}, "championing": {"label": "Championing", "description": "Buyer is selling internally on your behalf. They're asking how to make the case, what to show their boss, how to justify the spend. This is your champion.", "judgment_note": ""}}, "posture_transitions": [{"id": "pt-001", "from": "curious", "to": "open", "post_move_result": "engaged", "rationale": "Buyer moved from surface curiosity to active engagement. They're sharing real information."}, {"id": "pt-002", "from": "curious", "to": "defensive", "post_move_result": "resisted", "rationale": "The question hit a nerve. Buyer shifted from passive curiosity to active defense."}, {"id": "pt-003", "from": "curious", "to": "politically_cautious", "post_move_result": "deflected", "rationale": "Buyer deflected rather than resisted. They may be filtering for someone else in the room or someone who will hear about this."}, {"id": "pt-004", "from": "open", "to": "defensive", "post_move_result": "resisted", "rationale": "An open buyer who resists has encountered a specific topic that triggers defensiveness. The defense is topic-specific, not general."}, {"id": "pt-005", "from": "open", "to": "pain_acknowledged", "post_move_result": "engaged", "rationale": "Open buyer who engages deeply with pain questions and uses acknowledgment language has crossed the threshold."}, {"id": "pt-006", "from": "open", "to": "evaluative", "post_move_result": "", "rationale": "Buyer shifted from sharing information to comparing options. They know they have a problem — now they're deciding how to solve it."}, {"id": "pt-007", "from": "open", "to": "politically_cautious", "post_move_result": "deflected", "rationale": "Two consecutive deflections from an open buyer means they hit a political boundary. They're willing to share but not about certain topics."}, {"id": "pt-008", "from": "defensive", "to": "defensive_but_cracking", "post_move_result": ["engaged", "neutral"], "rationale": "Buyer is defending but just described friction. The defense and the evidence contradict — this is the cracking point."}, {"id": "pt-009", "from": "defensive", "to": "defensive", "post_move_result": "resisted", "rationale": "Continued resistance hardens the defensive posture. Don't try to transition — increase certainty that defense is the state."}, {"id": "pt-010", "from": "defensive", "to": "curious", "post_move_result": "engaged", "rationale": "A story broke through the defense. Buyer didn't acknowledge pain but dropped the defensive posture. Reset to curious — don't push too fast."}, {"id": "pt-011", "from": "defensive_but_cracking", "to": "pain_acknowledged", "post_move_result": "engaged", "rationale": "The crack became a break. Buyer explicitly acknowledged the problem or accumulated enough fragility evidence without new defenses. This is the most important transition in the system."}, {"id": "pt-012", "from": "defensive_but_cracking", "to": "defensive", "post_move_result": "resisted", "rationale": "The crack closed. Buyer re-engaged their defense. The AE pushed too hard or the wrong topic. Fall back to defensive and let move_evaluation switch tactics."}, {"id": "pt-013", "from": "defensive_but_cracking", "to": "politically_cautious", "post_move_result": "deflected", "rationale": "They're cracking on the problem but deflecting on authority. They know there's an issue but can't or won't discuss who decides."}, {"id": "pt-014", "from": "pain_acknowledged", "to": "evaluative", "post_move_result": "", "rationale": "Buyer moved from acknowledging the problem to evaluating solutions. Discovery shifts to differentiation."}, {"id": "pt-015", "from": "pain_acknowledged", "to": "championing", "post_move_result": "advanced", "rationale": "Buyer went from acknowledging pain to taking ownership of the internal process. They're selling for you."}, {"id": "pt-016", "from": "pain_acknowledged", "to": "stalling", "post_move_result": ["neutral", "deflected"], "rationale": "They acknowledged the pain but stopped engaging. Something is blocking momentum — could be internal politics, competing priorities, or lost conviction."}, {"id": "pt-017", "from": "politically_cautious", "to": "open", "post_move_result": "engaged", "rationale": "Backing off the political topics and returning to safe process questions reopened the buyer. They'll share when they feel safe."}, {"id": "pt-018", "from": "politically_cautious", "to": "championing", "post_move_result": "advanced", "rationale": "The cautious buyer just started selling. They were cautious because they care — and now they're committing."}, {"id": "pt-019", "from": "evaluative", "to": "championing", "post_move_result": "advanced", "rationale": "Evaluative buyer who starts asking about implementation has made their decision. They're now planning, not evaluating."}, {"id": "pt-020", "from": "evaluative", "to": "stalling", "post_move_result": ["neutral", "deflected"], "rationale": "Evaluative buyer who goes quiet and starts mentioning timing concerns is stalling. The evaluation has lost momentum."}, {"id": "pt-021", "from": "stalling", "to": "pain_acknowledged", "post_move_result": "engaged", "rationale": "A story or cost-of-inaction reframe broke through the stall. Buyer reconnected with the pain."}, {"id": "pt-022", "from": "stalling", "to": "evaluative", "post_move_result": "engaged", "rationale": "Stalling buyer who re-engages with evaluation questions has found renewed interest. They were stalling on timing, not on interest."}, {"id": "pt-023", "from": "championing", "to": "politically_cautious", "post_move_result": "deflected", "rationale": "Champion was enthusiastic until the AE asked about EB access. They're championing the product but gatekeeping the decision-maker. This is the most dangerous transition — the deal can die here."}, {"id": "pt-024", "from": "championing", "to": "stalling", "post_move_result": ["neutral", "deflected"], "rationale": "Champion who goes quiet may have hit internal resistance they haven't disclosed. Four consecutive flat responses from someone who was championing is a red flag."}, {"id": "pt-025", "from": "*", "to": "championing", "post_move_result": "advanced", "rationale": "Regardless of where the buyer was, an 'advanced' post-move result means they're now actively moving the deal forward. Recognize it immediately."}, {"id": "pt-026", "from": "*", "to": "defensive", "post_move_result": "resisted", "rationale": "Two consecutive resistances from any posture means something is seriously wrong. Stop the current approach. Move_evaluation rules me-001 and me-008 will activate automatically."}], "post_move_classifier": {"engaged": {"phrases": ["that's exactly what we're dealing with", "funny you mention that", "we actually had that happen", "tell me more about that", "how would that work for us", "that's interesting because", "we've been talking about this internally", "can you give me an example", "what would that l function getStageKeys(){

  return (cm.stages||[]).map(s=>{const p=s.id.split("-");return p.slice(1).join("-")||s.id;});

function getStageId(key){
  const cm=B.meetings[S.meeting];if(!cm) return key;

  const cm=B.meetings[S.meeting];if(!cm) return [];

  if(!t) return "";let r=t;

// ═══ SPEECH → QUESTION MATCHING ═══
// Fuzzy match: what % of words in the question appear in what was said
function matchScore(spoken, questionText){
  if(!spoken||!questionText) return 0;
  const sw=spoken.toLowerCase().replace(/[^a-z0-9\s]/g,"").split(/\s+/).filter(w=>w.length>2);
  const qw=questionText.toLowerCase().replace(/[^a-z0-9\s]/g,"").split(/\s+/).filter(w=>w.length>2);
  if(!qw.length) return 0;
  let hits=0;
  for(const q of qw){
    if(sw.some(s=>s===q||s.startsWith(q.slice(0,4))||q.startsWith(s.slice(0,4)))) hits++;
  }
  return hits/qw.length;
}

  };
  
  const cc=B.competitor_cards||{};

  // Fallback responses for admins/vendors not in cards or competitors dict
  const COMP_FB={
    "citco":{name:"Citco",rf:"Citco handles fund administration — bookkeeping, NAV, statements. The question is who checks their work.",tk:"Citco is a strong administrator. The dynamic is the same with any admin — they do the calculations, but the fund has a fiduciary responsibility to validate them. Most teams build parallel Excel workbooks to check Citco's output. That validation burden is what a performance book of record eliminates.",fu:"When Citco sends over distribution numbers, what does your team's validation process look like before anything goes out?"},

  };
  
  for(const[compKey, variants] of Object.entries(COMP_VARIANTS)){
    if(!variants.some(v=>lo.includes(v))) continue;
    if(found.some(f=>f.signal===compKey+"_mentioned")) continue;
    
    // 1. Check competitor_cards (15 entries with full talk tracks)
    const card=cc[compKey];
    if(card){
      found.push({cat:"vs "+card.name,l1:card.reframe+"\n\n"+card.talk_track,l2:card.follow_up||"",l3:"",signal:compKey+"_mentioned",label:"vs "+card.name.toUpperCase(),color:"#FF6EB4",id:++objCounter,isCompetitor:true});

    }
    // 2. Check competitors dict (44 entries with reframe/talk/follow)
    const cKey=Object.keys(compsDict).find(k=>k.toLowerCase().startsWith(compKey));
    if(cKey){
      const d=compsDict[cKey];
      found.push({cat:"vs "+cKey,l1:(d.reframe||"")+"\n\n"+(d.talk||""),l2:d.follow||"",l3:"",signal:compKey+"_mentioned",label:"vs "+cKey.toUpperCase(),color:"#FF6EB4",id:++objCounter,isCompetitor:true});
      continue;
    }
    // 3. Check hardcoded fallbacks (admins etc.)
    const fb=COMP_FB[compKey];
    if(fb){
      found.push({cat:"vs "+fb.name,l1:fb.rf+"\n\n"+fb.tk,l2:fb.fu||"",l3:"",signal:compKey+"_mentioned",label:"vs "+fb.name.toUpperCase(),color:"#FF6EB4",id:++objCounter,isCompetitor:true});
    }
  }
  
  return found;
}

// ═══ PROCESS SPEECH CHUNK (debounced) ═══
let _processTimer=null;
function processChunk(text){
  S.lastChunk=text;
  // Log for debug
  S.speechLog.unshift({text:text,time:fmt(S.timer)});
  if(S.speechLog.length>8) S.speechLog.pop();
  if(_processTimer) clearTimeout(_processTimer);
  _processTimer=setTimeout(()=>_processChunkInner(text),150);
}
// Manual test input
function testInput(){
  const el=document.getElementById("test-input");
  if(el&&el.value.trim()){
    processChunk(el.value.trim());
    el.value="";
  }
}
function _processChunkInner(text){
  const all=getAllQuestions();
  
  // 1. Auto-match questions — check if the rep just asked something
  // Only match ONE question per chunk (first match wins)
  let matched=false;
  for(const q of all){
    if(S.checked[q.id]) continue;
    const score=matchScore(text, q.l1?.q||"");
    if(score>0.35){
      S.checked[q.id]=true;
      S.expanded=q.id;
      matched=true;
      break; // one match per chunk
    }
  }
  
  // Also check L2 matches for expanded question
  if(S.expanded&&S.checked[S.expanded]&&!S.checkedL2[S.expanded]){
    const q=all.find(x=>x.id===S.expanded);
    if(q?.l2?.q){
      const score=matchScore(text, q.l2.q);
      if(score>0.35){
        S.checkedL2[S.expanded]=true;
      }
    }
  }
  
  // Check L3
  if(S.expanded&&S.checkedL2[S.expanded]&&!S.checkedL3[S.expanded]){
    const q=all.find(x=>x.id===S.expanded);
    if(q?.l3?.q){
      const score=matchScore(text, q.l3.q);
      if(score>0.35){
        S.checkedL3[S.expanded]=true;
      }
    }
  }
  
  // 2. Objection detection — prospect pushback
  const objs=detectObjections(text);
  objs.forEach(o=>{
    if(!S.objDismissed[o.signal]
      &&!S.objQueue.some(x=>x.signal===o.signal)
      &&(!S.activeObj||S.activeObj.signal!==o.signal)){
      S.objQueue.unshift(o);
    }
  });
  if(S.objQueue.length&&!S.activeObj){
    S.activeObj=S.objQueue.shift();
  }
  
  render();
}

// ═══ SPEECH RECOGNITION ═══
function initSpeech(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR) return;
  rec=new SR();
  rec.continuous=true;
  rec.interimResults=true;
  rec.lang="en-US";
  rec.onresult=function(e){
    let interim="",final="";
    for(let i=e.resultIndex;i<e.results.length;i++){
      const t=e.results[i][0].transcript;
      if(e.results[i].isFinal) final+=t+" ";
      else interim=t;
    }
    S.transcript=interim;
    if(final.trim()) processChunk(final.trim());
    else { // interim only — just update transcript text, no full re-render
      const el=document.getElementById("live-transcript");
      if(el) el.textContent=interim;
    }
  };
  rec.onerror=function(){};
  rec.onend=function(){if(S.listening) try{rec.start();}catch(e){}};
}

// ═══ ACTIONS ═══
function checkL1(id){ S.checked[id]=true; S.expanded=id; render(); }
function uncheckL1(id){ delete S.checked[id]; delete S.checkedL2[id]; delete S.checkedL3[id]; if(S.expanded===id) S.expanded=null; render(); }
function checkL2(id){ S.checkedL2[id]=true; render(); }
function checkL3(id){ S.checkedL3[id]=true; render(); }
function toggle(id){ S.expanded=S.expanded===id?null:id; render(); }
function dismissObj(){
  if(S.activeObj) S.objDismissed[S.activeObj.signal]=true;
  S.activeObj=S.objQueue.length?S.objQueue.shift():null;
  lastRenderedObjId=null;
  render();
}

function setM(m){
  S.meeting=m; const k=getStageKeys(); S.stage=k[0]||"open"; S.expanded=null; render();
}
function setStage(s){ S.stage=s; S.expanded=null; render(); }
function goLive(){
  if(!S.live){
    S.live=true; S.listening=true; S.timer=0;
    tiv=setInterval(()=>{S.timer++;const el=document.getElementById("tmr");if(el)el.textContent=fmt(S.timer);},1000);
    if(rec) try{rec.start();}catch(e){}
  } else {
    S.live=false; S.listening=false; clearInterval(tiv);
    if(rec) try{rec.stop();}catch(e){}
  }
  render();
}
function startCall(){
  S.setup=false; const k=getStageKeys(); S.stage=k[0]||"open"; initSpeech(); render();
}

        else h+=`<span style="color:#3D4A5C;font-size:9px">tap when asked</span>`;
        h+=`</div>`;
        h+=`<p style="color:${l2Done?"#7AFFCC":"#C8D5E5"};font-size:13px;line-height:1.5;margin:0">${personalize(q.l2.q)}</p>`;
        if(q.l2.goal) h+=`<p style="color:#4A5568;font-size:9px;margin:3px 0 0">${q.l2.goal}</p>`;
        h+=`</div>`;
      }

      // L3 — unlocks after L2
      if(q.l3?.q){
        const l2Done=!!S.checkedL2[q.id];
        const l3Done=!!S.checkedL3[q.id];
        if(l2Done){
          h+=`<div class="lvl ${l3Done?"done":""}" onclick="event.stopPropagation();${l3Done?"":"checkL3('"+q.id+"')"}">`;
          h+=`<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">`;
          h+=`<span style="font-size:9px;font-weight:700;color:#FF5555">L3 — NAIL IT</span>`;
          h+=`<div style="flex:1"></div>`;
          if(l3Done) h+=`<span style="color:#00FFCC;font-size:10px;font-weight:700">✓</span>`;
          else h+=`<span style="color:#3D4A5C;font-size:9px">tap when asked</span>`;
          h+=`</div>`;
          h+=`<p style="color:${l3Done?"#7AFFCC":"#C8D5E5"};font-size:13px;line-height:1.5;margin:0">${personalize(q.l3.q)}</p>`;
          if(q.l3.goal) h+=`<p style="color:#4A5568;font-size:9px;margin:3px 0 0">${q.l3.goal}</p>`;
          h+=`</div>`;
        } else {
          h+=`<div class="lvl locked"><p style="color:#253040;font-size:10px;margin:0">L3 unlocks after L2 ✓</p></div>`;
        }
      }
    }
  });

  // ─── STAGE EXTRAS ───
  if(stageData){
    // Exit criteria
    const ec=stageData.exit_criteria||[];
    if(ec.length){
      h+=`<div style="margin-top:16px;padding:8px 14px;border-top:1px solid #253040">`;
      h+=`<p style="color:#6B7D94;font-size:9px;font-weight:700;letter-spacing:0.1em;margin-bottom:6px">EXIT CRITERIA</p>`;
      ec.forEach((e,i)=>{
        const key="ec-"+S.stage+"-"+i;const met=!!S.checked[key];
        h+=`<div onclick="S.checked['${key}']=!S.checked['${key}'];render()" style="display:flex;align-items:flex-start;gap:8px;padding:4px 0;cursor:pointer">`;
        h+=`<span style="color:${met?"#00FFCC":"#3D4A5C"};font-size:12px;margin-top:1px">${met?"✓":"○"}</span>`;
        h+=`<p style="color:${met?"#7AFFCC":"#8899B0"};font-size:11px;line-height:1.4;margin:0">${e.criterion||e}</p>`;
        h+=`</div>`;
      });
      h+=`</div>`;
    }
    // Reframes
    const rf=stageData.reframes||[];
    if(rf.length){
      h+=`<div style="margin-top:8px;padding:8px 14px">`;
      h+=`<p onclick="S._showRf=!S._showRf;render()" style="color:#6B7D94;font-size:9px;font-weight:700;letter-spacing:0.1em;cursor:pointer;margin-bottom:4px">REFRAMES (${rf.length}) ${S._showRf?"▾":"▸"}</p>`;
      if(S._showRf) rf.forEach(r=>{
        h+=`<div style="padding:6px 10px;border-left:2px solid #5B52FF;margin:3px 0;border-radius:0 4px 4px 0;background:#1A2233">`;
        h+=`<p style="color:#B8C8FF;font-size:11px;line-height:1.5;margin:0">${personalize(r.text)}</p></div>`;
      });
      h+=`</div>`;
    }
    // Champion coaching
    const cc=stageData.champion_coaching||[];
    if(cc.length){
      h+=`<div style="margin-top:4px;padding:8px 14px">`;
      h+=`<p style="color:#6B7D94;font-size:9px;font-weight:700;letter-spacing:0.1em;margin-bottom:4px">CHAMPION COACHING</p>`;
      cc.forEach(c=>{
        h+=`<div style="padding:6px 10px;border-left:2px solid #FFB820;margin:3px 0;border-radius:0 4px 4px 0;background:#1E2233">`;
        h+=`<p style="color:#FFE0A0;font-size:11px;line-height:1.4;margin:0">${c.prompt||c}</p></div>`;
      });
      h+=`</div>`;
    }
  }

  h+=`</div>`;
  document.getElementById("app").innerHTML=h;
}

render();
</script>
</body>
</html>
