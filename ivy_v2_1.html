<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>IVY — Maybern</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;color:#E8EDF5;overflow-x:hidden;background:#0D1117}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#4A5568;border-radius:2px}
input::placeholder{color:#6B7D94}
button{font-family:inherit}

#shell{width:420px;height:100vh;position:fixed;right:0;top:0;background:#0D1117;display:flex;flex-direction:column;border-left:1px solid #3D4A5C}
@media(max-width:520px){#shell{width:100%!important;border-left:none}}

.form-input{background:#1A2233;border:1px solid #3D4A5C;border-radius:8px;padding:10px 12px;color:#fff;font-size:13px;width:100%;outline:none;font-family:inherit}
.form-input:focus{border-color:#00F0FF;box-shadow:0 0 8px #00F0FF30}

/* Question rows */
.q-row{padding:10px 14px;border-left:3px solid #253040;border-radius:0 8px 8px 0;margin-bottom:3px;cursor:pointer;transition:all 0.15s;background:#131A24}
.q-row:hover{background:#1A2538}
.q-row.active{border-left-color:#00F0FF;background:#1A2538}
.q-row.done{border-left-color:#00FFCC;background:#0D1F1A;opacity:0.6}
.q-row.done:hover{opacity:1}
.q-row.done .q-main{color:#00FFCC}

/* Level cards */
.lvl{padding:10px 14px;margin:2px 0 2px 16px;border-radius:6px;border-left:2px solid #3D4A5C;background:#1A2233;transition:all 0.15s;cursor:pointer}
.lvl:hover{background:#1E2840}
.lvl.done{border-left-color:#00FFCC;background:#0D1F1A}
.lvl.locked{opacity:0.25;cursor:default}

/* Objection card */
.obj-card{padding:12px 14px;border-left:3px solid #FF5555;border-radius:0 10px 10px 0;background:#1E1520;margin-bottom:6px}
.obj-card.obj-new{animation:slideIn 0.3s ease}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

/* Tags */
.tag{font-size:8px;font-weight:800;padding:2px 7px;border-radius:3px;letter-spacing:0.05em}
.mic-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.mic-dot.on{background:#FF5555;animation:pulse 1.2s infinite}
.mic-dot.off{background:#3D4A5C}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 #FF555560}50%{box-shadow:0 0 0 6px #FF555500}}
</style>
</head>
<body>
<div id="shell"><div id="app"></div></div>

<script>
const B = {"meetings": {"M1": {"name": "Initial Call", "belief_shift": "I have a structural risk I haven't fully examined.", "stages": [{"id": "m1-open", "name": "Open — Frame & Permission", "questions": [{"id": "rip-0", "tier": 1, "tag": "Pain", "fire_when": [], "skip_when": [], "l1": {"q": "I'd love to start by understanding how your fund accounting and operations team is set up today — walk me through who handles what, what systems you're using, and how the workflow runs from fund setup through reporting.", "goal": "Open-ended lay of the land — let them describe their world before diagnosing"}, "l2": {"q": "Where in that workflow does the most manual effort concentrate — and who carries that load?", "goal": "Narrow from overview to where the pain lives"}, "l3": {"q": "How has that setup evolved as you've added funds — has it scaled cleanly or has it gotten more fragile?", "goal": "Connect current state to trajectory — growing pain is more urgent"}}, {"id": "rip-1", "tier": 1, "tag": "Pain", "fire_when": [], "skip_when": [], "l1": {"q": "How many funds are you running right now, and what does your next 18 months look like in terms of launches?", "goal": "Risk identification"}, "l2": {"q": "How does the team size change when you add those funds — hiring or absorbing?", "goal": "Connect fund growth to operational strain"}, "l3": {"q": "At what fund count does the current headcount break?", "goal": "Get the specific breaking point"}}]}, {"id": "m1-advancing", "name": "Diagnose — Surface Structural Risk", "questions": [{"id": "dq-001", "tier": 1, "tag": "Pain", "fire_when": [], "skip_when": [], "note": "Ask this after the 'performance book of record' reframe. Let them describe the dependency themselves.", "l1": {"q": "Walk me through who actually owns the waterfall logic today — and what happens when that person is unavailable for a quarter-end.", "goal": "Surfaces key person risk and process fragility in a single question."}, "l2": {"q": "How current is the documentation on those models? Could someone else step in next quarter-end?", "goal": "Expose the documentation gap"}, "l3": {"q": "If that person gave notice tomorrow, walk me through the next distribution cycle — day by day.", "goal": "Force them to visualize the operational crisis in detail"}}, {"id": "dq-005", "tier": 1, "tag": "Pain", "fire_when": [], "skip_when": [], "note": "Slow down when asking this. Let the weight of it land. If they name a specific person, write the name down — that's your", "l1": {"q": "What would happen to your next distribution cycle if your lead fund accountant left tomorrow?", "goal": "Key person risk. The most emotionally resonant question. Hits Level 3 on the pai"}, "l2": {"q": "How long would it take to get someone new up to speed — weeks or months?", "goal": "Quantify the knowledge transfer cost"}, "l3": {"q": "Has this actually happened — to you or someone you know? What did it look like?", "goal": "Anchor to a real experience, not a hypothetical"}}, {"id": "rip-7", "tier": 1, "tag": "Pain", "fire_when": [], "skip_when": [], "l1": {"q": "Who else on your team fully understands how the waterfall logic works end to end?", "goal": "Risk identification"}, "l2": {"q": "If you asked them to reproduce a waterfall calc from scratch without help, could they?", "goal": "Test whether bench depth is real or theoretical"}, "l3": {"q": "What happens to your quarter-end if both of you are unavailable at the same time?", "goal": "Escalate from single point of failure to no-coverage scenario"}}, {"id": "dq-004", "tier": 1, "tag": "Pain", "fire_when": [], "skip_when": [], "note": "Side letters are the complexity that breaks templates. Use this to bridge to the 'purpose-built' concept.", "l1": {"q": "How many of your funds have side-letter economics that don't fit neatly into your main model?", "goal": "Surfaces hidden complexity invisible to leadership"}, "l2": {"q": "Where do those side-letter terms live — main model, separate tabs, or somewhere else entirely?", "goal": "Expose fragmented data architecture"}, "l3": {"q": "If an LP asked you to trace their specific fee arrangement back to the side letter, how many files do you touch?", "goal": "Quantify the audit trail gap"}}, {"id": "dq-002", "tier": 2, "tag": "Pain", "fire_when": ["audit_risk", "lp_scrutiny_mentioned", "regulatory_pressure"], "skip_when": [], "note": "If they hesitate, the gap is real. Don't fill the silence.", "l1": {"q": "When an LP asks you to trace a specific number back to the source, what does that process actually look like?", "goal": "Exposes auditability gaps and traceability issues"}, "l2": {"q": "How often does that happen, and how long does each inquiry take?", "goal": "Quantify the recurring burden"}, "l3": {"q": "Has an LP ever challenged a number you couldn't immediately defend? What happened?", "goal": "Surface a trust-damaging incident"}}, {"id": "dq-003", "tier": 3, "tag": "Pain", "fire_when": ["manual_process_acknowledged", "excel_dependency_confirmed"], "skip_when": [], "note": "The answer is almost always 'we couldn't.' That's the moment.", "l1": {"q": "If someone asked your team to pull every manual override from the last distribution cycle, how fast could they do that?", "goal": "Tests process maturity and auditability"}, "l2": {"q": "Who would know where to find that information — and how long would it take them?", "goal": "Expose the version control gap"}, "l3": {"q": "If an auditor asked that question today, how confident are you in the answer?", "goal": "Connect to audit liability"}}, {"id": "dq-008", "tier": 2, "tag": "Pain", "fire_when": ["external_admin_confirmed"], "skip_when": ["in_house_operations", "no_external_admin"], "note": "Let them tell you what's working first. The 'what isn't' part opens the maker-checker conversation.", "l1": {"q": "How would you describe your relationship with your fund admin — what's working and what isn't?", "goal": "Opens the admin tension naturally. Don't lead negative."}, "l2": {"q": "When they send distribution calcs, what does your review process look like? What are you checking for?", "goal": "Quantify the shadow validation burden"}, "l3": {"q": "Have you caught a material error? What would have happened if you hadn't?", "goal": "Escalate from process description to consequence"}}, {"id": "dq-010", "tier": 2, "tag": "Pain", "fire_when": ["external_admin_confirmed", "admin_trust_expressed"], "skip_when": ["in_house_operations"], "note": "If yes, follow up: 'How did you catch it? What would have happened if you hadn't?' This escalates from anecdote to syste", "l1": {"q": "Have you ever caught errors in your admin's calculations?", "goal": "Surfaces admin trust issues. If yes, major pain amplifier."}, "l2": {"q": "How did you catch it? Was it the process or luck?", "goal": "Test whether error detection is systematic or accidental"}, "l3": {"q": "What would have happened if you hadn't caught it — and how much was at stake?", "goal": "Quantify the downside of a miss"}}, {"id": "dq-009", "tier": 1, "tag": "Metrics", "fire_when": [], "skip_when": [], "note": "Anchor the number. You'll use it in the Value Creation workshop later.", "l1": {"q": "How long does your distribution process typically take end-to-end?", "goal": "Quantifies the operational burden. Sets up ROI."}, "l2": {"q": "How much of that is the waterfall validation piece specifically?", "goal": "Isolate the compressible time"}, "l3": {"q": "Multiply that by four quarters — what does it cost you in fully-loaded hours per year?", "goal": "Make them say the dollar figure"}}, {"id": "rip-5", "tier": 2, "tag": "Pain", "fire_when": [], "skip_when": [], "l1": {"q": "How long does audit prep take your team right now?", "goal": "Risk identification"}, "l2": {"q": "What percentage of that time is gathering data versus actually reviewing it?", "goal": "Separate data collection burden from analysis burden"}, "l3": {"q": "If audit prep was two days instead of two weeks, what would your team do with that time?", "goal": "Connect efficiency to strategic outcomes"}}, {"id": "dq-014", "tier": 3, "tag": "Pain", "fire_when": ["separate_deal_team", "data_access_complaint", "cross_team_friction"], "skip_when": [], "note": "This is the data accessibility play. Rob at Golub described sending requests to finance and waiting — 'that part drives ", "l1": {"q": "When the deal team or partners need performance data — IRR, deployment, capital call percentages — how fast can finance turn that around?", "goal": "Surfaces data accessibility pain"}, "l2": {"q": "What's the typical turnaround — hours, days? And what does the deal team do while they wait?", "goal": "Quantify downstream impact"}, "l3": {"q": "Has slow turnaround ever cost the firm a decision or delayed a deal?", "goal": "Connect data latency to business outcomes"}}, {"id": "dq-006", "tier": 2, "tag": "Pain", "fire_when": ["fund_growth", "scale_discussion", "hiring_pressure"], "skip_when": [], "note": "Future projection questions bypass the 'we're fine' defense. They can't argue with a scenario they haven't tested.", "l1": {"q": "When you think about scaling from your current fund count to double that, where does the process start to feel fragile?", "goal": "Connects current pain to future risk. Creates urgency without being pushy."}, "l2": {"q": "Is that fragility a time problem, an accuracy problem, or a people problem?", "goal": "Categorize the scaling risk"}, "l3": {"q": "How close are you to that breaking point right now — and what happens when you cross it?", "goal": "Create urgency from their own assessment"}}, {"id": "rip-6", "tier": 2, "tag": "Pain", "fire_when": [], "skip_when": [], "l1": {"q": "What happens to that process when you launch Fund V?", "goal": "Risk identification"}, "l2": {"q": "Can you walk me through a specific instance?", "goal": "Get a real example"}, "l3": {"q": "What did that cost you — hours, dollars, or trust?", "goal": "Quantify"}}, {"id": "dq-012", "tier": 1, "tag": "Pain", "fire_when": [], "skip_when": [], "note": "This closes the discovery phase. Whatever they say here is the narrative you carry into the close.", "l1": {"q": "If you fast-forward six quarters, what part of your current process worries you most?", "goal": "Future-state anxiety. Connects today's tolerable friction to tomorrow's risk."}, "l2": {"q": "Is that worry something you've raised internally, or is it just something you carry yourself?", "goal": "Test whether pain is personal or organizational"}, "l3": {"q": "If nothing changes between now and then, what's the worst realistic outcome you can picture?", "goal": "Get them to articulate the worst case — that's the narrative"}}, {"id": "dq-007", "tier": 1, "tag": "EB", "fire_when": [], "skip_when": [], "note": "If yes — you have a path to the EB. If no — the pain hasn't been escalated yet, and you may need to help them frame it.", "l1": {"q": "Has anyone on the leadership team ever raised concerns about how defensible your waterfall outputs are — to auditors or LPs?", "goal": "Tests whether pain has reached the EB"}, "l2": {"q": "When they raised it, what specifically were they worried about — accuracy, auditability, or key person risk?", "goal": "Map the EB's specific concern"}, "l3": {"q": "What would need to happen for that concern to move from 'something we discuss' to 'something we act on'?", "goal": "Find the EB's action trigger"}}, {"id": "dq-013", "tier": 2, "tag": "EB", "fire_when": ["referral_mention", "executive_interest", "budget_pushback"], "skip_when": [], "note": "CRITICAL: Ask this whenever the buyer indicates a senior leader sent them. The answer maps the funding path before M2. L", "l1": {"q": "How does your team think about investing in this part of the business — you've got a process that works, but it takes time. What's the internal appetite for improving it?", "goal": "Surfaces budget path and EB decision lens"}, "l2": {"q": "Who signs off on that level of investment — you, the CFO, or a committee?", "goal": "Map the actual decision authority"}, "l3": {"q": "What does the business case need to look like for that person to say yes?", "goal": "Get the EB's decision criteria before you're in the room"}}, {"id": "dq-011", "tier": 2, "tag": "Pain", "fire_when": ["pain_count_gte_3", "buyer_engaged"], "skip_when": [], "note": "Only ask after they've articulated real pain. If they say 7+, the deal is real.", "l1": {"q": "On a scale of 1-10, how would you prioritize fixing those issues?", "goal": "Forces them to commit to a priority level."}, "l2": {"q": "What makes it that number and not a 10?", "goal": "Surface what's holding them back from full urgency"}, "l3": {"q": "What would have to change to make it a 10?", "goal": "Get them to name their own activation trigger"}, "question_type": "confirming"}]}, {"id": "m1-confirming", "name": "Confirm & Advance — Book the Demo", "questions": [{"id": "dq-018", "tier": 1, "tag": "Pain", "fire_when": [], "skip_when": [], "note": "This is the single most important confirming question. If they say yes, go to close. If they hedge, go back to discovery", "l1": {"q": "Based on what we've covered — it sounds like there are a few real structural risks here. Would you agree?", "goal": "Tests whether the belief shift landed"}, "l2": {"q": "Which of those risks feels most pressing to you personally?", "goal": "Prioritize — this becomes the M2 anchor"}, "l3": {"q": "If you had to put a dollar amount on what that risk costs the firm per year, what would it be?", "goal": "Force quantification"}, "question_type": "confirming"}, {"id": "dq-015", "tier": 1, "tag": "Metrics", "fire_when": [], "skip_when": [], "note": "Use their actual AUM from Preqin. Shows you did homework.", "l1": {"q": "We have you at roughly X dollars AUM — how large is the finance and accounting team that supports this?", "goal": "Quantifies operational footprint. Sets up efficiency conversation."}, "l2": {"q": "Is that team growing, stable, or under pressure to stay lean?", "goal": "Understand headcount constraints"}, "l3": {"q": "If you could get 20 business days back per year without adding headcount, what would your team do with that time?", "goal": "Connect efficiency to strategic outcomes"}}, {"id": "dq-016", "tier": 2, "tag": "Criteria", "fire_when": ["fund_type_unclear", "open_ended_possible"], "skip_when": [], "note": "If open-ended: be honest about current roadmap. If closed-end only: green light.", "l1": {"q": "Our understanding is you're running closed-end funds — is that the full picture, or do you have open-ended vehicles too?", "goal": "Confirms fund type scope and product fit."}, "l2": {"q": "Are you looking at launching any new vehicle types in the next year — evergreen, continuation, co-invest?", "goal": "Scope future complexity"}, "l3": {"q": "How would your current process handle a structure you haven't modeled before?", "goal": "Expose the rigidity of the current setup"}}, {"id": "dq-017", "tier": 1, "tag": "Process", "fire_when": [], "skip_when": [], "note": "A fund raise in progress means stretched bandwidth but high urgency. Time the next step accordingly.", "l1": {"q": "Are you currently raising a new fund?", "goal": "Identifies timing trigger. New fund = best implementation window."}, "l2": {"q": "What's the target close — and how does that timeline affect your team's bandwidth?", "goal": "Connect fund raise to operational pressure"}, "l3": {"q": "Would it be easier to implement something like this before Fund V goes live, or after — when you're already mid-cycle?", "goal": "Create timing urgency from their own logic"}}, {"id": "dq-023", "tier": 1, "tag": "Competition", "fire_when": [], "skip_when": [], "note": "Ask casually. If they name competitors, don't react. Write the names down silently. If they say 'just exploratory,' test", "l1": {"q": "Have you looked at anything else for this, or is this more exploratory at this point?", "goal": "Competitive landscape awareness. Tells you if you're in a bake-off, a solo evalu"}, "l2": {"q": "What specifically didn't work about what you've seen before?", "goal": "Map competitor ceiling"}, "l3": {"q": "What would tip the scale if you compared solutions?", "goal": "Shape evaluation criteria"}}, {"id": "dq-022", "tier": 1, "tag": "Champion", "fire_when": [], "skip_when": [], "note": "Ask this before proposing the M2 attendee list. Their answer tells you whether to coach them on framing before the next ", "l1": {"q": "When you go back to your team after this call, how would you describe what we talked about?", "goal": "Champion litmus test — can they articulate the pain"}, "l2": {"q": "What part would resonate most with them — time savings, risk reduction, or scenario speed?", "goal": "Help them sharpen the internal pitch"}, "l3": {"q": "If they push back and say 'we're fine,' what would you say?", "goal": "Test whether the champion will fight or fold"}, "question_type": "confirming"}, {"id": "dq-019", "tier": 1, "tag": "Champion", "fire_when": [], "skip_when": [], "note": "Name the role specifically. 'Your team' is vague. 'Your CFO' or 'your controller' is a commitment.", "l1": {"q": "If we could show you how firms with your kind of complexity have addressed these same gaps — would it be worth getting your CFO or Head of Fund Ops in the room for 45 minutes?", "goal": "Proposes M2 with specific stakeholder"}, "l2": {"q": "What would make that meeting most useful — a live demo of your data, a business case, or both?", "goal": "Frame M2 around the EB's priorities"}, "l3": {"q": "What's the one thing they need to see to invest 45 minutes?", "goal": "Get the single most important proof point"}, "question_type": "confirming"}, {"id": "dq-020", "tier": 1, "tag": "EB", "fire_when": [], "skip_when": [], "note": "Write down every name. This is your M2 attendee list.", "l1": {"q": "Who on your team would need to be in the room for that conversation to be productive?", "goal": "Stakeholder mapping. Starts building the buying committee."}, "l2": {"q": "What's each person's biggest concern likely to be?", "goal": "Pre-map objections by stakeholder"}, "l3": {"q": "Is there anyone who would actively push back — and what would their argument be?", "goal": "Identify the blocker before M2"}}, {"id": "dq-021", "tier": 1, "tag": "Process", "fire_when": [], "skip_when": [], "note": "If they won't commit to a date live, the deal is already at risk. Push gently: 'Early or late next week?'", "l1": {"q": "What does your calendar look like in the next two weeks to schedule that?", "goal": "Book the meeting live on the call. Don't leave it to email."}, "l2": {"q": "Early next week or late — what works better?", "goal": "Binary choice closes faster than open-ended"}, "l3": {"q": "Let's lock it now — I'll send the invite before we hang up.", "goal": "Do not leave without a date"}, "question_type": "confirming"}]}]}, "M2": {"name": "Initial Demo", "belief_shift": "There's a credible alternative worth evaluating seriously.", "stages": [{"id": "m2-open", "name": "Open — Anchor to Pain, Not Product", "questions": [{"id": "m2rip-0", "tier": 2, "tag": "Pain", "fire_when": [], "skip_when": [], "l1": {"q": "Since our last conversation — has anything changed on your end that I should know about?", "goal": "Check for new context, stakeholders, or urgency"}, "l2": {"q": "Tell me more about that — how's it affecting the team?", "goal": "Get specifics on what changed"}, "l3": {"q": "Does that change how you're thinking about priorities here?", "goal": "Connect the change to urgency"}}]}, {"id": "m2-advancing", "name": "Demo & Diagnose — Create Contrast", "questions": [{"id": "dq-022", "tier": 2, "tag": "Pain", "fire_when": [], "skip_when": [], "note": "Ask before showing the distribution workflow in the demo. Their description becomes the 'before' that the demo contrasts", "l1": {"q": "When you go back to your team after this call, how would you describe what we talked about?", "goal": "Champion litmus test — can they articulate the pain"}, "l2": {"q": "Can you give me a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you — time, money, or risk?", "goal": "Quantify"}, "question_type": "confirming"}, {"id": "dq-023", "tier": 2, "tag": "Metrics", "fire_when": [], "skip_when": [], "note": "Anchor the number. Use it later: 'You said 3 weeks. What we just showed takes 3 days.'", "l1": {"q": "How long does the full process take from decision to funds out the door?", "goal": "Quantifies the operational burden. Creates a benchmark."}, "l2": {"q": "Can you give me a specific example?", "goal": "Get concrete evidence"}, "l3": {"q": "What did that cost you — time, money, or risk?", "goal": "Quantify"}}, {"id": "m2rip-11", "tier": 2, "tag": "Pain", "fire_when": [], "skip_when": [], "l1": {"q": "As you're watching this — where does it connect to the problems you described last time?", "goal": "Bridge demo to their pain"}, "l2": {"q": "Is that connection stronger or weaker than you expected?", "goal": "Test conviction level"}, "l3": {"q": "What would your team say if they saw this?", "goal": "Test internal resonance"}}, {"id": "dq-026", "tier": 1, "tag": "Pain", "fire_when": [], "skip_when": [], "note": "Ask this after showing a workflow, not before. Let the demo create the contrast first.", "l1": {"q": "Seeing a centralized calculation layer like this — what's the first thing that comes to mind when you compare it to how you do it today?", "goal": "Post-demo reflection — gets them comparing"}, "l2": {"q": "How big is that gap — minor inconvenience or structural problem?", "goal": "Get them to size it"}, "l3": {"q": "What does that gap cost you in real terms — time, money, risk, or all three?", "goal": "Quantify in their language"}}, {"id": "dq-029", "tier": 1, "tag": "Criteria", "fire_when": [], "skip_when": [], "note": "The single best post-demo question. Whatever they say is their decision criterion. Write it down.", "l1": {"q": "Looking at what we just showed — where's the biggest gap between this and how your team actually operates?", "goal": "Self-identified gap — they tell you where the value is"}, "l2": {"q": "Has your team tried to solve that before — and what happened?", "goal": "Surface failed internal attempts"}, "l3": {"q": "If you could fix one thing about your current process, what would it be?", "goal": "Get the single most important outcome"}}, {"id": "dq-028", "tier": 1, "tag": "Pain", "fire_when": [], "skip_when": [], "note": "Same future-projection technique from M1, now with the demo as evidence that an alternative exists.", "l1": {"q": "At what point does your current setup start breaking — whether that's more fund launches, more LPs, or more complexity?", "goal": "Future risk — connects current process to a scaling limit"}, "l2": {"q": "What does 'break' look like — longer cycles, more errors, or people burning out?", "goal": "Specifics on the failure mode"}, "l3": {"q": "How close are you to that point right now?", "goal": "Create urgency from their assessment"}}, {"id": "dq-024", "tier": 2, "tag": "Pain", "fire_when": [], "skip_when": [], "note": "This is the emotional question. If they pause or sigh, you've hit something real. Slow down and explore.", "l1": {"q": "Has a delayed or corrected distribution ever created a trust issue with an LP?", "goal": "Level 3 pain ladder — personal stakes. Connects operational failure to relations"}, "l2": {"q": "What happened after that — did the LP raise it again, or did it fade?", "goal": "Test whether trust issues compound"}, "l3": {"q": "What would it be worth to you to never have that conversation again?", "goal": "Emotional close on relationship risk"}}, {"id": "dq-032", "tier": 2, "tag": "Pain", "fire_when": [], "skip_when": [], "note": "Works especially well with controllers and CFOs. Audit season is universally painful.", "l1": {"q": "Think about the last time audit season was really stressful — what would have made it materially easier?", "goal": "Emotional recall — relives the pain in context of what they saw"}, "l2": {"q": "How many hours did that consume across your team?", "goal": "Quantify"}, "l3": {"q": "What would have made that a non-event instead of a fire drill?", "goal": "Paint the future state from their pain"}}, {"id": "dq-027", "tier": 2, "tag": "Metrics", "fire_when": [], "skip_when": [], "note": "Audit pain is universal. This question works with every persona in the room.", "l1": {"q": "If your auditors could trace any LP's economics back to one source of truth in under a minute — how would that change things for your team?", "goal": "Paints the future state"}, "l2": {"q": "How many hours does audit prep take your team today?", "goal": "Quantify audit burden"}, "l3": {"q": "What would you do with that time if you got it back?", "goal": "Connect efficiency to strategic outcomes"}}, {"id": "dq-025", "tier": 2, "tag": "EB", "fire_when": [], "skip_when": [], "note": "If 'day-to-day frustration' — you need to help them escalate it. If 'on management's radar' — the path to the EB is open", "l1": {"q": "Is fixing this on management's radar, or is it more of a day-to-day frustration the team just lives with?", "goal": "Tests whether pain has reached leadership"}, "l2": {"q": "What would need to happen for it to get on their radar?", "goal": "Find the escalation trigger"}, "l3": {"q": "If you framed it as a risk issue rather than an efficiency issue, would that land differently?", "goal": "Help them reframe for the EB"}}, {"id": "dq-031", "tier": 1, "tag": "Criteria", "fire_when": [], "skip_when": [], "note": "Ask this before they define criteria with someone else. What they say here becomes the rubric you demo against in M8.", "l1": {"q": "If you were to evaluate a solution for this — what would the non-negotiables be?", "goal": "Shapes the evaluation frame before a competitor does."}, "l2": {"q": "Which non-negotiable has disqualified solutions in the past?", "goal": "Find the deal-killer criterion"}, "l3": {"q": "If we met every non-negotiable, what's the remaining hesitation?", "goal": "Surface the hidden objection"}}, {"id": "dq-030", "tier": 1, "tag": "Competition", "fire_when": [], "skip_when": [], "note": "Opens the competitive landscape and reveals what killed prior deals. Both are gold.", "l1": {"q": "Have you looked at solutions for this before — and if so, what's kept you from moving forward?", "goal": "Surfaces prior evaluations and decision blockers."}, "l2": {"q": "Was it the product that didn't work, or timing, budget, or internal alignment?", "goal": "Separate product gaps from process gaps"}, "l3": {"q": "What would need to be different this time for you to actually move forward?", "goal": "Get their conditions for commitment"}}, {"id": "m2rip-12", "tier": 2, "tag": "Pain", "fire_when": [], "skip_when": [], "l1": {"q": "Is there anyone on your side who'd push back on moving forward — and what would their concern be?", "goal": "Surface hidden blockers"}, "l2": {"q": "Is that a product concern, a budget concern, or a timing concern?", "goal": "Categorize the blocker"}, "l3": {"q": "How would you address that if it came up?", "goal": "Test champion readiness"}}]}, {"id": "m2-confirming", "name": "Confirm & Advance — Secure Coordination Meeting", "questions": [{"id": "dq-033", "tier": 1, "tag": "Pain", "fire_when": [], "skip_when": [], "note": "If 'nice-to-have' — the belief shift didn't fully land. Go back to pain. If 'real problem' — proceed to close.", "l1": {"q": "Does what you've seen feel like it solves a real problem — or is this more of a nice-to-have?", "goal": "Binary test — forces a position"}, "l2": {"q": "What makes it real — is there a cost to not solving it, or a specific event that forces action?", "goal": "Anchor urgency to concrete trigger"}, "l3": {"q": "If you do nothing for twelve months, what's the most likely downside?", "goal": "Cost of inaction in their words"}, "question_type": "confirming"}, {"id": "dq-034", "tier": 1, "tag": "Process", "fire_when": [], "skip_when": [], "note": "Every name they give you is a person you need to multi-thread with before M8.", "l1": {"q": "If this is worth exploring further, who else on your team would need to weigh in on whether it fits your environment?", "goal": "Stakeholder mapping for the buying committee."}, "l2": {"q": "What's each person's likely reaction — supportive, skeptical, or unknown?", "goal": "Pre-map the room"}, "l3": {"q": "Who's the hardest to convince, and what would it take?", "goal": "Identify the blocker"}}, {"id": "dq-036", "tier": 1, "tag": "Champion", "fire_when": [], "skip_when": [], "note": "Whatever they say here tells you exactly what materials, references, or framing they need to get internal buy-in.", "l1": {"q": "What would you need from us to feel comfortable recommending the next step to your team?", "goal": "Arms the champion"}, "l2": {"q": "When you make that recommendation, what pushback do you expect?", "goal": "Prepare champion for resistance"}, "l3": {"q": "Would it help if I put together a one-pager so you don't have to build the case from scratch?", "goal": "Champion leaves armed"}, "question_type": "confirming"}, {"id": "dq-035", "tier": 1, "tag": "Process", "fire_when": [], "skip_when": [], "note": "Name the meeting type. 'Coordination meeting' is specific and bounded. 'Follow up' is vague and dies.", "l1": {"q": "Would it make sense to get the right stakeholders together for a coordination meeting to scope this out properly?", "goal": "Proposes M3"}, "l2": {"q": "What would need to happen between now and that meeting to keep momentum?", "goal": "Create interim commitments"}, "l3": {"q": "Can we get it on the calendar right now?", "goal": "Book it live"}, "question_type": "confirming"}]}]}, "M3": {"name": "Coordination Meeting", "belief_shift": "A proper evaluation requires defined scope, roles, timeline — and the economic buyer's awareness from day one.", "stages": [{"id": "m3-align", "name": "Align — Confirm Pain & Stakeholder Map", "goal": "Re-anchor the pain that earned this meeting. Map every person who touches or influences the decision. Identify the economic buyer by name and role. Understand their relationship to the champion.", "belief_shift_target": "Move from 'I'm exploring this' to 'I know exactly who needs to be involved, what each person cares about, and who ultimately says yes.'", "questions": [{"id": "dq-037", "tier": 1, "tag": "EB", "fire_when": ["economic_buyer_missing", "audit_risk"], "skip_when": [], "note": "Identifies the economic buyer or their proxy.", "l1": {"q": "When an LP or auditor pushes back on a distribution number — who in your organization is ultimately on the hook for defending it?", "goal": "Identifies the economic buyer or their proxy"}, "l2": {"q": "How involved are they in the day-to-day, or do they only engage when something escalates?", "goal": "Map EB engagement style"}, "l3": {"q": "What would they need to see from us to feel like this evaluation is worth their time?", "goal": "Get EB decision criteria"}}, {"id": "dq-038", "tier": 1, "tag": "Process", "fire_when": ["decision_process_unclear"], "skip_when": [], "note": "Maps the full buying committee. Surfaces hidden influencers.", "l1": {"q": "If we're going to evaluate this properly — who needs to be in the room to make sure nothing gets missed?", "goal": "Maps the full buying committee"}, "l2": {"q": "What does each of those people care about most — cost, risk, workflow, or something else?", "goal": "Map concerns by stakeholder"}, "l3": {"q": "Is there anyone not on that list who could slow things down later?", "goal": "Surface hidden influencers"}}, {"id": "dq-042", "tier": 1, "tag": "Champion", "fire_when": ["ownership_unclear"], "skip_when": [], "note": "MEDDPICC Champion gap fill. Identifies motivation.", "l1": {"q": "Who on your team has the most to gain personally if this gets solved the right way?", "goal": "Identifies the champion and their motivation"}, "l2": {"q": "What's driving them — is it workload, career growth, or frustration with the current process?", "goal": "Understand champion motivation"}, "l3": {"q": "How much internal capital do they have to push something like this through?", "goal": "Test champion strength"}}, {"id": "dq-106", "tier": 1, "tag": "EB", "fire_when": ["economic_buyer_missing", "eb_gatekeeping"], "skip_when": [], "note": "Maps EB engagement style. Determines whether EB needs operational evidence or strategic framing.", "l1": {"q": "You mentioned [name] would need to be involved — what does their day-to-day look like? Are they in the weeds on fund ops, or more strategic oversight?", "goal": "Maps EB engagement style"}, "l2": {"q": "When they evaluate a new investment in technology, what lens do they use — cost savings, risk reduction, or growth enablement?", "goal": "Get EB decision criteria"}, "l3": {"q": "Have they ever killed a project like this before — and if so, why?", "goal": "Surface EB dealbreakers"}}, {"id": "dq-107", "tier": 1, "tag": "EB", "fire_when": ["economic_buyer_missing", "pricing_discussion"], "skip_when": [], "note": "Discovers the EB's decision criteria before the EB is in the room. Arms the champion.", "l1": {"q": "When your CFO or COO evaluates an investment in operational technology — what matters most to them? Cost reduction, risk mitigation, or being able to scale?", "goal": "Discovers EB decision lens before they're in the room"}, "l2": {"q": "Have they approved something similar before — what did that process look like?", "goal": "Learn the approval pattern"}, "l3": {"q": "What's the threshold where they'd say 'just do it' versus requiring a full committee review?", "goal": "Map authority levels"}}, {"id": "dq-108", "tier": 1, "tag": "Process", "fire_when": ["decision_process_unclear", "timeline_delay"], "skip_when": [], "note": "Surfaces historical blockers and internal political dynamics. Prevents repeating past failures.", "l1": {"q": "Has your team tried to get something like this approved before? What happened?", "goal": "Surfaces historical blockers"}, "l2": {"q": "Was it the product that didn't work, the timing, or the internal politics?", "goal": "Categorize what went wrong"}, "l3": {"q": "What would need to be different this time for it to actually get across the line?", "goal": "Get success conditions"}}], "exit_criteria": [{"criterion": "Economic buyer identified by name and title", "meddpicc": "Economic Buyer", "required": true, "if_not_met": "Ask directly: 'If we got through the full evaluation and both sides agreed this was a fit — who writes the check? Who has the authority to say yes?' Do not leave M3-align without this."}, {"criterion": "Full buying committee mapped", "meddpicc": "Decision Process", "required": true, "if_not_met": "Walk through the decision chain: 'You'd evaluate the workflow. Who evaluates the cost? Who evaluates the security? Who signs the contract?' Each answer is a stakeholder."}, {"criterion": "Champion's internal credibility confirmed", "meddpicc": "Champion", "required": true, "if_not_met": "Ask: 'Have you championed something like this internally before? How did it go?' If they haven't, you may have a coach, not a champion."}, {"criterion": "EB's decision lens identified", "meddpicc": "Decision Criteria", "required": false}, {"criterion": "Historical blockers surfaced", "meddpicc": "Decision Process", "required": false}], "champion_coaching": [{"id": "cc-001", "prompt": "Ask the champion: 'When you bring this to [EB name], what's the one thing they'll ask first?' Then build the answer together.", "surface_when": "Champion mentions needing to 'run it by' or 'get buy-in from' someone senior."}, {"id": "cc-002", "prompt": "Test the champion: 'If [EB name] asked you right now why this matters, what would you say?' If their answer is vague, help sharpen it.", "surface_when": "After the stakeholder map is built and before the MAP is locked."}, {"id": "cc-003", "prompt": "Offer to build champion materials: 'Would it help if we put together a one-page summary you can share with [EB name] before we ask for their time?'", "surface_when": "Champion expresses any hesitation about engaging the EB."}], "stage_objections": [], "reframes": [{"id": "rf-033", "text": "A structured evaluation protects both sides. It prevents scope creep, sets clear expectations, and gives the team a framework to make a confident decision."}, {"id": "rf-064", "text": "The biggest risk in any evaluation isn't picking the wrong vendor. It's getting to month four and realizing the person who says yes was never in the process."}, {"id": "rf-065", "text": "The best evaluations we've seen work backwards from the decision — who makes it, what they need to see, and by when. That shapes everything else."}, {"id": "rf-066", "text": "We've seen deals move fast when the champion understands exactly what the EB cares about and builds the business case around that specific lens."}, {"id": "rf-067", "text": "The champion doesn't need the EB in every meeting. They need the EB to know the evaluation is happening, understand why, and have a defined moment where they engage."}], "competitor_paths": [], "next_steps": [], "proof_points": [{"id": "pp-046", "text": "Deals where the EB is identified and briefed by the coordination meeting close 2.5x faster than deals where the EB surfaces late in the process."}, {"id": "pp-047", "text": "Firms that run a structured MAP with defined milestones complete their evaluation in 45-60 days. Firms without one average 4-6 months — and many stall entirely."}]}, {"id": "m3-map", "name": "Map — Decision Process & Competitive Landscape", "goal": "Document the full decision process end-to-end: procurement steps, approval chain, timeline constraints, evaluation criteria, and competitive alternatives. Shape the evaluation rubric before someone else does.", "belief_shift_target": "Move from 'we'll figure out the process as we go' to 'the decision process has specific steps, specific owners, and a specific timeline — and we've documented it.'", "questions": [{"id": "dq-039", "tier": 1, "tag": "Process", "fire_when": ["decision_process_unclear", "timeline_delay"], "skip_when": [], "note": "Learns their procurement pattern. Identifies potential blockers early.", "l1": {"q": "Walk me through how decisions like this have been made at your firm in the past — what worked, and what slowed things down?", "goal": "Learns procurement pattern"}, "l2": {"q": "How long did the last one take from 'yes, let's evaluate' to signed contract?", "goal": "Calibrate timeline expectations"}, "l3": {"q": "Where in that process did it stall — and what unstuck it?", "goal": "Identify and pre-solve blockers"}}, {"id": "dq-040", "tier": 1, "tag": "Process", "fire_when": ["fund_growth", "timeline_delay"], "skip_when": [], "note": "Identifies the compelling event. Creates timeline urgency.", "l1": {"q": "Is there something on your calendar — a fundraise, an audit, a fund launch — that creates natural urgency around getting this resolved?", "goal": "Identifies the compelling event"}, "l2": {"q": "How does that timeline affect when you'd need a solution in place?", "goal": "Reverse-engineer the decision deadline"}, "l3": {"q": "If we worked backward from that date, what would the evaluation need to look like?", "goal": "Build the MAP from the compelling event"}}, {"id": "dq-041", "tier": 2, "tag": "Competition", "fire_when": ["vendor_comparison"], "skip_when": [], "note": "MEDDPICC Competition gap fill. Surfaces competitive landscape.", "l1": {"q": "Are you looking at anyone else for this — or is this the only conversation you're having?", "goal": "Maps competitive landscape"}, "l2": {"q": "What's impressed you or disappointed you about what you've seen so far?", "goal": "Learn competitor strengths and gaps"}, "l3": {"q": "If you had to pick evaluation criteria right now, what would be on the list?", "goal": "Shape criteria before competitors do"}}, {"id": "dq-043", "tier": 1, "tag": "Criteria", "fire_when": ["decision_process_unclear", "vendor_comparison"], "skip_when": [], "note": "MEDDPICC Decision Criteria gap fill. Shapes the evaluation rubric.", "l1": {"q": "Does your team have formal criteria for evaluating something like this, or are we building that as we go?", "goal": "Shapes the evaluation rubric"}, "l2": {"q": "What would be the top three things on that list?", "goal": "Anchor the criteria"}, "l3": {"q": "Is there a non-negotiable that's killed deals in the past?", "goal": "Find the dealbreaker criterion"}}, {"id": "dq-044", "tier": 1, "tag": "Process", "fire_when": ["decision_process_unclear", "timeline_delay"], "skip_when": [], "note": "MEDDPICC Paper Process gap fill. Surfaces legal/procurement blockers early.", "l1": {"q": "What does your standard vendor onboarding process look like — procurement, security, legal?", "goal": "Surfaces paper process blockers early"}, "l2": {"q": "How long does that typically take end to end?", "goal": "Calibrate timeline"}, "l3": {"q": "Can we start any of that in parallel while we're still evaluating?", "goal": "Compress the timeline"}}, {"id": "dq-109", "tier": 1, "tag": "Criteria", "fire_when": ["vendor_comparison", "decision_process_unclear"], "skip_when": [], "note": "Co-creates the evaluation rubric. Anchors criteria that favor Maybern's strengths before competitors shape it.", "l1": {"q": "Let's define the evaluation criteria together right now — what should be on the list? Accuracy, speed, auditability, integrations?", "goal": "Co-creates the rubric with criteria that favor Maybern"}, "l2": {"q": "Which of those is the one where you'd walk away if we didn't deliver?", "goal": "Find the must-have"}, "l3": {"q": "How would you weight these if you had to rank them?", "goal": "Prioritize criteria"}}, {"id": "dq-110", "tier": 1, "tag": "Process", "fire_when": ["timeline_delay", "decision_process_unclear"], "skip_when": [], "note": "Surfaces procurement bottlenecks early. Parallel-pathing security review prevents it from becoming a late-stage blocker.", "l1": {"q": "Is there a security review or IT assessment that needs to happen? How long does that usually take?", "goal": "Surfaces procurement bottlenecks"}, "l2": {"q": "Can we kick that off now so it doesn't become a bottleneck at the end?", "goal": "Parallel-path security"}, "l3": {"q": "Who on your IT side should we send the SOC 2 report and DDQ to?", "goal": "Get the contact and start the process"}}, {"id": "dq-111", "tier": 2, "tag": "Competition", "fire_when": ["vendor_comparison"], "skip_when": [], "note": "Pre-positions against competitor weaknesses by getting the buyer to articulate their own skepticism about demo-stage evaluations.", "l1": {"q": "When your team looks at vendors in this space — what's the thing that usually looks great in the demo but falls apart in real life?", "goal": "Pre-positions against competitor weaknesses"}, "l2": {"q": "What specifically broke down — was it the data handling, the implementation, or the ongoing support?", "goal": "Map the failure pattern"}, "l3": {"q": "How would you want to test for that this time around?", "goal": "Shape evaluation to favor Maybern's strengths"}}], "exit_criteria": [{"criterion": "Decision process documented end-to-end", "meddpicc": "Decision Process", "required": true, "if_not_met": "Walk through it step by step: 'After the tailored demo, what happens next? Who reviews? How long does that take? Then what?'"}, {"criterion": "Compelling event identified and anchored", "meddpicc": "Decision Process", "required": true, "if_not_met": "Ask: 'Is there anything on your calendar in the next 6-12 months that would make resolving this more urgent — a fundraise, an audit, a new fund launch?' If truly nothing — flag as deal risk."}, {"criterion": "Evaluation criteria co-created or at minimum discussed", "meddpicc": "Decision Criteria", "required": true, "if_not_met": "Propose: 'Based on what we've discussed, accuracy with real data, implementation speed, and ongoing support seem like the right criteria. Does that feel right, or are there others?'"}, {"criterion": "Competitive landscape mapped", "meddpicc": "Competition", "required": false}, {"criterion": "Security/procurement timeline estimated", "meddpicc": "Paper Process", "required": false}], "champion_coaching": [], "stage_objections": [{"id": "obj-055", "category": "EVALUATION PROCESS", "objection": "We don't have formal evaluation criteria — we'll just know when we see the right solution.", "response": "That instinct is valid, but it's hard to get multiple stakeholders to agree on 'we'll know it when we see it.' A written set of criteria — even a simple one — gives everyone a shared rubric. It also protects you from a competitor who looks flashy in a demo but can't handle your actual fund structures."}, {"id": "obj-056", "category": "COMPETITIVE EVALUATION", "objection": "We want to evaluate at least two or three vendors before committing to a process.", "response": "Makes total sense. A structured evaluation actually makes that easier — same criteria, same data, same stakeholders evaluating each vendor. Without that, you end up comparing apples to oranges because each vendor shows you something different."}, {"id": "obj-057", "category": "TIMELINE RESISTANCE", "objection": "We can't commit to a timeline right now — there's too much uncertainty.", "response": "Understood. Let's work backwards from the compelling event you mentioned. If [fundraise/audit/year-end] is the milestone, what would the timeline need to look like to have a decision by then? Even a rough sketch gives us something to test."}], "reframes": [{"id": "rf-068", "text": "The evaluation criteria should reflect what matters after the demo — implementation speed, data accuracy with real fund structures, and ongoing support. That's where the decision actually gets made."}, {"id": "rf-069", "text": "Starting the security review in parallel doesn't commit you to anything. It just prevents a two-month bottleneck at the end when everyone's ready to move."}, {"id": "rf-070", "text": "Most evaluations stall because the process was never defined. When we map it now, we can tell you within a week if the timeline is realistic or if we need to adjust."}, {"id": "rf-034", "text": "The NDA and data-access steps let us work with real information instead of hypotheticals — that's where the evaluation gets meaningful."}], "competitor_paths": [{"id": "comp-045", "trigger": "Buyer names a specific competitor they're also evaluating", "path": "Don't attack. Ask: 'What criteria are you using to evaluate them?' Then shape the rubric: 'Would it be useful to define the evaluation criteria together so each vendor is measured against the same bar? We're happy to be evaluated on accuracy with real data, implementation timeline, and ongoing support.' This anchors criteria that favor Maybern."}, {"id": "comp-046", "trigger": "Buyer says they saw a demo from a competitor and liked it", "path": "Acknowledge and redirect: 'Demos are designed to look good. The real test is what happens when you feed in your actual fund structures — the side letters, the catch-up provisions, the multi-currency waterfalls. Let's make that part of the evaluation criteria.'"}, {"id": "comp-047", "trigger": "Buyer mentions building internally or using existing tools", "path": "Don't argue. Ask: 'What would the internal build need to cover — and who would maintain it once the person who built it moves on? Let's include build-vs-buy as an explicit evaluation criterion so the comparison is transparent.'"}], "next_steps": [], "proof_points": []}, {"id": "m3-lock", "name": "Lock — MAP, NDA & EB Commitment", "goal": "Lock the Mutual Action Plan with specific dates and owners. Secure NDA/data-access commitment. Get a specific commitment for when and how the EB enters the evaluation — not a vague 'at some point' but a defined milestone.", "belief_shift_target": "Move from 'I'll bring leadership in when the time is right' to 'we've agreed on a specific milestone where leadership sees the evaluation — and I know what to tell them before that meeting.'", "questions": [{"id": "dq-112", "tier": 1, "tag": "Process", "fire_when": ["timeline_delay"], "skip_when": [], "note": "Tests timeline commitment. Surfaces hidden constraints.", "l1": {"q": "Based on everything we've mapped out — does a 45-day evaluation timeline feel realistic, or are there constraints we should plan around?", "goal": "Tests timeline commitment"}, "l2": {"q": "What's the biggest risk to that timeline?", "goal": "Surface blockers"}, "l3": {"q": "If we built in a buffer for [risk], would that work?", "goal": "Solve the constraint"}, "question_type": "confirming"}, {"id": "dq-113", "tier": 1, "tag": "EB", "fire_when": ["economic_buyer_missing", "eb_gatekeeping"], "skip_when": [], "note": "Defines the EB engagement milestone. Gets the champion to commit to a specific moment, not a vague 'eventually.'", "l1": {"q": "At what point in this process should your CFO or COO see what we've put together — and what would they need to feel confident?", "goal": "Defines the EB engagement milestone"}, "l2": {"q": "Would a 20-minute focused session work better than a full demo for them?", "goal": "Reduce friction on EB engagement"}, "l3": {"q": "Can we target [date] for that — and what do they need from you before they'll commit the time?", "goal": "Lock the EB meeting"}, "question_type": "confirming"}, {"id": "dq-114", "tier": 1, "tag": "Champion", "fire_when": ["economic_buyer_missing", "eb_gatekeeping"], "skip_when": [], "note": "Offers to arm the champion. Reduces friction of EB engagement.", "l1": {"q": "Would it help if we put together a brief for [name] — the problem, the cost, and what we've covered so far — so they're up to speed before that meeting?", "goal": "Arms the champion with EB materials"}, "l2": {"q": "What format works best for them — a one-pager, a quick call, or an email summary?", "goal": "Match the EB's communication preference"}, "l3": {"q": "When would you want to share that with them?", "goal": "Create a commitment on timing"}, "question_type": "confirming"}, {"id": "dq-115", "tier": 1, "tag": "Process", "fire_when": ["timeline_delay"], "skip_when": [], "note": "Books multiple meetings in one shot. Creates commitment and velocity.", "l1": {"q": "Can we lock the next few milestones on the calendar right now — the Value Creation Workshop, the Process Review, and the Tailored Demo?", "goal": "Books multiple meetings in one shot"}, "l2": {"q": "What does your team's availability look like over the next three weeks?", "goal": "Narrow the dates"}, "l3": {"q": "Let me send the invites today so we don't lose momentum.", "goal": "Close it now"}, "question_type": "confirming"}, {"id": "dq-116", "tier": 1, "tag": "Process", "fire_when": ["timeline_delay", "decision_process_unclear"], "skip_when": [], "note": "Surfaces deal risk early. Gets ahead of surprises.", "l1": {"q": "Is there anything that could derail this between now and our next milestone — a reorg, a budget freeze, a competing priority?", "goal": "Surfaces deal risk early"}, "l2": {"q": "How likely is that — and what would trigger it?", "goal": "Assess probability"}, "l3": {"q": "How should we plan around it if it happens?", "goal": "Build contingency"}, "question_type": "confirming"}], "exit_criteria": [{"criterion": "MAP locked with dates and owners", "meddpicc": "Decision Process", "required": true, "if_not_met": "Build it live: 'Let's draft this together right now. Value Creation Workshop — [date]. Process Review — [date]. Tailored Demo — [date]. NDA — by [date]. Data access — by [date]. Does that work?'"}, {"criterion": "NDA and data access committed with timeline", "meddpicc": "Paper Process", "required": true, "if_not_met": "Ask directly: 'What's preventing us from moving on the NDA this week? Is it a legal review? We can send a standard mutual NDA today.'"}, {"criterion": "EB engagement milestone defined", "meddpicc": "Economic Buyer", "required": true, "if_not_met": "This is the most critical exit criterion. Ask: 'We've mapped the whole process — at what point does [EB name] see this? The tailored demo is usually where leadership engages. Can we target [date] for that?'"}, {"criterion": "Security review initiated in parallel", "meddpicc": "Paper Process", "required": false}, {"criterion": "Champion armed with EB briefing materials", "meddpicc": "Champion", "required": false}], "champion_coaching": [{"id": "cc-004", "prompt": "Before we wrap: when you brief [EB name], lead with the cost of the status quo — the hours, the risk, the scaling problem. The product is secondary to the problem.", "surface_when": "Always — end of M3-lock."}, {"id": "cc-005", "prompt": "If [EB name] asks 'why now' — the answer is [compelling event]. That's the natural deadline. Everything works backward from there.", "surface_when": "When a compelling event has been identified in M3-map."}, {"id": "cc-006", "prompt": "The strongest champions position it as: 'I've been evaluating this and I think it's worth your time. Here's a 15-minute brief and then a 45-minute demo with our actual data. If it doesn't pass the bar, we stop.'", "surface_when": "Champion is nervous about EB engagement."}], "stage_objections": [{"id": "obj-058", "category": "EB ENGAGEMENT RESISTANCE", "objection": "It's too early to bring leadership into this — I need to vet it more first.", "response": "Totally fair. We're not asking for a leadership meeting tomorrow. We're asking: at what milestone would it make sense for them to see this? If the tailored demo is that milestone, let's work backward from there and make sure they're briefed before they walk in."}, {"id": "obj-059", "category": "EB ENGAGEMENT RESISTANCE", "objection": "My [CFO/COO] doesn't get involved until there's a proposal on the table.", "response": "That's common — and it often means the EB's first exposure to the evaluation is a price conversation, which skips the context. What if we ensured [EB name] had a 15-minute brief on the problem and the cost before the proposal? That way the pricing conversation happens with context, not in a vacuum."}, {"id": "obj-060", "category": "MAP RESISTANCE", "objection": "We don't need a formal plan — we can just schedule meetings as we go.", "response": "Absolutely — and if it were just the two of us, that would work. The challenge is coordinating multiple stakeholders across procurement, security, finance, and leadership. The MAP is just a shared calendar with owners. It prevents the 'we'll get to it' drift that adds months to evaluations."}], "reframes": [{"id": "rf-071", "text": "The MAP isn't a contract — it's a shared plan. If something changes, we adjust. But without it, evaluations drift and everyone loses momentum."}, {"id": "rf-072", "text": "The champion doesn't need the EB in every meeting. They need the EB aware of the evaluation, briefed on the problem, and scheduled for one key meeting where they see the platform handle their actual data."}, {"id": "rf-073", "text": "Here's what works: the champion briefs the EB on the problem and the cost. We handle the product demonstration. The EB never has to sit through discovery — they come in at the decision point."}, {"id": "rf-074", "text": "Locking the NDA and data access now means every subsequent meeting works with real information. That's the difference between evaluating a concept and evaluating a solution."}, {"id": "rf-075", "text": "The most successful evaluations we run share one thing: the EB knows it's happening from day one. They don't need to be in the room — they just need to be on the map."}], "competitor_paths": [], "next_steps": [{"id": "ns-045", "text": "Let me send over the MAP with the milestones we discussed, the NDA for review, and a data access request. You'll have it by end of day."}, {"id": "ns-046", "text": "Can we confirm: [EB name] will be briefed by [date] and scheduled for the tailored demo on [date]? I'll send a one-pager to support that conversation."}, {"id": "ns-047", "text": "The security review — can your IT team start that in parallel this week? I'll send the SOC 2 report and the DDQ responses."}, {"id": "ns-048", "text": "One last thing: is there anyone we haven't discussed who might have an opinion or veto power? Better to surface them now than at the finish line."}], "proof_points": [{"id": "pp-048", "text": "Evaluations with a locked MAP and EB commitment complete in 45-60 days. Without one, the average is 4-6 months — and 40% stall entirely."}, {"id": "pp-049", "text": "Champions who brief the EB before the tailored demo convert at 3x the rate of champions who bring the EB in cold."}]}], "stage_keys": ["align", "map", "lock"]}, "M4": {"name": "Value Creation Workshop", "belief_shift": "The cost of inaction is quantifiable and material.", "stages": [{"id": "m4-frame", "name": "Frame — Set the Diagnostic Context", "goal": "Establish that this is a collaborative quantification exercise — not a sales pitch. The buyer should feel like they're building the business case with you, not being sold one.", "belief_shift_target": "Move from 'this is inconvenient but manageable' to 'the cost of inaction is quantifiable and material — I can put a number on it.'", "questions": [{"id": "dq-117", "tier": 1, "tag": "EB", "fire_when": ["economic_buyer_missing"], "skip_when": [], "note": "Surfaces the EB early in M4. If the EB wasn't identified in M3, this catches the gap.", "l1": {"q": "Who would ultimately need to sign off on an investment like this — and what would they need to see to say yes?", "goal": "Surfaces the EB if not already identified"}, "l2": {"q": "Do they tend to focus on hard ROI numbers, or is risk reduction enough?", "goal": "Calibrate the business case narrative"}, "l3": {"q": "Have they ever greenlit something based on risk alone, without a full cost analysis?", "goal": "Test whether qualitative case is sufficient"}}, {"id": "dq-118", "tier": 1, "tag": "EB", "fire_when": ["economic_buyer_missing", "pricing_discussion"], "skip_when": [], "note": "Calibrates the ROI narrative for the EB's specific lens before building the model.", "l1": {"q": "When your CFO or COO evaluates a business case for operational technology — do they think cost savings, risk reduction, or strategic capability? What resonates most?", "goal": "Calibrates the ROI narrative for the EB"}, "l2": {"q": "What's an example of an investment they approved quickly — and what made them say yes?", "goal": "Learn the EB's decision pattern"}, "l3": {"q": "What's an example of one they killed — and what was missing?", "goal": "Learn the EB's dealbreakers"}}], "exit_criteria": [{"criterion": "Collaborative framing established", "meddpicc": "Champion", "required": true, "if_not_met": "Reframe: 'I want to be clear — this isn't about selling you on a number. It's about building a picture of what the current process actually costs so you can make an informed decision.'"}, {"criterion": "EB decision lens identified", "meddpicc": "Economic Buyer", "required": true, "if_not_met": "Ask dq-118 directly. Do not proceed to quantification without knowing which ROI dimension matters most to the person who approves the budget."}], "champion_coaching": [{"id": "cc-007", "prompt": "Before we start quantifying — who will you be presenting this to, and what's the one number they'll fixate on?", "surface_when": "Opening of M4-frame, before the first ROI prompt."}], "stage_objections": [], "reframes": [{"id": "rf-035", "text": "What we usually discover during this exercise is that the cost isn't obvious because the work is distributed across the team. Nobody owns the full number."}, {"id": "rf-036", "text": "The real cost usually shows up after the information has already been gathered — in the reconciliation, the validation, the shadow work nobody budgeted for."}, {"id": "rf-037", "text": "Many teams underestimate how much time this workflow consumes across analysts because each person only sees their slice of it."}, {"id": "rf-038", "text": "The hardest costs to see are the ones baked into the process — the extra headcount, the late distributions, the hours spent checking the admin's work."}, {"id": "rf-039", "text": "Most organizations don't even run through this exercise. The cost is there — they just haven't noticed it because nobody sat down to calculate it."}, {"id": "rf-040", "text": "We try to make everything tangible. If a number feels wrong, say so — we'll adjust it together. This is your model, not ours."}, {"id": "rf-041", "text": "I'm going to save this and share the link — you can toggle the numbers offline. This is your model. If something doesn't pass the sniff test, adjust it."}, {"id": "rf-076", "text": "The business case we build today should be something you can put in front of your [CFO/COO] as-is — no translation needed. Let's build it in their language."}, {"id": "rf-077", "text": "I'd rather we build a conservative model that your CFO believes than an aggressive one they discount. What matters is that the directional math is undeniable."}], "competitor_paths": [], "next_steps": [], "proof_points": [{"id": "pp-022", "text": "A healthcare PE controller called the platform pricing 'not that expensive' once the cost of the existing validation process was quantified — roughly $37K/year was a fraction of what the manual process cost."}, {"id": "pp-023", "text": "Most firms find the ROI case is straightforward once the numbers are on paper. The harder part is sitting down to do the math."}]}, {"id": "m4-diagnose", "name": "Diagnose — Map Workflow, Quantify Cost, Surface Risk", "goal": "Walk through the buyer's workflow systematically. Quantify time and effort at each step. Surface operational risk. Build a rough ROI model collaboratively. This is the core of the meeting.", "belief_shift_target": "Move from 'this is just how it works' to 'the total cost of this process is $X per year, it scales worse than linearly, and there's a key person risk we haven't addressed.'", "questions": [{"id": "dq-050", "tier": 2, "tag": "Metrics", "fire_when": ["status_quo_confidence", "roi_curiosity"], "skip_when": [], "note": "If yes — use their number as the starting point. If no — this meeting is the first time. That's significant: it means nobody has ever forced the calculation.", "l1": {"q": "Have you ever actually put a number on what the current process costs you — in headcount, hours, or distribution delays?", "goal": "Tests whether they've already quantified the problem"}, "l2": {"q": "What was the number — and did it surprise anyone?", "goal": "Get the anchor number"}, "l3": {"q": "If we came up with a different number today, would you trust ours or yours?", "goal": "Establish whose math they'll use"}}, {"id": "dq-045", "tier": 2, "tag": "Metrics", "fire_when": ["manual_process", "workflow_fragility"], "skip_when": [], "note": "Start here. This is the anchor number. Everything else builds on it. If they can't estimate, break it down: 'How many people touch the process? How many hours each?'", "l1": {"q": "How many person-hours per quarter does your team spend on waterfall calcs, validation, and LP reconciliation — ballpark?", "goal": "Quantifies the labor cost"}, "l2": {"q": "How much of that is senior people versus junior people?", "goal": "Get fully-loaded cost basis"}, "l3": {"q": "What would those senior people work on if they got that time back?", "goal": "Connect to opportunity cost"}}, {"id": "dq-046", "tier": 2, "tag": "Metrics", "fire_when": ["roi_curiosity", "budget_pushback"], "skip_when": [], "note": "Do the math together. If they won't say the rate, use $150K fully-loaded as a proxy and let them correct it.", "l1": {"q": "If you translated those hours into a fully-loaded annual cost — what does that number look like?", "goal": "Converts hours to dollars"}, "l2": {"q": "Does that number surprise you, or is it about what you'd expect?", "goal": "Test whether the pain is felt at the cost level"}, "l3": {"q": "How does that compare to what a platform like ours would cost?", "goal": "Set up the ROI comparison"}}, {"id": "dq-047", "tier": 2, "tag": "Metrics", "fire_when": ["fund_growth", "scale_discussion", "volume_increase"], "skip_when": [], "note": "The answer is almost always 'worse.' Each new fund adds side letters, unique fee arrangements, and another set of Excel models. Complexity is nonlinear.", "l1": {"q": "What happens to that number when your fund count doubles in the next 18 months — does it scale linearly, or does it get worse?", "goal": "Projects future cost"}, "l2": {"q": "At what fund count does the team need another hire just to keep up?", "goal": "Find the headcount avoidance threshold"}, "l3": {"q": "What does a fully-loaded hire cost you in this market?", "goal": "Anchor the headcount avoidance value"}}, {"id": "dq-120", "tier": 2, "tag": "Pain", "fire_when": ["audit_risk", "workflow_fragility"], "skip_when": [], "note": "Surfaces risk events that are emotionally resonant. Near-misses are more powerful than theoretical risk because they're real.", "l1": {"q": "Beyond the hours — has your team ever had a near-miss? A distribution that almost went out wrong, or a partner question that took days to answer?", "goal": "Surfaces emotionally resonant risk events"}, "l2": {"q": "What happened — and how did you catch it?", "goal": "Test whether detection is systematic or luck"}, "l3": {"q": "What would have happened if you hadn't caught it?", "goal": "Quantify the downside"}}, {"id": "dq-121", "tier": 2, "tag": "Pain", "fire_when": ["ownership_unclear", "workflow_fragility"], "skip_when": [], "note": "Key person risk quantification. Converts abstract dependency into concrete cost (hiring time, error risk, distribution delays).", "l1": {"q": "If the person who owns your waterfall models left tomorrow — how long before someone else could pick it up, and what breaks in the meantime?", "goal": "Key person risk quantification"}, "l2": {"q": "Is that knowledge documented anywhere, or is it all in their head?", "goal": "Expose the documentation gap"}, "l3": {"q": "What would you estimate the cost of that transition at — hiring time, ramp time, error risk?", "goal": "Put a dollar figure on key person risk"}}, {"id": "dq-048", "tier": 2, "tag": "Pain", "fire_when": ["audit_risk", "vendor_comparison"], "skip_when": [], "note": "This is Level 3 on the pain ladder. Connects operational failure to personal and relationship stakes. Let them feel it.", "l1": {"q": "When an LP challenges a distribution and your team has to reconstruct the logic — what does that cost you in time, credibility, and trust?", "goal": "Adds intangible costs — trust, reputation"}, "l2": {"q": "How long does it take to pull that together — and who drops everything to do it?", "goal": "Quantify the reactive burden"}, "l3": {"q": "Has it ever damaged an LP relationship?", "goal": "Connect to relationship stakes"}}, {"id": "dq-049", "tier": 1, "tag": "EB", "fire_when": ["economic_buyer_missing", "pricing_discussion", "roi_curiosity"], "skip_when": [], "note": "Whatever number they say becomes the bar. Then use the cost data from this session to show whether the numbers clear it.", "l1": {"q": "If you had to justify this investment to your CFO next week — what ROI would they need to see?", "goal": "Learns the CFO's decision framework"}, "l2": {"q": "Is that a payback period, an annual savings number, or a risk reduction story?", "goal": "Get the format right"}, "l3": {"q": "What's the number where they'd say 'that's a no-brainer'?", "goal": "Find the threshold"}}, {"id": "dq-119", "tier": 1, "tag": "EB", "fire_when": ["roi_curiosity", "economic_buyer_missing"], "skip_when": [], "note": "Tests whether the quantified cost is large enough to trigger EB attention. If yes, the business case has legs. If no, dig deeper.", "l1": {"q": "If the status quo costs your team $X per year in hours alone — before we add risk exposure — would that number surprise your CFO?", "goal": "Tests whether the cost is large enough to trigger action"}, "l2": {"q": "Is that enough to warrant a conversation, or do we need to add the risk layer too?", "goal": "Calibrate the pitch"}, "l3": {"q": "What would make them sit up and pay attention?", "goal": "Find the EB's attention threshold"}}], "exit_criteria": [{"criterion": "At least 2 of 4 cost-of-inaction channels quantified", "meddpicc": "Metrics", "required": true, "if_not_met": "Push through at least labor + one risk channel. The model doesn't need all four to be compelling — but it needs more than just hours."}, {"criterion": "Buyer owns the numbers", "meddpicc": "Champion", "required": true, "if_not_met": "If you've been doing all the estimating, pause and recalibrate: 'I want to make sure these are your numbers, not mine. Does that 200-hour estimate feel right to you, or should we adjust?'"}], "champion_coaching": [], "stage_objections": [], "reframes": [{"id": "rf-042", "text": "What we often find is that the total hours are 3-5x what anyone initially estimates — because each person only sees their slice of the workflow."}, {"id": "rf-043", "text": "The real impact usually shows up when the process needs to scale. Adding one more fund shouldn't require adding one more person."}, {"id": "rf-044", "text": "The cost that's hardest to see is the opportunity cost — what would your team do with those hours back? That's usually where the strategic value lives."}, {"id": "rf-045", "text": "Distribution timing is the sleeper ROI. Firms that distribute 14 days late — think about the pref accrual. At scale, that's real money returned to the GP."}, {"id": "rf-046", "text": "Management teams strip out intangible benefits. What survives the CFO filter: headcount equivalence, error cost reduction, distribution timing improvement. Those three build the case."}, {"id": "rf-047", "text": "The question isn't whether the ROI is there. It's whether the team has sat down to calculate it."}, {"id": "rf-048", "text": "Any delay in distributions is a drag on pref, which translates to a drag on carry. The question is whether the team can quantify exactly how much that delay costs per event."}, {"id": "rf-049", "text": "When someone leaves, there's a real cost: time to notice, time to hire, time to ramp. Most firms estimate $75K per departure. The question is whether that knowledge is in a system or in someone's head."}, {"id": "rf-050", "text": "The cost of the status quo isn't fixed. As fund count grows, every one of these numbers gets bigger — sometimes more than linearly."}, {"id": "rf-051", "text": "Even without the intangibles, the hard numbers — headcount equivalence, distribution timing, error reduction — usually clear the bar on their own."}, {"id": "rf-052", "text": "When in doubt, be conservative. This model should be directional, not precise. Management will run their own math — if we're conservative and the numbers still work, the case is stronger."}, {"id": "rf-053", "text": "The review time probably stays consistent. What changes is the preparation — that goes from hours to minutes. So we're not eliminating your oversight, we're eliminating the setup work."}, {"id": "rf-054", "text": "Risk mitigation and unlocking data — that's what clients tell us the real value is. The workflows are nice, but having the data accessible is the night-and-day difference."}, {"id": "rf-078", "text": "Near-misses are the most important data point. They tell you the system is fragile — you just haven't had the failure yet. The question is whether you want to fix it proactively or reactively."}, {"id": "rf-079", "text": "When we run this exercise with similar firms, the total usually lands between 2x and 4x what the champion initially estimated. Not because anyone is wrong — but because the cost is distributed across so many people that nobody sees the full number."}], "competitor_paths": [{"id": "comp-017", "trigger": "Buyer asks 'can't the admin just do this?'", "path": ""}, {"id": "comp-018", "trigger": "Buyer suggests cheaper alternatives or partial solutions", "path": ""}], "next_steps": [], "proof_points": [{"id": "pp-024", "text": "A $5B+ real estate manager quantified their quarter-end close at 3 weeks of team time. After implementing a system of record, it dropped to days. The controller changed how they think about hiring."}, {"id": "pp-025", "text": "One client found a six-figure error on a single distribution in their first quarter using the platform. The cost of that single error exceeded the annual platform cost."}, {"id": "pp-026", "text": "A $23B manager chose a productized platform over Anaplan + Lionpoint. The ROI case: $1.7M/year for a platform vs. $10M+ for a custom build that would require ongoing consulting to maintain."}, {"id": "pp-027", "text": "Three ROI buckets that survive the CFO filter: efficiency gains (person-hours saved × fully-loaded rate), key person risk reduction (what would a departure cost?), distribution timing improvement (pref accrual on late distributions)."}, {"id": "pp-028", "text": "Most firms pass the platform cost through as an LP fund expense. Net cost to the GP is often zero — making the ROI effectively infinite."}, {"id": "pp-029", "text": "In one Value Creation session, a mid-market credit firm's VP of Ops mapped $32K of direct labor cost and 200 hours per fund per year — one-tenth of a full-time person. Across 5 funds, that's half a headcount nobody had budgeted for."}, {"id": "pp-030", "text": "When distribution optimization was calculated with real numbers — 3 days saved × $10M average distribution × 7% pref rate — the annual pref savings alone were material. The IRR uplift was net positive even after including platform fees."}, {"id": "pp-031", "text": "One prospect's VP of Ops said: 'Management is going to throw out the intangible numbers. They'll look at software cost vs. headcount cost — that's it.' The value creation model was rebuilt around those two numbers and the deal advanced."}, {"id": "pp-032", "text": "In one Value Creation session with a $23B RE manager, the accounting team mapped 265 hours per fund per year. The PM team added another 307 hours — more than the AE expected. When the rep said 'that's less than I expected,' the accounting team corrected by adding scenario modeling, ad hoc requests, and catch-up calcs that weren't on the original list."}], "roi_prompts": [{"id": "roi-001", "prompt": "How long does the full quarter-end process take end-to-end — from when it starts to when everything is finalized?", "quantifies": "Total cycle time per quarter. Multiply by four for annual burden."}, {"id": "roi-002", "prompt": "How many people are directly involved when that workflow runs — analysts, controllers, fund accountants?", "quantifies": "Headcount exposed to the process. Basis for fully-loaded cost calculation."}, {"id": "roi-003", "prompt": "If that activity doubled in volume — twice as many funds, twice as many investors — what would happen?", "quantifies": "Scaling trajectory. Reveals whether cost growth is linear (unlikely) or exponential."}, {"id": "roi-004", "prompt": "What portion of your team's time goes to checking the admin's work versus original analysis?", "quantifies": "Shadow work ratio. Most teams estimate 30-40%. Actual is usually 50-60%."}, {"id": "roi-005", "prompt": "How many hours does a single distribution cycle take — from calculation to notice to wire?", "quantifies": "Per-event cost. Multiply by distributions per year for annual distribution burden."}, {"id": "roi-006", "prompt": "If the finance team had 30% of their time back, what's the first thing they'd work on?", "quantifies": "Opportunity cost. Reveals what strategic work is being displaced by operational validation."}, {"id": "roi-007", "prompt": "What would it cost to hire one additional analyst to absorb the growth in fund count?", "quantifies": "Headcount avoidance value. Platform cost vs. incremental hire cost is the si
