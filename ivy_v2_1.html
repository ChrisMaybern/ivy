mplest CFO math."}, {"id": "roi-008", "prompt": "How many days late are distributions typically going out — and what's the pref accrual impact?", "quantifies": "Distribution timing ROI. Late distributions accrue preferred return. Quantifiable in dollars."}, {"id": "roi-009", "prompt": "Let's start with your team — how many senior staff and how many junior staff handle fund operations?", "quantifies": "Team composition. Basis for fully-loaded cost allocation by seniority level."}, {"id": "roi-010", "prompt": "For management fees specifically — how many hours per event, and how many times per year?", "quantifies": "Per-activity cost for fees. Multiply across all activities for total annual burden."}, {"id": "roi-011", "prompt": "For capital calls — how many hours each, and what's the annual frequency?", "quantifies": "Cap call operational cost. Usually lower per-event but multiplied by frequency."}, {"id": "roi-012", "prompt": "For distributions — how many hours, and how many per year? This is usually where the heaviest lift is.", "quantifies": "Distribution operational cost. Typically the highest-hour activity due to waterfall complexity."}, {"id": "roi-013", "prompt": "How about ad hoc LP requests — how many per year, and how long does each one take?", "quantifies": "Reactive work burden. Often underestimated. Can be 25-60 hours per year."}, {"id": "roi-014", "prompt": "If we add up those hours, does the total feel right as a sanity check — could one person running all of these activities handle roughly 10 funds?", "quantifies": "Sanity check on the aggregate number. Validates the model against the buyer's intuition."}, {"id": "roi-015", "prompt": "Should we run this for a stabilized fund or a fundraising fund? The hours will look very different — fundraising funds have closings, equalizations, catch-up interest.", "quantifies": "Lifecycle-stage calibration. Fundraising funds have 2-3x the operational burden of stabilized funds."}, {"id": "roi-016", "prompt": "Does the preparation time look different from the review time? Let's separate those — review probably stays, but preparation should shrink significantly.", "quantifies": "Isolates the automatable portion. Review time is human judgment; prep time is system work."}], "eb_alignment": [{"scenario": "", "framing": "", "script": ""}, {"scenario": "", "framing": "", "script": ""}, {"scenario": "", "framing": "", "script": ""}, {"scenario": "", "framing": "", "script": ""}, {"scenario": "", "framing": "", "script": ""}]}, {"id": "m4-advance", "name": "Align & Advance — Lock the Process Review", "goal": "Confirm the business case landed. Verify the champion can articulate ROI internally. Secure commitment for the Process Review meeting.", "belief_shift_target": "Move from 'the numbers are interesting' to 'the cost of inaction is material enough to warrant a process review — and I can make that case internally.'", "questions": [{"id": "dq-051", "tier": 1, "tag": "Pain", "fire_when": ["roi_curiosity", "status_quo_defense"], "skip_when": [], "note": "If yes — proceed to close. If 'I think so' — the conviction isn't strong enough. Go back to the number that surprised them most.", "l1": {"q": "Now that we've put numbers on this — does it feel material enough to warrant a serious evaluation?", "goal": "Binary confirmation — tests belief shift"}, "l2": {"q": "What's the one number that landed the hardest for you?", "goal": "Identify the most compelling data point"}, "l3": {"q": "Is there anything we calculated that you'd push back on?", "goal": "Stress-test the business case"}, "question_type": "confirming"}, {"id": "dq-053", "tier": 1, "tag": "EB", "fire_when": ["economic_buyer_missing", "budget_pushback"], "skip_when": [], "note": "If no — identify the specific gap. Different CFOs care about different numbers. Find out which number matters most.", "l1": {"q": "Are you comfortable that this ROI case would hold up with your CFO or investment committee?", "goal": "Final gut-check on business case credibility"}, "l2": {"q": "What's the one thing they'd challenge?", "goal": "Pre-solve the objection"}, "l3": {"q": "How should we frame that part when it comes up?", "goal": "Co-build the defense"}, "question_type": "confirming"}, {"id": "dq-055", "tier": 1, "tag": "EB", "fire_when": ["economic_buyer_missing", "pricing_discussion"], "skip_when": [], "note": "Whatever they say here shapes the proposal narrative. Write it down.", "l1": {"q": "Before we wrap — which of these cost areas carries the most weight internally? Is there anything your team tends to discount that we should lean into?", "goal": "Prioritizes the ROI narrative"}, "l2": {"q": "Is there a cost area we didn't cover that your CFO would ask about?", "goal": "Find missing ROI components"}, "l3": {"q": "Should we build the one-pager around the top two, or do we need all of them?", "goal": "Scope the champion materials"}}, {"id": "dq-052", "tier": 1, "tag": "Champion", "fire_when": ["decision_process_unclear", "economic_buyer_missing"], "skip_when": [], "note": "If they hesitate, ask: 'What would make this more presentable? Specific materials? A one-pager with the numbers?'", "l1": {"q": "Could you present this business case internally without us in the room — or do we need to tighten anything up?", "goal": "Tests champion readiness"}, "l2": {"q": "Walk me through how you'd pitch it — pretend I'm your CFO.", "goal": "Role-play the internal pitch"}, "l3": {"q": "What pushback would you expect — and how would you handle it?", "goal": "Prepare champion for resistance"}, "question_type": "confirming"}, {"id": "dq-122", "tier": 1, "tag": "Champion", "fire_when": ["economic_buyer_missing"], "skip_when": [], "note": "Final calibration of the champion's internal pitch. Different EBs respond to different frames.", "l1": {"q": "When you present this to [name] — which version of the story resonates with them? The efficiency angle, the risk angle, or the strategic transformation angle?", "goal": "Calibrates champion's internal pitch"}, "l2": {"q": "How would you open that conversation — what's the first thing you'd say?", "goal": "Sharpen the opening"}, "l3": {"q": "If they push back with 'we have bigger priorities,' what's your answer?", "goal": "Arm the champion for objections"}, "question_type": "confirming"}, {"id": "dq-123", "tier": 1, "tag": "Process", "fire_when": ["decision_process_unclear", "economic_buyer_missing"], "skip_when": [], "note": "Distinguishes between EB sole authority and committee decision. Changes the deal strategy entirely.", "l1": {"q": "Is there a version of this that gets a quick yes from [name], or does everything go through a formal committee?", "goal": "Maps EB authority level"}, "l2": {"q": "What's the dollar threshold where it needs committee approval?", "goal": "Find the authority boundary"}, "l3": {"q": "Is there a way to structure this that stays under that threshold?", "goal": "Explore phased approach"}}, {"id": "dq-056", "tier": 1, "tag": "Process", "fire_when": ["timeline_delay"], "skip_when": [], "note": "Don't leave without a date. The Process Review should happen within 2 weeks while the numbers are fresh.", "l1": {"q": "Can we lock in the Process Review meeting right now while we're both looking at calendars?", "goal": "Books the next meeting live"}, "l2": {"q": "What works better — early next week or late?", "goal": "Binary choice closes faster"}, "l3": {"q": "I'll send the invite before we hang up.", "goal": "Don't leave without a date"}, "question_type": "confirming"}], "exit_criteria": [{"criterion": "Champion can articulate ROI without vendor in the room", "meddpicc": "Champion", "required": true, "if_not_met": "Do not leave the meeting without testing this. Ask dq-052: 'Could you present this business case internally, or do we need to sharpen any of the numbers?' If they hesitate, role-play it (cc-008)."}, {"criterion": "Process Review date locked", "meddpicc": "Decision Process", "required": true, "if_not_met": "Ask directly: 'Can we lock the process review right now while we're both looking at calendars? The numbers are freshest this week.'"}, {"criterion": "EB briefing plan confirmed", "meddpicc": "Economic Buyer", "required": true, "if_not_met": "Ask: 'What's the best way to get [EB name] up to speed — a one-pager, a quick call, or should we prep something together?' Then commit to a date."}, {"criterion": "EB decision authority confirmed", "meddpicc": "Economic Buyer", "required": false}, {"criterion": "ROI model saved and shareable", "meddpicc": "Metrics", "required": false}], "champion_coaching": [{"id": "cc-008", "prompt": "Before you present this internally — practice your 60-second pitch with me. Pretend I'm your [CFO/COO]. What would you say?", "surface_when": "End of M4-advance, before locking next steps."}, {"id": "cc-009", "prompt": "Here's what the strongest champions do: they send the one-pager before the internal meeting, not during it. Give [EB name] time to process the numbers before they're asked to react in a room.", "surface_when": "When champion commits to presenting internally."}, {"id": "cc-010", "prompt": "If [EB name] pushes back on price, the answer is: 'The platform costs $X. The status quo costs $Y. Here are the numbers.' The business case should speak for itself — you don't need to sell.", "surface_when": "When pricing sensitivity surfaces during M4-advance."}], "stage_objections": [], "reframes": [{"id": "rf-055", "text": "The numbers we built today are yours, not ours. You can present them however makes sense internally."}, {"id": "rf-056", "text": "The process review takes the cost picture we built today and connects it to specific workflow steps that can be improved."}, {"id": "rf-057", "text": "If the champion in the room can articulate this ROI to their CFO without us in the room, the deal is real."}, {"id": "rf-058", "text": "When you present this to management, lead with the hard numbers — software cost vs. headcount cost. That's the comparison they'll make. The intangibles add to it, but the hard math has to clear the bar on its own."}, {"id": "rf-059", "text": "Here's how the strongest champions present this: 'Here are all the intangible considerations. Here are the additional efficiencies we might see. But just looking at the hard numbers, this is where we're at.' If hard numbers reach parity, the intangibles push it over."}, {"id": "rf-060", "text": "If management takes a 'toe in the water' approach with one fund, pricing won't be as competitive. Expanding to all funds from the start typically unlocks better economics."}], "competitor_paths": [], "next_steps": [{"id": "ns-013", "text": "Here's what I'd suggest as next steps: a summary of the numbers we built today — sent to you same-day. Then a process review in the next two weeks to map the specific workflow that drives those costs. From there, a proposal."}, {"id": "ns-014", "text": "Can we lock the process review onto the calendar now? The numbers are freshest this week."}, {"id": "ns-015", "text": "What materials would help you present this internally — a one-pager with the cost breakdown, or a reference call with a similar firm?"}], "proof_points": [{"id": "pp-033", "text": "Champions who can articulate ROI in their own words close deals 3x faster than those who rely on the vendor to make the case."}, {"id": "pp-034", "text": "The process review connects the cost picture to specific workflow steps — it's the bridge between 'we know it costs us' and 'here's exactly how to fix it.'"}, {"id": "pp-035", "text": "One VP of Ops told his AE: 'Ops has clearly identified we need this solution. We're on your team. But management needs hard tangible figures — not reputational risk.' He then presented the efficiency calculator to management, stripped the intangibles, and led with headcount equivalence. The deal advanced."}], "eb_alignment": [{"scenario": "EB is cost-focused", "framing": "Lead with headcount equivalence: 'The platform costs less than one FTE and replaces the work of two.' Follow with distribution timing ROI as a bonus.", "script": "Tell your CFO: 'The hard numbers alone — headcount avoidance and distribution timing — make the case. The risk and strategic benefits are on top.'"}, {"scenario": "EB is risk-focused", "framing": "Lead with key person risk and audit defensibility. 'The institutional knowledge is in one person's head. The platform is the insurance policy.' Follow with cost savings as secondary.", "script": "Tell your CFO: 'We have a single point of failure on our most critical calculations. This eliminates that risk and saves money doing it.'"}, {"scenario": "EB is growth-focused", "framing": "Lead with scaling penalty: 'Every new fund adds nonlinear operational complexity. The platform absorbs that complexity so the team can focus on fundraising support, investor relations, and strategic analysis.' Follow with current cost as proof of concept.", "script": "Tell your CFO: 'We can't scale fund operations by adding headcount forever. This is the operational infrastructure that lets us grow without proportional cost growth.'"}, {"scenario": "EB hasn't been briefed yet", "framing": "This is a red flag. The champion needs to brief the EB before the tailored demo or the deal is at risk. Offer to build a one-pager. Escalate the EB engagement conversation.", "script": "Surface cc-006 (champion coaching): 'I've been evaluating this and I think it's worth your time. Here's a 15-minute brief and then a 45-minute demo with our actual data.'"}]}], "stage_keys": ["frame", "diagnose", "advance"]}, "M5": {"name": "Process Review", "belief_shift": "Our current process has specific fragilities that mirror what Maybern solves — and the right person needs to see this.", "stages": [{"id": "m5-discover", "name": "Discover — Map the End-to-End Workflow", "goal": "Walk through the buyer's process from beginning to end. Document every step, system, handoff, and person involved. This is a data-gathering phase — don't diagnose yet, just map.", "belief_shift_target": "Move from 'I know our process' to 'I had no idea how many manual handoffs and single-point-of-failure steps exist when you actually map it end-to-end.'", "questions": [{"id": "dq-057", "tier": 2, "tag": "Pain", "fire_when": ["manual_process", "workflow_fragility"], "skip_when": [], "note": "Full process mapping. Creates the artifact that drives the rest of the evaluation.", "l1": {"q": "Let's map your process end-to-end — starting from when fund terms are set, walk me through every step until an LP gets their distribution statement.", "goal": "Full process mapping"}, "l2": {"q": "Where in that flow does the most time get consumed?", "goal": "Identify the bottleneck"}, "l3": {"q": "Is that time well spent, or is most of it setup and prep work?", "goal": "Separate value-add from waste"}}, {"id": "dq-058", "tier": 2, "tag": "Pain", "fire_when": ["manual_process", "excel_dependency", "shadow_models"], "skip_when": [], "note": "Identifies manual handoff points — each one is an error risk.", "l1": {"q": "At which points in that flow does data get manually entered or re-keyed from one system to another?", "goal": "Identifies manual handoff points — each one is an error risk"}, "l2": {"q": "How many of those handoffs could be automated versus ones that genuinely need human judgment?", "goal": "Separate automatable from essential"}, "l3": {"q": "What's the error rate on those handoffs — and how do you catch mistakes?", "goal": "Quantify the risk at each handoff"}}, {"id": "dq-059", "tier": 2, "tag": "Pain", "fire_when": ["audit_risk", "shadow_models", "ownership_unclear"], "skip_when": [], "note": "Surfaces auditability gaps and governance risks.", "l1": {"q": "Where do overrides happen in your process — and who has visibility into what was changed and why?", "goal": "Surfaces auditability gaps"}, "l2": {"q": "Is there a log or audit trail, or does it live in someone's memory?", "goal": "Expose governance gap"}, "l3": {"q": "If an auditor asked to see every override from last quarter, how long would that take?", "goal": "Connect to audit liability"}}, {"id": "dq-060", "tier": 2, "tag": "Pain", "fire_when": ["manual_process", "audit_risk"], "skip_when": [], "note": "Tests the QC process. Usually reveals it's one person's judgment call.", "l1": {"q": "How does your team reconcile waterfall output back to the source data before anything goes out?", "goal": "Tests the QC process"}, "l2": {"q": "Is that a formal process or more of a spot-check?", "goal": "Test rigor of QC"}, "l3": {"q": "What happens when the numbers don't reconcile — how long does it take to find the issue?", "goal": "Quantify reconciliation burden"}}, {"id": "dq-061", "tier": 2, "tag": "Pain", "fire_when": ["complexity_increase", "shadow_models"], "skip_when": [], "note": "Surfaces the side-letter complexity that breaks standard templates.", "l1": {"q": "Which of your fund structures have side-letter provisions that require special handling outside the standard workflow?", "goal": "Surfaces the complexity that breaks templates"}, "l2": {"q": "How do those get tracked — separate models, extra tabs, or manual adjustments?", "goal": "Map the fragmentation"}, "l3": {"q": "Has a side-letter term ever been missed in a distribution? What happened?", "goal": "Connect to real consequences"}}, {"id": "dq-062", "tier": 2, "tag": "Pain", "fire_when": ["manual_process", "excel_dependency"], "skip_when": [], "note": "Collaboration and governance risk. Usually the answer is 'carefully' or 'we don't.'", "l1": {"q": "How do you manage version control when multiple people are working on the same calculation?", "goal": "Collaboration and governance risk"}, "l2": {"q": "Has someone ever overwritten someone else's work — and how did you find out?", "goal": "Surface real incidents"}, "l3": {"q": "What's the process for making sure everyone's working off the same version?", "goal": "Expose the gap between process and reality"}}, {"id": "dq-124", "tier": 2, "tag": "Pain", "fire_when": ["ownership_unclear", "audit_risk"], "skip_when": [], "note": "Surfaces the QC gap that most firms have. The answer is almost always one person.", "l1": {"q": "Who checks the checker? When the final numbers go out, is there a second set of eyes — or does one person sign off alone?", "goal": "Surfaces the QC gap"}, "l2": {"q": "How comfortable are you with that level of review?", "goal": "Test their confidence"}, "l3": {"q": "What would need to change for you to feel fully confident in every distribution?", "goal": "Get them to articulate the future state"}}, {"id": "dq-125", "tier": 2, "tag": "Pain", "fire_when": ["workflow_fragility"], "skip_when": [], "note": "Inverted question. Reveals what conditions produce success, which highlights what conditions produce failure.", "l1": {"q": "When's the last time the process ran perfectly — no late nights, no corrections, no surprises? What was different that quarter?", "goal": "Reveals what conditions produce success vs failure"}, "l2": {"q": "Is that the norm or the exception?", "goal": "Establish baseline reality"}, "l3": {"q": "What would it take to make that the norm?", "goal": "Connect to the solution"}}], "exit_criteria": [{"criterion": "End-to-end process map completed", "meddpicc": "Pain", "required": true, "if_not_met": "Don't move to diagnose until the map is complete. If the team can't finish in one session, schedule a follow-up to complete the map before moving on."}, {"criterion": "Manual handoff points identified and counted", "meddpicc": "Pain", "required": true, "if_not_met": "Ask dq-058 directly for each transition point: 'Is this step automated or manual? Who does it? How long does it take?'"}], "champion_coaching": [], "stage_objections": [], "reframes": [{"id": "rf-080", "text": "The reason we map the full process is that nobody in the room usually sees all of it. The champion sees the strategic picture. The analysts see their slice. When it's all on paper, the gaps become obvious."}, {"id": "rf-081", "text": "Don't worry about making it look clean — we want the real process, not the documented process. The messier it is, the more useful this exercise becomes."}, {"id": "rf-082", "text": "Every manual handoff on this map is an error waiting to happen. Not every quarter — but on the quarter where everything goes wrong at once."}], "competitor_paths": [], "next_steps": [], "proof_points": [{"id": "pp-036", "text": "Process mapping sessions consistently surface 3-5 fragility points the buyer didn't consciously recognize as risks until they were documented."}, {"id": "pp-050", "text": "The average fund operations workflow has 12-18 manual handoff points per distribution cycle. Most firms estimate 3-5 before they map it."}]}, {"id": "m5-diagnose", "name": "Diagnose — Identify Fragility Points & Connect to Product", "goal": "Review the process map together. Identify the 3-5 most fragile points. Connect each fragility to a specific Maybern capability. The buyer should see their process reflected in the product — not the other way around.", "belief_shift_target": "Move from 'we have some fragile points' to 'these specific fragilities are exactly what a purpose-built system eliminates — and I can see the connection.'", "questions": [{"id": "dq-063", "tier": 2, "tag": "Pain", "fire_when": ["ownership_unclear", "workflow_fragility"], "skip_when": [], "note": "Key person risk, revisited with the process map as context.", "l1": {"q": "If your lead person on this process were out for an entire quarter-end cycle — what breaks?", "goal": "Key person risk with process map as context"}, "l2": {"q": "Who would step in — and how long would it take them to get up to speed?", "goal": "Test bench depth"}, "l3": {"q": "Is that a risk you've planned for, or one you're hoping doesn't happen?", "goal": "Force an honest assessment"}}, {"id": "dq-064", "tier": 1, "tag": "Pain", "fire_when": ["workflow_fragility"], "skip_when": [], "note": "Self-identified. Gets them to own the diagnosis before you prescribe.", "l1": {"q": "Looking at the full map we just built — where do you see the most fragile points?", "goal": "Self-identified — gets them to own the diagnosis"}, "l2": {"q": "If one of those broke during a distribution cycle, what's the blast radius?", "goal": "Quantify the downside"}, "l3": {"q": "Is that something you'd want to fix proactively, or are you comfortable waiting until it happens?", "goal": "Test urgency"}}, {"id": "dq-126", "tier": 2, "tag": "Pain", "fire_when": ["audit_risk", "workflow_fragility"], "skip_when": [], "note": "Emotionally anchors the diagnosis to a specific risk. Converts abstract fragility to personal accountability.", "l1": {"q": "Of the fragility points we've identified — which one keeps you up at night?", "goal": "Emotionally anchors the diagnosis"}, "l2": {"q": "Has it ever actually broken — or is it more of a 'hasn't happened yet' situation?", "goal": "Distinguish between real incidents and theoretical risk"}, "l3": {"q": "What would the cost be if it broke on your worst quarter?", "goal": "Force worst-case quantification"}}, {"id": "dq-127", "tier": 1, "tag": "Criteria", "fire_when": ["workflow_fragility"], "skip_when": [], "note": "Bridges from diagnosis to product. Uses the process map as the demo script.", "l1": {"q": "Let me show you how Maybern handles that specific fragility point — would it help to see it mapped to your actual workflow?", "goal": "Bridges from diagnosis to product"}, "l2": {"q": "Does that address the concern, or is there more to it?", "goal": "Test whether the solution fits"}, "l3": {"q": "How would your team react to seeing this versus how they do it today?", "goal": "Test internal resonance"}}, {"id": "dq-128", "tier": 2, "tag": "Metrics", "fire_when": ["workflow_fragility", "roi_curiosity"], "skip_when": [], "note": "Future state visualization. Gets the buyer to articulate what 'better' looks like in their own words.", "l1": {"q": "If we could eliminate the three most fragile steps on this map — what would quarter-end actually look like for your team?", "goal": "Future state visualization"}, "l2": {"q": "How many hours would that save per cycle?", "goal": "Quantify the improvement"}, "l3": {"q": "What would your team do with that time?", "goal": "Connect to strategic outcomes"}}], "exit_criteria": [{"criterion": "3-5 fragility points identified and buyer-confirmed", "meddpicc": "Pain", "required": true, "if_not_met": "Ask dq-064: 'Looking at the full map — where do you see the most fragile points?' If they minimize, ask dq-126 to anchor it emotionally."}, {"criterion": "Each fragility connected to a specific Maybern capability", "meddpicc": "Decision Criteria", "required": true, "if_not_met": "Use dq-127 to bridge each one: 'Let me show you how Maybern handles [fragility]. Would it help to see this mapped to your actual workflow?'"}, {"criterion": "Future state articulated by buyer", "meddpicc": "Metrics", "required": false}], "champion_coaching": [], "stage_objections": [{"id": "obj-061", "category": "PROCESS DEFENSIVENESS", "objection": "Our process works — it just takes a lot of effort.", "response": "It works today. The question is whether it works when fund count doubles, when the key person leaves, or when an LP challenges a number from three quarters ago. The fragilities on this map don't break every quarter — they break on the worst possible quarter."}, {"id": "obj-062", "category": "CHANGE RESISTANCE", "objection": "We've invested years in building these spreadsheets and templates — I don't want to throw them away.", "response": "You wouldn't be throwing them away. The platform ingests the logic from your existing models — the waterfall structures, the allocation rules, the side-letter provisions. The institutional knowledge stays. What changes is that it's no longer in a spreadsheet that one person maintains."}], "reframes": [{"id": "rf-083", "text": "The fragility points you just identified are exactly the patterns we built the platform around. That's not a coincidence — it's the result of working with firms that have the same complexity."}, {"id": "rf-084", "text": "The most dangerous fragilities aren't the ones you know about. They're the ones that only surface when everything goes wrong at the same time — a new fund launch during quarter-end during an audit."}, {"id": "rf-085", "text": "Here's the mental model: for each fragility point on the map, there's a specific Maybern capability that eliminates it. The tailored demo should walk through those connections one by one with your actual data."}, {"id": "rf-086", "text": "The process map we just built becomes the demo script. Instead of a generic product tour, the tailored demo shows how each of these fragile steps works in Maybern — with your fund structures, your waterfall provisions, your actual complexity."}], "competitor_paths": [{"id": "comp-048", "trigger": "Buyer mentions a competitor's process mapping or workflow analysis capability", "path": "Redirect to data depth: 'The process map is the starting point, not the product. What matters is whether the platform can actually handle the specific fund structures on this map — the side letters, the catch-ups, the multi-currency waterfalls. That's what the tailored demo will test.'"}, {"id": "comp-049", "trigger": "Buyer asks if Maybern can replicate their current spreadsheet logic exactly", "path": "Confirm and elevate: 'Yes — and then some. The platform replicates the logic but adds auditability, version control, and multi-user access that spreadsheets can't provide. Your models become institutional assets instead of personal files.'"}], "next_steps": [], "proof_points": []}, {"id": "m5-advance", "name": "Advance — Lock Future State & EB Demo", "goal": "Confirm the fragility diagnosis. Align on which capabilities to demonstrate in the Tailored Demo. Lock the EB into M8 with a tailored agenda built from the process map findings. This is the last meeting before the EB sees the product.", "belief_shift_target": "Move from 'the process has fragilities' to 'I have a specific plan: the tailored demo will address these exact fragilities with our actual data, and [EB name] is confirmed to attend because the business case warrants their time.'", "questions": [{"id": "dq-129", "tier": 1, "tag": "Criteria", "fire_when": ["economic_buyer_missing"], "skip_when": [], "note": "Co-creates the demo agenda. Ensures the demo is calibrated to the EB's priorities, not just the champion's.", "l1": {"q": "Based on the fragilities we've mapped — which three should be the focus of the tailored demo? What would be most convincing for your CFO?", "goal": "Co-creates demo agenda calibrated to EB"}, "l2": {"q": "Is there something your CFO would want to see that the champion wouldn't think to ask for?", "goal": "Anticipate EB-specific needs"}, "l3": {"q": "Should we include a pricing preview in that session, or keep it focused on capability?", "goal": "Scope the EB meeting"}, "question_type": "confirming"}, {"id": "dq-130", "tier": 1, "tag": "EB", "fire_when": ["economic_buyer_missing", "eb_gatekeeping"], "skip_when": [], "note": "Direct EB commitment check. Forces the champion to either confirm or articulate the blocker.", "l1": {"q": "Is [name] confirmed for the tailored demo? If not — what do they need from you before they'll commit the time?", "goal": "Direct EB commitment check"}, "l2": {"q": "Would it help if we did a shorter, more focused format — say 20 minutes?", "goal": "Reduce friction"}, "l3": {"q": "Can we get a date on the calendar now?", "goal": "Lock it"}, "question_type": "confirming"}, {"id": "dq-131", "tier": 1, "tag": "EB", "fire_when": ["economic_buyer_missing"], "skip_when": [], "note": "Identifies the EB's decision-making trigger. Calibrates the demo to land the single most important message.", "l1": {"q": "What's the one thing your CFO would need to see in 45 minutes that would make them say 'this is worth pursuing'?", "goal": "Identifies the EB's decision trigger"}, "l2": {"q": "Is that a capability thing, a cost thing, or a credibility thing?", "goal": "Categorize what matters"}, "l3": {"q": "How should we open that meeting — with the business case or the product?", "goal": "Structure the EB session"}, "question_type": "confirming"}, {"id": "dq-132", "tier": 1, "tag": "Process", "fire_when": ["timeline_delay"], "skip_when": [], "note": "Secures the data needed to build the tailored demo. Without real data, the demo is generic.", "l1": {"q": "For the file review — can your team pull sample data files, waterfall templates, and your most complex fund structures by [date]?", "goal": "Secures data for tailored demo"}, "l2": {"q": "Who on your side would pull that together?", "goal": "Identify the data owner"}, "l3": {"q": "Anything sensitive we should know about before we work with the files?", "goal": "Address data concerns proactively"}, "question_type": "confirming"}, {"id": "dq-133", "tier": 1, "tag": "Process", "fire_when": ["timeline_delay"], "skip_when": [], "note": "Deal risk check. Catches blockers before they materialize.", "l1": {"q": "Is there anything that could prevent the tailored demo from happening on [date] — a vacation, an audit, a competing priority?", "goal": "Deal risk check"}, "l2": {"q": "What's the backup date if that falls through?", "goal": "Have a contingency"}, "l3": {"q": "Who should I follow up with to confirm?", "goal": "Get the right contact"}, "question_type": "confirming"}], "exit_criteria": [{"criterion": "EB confirmed for Tailored Demo with specific date", "meddpicc": "Economic Buyer", "required": true, "if_not_met": "This is the most critical exit criterion in the entire mid-funnel. Ask dq-130 directly. If the champion can't confirm, escalate: 'What would need to happen for [EB name] to commit to 30 minutes? Would a shorter format help? Would a pre-brief from us help?'"}, {"criterion": "Tailored demo agenda co-created from fragility findings", "meddpicc": "Decision Criteria", "required": true, "if_not_met": "Ask dq-129 and dq-131 to co-create the agenda. The demo must be built around the EB's lens, not the champion's."}, {"criterion": "Data access committed for file review", "meddpicc": "Decision Process", "required": true, "if_not_met": "Ask dq-132 directly. Without data, the tailored demo is generic — and a generic demo won't close the EB."}, {"criterion": "EB pre-briefing plan confirmed", "meddpicc": "Champion", "required": false}, {"criterion": "Demo format agreed", "meddpicc": "Decision Criteria", "required": false}], "champion_coaching": [{"id": "cc-011", "prompt": "When you invite [EB name] to the tailored demo, position it as: 'I've been evaluating this for the past [X] weeks. The process map and the business case both point in the same direction. I'd like you to see a 30-minute demo with our actual data before we decide next steps.'", "surface_when": "EB commitment is being discussed."}, {"id": "cc-012", "prompt": "Brief [EB name] before the demo — not during. Send them the one-pager from M4, the three fragility points from today, and a note that says: 'Here's what we found. The demo will show what the solution looks like.'", "surface_when": "EB is confirmed but hasn't been briefed."}], "stage_objections": [{"id": "obj-063", "category": "EB ENGAGEMENT RESISTANCE", "objection": "My [CFO/COO] won't sit through a 45-minute demo.", "response": "Fair. What if we structured it as a 20-minute focused session? Three fragility points from the process map, each shown with your actual data. No product tour — just the three things that matter most to them. Would that work?"}, {"id": "obj-064", "category": "DATA HESITATION", "objection": "We're not comfortable sharing fund data before an agreement is in place.", "response": "Understood. We can work with anonymized data or sample structures that mirror your complexity without using actual LP information. The goal is to demonstrate the product handles your fund architecture — we don't need real names or dollar amounts for that."}], "reframes": [{"id": "rf-087", "text": "The tailored demo isn't a product tour — it's a simulation of your future state. We'll load your data, run your fund structures, and show what the fragility points on this map look like when they're eliminated."}, {"id": "rf-088", "text": "Your [CFO/COO] doesn't need the workflow details. They need: 'Here's what the current process costs. Here's what breaks. Here's what it looks like when it doesn't break.' The demo builds that story in 45 minutes."}, {"id": "rf-089", "text": "The most effective tailored demos we run follow the process map: 'This is what you do today. This is where it breaks. This is what it looks like when Maybern handles it.' Step by step, fragility by fragility."}, {"id": "rf-090", "text": "If the EB leaves the tailored demo understanding three things — the cost, the risk, and the alternative — they have everything they need to make a decision. That's what we're designing for."}], "competitor_paths": [], "next_steps": [{"id": "ns-049", "text": "I'll send a summary of the process map and the fragility points we identified — that becomes the tailored demo agenda."}, {"id": "ns-050", "text": "For the file review, we'll need sample files by [date]. Can your team pull waterfall templates, sample LPA provisions, and examples of your most complex structures?"}, {"id": "ns-051", "text": "Let's confirm: tailored demo on [date], [EB name] attending, agenda built around [fragility 1], [fragility 2], and [fragility 3]. I'll send a calendar invite today."}, {"id": "ns-052", "text": "One final thing: is there anything your [CFO/COO] will ask in the demo that we should be prepared for? Better to anticipate it now than be surprised in the room."}], "proof_points": []}], "stage_keys": ["discover", "diagnose", "advance"]}, "M6": {"name": "Tech File Review", "belief_shift": "Our data is ready (or knowably close) for a tailored demo.", "stages": [{"id": "m6-core", "name": "Technical File Review", "goal": "Validate data completeness. Finalize the dataset for a tailored demo that proves the product works with the buyer's actual fund structures.", "belief_shift_target": "Move from 'can this handle our complexity?' to 'our data is ready for a demo that will prove it.'", "questions": [{"id": "dq-065", "tier": 2, "tag": "Criteria", "fire_when": ["complexity_increase"], "skip_when": [], "note": "Tests data representativeness.", "l1": {"q": "Looking at the files you shared — how well do these represent the full range of waterfall structures across your funds?", "goal": "Tests data representativeness"}, "l2": {"q": "Are there any edge cases we're not seeing here — co-invests, side vehicles, feeder structures?", "goal": "Surface hidden complexity"}, "l3": {"q": "Which fund is the most complex — and is it in this set?", "goal": "Make sure the hardest case is covered"}}, {"id": "dq-066", "tier": 2, "tag": "Pain", "fire_when": ["shadow_models", "excel_dependency"], "skip_when": [], "note": "Surfaces hidden logic that needs to be in the demo.", "l1": {"q": "Are there any calculations that live outside what you've shared — in side spreadsheets, emails, or someone's head?", "goal": "Surfaces shadow work"}, "l2": {"q": "Who owns those, and how do they connect to the main workflow?", "goal": "Map the dependency"}, "l3": {"q": "What happens to those calcs if that person isn't available?", "goal": "Key person risk on shadow work"}}, {"id": "dq-067", "tier": 2, "tag": "Pain", "fire_when": ["volume_increase", "workflow_fragility"], "skip_when": [], "note": "Stress-test question. Connects data to operational reality.", "l1": {"q": "When you hit peak volume — quarter-end, audit season — how does the data flow hold up? Where does it bottleneck?", "goal": "Stress test the workflow"}, "l2": {"q": "What's the first thing that slows down or breaks?", "goal": "Identify the weakest link"}, "l3": {"q": "How do you recover from that — extra hours, or does it just run late?", "goal": "Quantify the cost of bottlenecks"}}, {"id": "dq-068", "tier": 2, "tag": "Criteria", "fire_when": ["complexity_increase"], "skip_when": [], "note": "Identifies edge cases the demo needs to handle.", "l1": {"q": "Do you have any fund structures or LP arrangements that don't fit neatly into your standard templates?", "goal": "Surfaces bespoke complexity"}, "l2": {"q": "How does the team handle those — custom models, manual adjustments, or workarounds?", "goal": "Map the workaround pattern"}, "l3": {"q": "How much extra time do those take versus a standard fund?", "goal": "Quantify the complexity premium"}}, {"id": "dq-069", "tier": 2, "tag": "Pain", "fire_when": ["manual_process", "excel_dependency"], "skip_when": [], "note": "Identifies data quality issues that affect implementation.", "l1": {"q": "Where have you seen data inconsistencies or format mismatches cause problems?", "goal": "Surfaces data quality issues"}, "l2": {"q": "How do you catch those — is it automated or manual review?", "goal": "Test detection rigor"}, "l3": {"q": "What's the worst case if an inconsistency makes it through to an LP statement?", "goal": "Connect to downstream risk"}}], "exit_criteria": [], "champion_coaching": [], "stage_objections": [], "reframes": [], "competitor_paths": [], "next_steps": [{"id": "ns-019", "text": "Based on what we've reviewed, do you feel confident the dataset captures enough complexity for a realistic demo?"}, {"id": "ns-020", "text": "Are there any gaps we've identified that need to be filled before we can build the tailored demo?"}, {"id": "ns-021", "text": "Can we agree that this dataset is finalized — or do you need a few more days to supplement it?"}, {"id": "ns-022", "text": "Who on your team should we loop in for any follow-up questions as we build the demo environment?"}], "proof_points": [{"id": "pp-037", "text": "Tailored demos built from actual fund data close at 3x the rate of generic product demos."}]}], "stage_keys": ["core"]}, "M7": {"name": "Demo Prep (Internal)", "belief_shift": "We need to show up prepared so the exec team sees their world.", "stages": [{"id": "m7-core", "name": "Internal Demo Prep", "goal": "Align the internal team on storyline, roles, and executive audience for the tailored demo. Every demo moment should connect to a pain point or decision criterion the exec team cares about.", "belief_shift_target": "Internal alignment: 'We know exactly what to show, who says what, and which moments will drive the decision.'", "questions": [{"id": "dq-070", "tier": 2, "tag": "EB", "fire_when": ["economic_buyer_missing"], "skip_when": [], "note": "Anchors the demo to executive-level concerns.", "l1": {"q": "When the exec team sees the demo — which scenarios are going to resonate most? Where have they personally felt the pain?", "goal": "Calibrate demo to EB"}, "l2": {"q": "Is there a recent incident we should reference — something that's still fresh?", "goal": "Anchor to a real event"}, "l3": {"q": "What's the one thing that would make them lean forward in their chair?", "goal": "Find the hook"}}, {"id": "dq-071", "tier": 2, "tag": "Pain", "fire_when": ["audit_risk", "complexity_increase"], "skip_when": [], "note": "Identifies high-impact demo moments.", "l1": {"q": "Are there specific side-letter situations that have caused friction with LPs or auditors — something we should feature in the demo?", "goal": "Build demo around real pain"}, "l2": {"q": "How much time did that take to resolve?", "goal": "Quantify"}, "l3": {"q": "If we showed that exact scenario being handled automatically, would that land?", "goal": "Test the demo story"}}, {"id": "dq-072", "tier": 2, "tag": "Pain", "fire_when": ["workflow_fragility"], "skip_when": [], "note": "Finds the 'wow moment' for the demo.", "l1": {"q": "What's the single biggest reconciliation headache that, if we solved it live in the demo, would get the strongest reaction?", "goal": "Find the demo highlight"}, "l2": {"q": "How often does that come up — every quarter or just certain funds?", "goal": "Scope the frequency"}, "l3": {"q": "Who in the room would react most to seeing that solved?", "goal": "Map the demo audience"}}, {"id": "dq-073", "tier": 2, "tag": "EB", "fire_when": ["pricing_discussion", "economic_buyer_missing"], "skip_when": [], "note": "Pre-shapes the pricing discussion for M8.", "l1": {"q": "How should we handle the pricing conversation in the demo — what framework does the decision-maker use?", "goal": "Pre-plan the pricing discussion"}, "l2": {"q": "Should we lead with total cost comparison or ROI payback?", "goal": "Pick the right frame"}, "l3": {"q": "What's the one pricing question they'll definitely ask?", "goal": "Prepare the answer"}}, {"id": "dq-074", "tier": 2, "tag": "Criteria", "fire_when": ["decision_process_unclear"], "skip_when": [], "note": "Aligns the demo story to what matters most to the decision-makers.", "l1": {"q": "What's the narrative we need the exec team to walk away with — control, defensibility, scalability, or something else?", "goal": "Align on the demo story arc"}, "l2": {"q": "How should we open — with the business case or with the product?", "goal": "Structure the demo flow"}, "l3": {"q": "What's the close — what do we want them to commit to at the end?", "goal": "Define the demo success metric"}}, {"id": "dq-075", "tier": 2, "tag": "Champion", "fire_when": ["decision_process_unclear"], "skip_when": [], "note": "MEDDPICC Champion gap fill. Enables the champion before the exec meeting.", "l1": {"q": "How well positioned is [name] to navigate the internal approval process? What obstacles might they run into?", "goal": "Assess champion strength"}, "l2": {"q": "Is there anything we can do to make their job easier?", "goal": "Arm the champion"}, "l3": {"q": "Should we prep a brief they can share before the demo?", "goal": "Create champion materials"}}], "exit_criteria": [], "champion_coaching": [], "stage_objections": [], "reframes": [], "c "id": "dq-078", "tier": 2, "tag": "Criteria", "fire_when": ["fund_growth"], "skip_when": [], "note": "Future confidence test. Connects the demo to a real upcoming decision.", "l1": {"q": "If you were launching a new fund next quarter — how confident would you feel running it through this versus your current process?", "goal": "Test conviction on new fund use case"}, "l2": {"q": "What would need to be true for you to feel comfortable?", "goal": "Identify remaining concerns"}, "l3": {"q": "Could you see the team adopting this for existing funds too, or just new ones?", "goal": "Scope the rollout"}}, {"id": "dq-079", "tier": 2, "tag": "Process", "fire_when": ["decision_process_unclear", "scale_discussion"], "skip_when": [], "note": "Surfaces implementation concerns before they become objections.", "l1": {"q": "What concerns do you have about rolling this out across your full portfolio?", "goal": "Surface implementation anxiety"}, "l2": {"q": "Is that a technical concern, a people concern, or a timing concern?", "goal": "Categorize"}, "l3": {"q": "How would you want to phase it — all at once or fund by fund?", "goal": "Co-create the rollout plan"}}, {"id": "dq-080", "tier": 2, "tag": "Competition", "fire_when": ["vendor_comparison"], "skip_when": [], "note": "MEDDPICC Competition gap fill at exec level, post-demo.", "l1": {"q": "After seeing this with your actual data — how does it compare to anything else you've looked at?", "goal": "Competitive positioning post-demo"}, "l2": {"q": "What can we do that the others can't?", "goal": "Lock in differentiators"}, "l3": {"q": "Is there anything the others do better that we should address?", "goal": "Surface remaining competitive gaps"}}, {"id": "dq-081", "tier": 2, "tag": "Criteria", "fire_when": ["decision_process_unclear"], "skip_when": [], "note": "MEDDPICC Decision Criteria gap fill at exec level.", "l1": {"q": "What would make or break this decision for the people in this room?", "goal": "Final decision criteria check"}, "l2": {"q": "Is everyone aligned on that, or are there different priorities?", "goal": "Surface internal disagreements"}, "l3": {"q": "What happens next — and by when?", "goal": "Lock commitment"}}, {"id": "dq-082", "tier": 2, "tag": "Metrics", "fire_when": ["roi_curiosity"], "skip_when": [], "note": "MEDDPICC Metrics reinforcement. Reconnects demo to ROI.", "l1": {"q": "We quantified the cost of inaction earlier — after seeing this with real data, does that business case still hold up?", "goal": "Validate ROI post-demo"}, "l2": {"q": "Does anything we showed today change the math — in either direction?", "goal": "Refine the business case"}, "l3": {"q": "Is the business case strong enough to move forward, or do we need more data?", "goal": "Test readiness to commit"}}], "exit_criteria": [], "champion_coaching": [], "stage_objections": [], "reframes": [], "competitor_paths": [], "next_steps": [{"id": "ns-026", "text": "Based on what you've seen with your own data, does this feel like a real solution — or are there gaps?"}, {"id": "ns-027", "text": "Is there anything your CFO or Board would need to see that we haven't covered?"}, {"id": "ns-028", "text": "Do you see a path to purchase here — and if so, what does that path look like on your end?"}, {"id": "ns-029", "text": "Can we agree on next steps to move toward a proposal?"}], "proof_points": [{"id": "pp-038", "text": "A $23B manager evaluated Anaplan + consulting vs. a productized platform. Chose the product because it worked with their actual data — no customization required."}, {"id": "pp-039", "text": "Firms that see their own data in the system move to proposal in 2 weeks. Firms that only see standard demos take 2 months."}]}], "stage_keys": ["core"]}, "M9": {"name": "Future State Workshop", "belief_shift": "I can see what 'live on Maybern' looks like for my team.", "stages": [{"id": "m9-core", "name": "Future State — Envision Post-Implementation", "goal": "Map the future operating model on Maybern. Define success metrics. Get green-light to draft a formal proposal.", "belief_shift_target": "Move from 'this works in a demo' to 'I can see what live on this platform looks like for my team — the transition is manageable.'", "questions": [{"id": "dq-083", "tier": 2, "tag": "Pain", "fire_when": ["roi_curiosity"], "skip_when": [], "note": "Vision building. Gets them describing the desired outcome.", "l1": {"q": "If you could design the ideal setup for your fund ops team — what does day-to-day look like 12 months from now?", "goal": "Gets them to envision the future state"}, "l2": {"q": "What's the biggest difference between that and how things work today?", "goal": "Identify the transformation gap"}, "l3": {"q": "What would your team need to feel during the transition to stay bought in?", "goal": "Pre-solve change management"}}, {"id": "dq-084", "tier": 2, "tag": "Process", "fire_when": ["decision_process_unclear", "scale_discussion"], "skip_when": [], "note": "Scoping the implementation. Identifies the beachhead.", "l1": {"q": "What's a realistic starting point — which funds or processes would you pilot first, and why?", "goal": "Scope the pilot"}, "l2": {"q": "What makes that the right starting point?", "goal": "Validate the logic"}, "l3": {"q": "How long before you'd want to expand beyond the pilot?", "goal": "Set expansion timeline"}}, {"id": "dq-085", "tier": 2, "tag": "Champion", "fire_when": ["ownership_unclear"], "skip_when": [], "note": "Identifies the internal owner for adoption.", "l1": {"q": "Who owns change management on your side — and what kind of support would they need from us?", "goal": "Identify the implementation lead"}, "l2": {"q": "How has your team handled system transitions in the past?", "goal": "Learn their change tolerance"}, "l3": {"q": "What went wrong last time — and what should we avoid?", "goal": "Pre-solve implementation risk"}}, {"id": "dq-086", "tier": 2, "tag": "Metrics", "fire_when": ["roi_curiosity"], "skip_when": [], "note": "Defines measurable success criteria.", "l1": {"q": "How would you define success at 90 days — what metrics matter most?", "goal": "Set measurable success criteria"}, "l2": {"q": "Who's tracking those metrics — you, or someone else?", "goal": "Assign ownership"}, "l3": {"q": "What would failure look like at 90 days?", "goal": "Define the downside"}}, {"id": "dq-087", "tier": 2, "tag": "Competition", "fire_when": ["vendor_comparison", "internal_build"], "skip_when": [], "note": "MEDDPICC Competition gap fill. Arms the champion with the competitive case.", "l1": {"q": "If someone internally asks 'why not just build this ourselves' — what's your answer?", "goal": "Pre-arm against build-vs-buy"}, "l2": {"q": "What's the real cost of a build — engineering time, maintenance, opportunity cost?", "goal": "Quantify the alternative"}, "l3": {"q": "How long would an internal build take versus being live on a platform in 4 months?", "goal": "Time comparison"}}, {"id": "dq-088", "tier": 2, "tag": "Champion", "fire_when": ["ownership_unclear"], "skip_when": [], "note": "MEDDPICC Champion confirmation.", "l1": {"q": "Who's going to carry this across the finish line internally — and do they have the bandwidth?", "goal": "Final champion check"}, "l2": {"q": "What support do they need from us to make that happen?", "goal": "Offer resources"}, "l3": {"q": "Is there a risk of this losing momentum if [name] gets pulled into something else?", "goal": "Test champion durability"}}, {"id": "dq-089", "tier": 2, "tag": "Metrics", "fire_when": ["economic_buyer_missing", "roi_curiosity"], "skip_when": [], "note": "MEDDPICC Metrics. Anchors to EB's measurement framework.", "l1": {"q": "When your CFO looks at year-one ROI — what metrics will they focus on?", "goal": "Align success metrics to EB priorities"}, "l2": {"q": "Is that something we should build into the proposal explicitly?", "goal": "Shape the proposal"}, "l3": {"q": "Would a guaranteed milestone framework make the investment easier to approve?", "goal": "Offer risk mitigation"}}], "exit_criteria": [], "champion_coaching": [], "stage_objections": [], "reframes": [], "competitor_paths": [], "next_steps": [{"id": "ns-030", "text": "Does the future state we've mapped feel achievable and aligned with your team's capacity?"}, {"id": "ns-031", "text": "Do you feel confident enough in the path forward to give us the green light to draft a formal proposal?"}, {"id": "ns-032", "text": "What internal approvals do you need before we can move to proposal review?"}], "proof_points": [{"id": "pp-040", "text": "Firms that define 90-day success metrics in the future state workshop report higher satisfaction at go-live — expectations were set, not assumed."}, {"id": "pp-041", "text": "One PE/credit firm added funds to their contract during implementation — they saw value before going live."}]}], "stage_keys": ["core"]}, "M10": {"name": "Proposal Review", "belief_shift": "The commercial terms match the value we've validated.", "stages": [{"id": "m10-core", "name": "Proposal Review", "goal": "Align on commercial terms. Lock timeline. Move to legal. The proposal should feel like a formality — the value has already been validated.", "belief_shift_target": "Move from 'we need to review the proposal' to 'the commercial terms match the value we've validated — this is a fair deal.'", "questions": [{"id": "dq-090", "tier": 2, "tag": "Criteria", "fire_when": ["decision_process_unclear"], "skip_when": [], "note": "Confirms scope alignment.", "l1": {"q": "As you look at the proposal — does the scope match everything we've discussed and validated?", "goal": "Verify alignment"}, "l2": {"q": "Is there anything we missed, or anything in here you weren't expecting?", "goal": "Surface surprises"}, "l3": {"q": "Does this feel like the right scope — or too much, too little?", "goal": "Right-size the deal"}}, {"id": "dq-091", "tier": 2, "tag": "Metrics", "fire_when": ["roi_curiosity", "pricing_discussion"], "skip_when": [], "note": "Surfaces negotiation points.", "l1": {"q": "Where do you see alignment between the proposal and the business case — and where are there gaps?", "goal": "Validate the value story"}, "l2": {"q": "Are those gaps dealbreakers, or can we work around them?", "goal": "Prioritize gaps"}, "l3": {"q": "What would close those gaps?", "goal": "Get specific actions"}}, {"id": "dq-092", "tier": 2, "tag": "EB", "fire_when": ["pricing_discussion", "budget_pushback"], "skip_when": [], "note": "Tests pricing acceptance.", "l1": {"q": "Is the commercial structure in a range that works for your organization?", "goal": "Test pricing fit"}, "l2": {"q": "What would need to change to get it into the right range?", "goal": "Open negotiation"}, "l3": {"q": "Would expanding the scope to all funds improve the economics enough to work?", "goal": "Explore all-in pricing"}}, {"id": "dq-093", "tier": 2, "tag": "Process", "fire_when": ["decision_process_unclear", "timeline_delay"], "skip_when": [], "note": "Maps remaining decision process.", "l1": {"q": "What additional approvals or reviews are needed before we can move to legal?", "goal": "Map remaining process"}, "l2": {"q": "How long do those typically take?", "goal": "Calibrate timeline"}, "l3": {"q": "Can any of them run in parallel?", "goal": "Compress the timeline"}}, {"id": "dq-094", "tier": 2, "tag": "Champion", "fire_when": ["decision_process_unclear"], "skip_when": [], "note": "Surfaces any remaining champion concerns.", "l1": {"q": "What would need to change in this proposal for you to feel fully confident recommending it?", "goal": "Final champion check"}, "l2": {"q": "Is that a scope change, a pricing change, or a terms change?", "goal": "Categorize the ask"}, "l3": {"q": "If we addressed that — are you ready to champion this internally?", "goal": "Lock commitment"}}], "exit_criteria": [], "champion_coaching": [], "stage_objections": [], "reframes": [{"id": "rf-061", "text": "Pricing is basis points on NAV plus unfunded — it mimics how public market infrastructure is priced."}, {"id": "rf-062", "text": "Most firms pass this through as an LP expense. If it's a core book of record solution, it's typically covered in the LPA."}, {"id": "rf-063", "text": "Three value buckets justify the investment: efficiency gains, key person risk reduction, and distribution timing improvement."}], "competitor_paths": [], "next_steps": [{"id": "ns-033", "text": "Do we have verbal alignment on scope, pricing, and support — or are there open items?"}, {"id": "ns-034", "text": "Is the proposed timeline realistic for your internal process?"}, {"id": "ns-035", "text": "Can we agree on a target date to have the legal review completed?"}, {"id": "ns-036", "text": "Are you comfortable moving this to legal/procurement as the next step?"}], "proof_points": [{"id": "pp-042", "text": "Three value buckets justify the investment: efficiency gains, key person risk reduction, distribution timing improvement."}, {"id": "pp-043", "text": "Most firms pass the cost through as an LP expense. Net cost to the GP is often zero."}]}], "stage_keys": ["core"]}, "M11": {"name": "Legal Review", "belief_shift": "Every open item is resolvable — nothing blocks signature.", "stages": [{"id": "m11-core", "name": "Legal Review", "goal": "Resolve all open legal items. Confirm signing date. Prevent legal from re-opening commercial terms.", "belief_shift_target": "Move from 'legal has concerns' to 'every open item is resolvable — nothing blocks signature.'", "questions": [{"id": "dq-095", "tier": 2, "tag": "Process", "fire_when": ["decision_process_unclear", "timeline_delay"], "skip_when": [], "note": "Separates real blockers from routine negotiation.", "l1": {"q": "Are there any clauses your legal team sees as blockers versus standard redlines?", "goal": "Separate real issues from routine edits"}, "l2": {"q": "What's driving that concern — regulatory, policy, or precedent?", "goal": "Understand the root cause"}, "l3": {"q": "Have you resolved similar clauses with other vendors — and how?", "goal": "Find the path to resolution"}}, {"id": "dq-096", "tier": 2, "tag": "Process", "fire_when": ["decision_process_unclear"], "skip_when": [], "note": "Routes issues to the right resolution path.", "l1": {"q": "For the redlines flagged — are these commercial concerns or purely legal positions?", "goal": "Route to the right person for resolution"}, "l2": {"q": "Which ones have flexibility, and which are firm?", "goal": "Prioritize negotiation"}, "l3": {"q": "Can we get the commercial ones resolved between us, then let legal handle the rest?", "goal": "Split the path"}}, {"id": "dq-097", "tier": 2, "tag": "Criteria", "fire_when": ["pricing_discussion", "decision_process_unclear"], "skip_when": [], "note": "Catches scope creep during legal.", "l1": {"q": "Did anything in the commercial terms shift during legal review that we need to re-align on?", "goal": "Catch scope drift"}, "l2": {"q": "Who made that change — legal or the business side?", "goal": "Identify the decision-maker"}, "l3": {"q": "Is that a deal change or just a language preference?", "goal": "Assess severity"}}, {"id": "dq-098", "tier": 2, "tag": "Process", "fire_when": ["decision_process_unclear", "timeline_delay"], "skip_when": [], "note": "Maps the execution process.", "l1": {"q": "Walk me through your signing process — who signs first, and how does it route internally?", "goal": "Map the final steps"}, "l2": {"q": "How long does that routing typically take?", "goal": "Calibrate timeline"}, "l3": {"q": "Is there anything that could delay it at this stage?", "goal": "Surface last-mile risk"}}, {"id": "dq-099", "tier": 2, "tag": "Process", "fire_when": ["decision_process_unclear", "timeline_delay"], "skip_when": [], "note": "Identifies if procurement is a separate blocker.", "l1": {"q": "Where does procurement stand — running in parallel or sequentially after legal?", "goal": "Check procurement status"}, "l2": {"q": "Is there anything procurement needs from us to keep moving?", "goal": "Unblock procurement"}, "l3": {"q": "Can we set a target date for contract execution?", "goal": "Lock timeline"}}, {"id": "dq-100", "tier": 2, "tag": "Champion", "fire_when": ["decision_process_unclear"], "skip_when": [], "note": "MEDDPICC Champion gap fill. Checks for defection at the final stage.", "l1": {"q": "Have you picked up any signals that support for this has shifted — either positively or negatively?", "goal": "Read the room"}, "l2": {"q": "What's driving that shift?", "goal": "Understand the change"}, "l3": {"q": "Is there anything we should do differently in response?", "goal": "Adapt strategy"}}], "exit_criteria": [], "champion_coaching": [], "stage_objections": [], "reframes": [], "competitor_paths": [], "next_steps": [{"id": "ns-037", "text": "Are all open redlines now resolved, or are there items still outstanding?"}, {"id": "ns-038", "text": "Do both sides have a clear view of the final document — no surprises?"}, {"id": "ns-039", "text": "Can we commit to a target signing date?"}, {"id": "ns-040", "text": "Is there anything that could delay execution that we haven't addressed?"}], "proof_points": []}], "stage_keys": ["core"]}, "M12": {"name": "Implementation Kickoff", "belief_shift": "The implementation team has the context to deliver what we bought.", "stages": [{"id": "m12-core", "name": "Implementation Kickoff", "goal": "Transfer context from sales to implementation. Confirm the implementation plan matches expectations. Ensure the client team is identified, available, and committed.", "belief_shift_target": "Move from 'we signed, now what?' to 'the implementation team has the context to deliver what we bought.'", "questions": [{"id": "dq-101", "tier": 2, "tag": "Pain", "fire_when": ["workflow_fragility", "ownership_unclear"], "skip_when": [], "note": "Captures tribal knowledge before handoff.", "l1": {"q": "What are the top three things the implementation team needs to understand about your environment that might not be in the files?", "goal": "Surface institutional knowledge"}, "l2": {"q": "Are there any quirks or exceptions that have tripped up other vendors?", "goal": "Pre-solve implementation pitfalls"}, "l3": {"q": "Who on your team should we talk to about those details?", "goal": "Get the right contact"}}, {"id": "dq-102", "tier": 2, "tag": "Champion", "fire_when": ["ownership_unclear"], "skip_when": [], "note": "Identifies the implementation champion.", "l1": {"q": "Who on your side will be the day-to-day point of contact — and do they have the bandwidth for this?", "goal": "Identify implementation lead"}, "l2": {"q": "What's their workload like right now — any competing priorities?", "goal": "Assess bandwidth risk"}, "l3": {"q": "Do they need air cover from leadership to dedicate time to this?", "goal": "Pre-solve resource conflicts"}}, {"id": "dq-103", "tier": 2, "tag": "Process", "fire_when": ["timeline_delay"], "skip_when": [], "note": "Identifies timing constraints.", "l1": {"q": "Are there any upcoming events that create hard deadlines or blackout periods for the rollout?", "goal": "Map timeline constraints"}, "l2": {"q": "When's the ideal window to go live — and what drives that?", "goal": "Identify optimal timing"}, "l3": {"q": "Should we work backward from that date to build the implementation plan?", "goal": "Lock the plan"}}, {"id": "dq-104", "tier": 2, "tag": "Metrics", "fire_when": ["roi_curiosity"], "skip_when": [], "note": "Sets early success criteria.", "l1": {"q": "What does a successful first 30 days look like from your team's perspective?", "goal": "Set expectations"}, "l2": {"q": "What would make the team feel like this was the right decision?", "goal": "Define the emotional milestone"}, "l3": {"q": "What's the one thing that, if it went wrong early, would undermine confidence?", "goal": "Identify the critical risk"}}, {"id": "dq-105", "tier": 2, "tag": "Process", "fire_when": ["timeline_delay", "workflow_fragility"], "skip_when": [], "note": "Learns from their prior failures. Prevents repeating them.", "l1": {"q": "Where have past technology implementations gone sideways in your organization — and what should we avoid?", "goal": "Learn from their history"}, "l2": {"q": "Was it the technology, the process, or the people that caused the issue?", "goal": "Categorize the risk"}, "l3": {"q": "How should we structure our check-ins to catch problems early?", "goal": "Build in safeguards"}}], "exit_criteria": [], "champion_coaching": [], "stage_objections": [], "reframes": [], "competitor_paths": [], "next_steps": [{"id": "ns-041", "text": "Does the implementation plan match your expectations for scope and timeline?"}, {"id": "ns-042", "text": "Is the full team identified and available for the kickoff?"}, {"id": "ns-043", "text": "Can we lock in the kickoff date and send calendar invites today?"}, {"id": "ns-044", "text": "Is there anything else you need from us before we officially begin?"}], "proof_points": [{"id": "pp-044", "text": "Implementation team handles 90-95% of configuration. Client role is validation — confirming output matches what they know to be true."}, {"id": "pp-045", "text": "AI tooling accelerating LPA parsing, chart of accounts mapping, and historical reconciliation. Every quarter the process gets faster."}]}], "stage_keys": ["core"]}}, "signal_rebuttals": {"status_quo_confidence": {"l1": {"text": "That's actually the most common thing we hear. The firms that feel most confident are usually the ones who haven't been stress-tested yet — one LP dispute, one key person leaving, one new fund launch. I'm not here to create a problem. I'm here to ask whether the setup that works today still works at twice the complexity."}, "l2": {"text": "What would have to break before you'd say 'we should have done this sooner'?"}, "l3": {"text": "Something brought you to this meeting. If everything were truly fine, we wouldn't be talking. What triggered the conversation?"}}, "status_quo_defense": {"l1": {"text": "I'm not saying it's broken — I'm asking whether it scales. Most firms we talk to aren't in crisis. They're at an inflection point where the process that got them here won't get them there. The question is whether you want to address that before or after the next fund launch."}, "l2": {"text": "When you add Fund V or your next close — does the current process hold up without adding headcount?"}, "l3": {"text": "What's the one thing about your current setup that you'd fix if it were easy?"}}, "manual_process": {"l1": {"text": "Manual works until it doesn't. The real question is whether the manual work is growing with your fund count — because if it is, you're either going to cap your growth or keep hiring. Neither is the answer."}, "l2": {"text": "Ballpark — how many hours per quarter does your team spend on validation and reconciliation?"}, "l3": {"text": "If you could get 80% of those hours back without adding headcount, what would the team work on instead?"}}, "workflow_fragility": {"l1": {"text": "When a process depends on specific people doing specific steps in a specific order — that's not a workflow, that's a ritual. Rituals work until the person who knows the ritual isn't there."}, "l2": {"text": "If I asked your team to document that process end to end right now — how long would it take and how complete would it be?"}, "l3": {"text": "What happens the quarter when everything goes wrong at once — new fund, key person out, audit prep all landing in the same window?"}}, "excel_dependency": {"l1": {"text": "Excel isn't the problem — it's the dependency Excel creates. When the logic lives in a file that one person maintains, the file is the single point of failure. It doesn't break loudly. It breaks quietly."}, "l2": {"text": "How many people on your team can open that model and actually understand what it's doing — not just use it, but explain the logic?"}, "l3": {"text": "What happens to that model when you need to handle a structure you've never modeled before — a new waterfall tier, a continuation vehicle, a co-invest with custom economics?"}}, "audit_risk": {"l1": {"text": "Audit readiness isn't just having the numbers — it's showing your work. Every calculation, every override, every amendment, with a timestamp and a reason. A spreadsheet that's been modified 40 times doesn't give you that."}, "l2": {"text": "Last audit season — how long did your team spend pulling documentation together versus actually reviewing it?"}, "l3": {"text": "If an auditor could trace any number back to the source in under a minute instead of hours — how much does that compress your cycle?"}}, "key_person_risk": {"l1": {"text": "The risk isn't just that they leave — it's what happens while they're still here. You can't promote them freely. You can't have them out during distribution season. You can't ramp someone alongside them because the knowledge isn't transferable. They're a bottleneck even when they're performing."}, "l2": {"text": "Who else on your team fully understands how the waterfall logic works end to end — not just the outputs, but the construction?"}, "l3": {"text": "If that person told you today they're leaving in 60 days — what's your plan?"}}, "fund_growth": {"l1": {"text": "Growth is the multiplier. Every new fund adds side letters, fee arrangements, waterfall tiers, and another set of reconciliation cycles. The cost doesn't grow linearly — it compounds. The question is whether the infrastructure scales with the business or becomes the ceiling on it."}, "l2": {"text": "What does your fund launch roadmap look like over the next 18 months — and how does the team absorb that?"}, "l3": {"text": "At what point do you need to hire another person just to keep up — and what does that hire cost you fully loaded?"}}, "pricing_sensitivity": {"l1": {"text": "It's the most significant software investment a fund ops team makes. Here's the math that matters: your team is already spending the equivalent in person-hours, key person risk, and distribution delays — they're just not line-iteming it. Every client we work with passes this through as an LP fund expense under the LPA. Net cost to the GP is often close to zero."}, "l2": {"text": "Let me make this concrete — what does a fully-loaded FTE cost you in this market? I want to run the real comparison with your numbers, not ours."}, "l3": {"text": "Forget our pricing for a second. What does the status quo cost you per year — in hours, in risk, in late distributions? That's the number your CFO should be comparing against."}}, "internal_build_mentioned": {"l1": {"text": "We've seen this play out. The first version works. Then a new fund structure comes in and someone has to hack the system. Then another. The engineering team underestimates the complexity of fund accounting — not because they're not talented, but because it's genuinely subtle. One client priced an Anaplan build at $50-70M over five years. That's before the 3-5 engineers to maintain it."}, "l2": {"text": "What's the realistic timeline for the build — and does that include ongoing maintenance when fund structures change?"}, "l3": {"text": "Here's the real question: does your firm want to be in the fund accounting software business, or the fund management business? We have 50+ engineers who do nothing but this."}}, "competitor_mentioned": {"l1": {"text": "Good — the fact that you're looking around means you know this is a real need. I'm not going to trash anyone. What I'd rather do is understand what you've seen, what impressed you, and where it fell short — so we can focus on the gaps instead of covering ground you've already covered."}, "l2": {"text": "What specifically were you hoping they could solve — and where did it come up short?"}, "l3": {"text": "I'm not asking you to trust my word on capability. I'm asking if it's worth 45 minutes to put your hardest fund on the table and see whether we can actually model it."}}, "no_urgency": {"l1": {"text": "That's fair — there's no fire today. The question is whether the current setup is designed for where you're going or where you've been. Most firms don't add infrastructure during a crisis — they add it when they can. The ones who wait usually wish they'd started a quarter earlier."}, "l2": {"text": "What's your next fund close date — and does the current process get harder or easier between now and then?"}, "l3": {"text": "What would have to happen for this to feel urgent? I want to understand what the trigger looks like for you so we're not guessing at timing."}}, "competitor_pricing": {"l1": {"text": "A lower price point usually means a narrower scope. The question is what's included versus what you'd still need to solve in Excel on top of it. A platform that handles 60% of the complexity at a lower cost isn't cheaper — it's a partial solution plus the same manual work."}, "l2": {"text": "What specifically is included in their quote — and what would you still need to handle yourself?"}, "l3": {"text": "One of our clients spent six months evaluating a cheaper alternative that couldn't handle their waterfall structures. The hidden cost wasn't the license — it was the six months."}}, "build_vs_buy_cost": {"l1": {"text": "Internal builds are optimized for how things worked when they were built. The question is what happens when a new structure comes in — a continuation vehicle, a step-up carry, a multi-currency waterfall. Every exception becomes a mini-engineering project. One client priced an Anaplan build at $50-70M over five years including the consulting and maintenance tail."}, "l2": {"text": "How many engineering hours would your team need to build waterfall logic for multi-tier structures with side-letter overrides and full audit traceability?"}, "l3": {"text": "Your firm has a choice: be in the fund accounting software business, or the fund management business. We have 50+ engineers whose entire job is this. You'd be sharing R&D cost with every client on the platform."}}, "allvue_mentioned": {"l1": {"text": "Allvue is a strong GL for partnership accounting. The gap is at the investor level — waterfalls, carried interest, scenario modeling, LP-specific economics. That's where every firm running Allvue still ends up in Excel. We sit on top of Allvue, not instead of it."}, "l2": {"text": "Are you using Allvue for the GL only, or are you trying to get it to handle investor-level calculations too?"}, "l3": {"text": "Where does the waterfall logic actually live today — in Allvue or in a spreadsheet next to it?"}}, "carta_mentioned": {"l1": {"text": "Carta is solid for venture-style funds with simple pro-rata structures. The ceiling shows up when complexity increases — deal-by-deal waterfalls, catch-ups with clawbacks, side-letter overrides. Firms with institutional-grade complexity tend to outgrow it."}, "l2": {"text": "How many of your fund structures have economics that go beyond a simple pro-rata split?"}, "l3": {"text": "Carta's waterfall engine uses rigid templates. How many of your LP arrangements have custom terms that wouldn't fit a standard template?"}}, "investran_mentioned": {"l1": {"text": "Investran is widely used for fund-level accounting — and it does that well. The pattern is that investor-level performance — waterfalls, fees, carry, scenario modeling — still lives in Excel even with Investran. We don't replace Investran. Data flows in. The GL stays. We add the calc layer above it."}, "l2": {"text": "Where does the investor-level calc logic live today — inside Investran or in Excel next to it?"}, "l3": {"text": "If Investran handled the calc layer well, your team wouldn't be in Excel. That gap is exactly where we sit."}}, "efront_mentioned": {"l1": {"text": "eFront is solid for GL and fund accounting, especially highly customized instances. The gap is the same — investor-level performance, waterfalls, and scenario modeling typically live outside eFront in Excel or custom solutions. We integrate with eFront and add the layer it doesn't cover."}, "l2": {"text": "How customized is your eFront instance — and what still lives outside it in Excel?"}, "l3": {"text": "The more customized the eFront instance, the harder it is to change. The calc layer above it gives you flexibility without touching the GL."}}, "ownership_unclear": {"l1": {"text": "When ownership is distributed — the admin handles this, someone else handles that, a third person checks the numbers — nobody sees the full picture. That's not a people problem, it's a structural one. A system of record gives everyone visibility without changing who does what."}, "l2": {"text": "If I asked who's ultimately responsible for the accuracy of your next distribution — one name — who would you say?"}, "l3": {"text": "What happens when that person is on vacation during quarter-end?"}}, "internal_build": {"l1": {"text": "Building internally makes sense when the problem is simple and stable. Fund accounting isn't either — new structures, new side letters, new regulatory requirements. The first version works. Maintaining it across 15 fund vintages over 10 years is where the real cost hides."}, "l2": {"text": "How much of your engineering team's time goes into maintaining the current tool versus building new things?"}, "l3": {"text": "If the person who built it left, how long before someone else could maintain it — and what breaks in the meantime?"}}, "economic_buyer_missing": {"l1": {"text": "Totally understand — most decisions like this involve someone senior. The sooner we understand what they care about, the better we can tailor the conversation. We're not asking to pitch them yet — we just want to make sure what we show is relevant to the person who says yes."}, "l2": {"text": "When they evaluate an investment like this, what lens do they use — cost savings, risk reduction, or strategic capability?"}, "l3": {"text": "What's the one thing they'd need to see to give this 30 minutes of their time?"}}, "pricing_discussion": {"l1": {"text": "Happy to talk numbers. The short version: it's priced in basis points on committed capital, and every client passes it through as an LP fund expense — so the net cost to the GP is typically close to zero. The real comparison is platform cost versus the fully-loaded cost of the manual process it replaces."}, "l2": {"text": "Would it help if I walked you through how firms your size typically think about the math — headcount equivalence, distribution timing, and risk reduction?"}, "l3": {"text": "What's the budget range that would make this a straightforward decision versus one that needs committee approval?"}}, "vendor_comparison": {"l1": {"text": "Good — the fact that you're evaluating options means you know this is a real need. Rather than give you the generic pitch, tell me what you've seen so far and where it fell short. That way I can focus on what actually matters to you instead of covering ground you've already covered."}, "l2": {"text": "What's the biggest gap you've found so far — product capability, implementation approach, or something else?"}, "l3": {"text": "Would it be useful to define evaluation criteria together so every vendor gets measured against the same bar?"}}, "timeline_delay": {"l1": {"text": "Timing makes sense — you don't want to add a project during your busiest period. Here's what most firms do: discovery and scoping happen now while the team is heads-down, implementation kicks off after the crunch clears, and the system is ready for the next cycle. That way you're not scrambling to do both at once."}, "l2": {"text": "When does the current crunch end — and what's the first clean window after that?"}, "l3": {"text": "If we started scoping now and kicked off implementation in [month], would that timeline work?"}}, "decision_process_unclear": {"l1": {"text": "That's normal for a decision that touches finance, operations, and technology. The best way to handle it is to map the process now — who evaluates, who approves, what security or procurement steps are required — so nothing surpri
